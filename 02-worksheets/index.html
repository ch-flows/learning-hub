<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INTERACTION | CH-FLOWS</title>
    <style>
        /* 样式与口试页保持高度统一，维持高级感 */
        body { font-family: -apple-system, sans-serif; background: #fcfcfc; color: #334155; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { padding: 60px 0 40px; text-align: center; }
        .brand { font-size: 1.25rem; font-weight: 200; letter-spacing: 6px; color: #0c4a6e; text-transform: uppercase; text-decoration: none; }

        .task-date { font-size: 0.75rem; color: #94a3b8; }
        .back-home-icon { margin: 60px 0; padding: 12px; border-radius: 50%; transition: 0.3s; display: inline-flex; }
        .back-home-icon:hover { background: #f1f5f9; transform: scale(1.1); }
