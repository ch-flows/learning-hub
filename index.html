<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #64748b; 
            --text-light: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-gradient);
            padding: 60px 20px 80px; 
            text-align: center;
            color: white;
            flex-shrink: 0;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            letter-spacing: 5px; opacity: 0.8; font-weight: 300;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 在大屏下让内容居中分布 */
            padding-bottom: 40px;
        }

        .container {
            max-width: 1060px;
            width: 92%;
            margin: -35px auto 0; 
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 25px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1); }
        .icon { font-size: 48px; margin-bottom: 25px; }
        .card h2 { font-size: 1.4rem; letter-spacing: 5px; color: var(--text-main); margin-bottom: 8px; font-weight: 400;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-sub); letter-spacing: 2px; }

        /* 中英双语理念看板 */
        .vision-board {
            text-align: center;
            padding: 50px 20px;
            max-width: 800px;
            margin: 20px auto 0;
        }
        .vision-ch {
            font-size: 1.1rem;
            color: var(--text-sub);
            letter-spacing: 4px;
            margin-bottom: 12px;
            font-weight: 300;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--text-light);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 300;
            line-height: 1.8;
        }

        footer {
            padding: 25px 20px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        .footer-text { font-size: 0.75rem; color: #cbd5e1; letter-spacing: 2px; font-weight: 300; }

        /* 针对小窗口/非全屏的优化 */
        @media (max-height: 800px) {
            header { padding: 40px 20px 60px; }
            .vision-board { padding: 30px 20px; }
            .main-content { justify-content: flex-start; } /* 窗口矮时向上对齐，防止底部被遮 */
        }

        @media (max-width: 768px) {
            .brand { font-size: 1.7rem; letter-spacing: 8px; }
            .grid { grid-template-columns: 1fr; gap: 20px; }
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">LEARNING GUIDE</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">CLASS INTERACTION</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">EXCELLENCE GALLERY</div>
                </a>
            </div>
        </div>

        <div class="vision-board">
            <p class="vision-ch">博观而约取，厚积而薄发</p>
            <p class="vision-en">Broaden your vision to harvest the essence;<br>Accumulate deeply to flourish with brilliance.</p>
        </div>
    </main>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · CONNECTING THE WORLD THROUGH CHINESE</div>
    </footer>
</body>
</html>
