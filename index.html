<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #475569; /* 加深颜色，确保阅读不吃力 */
            --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-gradient);
            padding: 70px 20px 100px; 
            text-align: center;
            color: white;
            flex-shrink: 0;
        }
        .brand {
            font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 600;
            letter-spacing: 12px; margin-bottom: 10px; text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            letter-spacing: 5px; opacity: 0.8; font-weight: 300;
        }

        /* 核心逻辑：让 main 占据剩余所有空间 */
        .main-content {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; /* 全屏时垂直居中分布 */
            padding: 40px 0;
        }

        .container {
            max-width: 1060px;
            width: 92%;
            margin: -60px auto 0; /* 保持悬浮感 */
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 45px 25px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1); }
        .icon { font-size: 52px; margin-bottom: 30px; }
        .card h2 { font-size: 1.45rem; letter-spacing: 5px; color: var(--text-main); margin-bottom: 8px; font-weight: 400;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-light); letter-spacing: 2px; }

        /* 理念看板：加深颜色，优化全屏排版 */
        .vision-board {
            text-align: center;
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .vision-ch {
            font-size: 1.2rem;
            color: var(--text-sub); /* 使用深色 */
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 1px;
            font-weight: 400;
            line-height: 1.8;
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        .footer-text { font-size: 0.8rem; color: #94a3b8; letter-spacing: 2px; font-weight: 300; }

        /* 处理矮窗口：防止内容挤压 */
        @media (max-height: 850px) {
            .main-content { justify-content: flex-start; }
            .vision-board { padding: 40px 20px; }
        }

        @media (max-width: 768px) {
            .brand { font-size: 1.7rem; letter-spacing: 8px; }
            .grid { grid-template-columns: 1fr; }
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">LEARNING GUIDE</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">CLASS INTERACTION</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">EXCELLENCE GALLERY</div>
                </a>
            </div>
        </div>

        <div class="vision-board">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </div>
    </main>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · Connecting the World through Chinese</div>
    </footer>
</body>
</html>
