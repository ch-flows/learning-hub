<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>📸 拍照上传</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f0f4f8;min-height:100vh;padding:16px 16px 40px;}
.wrap{max-width:480px;margin:0 auto;}
.card{background:#fff;border-radius:12px;padding:16px 18px;margin-bottom:14px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.card h2{font-size:10pt;font-weight:700;color:#1a2a3a;margin-bottom:12px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:8.5pt;color:#64748b;font-weight:600;margin-bottom:4px;}
.field input{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:10.5pt;font-family:inherit;outline:none;}
.field input:focus{border-color:#2563eb;}
.scan-row{display:flex;align-items:center;gap:10px;background:#f4f8ff;border:0.5px solid #c8d8f0;border-radius:8px;padding:10px 14px;margin-bottom:12px;}
.scan-label{flex:1;}
.scan-label b{font-size:9.5pt;color:#1a2a3a;display:block;}
.scan-label span{font-size:7.5pt;color:#64748b;}
.scan-badge{font-size:7pt;padding:1px 6px;border-radius:10px;margin-left:5px;font-weight:600;vertical-align:middle;}
.scan-badge.loading{background:#fef3c7;color:#92400e;}
.scan-badge.ready{background:#d1fae5;color:#065f46;}
.scan-badge.fallback{background:#e0e7ff;color:#3730a3;}
.toggle{position:relative;width:50px;height:28px;flex-shrink:0;display:inline-block;}
.toggle input{position:absolute;opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:#cbd5e1;border-radius:28px;cursor:pointer;transition:background .25s;}
.slider::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle input:checked ~ .slider{background:#2563eb;}
.toggle input:checked ~ .slider::before{transform:translateX(22px);}
.upload-zone{border:1.5px dashed #c8d8f0;border-radius:8px;padding:28px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:12px;position:relative;background:#fff;}
.upload-zone:hover,.upload-zone.over{border-color:#2563eb;background:#f0f6ff;}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:28px;margin-bottom:8px;}
.upload-lbl{font-size:10pt;font-weight:600;color:#2563eb;margin-bottom:3px;}
.upload-hint{font-size:8pt;color:#64748b;}
.count{font-size:8.5pt;color:#64748b;text-align:center;margin-bottom:8px;}
.drag-hint{font-size:8pt;color:#94a3b8;text-align:center;margin-bottom:8px;display:none;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:12px;}
.thumb{position:relative;border-radius:10px;background:#f8fafc;box-shadow:0 2px 8px rgba(0,0,0,.10);cursor:grab;user-select:none;}
.thumb img{width:100%;aspect-ratio:3/4;object-fit:cover;border-radius:10px;display:block;pointer-events:none;}
.thumb-num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.55);color:#fff;font-size:7.5pt;font-weight:700;border-radius:20px;padding:2px 7px;pointer-events:none;}
.thumb-del{position:absolute;top:5px;right:5px;width:26px;height:26px;border-radius:50%;background:#dc2626;color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.3);z-index:2;}
.thumb-retake{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;border:none;font-size:7.5pt;border-radius:20px;padding:3px 10px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.add-more{display:flex;align-items:center;justify-content:center;gap:7px;background:#f4f8ff;border:0.5px solid #c8d8f0;border-radius:8px;padding:10px;font-size:9.5pt;font-weight:600;color:#2563eb;cursor:pointer;font-family:inherit;width:100%;margin-bottom:12px;transition:background .15s;position:relative;}
.add-more input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.submit-btn{width:100%;padding:14px;background:#1a4f8a;color:#fff;border:none;border-radius:10px;font-size:11pt;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity .2s;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.status{font-size:8.5pt;text-align:center;padding:8px;border-radius:7px;margin-top:10px;display:none;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#fff;}
.overlay.show{display:flex;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-txt{font-size:11pt;font-weight:600;}
</style>
</head>
<body>
<div id="proc-overlay" class="overlay"><div class="spinner"></div><div class="spinner-txt" id="proc-txt">处理中…</div></div>
<div class="wrap">
  <div class="card">
    <h2>学生信息</h2>
    <div class="field"><label>姓名 Name</label><input type="text" id="s-name" placeholder="请填写姓名" autocomplete="off"></div>
    <div class="field"><label>学号 Index No.</label><input type="text" id="s-num" placeholder="请填写学号" autocomplete="off" inputmode="numeric"></div>
  </div>
  <div class="card">
    <h2>上传作业照片</h2>
    <div class="scan-row">
      <div class="scan-label">
        <b>🔬 自动扫描增强<span class="scan-badge loading" id="cv-badge">加载中…</span></b>
        <span id="cv-desc">正在加载扫描引擎…</span>
      </div>
      <div class="toggle"><input type="checkbox" id="scan-on" checked><span class="slider"></span></div>
    </div>
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-in" accept="image/*" capture="environment" multiple>
      <div class="upload-icon">📷</div>
      <div class="upload-lbl">点击拍照或选取图片</div>
      <div class="upload-hint">可同时选取多张照片</div>
    </div>
    <div class="count" id="p-count"></div>
    <div class="drag-hint" id="drag-hint">☰ 长按可拖动排序</div>
    <div class="grid" id="p-grid"></div>
    <button class="add-more" id="add-more" style="display:none">
      <input type="file" id="add-in" accept="image/*" capture="environment" multiple>
      ＋ 继续添加照片
    </button>
    <button class="submit-btn" id="sub-btn">📤 提交</button>
    <div class="status" id="sub-status"></div>
  </div>
</div>

<script>
var META = {"class":"4hcl","assignTitle":"fupan","scriptUrl":"https://script.google.com/macros/s/AKfycbxxAkcPQ3xFKhngphXLPdyIXzPX-d33kxMWNjuYrnJ9NksUQ1Cq3TFVJwi9wQhe15hQ/exec"};
document.title = META.assignTitle;

var photos = [], scanOn = true, dragSrc = null;
var cvReady = false;   // OpenCV 已就绪
var cvFailed = false;  // OpenCV 加载失败，使用降级方案

// ══════════════════════════════════════════════
//  OpenCV.js 加载
// ══════════════════════════════════════════════
function onOpenCvReady() {
  // cv.onRuntimeInitialized 在 WASM 编译完成后调用
  cv.onRuntimeInitialized = function() {
    cvReady = true;
    var badge = document.getElementById('cv-badge');
    var desc  = document.getElementById('cv-desc');
    if (badge) { badge.textContent = '高清扫描'; badge.className = 'scan-badge ready'; }
    if (desc)  { desc.textContent = '透视矫正 + 自适应二值化，效果接近打印机扫描'; }
  };
}

(function loadOpenCV() {
  var badge = document.getElementById('cv-badge');
  var desc  = document.getElementById('cv-desc');
  var script = document.createElement('script');
  script.async = true;
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/opencv.js/4.8.0/opencv.js';
  script.onload = function() { onOpenCvReady(); };
  script.onerror = function() {
    // CDN 失败，尝试备用地址
    var script2 = document.createElement('script');
    script2.async = true;
    script2.src = 'https://docs.opencv.org/4.8.0/opencv.js';
    script2.onload = function() { onOpenCvReady(); };
    script2.onerror = function() {
      cvFailed = true;
      if (badge) { badge.textContent = '基础增强'; badge.className = 'scan-badge fallback'; }
      if (desc)  { desc.textContent = '扫描引擎不可用，使用基础对比度增强'; }
    };
    document.head.appendChild(script2);
  };
  document.head.appendChild(script);
  // 10秒后若仍未就绪，标记降级
  setTimeout(function() {
    if (!cvReady) {
      cvFailed = true;
      if (badge) { badge.textContent = '基础增强'; badge.className = 'scan-badge fallback'; }
      if (desc)  { desc.textContent = '扫描引擎加载超时，使用基础对比度增强'; }
    }
  }, 10000);
})();

// ══════════════════════════════════════════════
//  OpenCV 扫描：透视矫正 + 自适应阈值
// ══════════════════════════════════════════════
function cvScan(img) {
  try {
    // 缩放到合适大小处理（太大会慢）
    var maxDim = 1600;
    var W = img.naturalWidth || img.width;
    var H = img.naturalHeight || img.height;
    var scale = Math.min(1, maxDim / Math.max(W, H));
    var w = Math.round(W * scale), h = Math.round(H * scale);

    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);

    var src = cv.imread(canvas);
    var dst = new cv.Mat();

    // 1. 灰度
    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);

    // 2. 高斯模糊（去噪）
    var blurred = new cv.Mat();
    var ksize = new cv.Size(5, 5);
    cv.GaussianBlur(dst, blurred, ksize, 0);

    // 3. Canny 边缘检测
    var edges = new cv.Mat();
    cv.Canny(blurred, edges, 50, 150);

    // 4. 膨胀（连接断边）
    var dilated = new cv.Mat();
    var kernel = cv.Mat.ones(3, 3, cv.CV_8U);
    cv.dilate(edges, dilated, kernel);

    // 5. 找轮廓
    var contours = new cv.MatVector();
    var hierarchy = new cv.Mat();
    cv.findContours(dilated, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    // 6. 找面积最大的四边形轮廓（纸张）
    var bestContour = null;
    var bestArea = 0;
    var imgArea = w * h;
    for (var i = 0; i < contours.size(); i++) {
      var cnt = contours.get(i);
      var area = cv.contourArea(cnt);
      if (area < imgArea * 0.1) { cnt.delete(); continue; } // 太小跳过
      var peri = cv.arcLength(cnt, true);
      var approx = new cv.Mat();
      cv.approxPolyDP(cnt, approx, 0.02 * peri, true);
      if (approx.rows === 4 && area > bestArea) {
        if (bestContour) bestContour.delete();
        bestContour = approx;
        bestArea = area;
      } else {
        approx.delete();
      }
      cnt.delete();
    }

    var result;
    if (bestContour && bestArea > imgArea * 0.15) {
      // 找到了纸张四角，做透视变换
      var pts = [];
      for (var i = 0; i < 4; i++) {
        pts.push({ x: bestContour.data32S[i*2], y: bestContour.data32S[i*2+1] });
      }
      // 排序：左上、右上、右下、左下
      pts.sort(function(a, b) { return a.y - b.y; });
      var top = pts.slice(0, 2).sort(function(a, b) { return a.x - b.x; });
      var bot = pts.slice(2, 4).sort(function(a, b) { return a.x - b.x; });
      var tl = top[0], tr = top[1], br = bot[1], bl = bot[0];

      var wA = Math.hypot(br.x - bl.x, br.y - bl.y);
      var wB = Math.hypot(tr.x - tl.x, tr.y - tl.y);
      var hA = Math.hypot(tr.x - br.x, tr.y - br.y);
      var hB = Math.hypot(tl.x - bl.x, tl.y - bl.y);
      var dw = Math.round(Math.max(wA, wB));
      var dh = Math.round(Math.max(hA, hB));
      if (dw < 100 || dh < 100) throw new Error('warp too small');

      var srcPts = cv.matFromArray(4, 1, cv.CV_32FC2,
        [tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y]);
      var dstPts = cv.matFromArray(4, 1, cv.CV_32FC2,
        [0, 0, dw, 0, dw, dh, 0, dh]);
      var M = cv.getPerspectiveTransform(srcPts, dstPts);
      var warped = new cv.Mat();
      var dsize = new cv.Size(dw, dh);
      cv.warpPerspective(src, warped, M, dsize);

      // 转灰度做自适应阈值
      var wGray = new cv.Mat();
      cv.cvtColor(warped, wGray, cv.COLOR_RGBA2GRAY);
      var wThresh = new cv.Mat();
      cv.adaptiveThreshold(wGray, wThresh, 255,
        cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 21, 10);

      var outCanvas = document.createElement('canvas');
      outCanvas.width = dw; outCanvas.height = dh;
      cv.imshow(outCanvas, wThresh);
      result = outCanvas.toDataURL('image/jpeg', 0.92);

      // 清理
      [warped, wGray, wThresh, srcPts, dstPts, M].forEach(function(m){ m.delete(); });
      bestContour.delete();
    } else {
      // 找不到四角，只做自适应阈值（不做透视）
      var gray2 = new cv.Mat();
      cv.cvtColor(src, gray2, cv.COLOR_RGBA2GRAY);
      var thresh2 = new cv.Mat();
      cv.adaptiveThreshold(gray2, thresh2, 255,
        cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 21, 10);
      var outCanvas2 = document.createElement('canvas');
      outCanvas2.width = w; outCanvas2.height = h;
      cv.imshow(outCanvas2, thresh2);
      result = outCanvas2.toDataURL('image/jpeg', 0.92);
      [gray2, thresh2].forEach(function(m){ m.delete(); });
      if (bestContour) bestContour.delete();
    }

    // 清理其余
    [src, dst, blurred, edges, dilated, kernel, contours, hierarchy].forEach(function(m){
      try { m.delete(); } catch(e) {}
    });

    return result;
  } catch(e) {
    // OpenCV 出错，降级
    return null;
  }
}

// ══════════════════════════════════════════════
//  降级方案：纯 JS 基础增强（灰度+对比度+锐化）
// ══════════════════════════════════════════════
function basicEnhance(img) {
  var c = document.createElement('canvas');
  var W = img.naturalWidth || img.width, H = img.naturalHeight || img.height;
  c.width = W; c.height = H;
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, W, H);
  var id = ctx.getImageData(0, 0, W, H), d = id.data;
  // 灰度
  for (var i = 0; i < d.length; i += 4) {
    var g = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
    d[i] = d[i+1] = d[i+2] = g;
  }
  // 自适应对比度拉伸
  var h = new Float32Array(256);
  for (var i = 0; i < d.length; i += 4) h[d[i]]++;
  var tot = W*H, lo = 0, hi = 255, cum = 0;
  for (var v = 0; v < 256; v++) { cum += h[v]; if (cum/tot >= 0.04) { lo = v; break; } }
  cum = 0;
  for (var v = 255; v >= 0; v--) { cum += h[v]; if (cum/tot >= 0.04) { hi = v; break; } }
  if (hi <= lo) { lo = 0; hi = 255; }
  var sc = 255 / (hi - lo);
  for (var i = 0; i < d.length; i += 4) {
    var val = Math.round((d[i] - lo) * sc);
    val = val < 0 ? 0 : val > 255 ? 255 : val;
    d[i] = d[i+1] = d[i+2] = val;
  }
  // 锐化
  var src2 = new Uint8ClampedArray(d), tmp = new Uint8ClampedArray(d.length);
  for (var y = 0; y < H; y++) {
    for (var x = 0; x < W; x++) {
      var idx = (y*W+x)*4, sum = 0, cnt = 0;
      for (var dx = -1; dx <= 1; dx++) {
        var nx = x+dx; if (nx<0||nx>=W) continue;
        sum += src2[(y*W+nx)*4]; cnt++;
      }
      tmp[idx] = tmp[idx+1] = tmp[idx+2] = Math.round(sum/cnt); tmp[idx+3] = 255;
    }
  }
  for (var i = 0; i < d.length; i += 4) {
    var s2 = src2[i] + 0.6*(src2[i]-tmp[i]);
    s2 = s2<0?0:s2>255?255:s2;
    d[i] = d[i+1] = d[i+2] = Math.round(s2);
  }
  ctx.putImageData(id, 0, 0);
  return c.toDataURL('image/jpeg', 0.92);
}

// ══════════════════════════════════════════════
//  统一入口：优先用 OpenCV，不可用降级
// ══════════════════════════════════════════════
function enhanceScan(img) {
  if (cvReady && !cvFailed) {
    var result = cvScan(img);
    if (result) return result;
  }
  return basicEnhance(img);
}

// ══════════════════════════════════════════════
//  文件处理
// ══════════════════════════════════════════════
function procFile(file, cb) {
  var r = new FileReader();
  r.onload = function(e) {
    var orig = e.target.result;
    if (!scanOn) { cb({dataUrl:orig, orig:orig}); return; }
    var img = new Image();
    img.onload = function() { cb({dataUrl:enhanceScan(img), orig:orig}); };
    img.src = orig;
  };
  r.readAsDataURL(file);
}

function procFiles(files) {
  var arr = Array.from(files).filter(function(f){ return f.type.startsWith('image/'); });
  if (!arr.length) return;
  showOverlay(true);
  var idx = 0, res = [];
  function next() {
    if (idx >= arr.length) {
      arr.forEach(function(_, i){ photos.push(res[i]); });
      showOverlay(false); render(); return;
    }
    document.getElementById('proc-txt').textContent = '处理第' + (idx+1) + '/' + arr.length + '张…';
    procFile(arr[idx], function(p){ res[idx]=p; idx++; setTimeout(next, 30); });
  }
  next();
}

function showOverlay(v) {
  var el = document.getElementById('proc-overlay');
  if (el) { if(v) el.classList.add('show'); else el.classList.remove('show'); }
}

// ══════════════════════════════════════════════
//  渲染照片网格
// ══════════════════════════════════════════════
function render() {
  var grid = document.getElementById('p-grid');
  var zone = document.getElementById('upload-zone');
  var am   = document.getElementById('add-more');
  var cnt  = document.getElementById('p-count');
  var dh   = document.getElementById('drag-hint');
  grid.innerHTML = '';
  if (!photos.length) {
    zone.style.display = ''; am.style.display = 'none';
    cnt.textContent = ''; dh.style.display = 'none'; return;
  }
  zone.style.display = 'none'; am.style.display = '';
  cnt.textContent = '共' + photos.length + '张照片';
  dh.style.display = photos.length > 1 ? 'block' : 'none';
  photos.forEach(function(p, i) {
    var t = document.createElement('div'); t.className = 'thumb'; t.draggable = true; t.dataset.idx = i;
    var img = document.createElement('img'); img.src = p.dataUrl;
    var num = document.createElement('div'); num.className = 'thumb-num'; num.textContent = i+1;
    var del = document.createElement('button'); del.className = 'thumb-del'; del.innerHTML = '✕';
    del.onclick = function(e){ e.stopPropagation(); photos.splice(i,1); render(); };
    var ret = document.createElement('button'); ret.className = 'thumb-retake'; ret.textContent = '🔄 重拍';
    ret.onclick = function(e){ e.stopPropagation(); retake(i); };
    t.appendChild(img); t.appendChild(num); t.appendChild(del); t.appendChild(ret);
    t.addEventListener('dragstart', function(ev){ dragSrc=i; t.style.opacity='.5'; ev.dataTransfer.effectAllowed='move'; });
    t.addEventListener('dragend',   function(){ t.style.opacity=''; document.querySelectorAll('.thumb').forEach(function(el){el.style.boxShadow='';}); });
    t.addEventListener('dragover',  function(ev){ ev.preventDefault(); document.querySelectorAll('.thumb').forEach(function(el){el.style.boxShadow='';}); t.style.boxShadow='0 0 0 3px #2563eb'; });
    t.addEventListener('drop',      function(ev){ ev.preventDefault(); if(dragSrc===null||dragSrc===i)return; var mv=photos.splice(dragSrc,1)[0]; photos.splice(i,0,mv); dragSrc=null; render(); });
    grid.appendChild(t);
  });
}

function retake(idx) {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange = function(){ if(!inp.files||!inp.files[0])return; showOverlay(true); procFile(inp.files[0],function(p){ photos[idx]=p; showOverlay(false); render(); }); };
  inp.click();
}

function reprocess() {
  if (!photos.length) return;
  showOverlay(true);
  var idx = 0;
  function next() {
    if (idx >= photos.length) { showOverlay(false); render(); return; }
    document.getElementById('proc-txt').textContent = '重新处理第'+(idx+1)+'/'+photos.length+'张…';
    var orig = photos[idx].orig;
    if (!scanOn) { photos[idx].dataUrl = orig; idx++; setTimeout(next,10); return; }
    var img = new Image();
    img.onload = function(){ photos[idx].dataUrl = enhanceScan(img); idx++; setTimeout(next,30); };
    img.src = orig;
  }
  next();
}

// ══════════════════════════════════════════════
//  事件绑定
// ══════════════════════════════════════════════
document.getElementById('file-in').addEventListener('change', function(){ if(this.files&&this.files.length) procFiles(this.files); this.value=''; });
document.getElementById('add-in').addEventListener('change',  function(){ if(this.files&&this.files.length) procFiles(this.files); this.value=''; });
document.getElementById('scan-on').addEventListener('change', function(){ scanOn=this.checked; reprocess(); });
document.querySelector('.slider').addEventListener('click', function(){ document.getElementById('scan-on').click(); });

// ══════════════════════════════════════════════
//  提交
// ══════════════════════════════════════════════
document.getElementById('sub-btn').addEventListener('click', function() {
  var name = document.getElementById('s-name').value.trim();
  var num  = document.getElementById('s-num').value.trim();
  var st   = document.getElementById('sub-status');
  function showSt(msg, ok) {
    st.style.display='block'; st.style.background=ok?'#f0fdf4':'#fef2f2';
    st.style.color=ok?'#15803d':'#dc2626'; st.textContent=msg;
  }
  if (!name)          { showSt('❗ 请填写姓名', false); return; }
  if (!num)           { showSt('❗ 请填写学号', false); return; }
  if (!photos.length) { showSt('❗ 请至少拍一张照片', false); return; }
  var btn = document.getElementById('sub-btn');
  btn.disabled = true; btn.textContent = '提交中…'; st.style.display = 'none';
  var fileKey = [META.class, META.assignTitle, name, num]
    .map(function(s){ return String(s).replace(/[^\w\u4e00-\u9fff]/g,'_'); }).join('__');
  var payload = {
    type:'worksheet', fileKey:fileKey, template:'pazhao',
    grade:'worksheet_'+META.class, class:META.class, assignTitle:META.assignTitle,
    studentName:name, studentNum:num, submitTime:new Date().toLocaleString('zh-SG'),
    inputs:{}, canvases:{},
    pzPhotos: photos.map(function(p,i){ return {index:i+1, dataUrl:p.dataUrl}; })
  };
  fetch(META.scriptUrl, {
    method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload)
  }).then(function(){
    btn.textContent = '✅ 已提交';
    showSt('✅ 提交成功！老师已收到你的作业。', true);
  }).catch(function(){
    btn.disabled = false; btn.textContent = '📤 提交';
    showSt('❌ 网络错误，请检查连接后重试。', false);
  });
});
</script>
</body>
</html>
