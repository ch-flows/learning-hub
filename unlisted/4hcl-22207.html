        var sn=nodes.map(function(nd,i){
            var tw=Math.max(66,nd.text.length*7.2+14);
            var x=PAD+nd.level*NW, cy=yT[i]+leaves(i)*RH/2;
            return{x,cy,tw,col:C[nd.level%C.length],text:nd.text,lv:nd.level,i};
        });
        var parts=[],maxX=0;
        sn.forEach(function(nd,i){
            maxX=Math.max(maxX,nd.x+nd.tw);
            var ch=[];for(var k=0;k<n;k++)if(parent[k]===i)ch.push(k);
            if(ch.length){
                var topCy=sn[ch[0]].cy, botCy=sn[ch[ch.length-1]].cy;
                var bx=nd.x+nd.tw+5;
                // vertical bracket bar
                parts.push('<line x1="'+(nd.x+nd.tw)+'" y1="'+nd.cy+'" x2="'+bx+'" y2="'+nd.cy+'" stroke="'+nd.col+'" stroke-width="1.2" opacity="0.5"/>');
                parts.push('<line x1="'+bx+'" y1="'+topCy+'" x2="'+bx+'" y2="'+botCy+'" stroke="'+nd.col+'" stroke-width="1.2" opacity="0.5"/>');
                ch.forEach(function(k){
                    parts.push('<line x1="'+bx+'" y1="'+sn[k].cy+'" x2="'+(sn[k].x)+'" y2="'+sn[k].cy+'" stroke="'+sn[k].col+'" stroke-width="1.2" opacity="0.5"/>');
                });
            }
            parts.push('<rect x="'+nd.x+'" y="'+(nd.cy-10)+'" width="'+nd.tw+'" height="20" rx="'+(nd.lv===0?6:4)+'" fill="'+nd.col+'" opacity="'+(nd.lv===0?1:0.85)+'"/>');
            parts.push('<text x="'+(nd.x+nd.tw/2)+'" y="'+(nd.cy+4)+'" text-anchor="middle" font-size="'+(nd.lv===0?9:7.5)+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+(nd.lv===0?700:400)+'">'+nd.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        });
        var totalH=leaves(0)*RH+PAD*2;
        return '<svg viewBox="0 0 '+(maxX+PAD)+' '+totalH+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+parts.join('')+'</svg>';
    }

    function ktBuildOval(text, vertical) {
        var nodes=_mmParse(text); if(!nodes.length)return '<p style="color:#aaa;padding:8px;">µŚĀÕåģÕ«╣</p>';
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#d35400'];
        var root=nodes[0];
        var l1=nodes.filter(function(n){return n.level===1;});

        function getChld(ni,lv){var r=[];for(var j=ni+1;j<nodes.length;j++){if(nodes[j].level===lv+1){var ok=true;for(var k=ni+1;k<j;k++){if(nodes[k].level<=lv){ok=false;break;}}if(ok)r.push(j);}else if(nodes[j].level<=lv)break;}return r;}
        function cntL(i){var ch=getChld(i,nodes[i].level);return ch.length?ch.reduce(function(s,c){return s+cntL(c);},0):1;}

        // All coords relative to root center = (CX, CY)
        // CX=340 ensures horizontal mode fills ~680px width nicely
        var CX=340, CY=0;
        var all=[], minX=CX, maxX=CX, minY=CY, maxY=CY;
        function track(x,y){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);}

        var rootTw=Math.max(72,root.text.length*8+20);
        all.push('<rect x="'+(CX-rootTw/2)+'" y="'+(CY-13)+'" width="'+rootTw+'" height="26" rx="7" fill="'+C[0]+'" opacity="0.95"/>');
        all.push('<text x="'+CX+'" y="'+(CY+4)+'" text-anchor="middle" font-size="9" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="700">'+root.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        track(CX-rootTw/2,CY-13); track(CX+rootTw/2,CY+13);

        if(!vertical) {
            // HORIZONTAL: 1stŌåÆLEFT, 2ndŌåÆRIGHT, 3rdŌåÆLEFT ...
            var RH=32, GAP=55;
            var leftNodes =l1.filter(function(n,i){return i%2===0;});
            var rightNodes=l1.filter(function(n,i){return i%2===1;});

            function layH(sns,dir){
                var tot=sns.reduce(function(s,n){return s+cntL(nodes.indexOf(n));},0);
                var y0=CY-tot*RH/2;
                sns.forEach(function(n){
                    var ni=nodes.indexOf(n),ml=cntL(ni),cy=y0+ml*RH/2;
                    var col=C[(l1.indexOf(n)+1)%C.length];
                    var tw=Math.max(66,n.text.length*7.5+18);
                    var nx=dir==='r'?CX+GAP:CX-GAP-tw;
                    var lx=dir==='r'?CX+38:CX-38, rx=dir==='r'?nx:nx+tw, mx=(lx+rx)/2;
                    all.push('<path d="M'+lx+','+CY+' C'+mx+','+CY+' '+mx+','+cy+' '+rx+','+cy+'" fill="none" stroke="'+col+'" stroke-width="1.5" opacity="0.55"/>');
                    all.push('<rect x="'+nx+'" y="'+(cy-10)+'" width="'+tw+'" height="20" rx="5" fill="'+col+'" opacity="0.88"/>');
                    all.push('<text x="'+(nx+tw/2)+'" y="'+(cy+4)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="600">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                    track(nx,cy-10); track(nx+tw,cy+10);
                    var ch2=getChld(ni,1),cY2=y0;
                    ch2.forEach(function(ci){
                        var cn=nodes[ci],cl=cntL(ci),ccy=cY2+cl*RH/2;
                        var cc=C[(l1.indexOf(n)+2)%C.length];
                        var ctw=Math.max(54,cn.text.length*7+12);
                        var cx2=dir==='r'?nx+tw+36:nx-36-ctw;
                        var lx2=dir==='r'?nx+tw:nx, rx2=dir==='r'?cx2:cx2+ctw, mx2=(lx2+rx2)/2;
                        all.push('<path d="M'+lx2+','+cy+' C'+mx2+','+cy+' '+mx2+','+ccy+' '+rx2+','+ccy+'" fill="none" stroke="'+cc+'" stroke-width="1.2" opacity="0.4"/>');
                        all.push('<rect x="'+cx2+'" y="'+(ccy-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+cc+'" opacity="0.7"/>');
                        all.push('<text x="'+(cx2+ctw/2)+'" y="'+(ccy+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+cn.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                        track(cx2,ccy-9); track(cx2+ctw,ccy+9);
                        cY2+=cl*RH;
                    });
                    y0+=ml*RH;
                });
            }
            layH(leftNodes,'l');
            layH(rightNodes,'r');
        } else {
            // VERTICAL: 1stŌåÆTOP, 2ndŌåÆBOTTOM, 3rdŌåÆTOP ...
            // Use horizontal spread: each branch gets horizontal space
            var RW=90, GAP_V=50;
            var topNodes=l1.filter(function(n,i){return i%2===0;});
            var botNodes=l1.filter(function(n,i){return i%2===1;});

            function layV(sns,dir){
                var tot=sns.reduce(function(s,n){return s+cntL(nodes.indexOf(n));},0);
                // Center the spread around CX
                var x0=CX-tot*RW/2;
                sns.forEach(function(n){
                    var ni=nodes.indexOf(n),ml=cntL(ni),cx=x0+ml*RW/2;
                    var col=C[(l1.indexOf(n)+1)%C.length];
                    var tw=Math.max(66,n.text.length*7.5+18);
                    // ny: distance from root
                    var ny=dir==='t'?CY-(GAP_V+10):CY+(GAP_V+10);
                    var root_edge=dir==='t'?CY-13:CY+13;
                    var my=(root_edge+ny)/2;
                    all.push('<path d="M'+CX+','+root_edge+' C'+CX+','+my+' '+cx+','+my+' '+cx+','+ny+'" fill="none" stroke="'+col+'" stroke-width="1.5" opacity="0.55"/>');
                    all.push('<rect x="'+(cx-tw/2)+'" y="'+(ny-10)+'" width="'+tw+'" height="20" rx="5" fill="'+col+'" opacity="0.88"/>');
                    all.push('<text x="'+cx+'" y="'+(ny+4)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="600">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                    track(cx-tw/2,ny-10); track(cx+tw/2,ny+10);
                    var ch2=getChld(ni,1),cX2=x0;
                    ch2.forEach(function(ci){
                        var cn=nodes[ci],cl=cntL(ci),ccx=cX2+cl*RW/2;
                        var cc=C[(l1.indexOf(n)+2)%C.length];
                        var ctw=Math.max(54,cn.text.length*7+12);
                        var cny=dir==='t'?ny-(GAP_V+20):ny+(GAP_V+20);
                        var ny_edge=dir==='t'?ny-10:ny+10;
                        var cmy=(ny_edge+cny)/2;
                        all.push('<path d="M'+cx+','+ny_edge+' C'+cx+','+cmy+' '+ccx+','+cmy+' '+ccx+','+cny+'" fill="none" stroke="'+cc+'" stroke-width="1.2" opacity="0.4"/>');
                        all.push('<rect x="'+(ccx-ctw/2)+'" y="'+(cny-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+cc+'" opacity="0.7"/>');
                        all.push('<text x="'+ccx+'" y="'+(cny+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+cn.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                        track(ccx-ctw/2,cny-9); track(ccx+ctw/2,cny+9);
                        cX2+=cl*RW;
                    });
                    x0+=ml*RW;
                });
            }
            layV(topNodes,'t');
            layV(botNodes,'b');
        }

        var PAD=20;
        // Ensure minimum viewBox width of 600 to prevent upscaling
        var vw=Math.max(maxX-minX+PAD*2, 600);
        var vh=maxY-minY+PAD*2;
        // Centre the content horizontally if narrower than 600
        var vx=minX-PAD-(vw-(maxX-minX+PAD*2))/2;
        return '<svg viewBox="'+vx+' '+(minY-PAD)+' '+vw+' '+vh+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+all.join('')+'</svg>';
    }








    // ŌöĆŌöĆ ķóśńø«ńö╗ÕĖā’╝łµ»Åķüōķóśńŗ¼ń½ŗ’╝ēŌöĆŌöĆ
    var _ktQCanvasInited = new WeakSet();
    function ktInitQCanvas(canvas) {
        if (!canvas || _ktQCanvasInited.has(canvas)) return;
        _ktQCanvasInited.add(canvas);
        var ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        var drawing = false, lastX = 0, lastY = 0;
        var erasing = false;

        // ŌöĆŌöĆ ÕÉīµŁźńö╗ÕĖāÕłåĶŠ©ńÄćõĖÄ CSS Õ░║Õ»Ė’╝īķś▓µŁóµŗēõ╝ĖÕÉÄõĖŹÕÅ»ńö╗ ŌöĆŌöĆ
        var _syncTimer = null;
        function syncCanvasSize() {
            if (_syncTimer) return;
            _syncTimer = requestAnimationFrame(function() {
                _syncTimer = null;
                var r = canvas.getBoundingClientRect();
                var w = Math.round(r.width), h = Math.round(r.height);
                if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
                    var data = null;
                    try { data = canvas.toDataURL(); } catch(ex){}
                    canvas.width = w; canvas.height = h;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    if (data) { var img = new Image(); img.onload = function(){ ctx.clearRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); }; img.src = data; }
                }
            });
        }
        if (typeof ResizeObserver !== 'undefined') {
            var _roTarget = canvas.closest('.kt-mode-canvas') || canvas;
            new ResizeObserver(syncCanvasSize).observe(_roTarget);
        }
        requestAnimationFrame(function() {
            var r = canvas.getBoundingClientRect();
            var w = Math.round(r.width), h = Math.round(r.height);
            if (w > 0 && h > 0) {
                canvas.width = w; canvas.height = h;
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            }
        });
        function getPos(e) {
            var r = canvas.getBoundingClientRect();
            var t = e.touches ? e.touches[0] : e;
            return { x: (t.clientX - r.left) * canvas.width / r.width,
                     y: (t.clientY - r.top)  * canvas.height / r.height };
        }
        function start(e) { e.preventDefault(); drawing = true; var p = getPos(e); lastX = p.x; lastY = p.y; }
        function move(e) {
            e.preventDefault(); if (!drawing) return;
            var p = getPos(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
            if (_ktDrawErase) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=18; ctx.strokeStyle='rgba(0,0,0,1)'; }
            else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=_ktDrawColor; ctx.lineWidth=2.2; }
            ctx.stroke(); lastX = p.x; lastY = p.y;
        }
        function end(e) { e.preventDefault(); drawing = false; }
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', end); canvas.addEventListener('mouseleave', end);
        canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false});
        canvas.addEventListener('touchend', end, {passive:false});
    }

    // Õż¦ń║▓ĶŠōÕģźĶ¦äĶīāÕī¢’╝ÜĶ»åÕł½TabŃĆü- Õ╝ĆÕż┤ŃĆüµĢ░ÕŁŚ. Õ╝ĆÕż┤’╝īń╗¤õĖĆĶĮ¼õĖ║õĖżń®║µĀ╝ń╝®Ķ┐ø
    function ktNormalizeMmInput(raw) {
        var lines = raw.split('\n');
        return lines.map(function(line) {
            if (!line.trim()) return '';
            // Count leading tabs ŌåÆ convert each tab to 2 spaces
            var tabMatch = line.match(/^(\t+)/);
            if (tabMatch) {
                return '  '.repeat(tabMatch[1].length) + line.replace(/^\t+/, '').replace(/^[-\d]+\.\s*/, '').replace(/^-\s*/, '');
            }
            // Strip leading - or digits.
            var stripped = line.replace(/^(\s*)[-\d]+\.\s*/, '$1').replace(/^(\s*)-\s*/, '$1');
            return stripped;
        }).filter(function(l){ return l.trim() !== ''; }).join('\n');
    }

        //       ńö© inline-flex µ¢╣Õ╝ÅÕ»╣ķĮÉ’╝īķü┐ÕģŹńĀ┤ÕØÅ grid ÕłŚµĢ░
        var shareSets = [

                var allSpans = Array.from(lbl.querySelectorAll('span'));

                if (!textSpan) return;
                // Ķ«®µ¢ćÕŁŚ span ÕÅśµłÉ inline-flex’╝īõĮ┐µīēķÆ«ÕÅ│Õ»╣ķĮÉõĖöÕ×éńø┤Õ▒ģõĖŁ
                textSpan.style.cssText += ';display:inline-flex;align-items:center;width:100%;';
                var del = _makeDelBtn('share-item-del', function(){ lbl.remove(); });
                textSpan.appendChild(del);
            });
        });

        // ŌĢÉŌĢÉ REVIEW grids’╝ł5ÕłŚ’╝ÜÕ║ÅÕÅĘ|ÕÉŹń¦░|Ķ»┤µśÄ|µś»|õĖŹµś»’╝ēŌĢÉŌĢÉ
        // ńŁ¢ńĢź’╝Üń╗ÖÕÉīõĖĆ data-group ńÜäµēĆµ£ēµĀ╝ÕŁÉÕŖĀ data-delrow=groupName’╝ī
        //       ÕłĀķÖżµŚČµīēĶ»źÕ▒×µĆ¦õĖĆµ¼ĪµĆ¦ń¦╗ķÖżµĢ┤ĶĪīµēĆµ£ēµĀ╝ÕŁÉ’╝īÕ«īÕģ©õĖŹõŠØĶĄ¢ń┤óÕ╝ĢõĮŹńĮ«
        function processReviewGrid(grid) {
            var groups = {};
            Array.from(grid.querySelectorAll('input[type="checkbox"][data-group]')).forEach(function(cb) {
                var g = cb.getAttribute('data-group');
                if (!groups[g]) groups[g] = [];
                groups[g].push(cb);
            });
            Object.keys(groups).forEach(function(g) {
                var pair = groups[g];
                if (pair.length < 2) return;
                // µēŠĶ┐ÖõĖĆĶĪīµēĆµ£ē 5 õĖ¬µĀ╝ÕŁÉ’╝łķāĮÕ£©ÕÉīõĖĆõĖ¬ grid õĖŗ’╝ē
                // ńö© closest µēŠÕł░µ»ÅõĖ¬ checkbox ńø┤Õ▒×ńÜä grid ÕŁÉÕģāń┤Ā
                var rowCells = [];
                pair.forEach(function(cb) {
                    // ńø┤µÄźÕŁÉÕģāń┤Ā = grid cell
                    var cell = cb.parentElement;
                    while (cell && cell.parentElement !== grid) cell = cell.parentElement;
                    if (cell && rowCells.indexOf(cell) < 0) rowCells.push(cell);
                });
                // Õ║ÅÕÅĘµĀ╝ÕÆīÕÉŹń¦░µĀ╝’╝ÜÕ£© pair[0]’╝łµś»’╝ēµĀ╝õ╣ŗÕēŹńÜä 3 õĖ¬ÕģäÕ╝¤ĶŖéńé╣
                var yesCell = (function(){
                    var c = pair[0].parentElement;
                    while (c && c.parentElement !== grid) c = c.parentElement;
                    return c;
                })();
                if (yesCell) {
                    var prev = yesCell;
                    for (var k = 0; k < 3; k++) {
                        prev = prev ? prev.previousElementSibling : null;
                        if (prev && rowCells.indexOf(prev) < 0) rowCells.unshift(prev);
                    }
                }
                // ń╗ÖµēĆµ£ēµĀ╝ÕŁÉµēōµĀćĶ«░
                var rowId = 'row-' + g;
                rowCells.forEach(function(cell){ cell.setAttribute('data-delrow', rowId); });

                var noLabel = pair[1].closest('label');
                if (!noLabel || noLabel.querySelector('.review-item-del')) return;
                // Ķ«® noLabel ÕÅśµłÉ flex õ╗źõŠ┐µīēķÆ«Ķć¬ńäČÕÅ│Õ»╣ķĮÉ
                noLabel.style.cssText += ';display:flex;align-items:center;';
                var del = _makeDelBtn('review-item-del', function(){
                    grid.querySelectorAll('[data-delrow="' + rowId + '"]').forEach(function(cell){
                        if (cell.parentNode) cell.parentNode.removeChild(cell);
                    });
                });
                noLabel.appendChild(del);
            });
        }

        var ktGrid = document.getElementById('kt-review-grid');
        if (ktGrid) processReviewGrid(ktGrid);
        ['miaoxie','yilun','shiyong'].forEach(function(tpl) {
            var page = document.getElementById('page-' + tpl);
            if (!page) return;
            page.querySelectorAll('[style*="grid-template-columns:1.4em"]').forEach(processReviewGrid);
        });
    }








    function ktParseMindmapLines(text) {
        var lines = text.split('\n');
        var nodes = [];
        lines.forEach(function(line) {
            if (!line.trim()) return;
            var indent = line.match(/^(\s*)/)[1].length;
            var level = Math.floor(indent / 2);
            nodes.push({ text: line.trim(), level: level });
        });
        return nodes;
    }

    function ktBuildTreeMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">µŚĀÕåģÕ«╣</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var PAD = 16, NODE_H = 30, INDENT = 130, MIN_W = 70;
        var y = PAD;
        var svgNodes = [];
        var maxX = 0;
        nodes.forEach(function(n, i) {
            var x = PAD + n.level * INDENT;
            var col = colors[n.level % colors.length];
            var tw = Math.max(MIN_W, n.text.length * 8 + 20);
            maxX = Math.max(maxX, x + tw);
            svgNodes.push({ x:x, y:y, w:tw, h:24, cx:x+tw/2, cy:y+12, text:n.text, col:col, level:n.level, idx:i });
            y += NODE_H;
        });
        var SVG_W = maxX + PAD;
        var SVG_H = y + PAD;
        // Build connection lines: for each node find nearest ancestor
        var paths = '';
        for (var i = 1; i < svgNodes.length; i++) {
            var n = svgNodes[i];
            for (var j = i - 1; j >= 0; j--) {
                if (svgNodes[j].level === n.level - 1) {
                    var p = svgNodes[j];
                    var x1 = p.x + p.w, y1 = p.cy;
                    var x2 = n.x,       y2 = n.cy;
                    var mx = (x1 + x2) / 2;
                    paths += '<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+n.col+'" stroke-width="1.4" opacity="0.55" stroke-dasharray="none"/>';
                    break;
                }
            }
        }
        // Draw nodes
        var rects = svgNodes.map(function(n) {
            var r = n.level === 0 ? 7 : 5;
            var fs = n.level === 0 ? 9 : 8;
            var fw = n.level === 0 ? 'bold' : 'normal';
            var op = n.level === 0 ? '1' : '0.88';
            return '<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+r+'" fill="'+n.col+'" opacity="'+op+'"/>'+
                   '<text x="'+n.cx+'" y="'+(n.y+16)+'" text-anchor="middle" font-size="'+fs+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+fw+'">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>';
        }).join('');
        return '<svg viewBox="0 0 '+SVG_W+' '+SVG_H+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+paths+rects+'</svg>';
    }

    function ktBuildRadialMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">µŚĀÕåģÕ«╣</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var CX = 340, CY = 200, R1 = 105, R2 = 195;
        var root = nodes[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var svgParts = [];
        // root
        svgParts.push('<ellipse cx="'+CX+'" cy="'+CY+'" rx="52" ry="22" fill="'+colors[0]+'" opacity="0.95"/>');
        svgParts.push('<text x="'+CX+'" y="'+(CY+5)+'" text-anchor="middle" font-size="9" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="700">'+(root?root.text:'').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        l1.forEach(function(n, i) {
            var angle = (2*Math.PI*i/Math.max(l1.length,1)) - Math.PI/2;
            var nx = Math.round(CX + R1*Math.cos(angle));
            var ny = Math.round(CY + R1*Math.sin(angle));
            var col = colors[(i+1)%colors.length];
            var tw = Math.max(56, n.text.length*7+14);
            // Line from root edge to branch
            var ex = Math.round(CX + 52*Math.cos(angle));
            var ey = Math.round(CY + 22*Math.sin(angle));
            svgParts.push('<line x1="'+ex+'" y1="'+ey+'" x2="'+nx+'" y2="'+ny+'" stroke="'+col+'" stroke-width="1.6" opacity="0.5"/>');
            svgParts.push('<rect x="'+(nx-tw/2)+'" y="'+(ny-11)+'" width="'+tw+'" height="22" rx="5" fill="'+col+'" opacity="0.88"/>');
            svgParts.push('<text x="'+nx+'" y="'+(ny+5)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            // children
            var myIdx = nodes.indexOf(n);
            var children=[];
            for(var j=myIdx+1;j<nodes.length;j++){if(nodes[j].level===2)children.push(nodes[j]);else if(nodes[j].level<=1)break;}
            children.forEach(function(c,ci){
                var spread = Math.min(0.55, 0.8/Math.max(children.length,1));
                var cAngle = angle + (ci-(children.length-1)/2)*spread;
                var cx2 = Math.round(CX+R2*Math.cos(cAngle));
                var cy2 = Math.round(CY+R2*Math.sin(cAngle));
                var ctw = Math.max(44, c.text.length*6.5+12);
                // Line from branch edge to child
                var bex = Math.round(nx + (tw/2)*Math.cos(cAngle));
                var bey = Math.round(ny + 11*Math.sin(cAngle));
                svgParts.push('<line x1="'+bex+'" y1="'+bey+'" x2="'+cx2+'" y2="'+cy2+'" stroke="'+col+'" stroke-width="1" opacity="0.35"/>');
                svgParts.push('<rect x="'+(cx2-ctw/2)+'" y="'+(cy2-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+col+'" opacity="0.6"/>');
                svgParts.push('<text x="'+cx2+'" y="'+(cy2+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            });
        });
        return '<svg viewBox="0 0 680 400" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // Õåģķā©ĶŠģÕŖ®’╝ÜµĀ╣µŹ«ÕżŹńøś/Õłåõ║½õĖżõĖ¬Õī║ÕØŚńÜäÕ«×ķÖģµśŠńż║ńŖČµĆü’╝īń╗¤õĖĆĶ░āµĢ┤ grid
    function _syncPenGrid(tpl) {
        var gridCfg = {
            miaoxie: { grid: 'miaoxie-main-grid', twoCol: '62fr 38fr', review: 'miaoxie-review-box' },
            yilun:   { grid: 'yilun-main-grid',   twoCol: '5fr 4fr',   review: 'yilun-review-box'   },
            shiyong: { grid: 'shiyong-main-grid',  twoCol: '3fr 2fr',  review: 'shiyong-review-box'  }
        };
        var t = gridCfg[tpl];
        if (!t) return;
        var pg       = document.getElementById('page-' + tpl);
        var gridEl   = document.getElementById(t.grid);
        var reviewEl = document.getElementById(t.review);
        var shareEl  = pg ? pg.querySelector('.share-zone') : null;
        if (!gridEl) return;

        var rVis = reviewEl && reviewEl.style.display !== 'none';
        var sVis = shareEl  && shareEl.style.display  !== 'none';

        if (rVis && sVis) {
            // õĖżĶĆģķāĮµśŠńż║’╝ÜµüóÕżŹÕÄ¤Õ¦ŗõĖżÕłŚµ»öõŠŗ’╝īÕÉäÕø×Ķć¬ÕĘ▒ńÜä grid-column
            gridEl.style.gridTemplateColumns = t.twoCol;
            if (reviewEl) reviewEl.style.gridColumn = '1';
            if (shareEl)  shareEl.style.gridColumn  = '2';
        } else if (rVis && !sVis) {
            // ÕÅ¬µ£ēÕżŹńøś
            gridEl.style.gridTemplateColumns = '1fr';
            if (reviewEl) reviewEl.style.gridColumn = '1';
        } else if (!rVis && sVis) {
            // ÕÅ¬µ£ēÕłåõ║½
            gridEl.style.gridTemplateColumns = '1fr';
            if (shareEl) shareEl.style.gridColumn = '1';
        } else {
            // õĖżĶĆģķāĮķÜÉĶŚÅ
            gridEl.style.gridTemplateColumns = '1fr';
        }
    }

    function timerUpdateDisplay(tpl) {

        var r = Math.max(0, state.remaining);
        var str = String(Math.floor(r/60)).padStart(2,'0') + ':' + String(r%60).padStart(2,'0');

        var phase = (_phaseNames[state.phase] !== undefined && _phaseNames[state.phase] !== null) ? _phaseNames[state.phase] : ('Phase '+(state.phase+1));
        // ÕÅ│õŠ¦
        var tfC = document.getElementById('tf-clock'); if(tfC){tfC.textContent=str;tfC.className=cls;}
        var tfP = document.getElementById('tf-phase'); if(tfP){ tfP.textContent=phase; tfP.style.display=phase?'':'none'; }
        var tfDiv = document.getElementById('tf-divider'); if(tfDiv){ tfDiv.style.display=phase?'':'none'; }

        // Ķ┐øÕ║”µØĪ
        var fill = document.getElementById('timer-fill-'+tpl);
        if(fill) fill.style.width = Math.max(0, r/state.total*100)+'%';
    }

    function timerGetConfig(tpl) {

            _phaseNames[2] = c.n3 !== undefined ? c.n3 : 'ń¼¼õĖēķśČµ«Ą';

    (function() {
        var handle = document.getElementById('kt-dual-handle');
        var pane   = document.getElementById('kt-dual-pane');
        if (!handle || !pane) return;
        var dragging = false, startX = 0, startW = 0, totalW = 0;
        handle.addEventListener('mousedown', function(e) {
            dragging = true;
            startX   = e.clientX;
            var left = pane.querySelector('#kt-text-section');
            startW   = left ? left.offsetWidth : 0;
            totalW   = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var delta = e.clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            var newRight = totalW - newLeft;
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + newRight + 'px';
        });
        document.addEventListener('mouseup', function() { dragging = false; });
        // Touch support
        handle.addEventListener('touchstart', function(e) {
            dragging = true;
            startX = e.touches[0].clientX;
            var left = pane.querySelector('#kt-text-section');
            startW = left ? left.offsetWidth : 0;
            totalW = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        }, {passive:false});
        document.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var delta = e.touches[0].clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + (totalW - newLeft) + 'px';
        }, {passive:false});
        document.addEventListener('touchend', function() { dragging = false; });
    })();

        handle.addEventListener('mousedown', function(e) {
            dragging = true; startY = e.clientY; startH = pane.offsetHeight;
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var newH = Math.max(150, startH + (e.clientY - startY));
            pane.style.minHeight = newH + 'px';
            pane.style.height = newH + 'px';
        });
        document.addEventListener('mouseup', function() { dragging = false; });
        handle.addEventListener('touchstart', function(e) {
            dragging = true; startY = e.touches[0].clientY; startH = pane.offsetHeight;
            e.preventDefault();
        }, {passive:false});
        document.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var newH = Math.max(150, startH + (e.touches[0].clientY - startY));
            pane.style.minHeight = newH + 'px';
            pane.style.height = newH + 'px';
        }, {passive:false});
        document.addEventListener('touchend', function() { dragging = false; });
    })();

    function timerTick(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        state.remaining--;
        timerUpdateDisplay(tpl);
        try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:state.phase,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
        if(state.remaining <= 0) timerPhaseEnd(tpl);
    }

    function timerPhaseEnd(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        clearInterval(state.interval);
        timerLockPhaseInputs(tpl, state.phase);
        var tfExt = document.getElementById('tf-extend');
        var tfCnt = document.getElementById('tf-count');
        var remaining = MAX_EXTENSIONS - state.extCount;
        // jingsai is single-phase: when phase 0 ends, go straight to final submit
        var maxPhase = (tpl === 'jingsai') ? 0 : 2;
        if(state.phase < maxPhase) {
            var next = state.phase + 1;
            if(tfExt){ tfExt.style.display='block'; tfExt.textContent='Request Extension'; }
            if(tfCnt){ tfCnt.style.display='block'; tfCnt.textContent=remaining+' left'; }
            if(next === 2) {
                // ń¼¼õ║īķśČµ«Ąń╗ōµØ¤ ŌåÆ Õģ©Õ▒Åķ╗æÕ╣Ģ’╝īńŁēÕŁ”ńö¤ÕćåÕżćÕźĮµēŹÕ╝ĆÕ¦ŗń¼¼õĖēķśČµ«Ą
                timerShowSharingPrompt(tpl, state, next, tfExt, tfCnt);
            } else {
                timerShowAlert('\u2705 '+_phaseNames[state.phase]+' ended \u2014 '+_phaseNames[next]+' starting\u2026');
                setTimeout(function(){
                    state.phase = next;
                    state.remaining = state.cfg.phases[next];
                    state.total = state.cfg.phases[next];
                    timerLockAllInputs(tpl);
                    timerUnlockPhaseInputs(tpl, next);
                    if(tfExt) tfExt.style.display='none';
                    if(tfCnt) tfCnt.style.display='none';
                    timerUpdateDisplay(tpl);
                    state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
                    try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:next,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
                }, 4000);
            }
        } else {
            // Õģ©ķā©ń╗ōµØ¤’╝ÜķöüÕ«ÜµēĆµ£ēĶŠōÕģź’╝īĶ¦”ÕÅæµÅÉõ║żµĄüń©ŗ
            timerLockAllInputs(tpl);
            var tfC = document.getElementById('tf-clock'); if(tfC){tfC.textContent='00:00';tfC.className='tf-clock';}
            var tfPe = document.getElementById('tf-phase'); if(tfPe){tfPe.textContent='';tfPe.style.display='none';}
            var tfDe = document.getElementById('tf-divider'); if(tfDe){tfDe.style.display='none';}
            if(tfExt) tfExt.style.display='none';
            if(tfCnt) tfCnt.style.display='none';
            try { localStorage.removeItem('_timer_'+tpl); } catch(e){}
            setTimeout(function(){ timerTriggerFinalSubmit(tpl); }, 800);
        }
    }

    function timerExtendFloat() {

        state.extCount++;

        if(!_timerExtendLog[tpl]) _timerExtendLog[tpl]=[];
        _timerExtendLog[tpl].push({phase:state.phase,time:new Date().toLocaleString('zh-SG'),secs:secs,count:state.extCount});

        timerUpdateDisplay(tpl);
        clearInterval(state.interval);
        state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
    }

    function timerRestoreFromStorage(tpl) {
        try {
            var raw = localStorage.getItem('_timer_'+tpl); if(!raw) return;
            var saved = JSON.parse(raw);
            var elapsed = Math.floor((Date.now()-saved.ts)/1000);
            var remaining = Math.max(0, saved.remaining - elapsed);
            if(remaining <= 0){ localStorage.removeItem('_timer_'+tpl); return; }
            var state = {tpl:tpl,phase:saved.phase,remaining:remaining,total:saved.cfg.phases[saved.phase],cfg:saved.cfg,interval:null,extCount:saved.extCount||0};
            _timerState[tpl] = state;
            var startEl = document.getElementById('timer-start-inline-'+tpl);
            var prog = document.getElementById('timer-progress-'+tpl);
            var floatR = document.getElementById('timer-float');
            if(startEl) startEl.style.display='none';
            if(prog){ prog.style.display='block'; prog.classList.add('active'); }
            if(floatR) floatR.style.display='flex';
            // µüóÕżŹķöüÕ«ÜńŖČµĆü’╝ÜķöüÕ«ÜÕēŹķØóÕĘ▓Õ«īµłÉńÜäķśČµ«Ą
            timerUnlockAllInputs(tpl);
            for(var i=0; i<saved.phase; i++) timerLockPhaseInputs(tpl, i);
            timerUpdateDisplay(tpl);
            state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
        } catch(e){}
    }

                        var img = new Image();

        // ÕłØÕ¦ŗÕī¢µŚČń½ŗÕŹ│ÕÉīµŁźõĖĆµ¼ĪÕ░║Õ»Ė
        requestAnimationFrame(function() {

            if (w > 0 && h > 0) {

                ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = lineWidth||(_ktDrawLineWidth||1);
                ctx.lineCap='round'; ctx.lineJoin='round';
            }
        });
        let drawing = false, lastX = 0, lastY = 0;
        let shiftStart = null;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const scaleX = canvas.width / r.width;
            const scaleY = canvas.height / r.height;
            if (e.touches) {
                return [(e.touches[0].clientX - r.left) * scaleX,
                        (e.touches[0].clientY - r.top) * scaleY];
            }
            return [(e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY];
        }


        // ŌöĆŌöĆ Shift ńø┤ń║┐ overlay ŌöĆŌöĆ
        var overlayCanvas = document.createElement('canvas');
        overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;';
        if (canvas.parentElement) canvas.parentElement.appendChild(overlayCanvas);
        function syncOverlay() { overlayCanvas.width = canvas.width; overlayCanvas.height = canvas.height; }
        syncOverlay();
        function drawStraightPreview(x, y) {
            if (!shiftStart) return;

            var oc = overlayCanvas.getContext('2d');
            oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            oc.strokeStyle = ctx.strokeStyle; oc.lineWidth = ctx.lineWidth; oc.lineCap = 'round';
            oc.setLineDash([6, 4]);

        });

    // localStorage key = ńÅŁń║¦ + õ╗╗ÕŖĪ + fileToken
    // fileToken Õ£©ńö¤µłÉµŚČÕåÖÕģź’╝īµ»Åµ¼Īńö¤µłÉķāĮõĖŹÕÉī’╝īńĪ«õ┐ØõĖŹÕÉīÕŁ”ńö¤ńēłĶŹēń©┐õ║ÆõĖŹµ▒Īµ¤ō
    function _draftKey() {
        const m = window.STUDENT_META;
        if (!m) return null;

    function saveDraft(silent) {
        const key = _draftKey();
        if (!key) return;

        const _pid = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const inputs = {};
        document.querySelectorAll(_pid + ' input[type="text"], ' + _pid + ' textarea').forEach((el, i) => {
            inputs['f' + i] = el.value;
        });
        // jingsai/yuedu-jingsai’╝Ü_textÕÆī_curÕŁśÕģźĶŹēń©┐
        if (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai')) {
            if (typeof window._jingsaiGetState === 'function') {
                var _js = window._jingsaiGetState();
                inputs['jingsai_text'] = _js.text;
                inputs['jingsai_cur'] = _js.cur;
            }
        }
        document.querySelectorAll(_pid + ' input[type="checkbox"]').forEach((el, i) => {
            inputs['c' + i] = el.checked;
        });

        const canvases = {};
        document.querySelectorAll(_pid + ' canvas').forEach(canvas => {
            if (!canvas.id) return;
            if (canvas.width === 0 || canvas.height === 0) return;
            try {
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                // õ┐«ÕżŹI’╝ÜµŻĆµ¤źķØ×ńÖĮĶē▓ķØ×ķĆÅµśÄÕāÅń┤Ā’╝łń¼öĶ┐╣’╝ē’╝īõĖÄisCanvasBlankķĆ╗ĶŠæõĖĆĶć┤
                const step = Math.max(1, Math.floor(canvas.height / 8));
                let hasPixel = false;
                outer: for (let y = 0; y < canvas.height; y += step) {
                    const d = ctx.getImageData(0, y, canvas.width, 1).data;
                    for (let i = 0; i < d.length; i += 4) {
                        const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
                        if (a > 10 && !(r > 240 && g > 240 && b > 240)) { hasPixel = true; break outer; }
                    }
                }
                if (hasPixel) canvases[canvas.id] = canvas.toDataURL('image/jpeg', 0.4);
            } catch(e) {}
        });

        try {
            localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases }));
        } catch(e) {
            try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases: {} })); } catch(e2) {}
        }

        if (!silent) _showDraftToast('Ō£ģ Draft saved');
    }

    function restoreDraft() {
        const key = _draftKey();
        if (!key) return;
        let raw;
        try { raw = localStorage.getItem(key); } catch(e) { return; }
        if (!raw) return;

        let data;
        try { data = JSON.parse(raw); } catch(e) { return; }

        const ts = data.ts ? new Date(data.ts).toLocaleString('zh-SG', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

        const confirmed = true; // ķØÖķ╗śµüóÕżŹ’╝īõĖŹÕ╝╣ńĪ«Ķ«żµĪå
        if (!confirmed) {
            localStorage.removeItem(key);

        }

        const _pid2 = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        if (data.inputs) {

            if (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai')) {
                if (data.inputs['jingsai_text'] !== undefined && typeof window._jingsaiSetState === 'function') {
                    window._jingsaiSetState(data.inputs['jingsai_text'], data.inputs['jingsai_cur']||0);
                }
                if (data.inputs['yj_units'] !== undefined) {
                    try {
                        var _yjRestoreUnits = JSON.parse(data.inputs['yj_units']);
                        if (typeof window.yjInit === 'function') window.yjInit(_yjRestoreUnits);
                    } catch(e) {}
                } else if (data.inputs['yuedu_jingsai_question'] !== undefined) {
                    // Õģ╝Õ«╣µŚ¦µĀ╝Õ╝Å
                    if (typeof window.yjInit === 'function') {
                        window.yjInit([{question: data.inputs['yuedu_jingsai_question']||'', text: data.inputs['jingsai_text']||'ŃĆĆŃĆĆ', cur:2}]);
                    }
                }
            }
            document.querySelectorAll(_pid2 + ' input[type="checkbox"]').forEach((el, i) => {
                const v = data.inputs['c' + i];
                if (v !== undefined) {
                    el.checked = v;
                    if (el.classList.contains('other-reason-cb') || el.classList.contains('other-action-cb')) {
                        const label = el.closest('label');
                        if (label) {
                            const inp = label.querySelector('input[type="text"]');
                            if (inp) {
                                inp.disabled = !v;
                                inp.style.opacity = v ? '1' : '0.5';
                                inp.style.cursor = v ? 'text' : 'not-allowed';
                            }
                        }
                    }
                }
            });
        }

        // Ķ┐śÕÄ¤ canvas’╝łõĖżÕĖ¦ÕÉÄµē¦ĶĪīńĪ«õ┐Ø canvas Õ░║Õ»ĖÕĘ▓ÕĖāÕ▒Ć’╝ē
        if (data.canvases) {
            const ids = Object.keys(data.canvases);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                ids.forEach(id => {
                    const canvas = document.getElementById(id);
                    const dataUrl = data.canvases[id];
                    if (!canvas || !dataUrl) return;
                    const img = new Image();
                    img.onload = () => {
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    };
                    img.src = dataUrl;
                });
            }));
        }

        _showDraftToast('­¤ōŗ Draft restored');
        // Ķ┐śÕÄ¤ÕÉÄÕÉīµŁźĶ«║ķóśĶŠōÕģźµĪåÕ«ĮÕ║”
        var _yti = document.getElementById('yo-topic-input');

    var _phCurrentTarget = null;
    function _showPhPopover(inputEl, iconEl) {
        var pop = _getPhPopover();
        _phCurrentTarget = inputEl;
        var inp = document.getElementById('ph-pop-input');
        inp.value = inputEl.placeholder || '';

        // Position near the icon
        var rect = iconEl.getBoundingClientRect();
        var popW = 260;
        var left = rect.left;
        var top = rect.bottom + 6;
        // Keep inside viewport
        if (left + popW > window.innerWidth - 12) left = window.innerWidth - popW - 12;
        if (left < 8) left = 8;
        if (top + 120 > window.innerHeight) top = rect.top - 120;

        pop.style.left = left + 'px';
        pop.style.top = top + 'px';
        pop.style.display = 'flex';
        setTimeout(function() { inp.focus(); inp.select(); }, 30);
    }

    function _attachPlaceholderIcons() {
        if (_phIconsAttached) return;
        _phIconsAttached = true;

        var els = document.querySelectorAll('input[type="text"], input:not([type]), textarea');
        els.forEach(function(el) {
            if (_isInExcludedZone(el)) return;
            if (el.id === 'classSelect' || el.id === 'assignTitle') return;
            if (el.style.display === 'none' || el.offsetParent === null) return;
            if (el.dataset.phIconAttached) return;
            el.dataset.phIconAttached = '1';

            // Wrap the field in a hover-container so icon stays visible when
            // moving from field ŌåÆ icon (both are inside the same container)
            var wrapper = document.createElement('span');
            wrapper.className = 'ph-wrap';
            wrapper.style.cssText = 'position:relative;display:inline-block;width:100%;';
            // For block-level textarea keep display:block
            if (el.tagName === 'TEXTAREA' || window.getComputedStyle(el).display === 'block') {
                wrapper.style.display = 'block';
            }
            el.parentNode.insertBefore(wrapper, el);
            wrapper.appendChild(el);

            // Pencil icon
            var icon = document.createElement('span');
            icon.className = 'ph-edit-icon';
            icon.title = 'õ┐«µö╣µÅÉńż║Ķ»Ł';
            icon.textContent = 'Ō£Å';
            var iconTop = el.tagName === 'TEXTAREA' ? '4px' : '50%';
            var iconTransform = el.tagName === 'TEXTAREA' ? 'none' : 'translateY(-50%)';
            icon.style.cssText = [
                'position:absolute;z-index:50;',
                'right:4px;top:' + iconTop + ';transform:' + iconTransform + ';',
                'font-size:10px;line-height:1;',
                'background:rgba(46,134,193,0.90);color:#fff;',
                'border-radius:4px;padding:2px 5px;',
                'cursor:pointer;',
                'display:inline-flex;align-items:center;',
                'box-shadow:0 1px 5px rgba(0,0,0,.22);',
                'white-space:nowrap;opacity:0;transition:opacity .12s;',
                'pointer-events:none;user-select:none;'
            ].join('');
            wrapper.appendChild(icon);
            el._phIcon = icon;

            // Show/hide on wrapper hover (covers both field AND icon)
            wrapper.addEventListener('mouseenter', function() {
                if (!isEditMode) return;
                icon.style.opacity = '1';
                icon.style.pointerEvents = 'auto';
            });
            wrapper.addEventListener('mouseleave', function() {
                icon.style.opacity = '0';
                icon.style.pointerEvents = 'none';
            });

            icon.addEventListener('click', function(e) {
                e.stopPropagation();
                _showPhPopover(el, icon);
            });
        });
    }

    function _detachPlaceholderIcons() {
        if (!_phIconsAttached) return;
        _phIconsAttached = false;
        // Unwrap ph-wrap containers and remove icons
        document.querySelectorAll('span.ph-wrap').forEach(function(wrapper) {
            var input = wrapper.querySelector('input, textarea');
            if (input) wrapper.parentNode.insertBefore(input, wrapper);
            wrapper.remove();
        });
        document.querySelectorAll('[data-ph-icon-attached]').forEach(function(el) {
            delete el.dataset.phIconAttached;
            delete el._phIcon;
        });
    }

        if (!input) return;
        _showPhPopover(input, icon);
    }

    function _updateDirIndex(cat, fileName, title, cls) {
        // µ»ÅõĖ¬ńø«ÕĮĢńö©õĖŹÕÉīńÜäµĀćĶ«░ÕÉŹ’╝īķü┐ÕģŹµĘĘµĘå
        var markerMap = {
            '03-gallery':       ['// ARTICLES_START', '// ARTICLES_END', 'ARTICLES'],
            '01-learning-guide':['// ITEMS_START',    '// ITEMS_END',    'ITEMS'],
            '02-interaction':   ['// ITEMS_START',    '// ITEMS_END',    'ITEMS']
        };
        var m = markerMap[cat];
        if (!m) return;

        var indexPath = cat + '/index.html';
        var indexUrl  = 'https://api.github.com/repos/' + GH_PUB_USER + '/' + GH_PUB_REPO + '/contents/' + indexPath;
        var headers   = { 'Authorization': 'token ' + GH_PUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' };

        fetch(indexUrl, { headers: headers })
        .then(function(r){ return r.json(); })
        .then(function(existing){
            if (!existing || !existing.content) return;
            var currentHtml = decodeURIComponent(escape(atob(existing.content.replace(/\s/g,''))));

            var today = new Date();
            var dateStr = today.getFullYear() + '.'
                        + String(today.getMonth()+1).padStart(2,'0') + '.'
                        + String(today.getDate()).padStart(2,'0');

            var newEntry = '  { file:"' + fileName + '", title:"' + title.replace(/"/g,'\\"') + '", cls:"' + cls.replace(/"/g,'\\"') + '", date:"' + dateStr + '" }';

            var startMark = m[0], endMark = m[1], varName = m[2];
            var updated;
            // ń®║µĢ░ń╗ä
            var emptyRe = new RegExp(startMark.replace(/\//g,'\\/') + '\\s*\\nvar ' + varName + ' = \\[\\];\\s*\\n' + endMark.replace(/\//g,'\\/'));
            if (emptyRe.test(currentHtml)) {
                updated = currentHtml.replace(emptyRe,
                    startMark + '\nvar ' + varName + ' = [\n' + newEntry + '\n];\n' + endMark);
            } else {
                // ÕĘ▓µ£ēµØĪńø«’╝īµ£½Õ░ŠĶ┐ĮÕŖĀ
                var appendRe = new RegExp('(' + startMark.replace(/\//g,'\\/') + '[\\s\\S]*?var ' + varName + ' = \\[[\\s\\S]*?)(\\n\\];\\s*\\n' + endMark.replace(/\//g,'\\/') + ')');
                updated = currentHtml.replace(appendRe, '$1,\n' + newEntry + '$2');
            }
            if (updated === currentHtml) return;

            var b64new = btoa(unescape(encodeURIComponent(updated)));
            return fetch(indexUrl, {
                method: 'PUT',
                headers: Object.assign({}, headers, {'Content-Type':'application/json'}),
                body: JSON.stringify({
                    message: 'Add ' + fileName + ' to ' + cat + ' index',
                    content: b64new,
                    sha: existing.sha
                })
            });
        })
        .catch(function(){ /* ķØÖķ╗śÕ┐ĮńĢź’╝īõĖŹÕĮ▒ÕōŹõĖ╗ÕÅæÕĖāµĄüń©ŗ */ });
    }

    // ŌöĆŌöĆ Canvas µś»ÕÉ”ń®║ńÖĮ ŌöĆŌöĆ
    function isCanvasBlank(canvas) {
        if (!canvas) return true;
        if (canvas.width === 0 || canvas.height === 0) return true;
        try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            // õ┐«ÕżŹI’╝ÜÕÄ¤µØźÕÅ¬µŻĆµ¤źalphaķĆÜķüō’╝īõĮåcanvasĶāīµÖ»µś»ńÖĮĶē▓’╝łalpha=255’╝ē
            // Õ»╝Ķć┤ń®║ńÖĮńŁŠÕÉŹcanvasõ╣¤Ķó½Õłżµ¢ŁõĖ║"µ£ēÕåģÕ«╣"’╝īńŁŠÕÉŹķ¬īĶ»üÕż▒µĢł
            // µŁŻńĪ«ÕüÜµ│Ģ’╝ÜµŻĆµ¤źµś»ÕÉ”µ£ēķØ×ńÖĮĶē▓ŃĆüķØ×ķĆÅµśÄńÜäÕāÅń┤Ā’╝łÕŹ│ń£¤µŁŻńÜäń¼öĶ┐╣’╝ē
            const step = Math.max(1, Math.floor(canvas.height / 10));
            for (let y = 0; y < canvas.height; y += step) {
                const data = ctx.getImageData(0, y, canvas.width, 1).data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                    // µ£ēõĖŹķĆÅµśÄõĖöķØ×ńÖĮĶē▓ńÜäÕāÅń┤Ā = µ£ēń¼öĶ┐╣
                    if (a > 10 && !(r > 240 && g > 240 && b > 240)) return false;
                }
            }
            return true;
        } catch(e) { return true; }
    }

    // ŌöĆŌöĆ ķöüÕ«Ü / Ķ¦Żķöüń©┐ń║ĖķĪĄķØó’╝łPDF ńö¤µłÉÕÉÄķś▓µŁóĶ»»ń╝¢ĶŠæ’╝ēŌöĆŌöĆ

    // ŌöĆŌöĆ õ┐ØÕŁś PDF’╝łÕŁ”ńö¤ń½»’╝ēŌöĆŌöĆ
    function savePDF() {
        var pdfBtn = document.querySelector('#submitPanel button[onclick="savePDF()"]') ||
                     [...document.querySelectorAll('#submitPanel button')].find(function(b){ return (b.getAttribute('onclick')||'').includes('savePDF'); });
        var origText = pdfBtn ? pdfBtn.textContent : null;
        if (pdfBtn) { pdfBtn.textContent = 'ŌÅ│ ńö¤µłÉõĖŁŌĆ”'; pdfBtn.disabled = true; }

        function restore() {
            if (pdfBtn) { pdfBtn.textContent = origText || '­¤ōä Save as PDF'; pdfBtn.disabled = false; }
        }

        var pg = document.getElementById(typeof currentTemplate !== 'undefined' && currentTemplate === 'yuedu-jingsai' ? 'page-yuedu-jingsai' : 'page-jingsai');
        if (!pg || pg.style.display === 'none') {
            window.print();
            setTimeout(restore, 3000);
            return;
        }

        // Ensure text is rendered
        if (typeof window.jingsaiRender === 'function') window.jingsaiRender();

        function doExport() {
            try {
                var COLS = 20;
                var _isYJ = (typeof currentTemplate !== 'undefined' && currentTemplate === 'yuedu-jingsai');
                var PAGE_W = 210, PAGE_H = 297;
                var MARGIN = 12, PAD_LR = 8;
                var CONTENT_W = PAGE_W - 2*MARGIN - 2*PAD_LR;
                var X0 = MARGIN + PAD_LR;
                var HDR_H = 27, HDR_GAP = 3;
                var Q_H = 10, Q_GAP = 2, BLOCK_GAP = 4;
                var GREEN = '#4caf50';
                var TARGET_DPI = 150, PX_PER_MM = TARGET_DPI / 25.4, sc = 2;

                // ĶĪīķ½śĶ«Īń«Ś
                var _tw = Math.round(CONTENT_W * PX_PER_MM * sc);
                var _maxCH = (957/31.8) * (TARGET_DPI/96) * sc;
                var _cH0 = Math.min(_tw/COLS, _maxCH);
                var _auxH0 = Math.round(_cH0 * 0.4);
                var _gH0 = _cH0 + _auxH0;
                var ROW_H_MM = _gH0 / PX_PER_MM / sc;

                // ńö╗µĀ╝ÕŁÉÕøŠ
                function makeGrid(rows, chars) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var cWp = w / COLS;
                    var cH = Math.min(cWp, _maxCH);
                    var auxH = Math.round(cH * 0.4);
                    var gH = cH + auxH;
                    var TH = (rows-1)*gH + cH + 2;
                    var h = Math.round(TH);
                    var h_mm = h / PX_PER_MM / sc;
                    var cv = document.createElement('canvas');
                    cv.width = w; cv.height = h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
                    ctx.strokeStyle = GREEN; ctx.lineWidth = 0.7;
                    for (var r = 0; r < rows; r++) {
                        var base = r*gH, wb = base+cH, ab = wb+auxH;
                        ctx.beginPath(); ctx.moveTo(0,wb); ctx.lineTo(w,wb); ctx.stroke();
                        if (r < rows-1) { ctx.beginPath(); ctx.moveTo(0,ab); ctx.lineTo(w,ab); ctx.stroke(); }
                        for (var c = 1; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c*cWp,base); ctx.lineTo(c*cWp,wb); ctx.stroke(); }
                    }
                    ctx.lineWidth = 1.5; ctx.strokeRect(0.75, 0.75, w-1.5, h-1.5);
                    if (chars) {
                        var fs = Math.round(cH * 0.62);
                        ctx.fillStyle = '#1a2a3a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.font = '100 ' + fs + 'px SimSun,"Õ«ŗõĮō",STSong,serif';
                        var ci = 0, rr = 0, cc = 0;
                        while (ci < chars.length && rr < rows) {
                            var ch = chars[ci++];
                            if (ch === '\n') { rr++; cc = 0; }
                            else { ctx.fillText(ch, Math.round(cc*cWp+cWp/2), Math.round(rr*gH+cH/2) - Math.round(fs*0.08)); cc++; if (cc>=COLS){cc=0;rr++;} }
                        }
                    }
                    return { dataUrl: cv.toDataURL('image/png'), h_mm: h_mm };
                }

                // ńö╗ķóśńø«µĀćķóś
                function makeTitle(text) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var h = Math.round(Q_H * PX_PER_MM * sc);
                    var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle='#eef4fb'; ctx.fillRect(0,0,w,h);
                    ctx.fillStyle='#1a4f8a'; ctx.fillRect(0,0,Math.round(3*sc),h);
                    ctx.fillStyle='#1a2a3a';
                    var fs = Math.round(9.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.font = '600 '+fs+'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign='left'; ctx.textBaseline='middle';
                    ctx.fillText(text, Math.round(8*sc), h/2);
                    return { dataUrl: cv.toDataURL('image/png'), h_mm: Q_H };
                }

                // ńö╗ķĪĄń£ē
                function makeHeader(name, cls, num, group, title, isAnon) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var h = Math.round(HDR_H * PX_PER_MM * sc);
                    var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
                    var row1H = Math.round(9 * PX_PER_MM * sc);
                    var fs = Math.round(11 * PX_PER_MM/96 * sc * 25.4);
                    ctx.fillStyle='#1a2a3a'; ctx.textBaseline='middle';
                    ctx.font='500 '+fs+'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign='left';
                    if (!isAnon) {
                        ctx.fillText('Õ¦ōÕÉŹ’╝Ü'+name, 0, row1H/2);
                        ctx.fillText('ń╝¢ÕÅĘ’╝Ü'+cls, Math.round(52*PX_PER_MM*sc), row1H/2);
                        ctx.fillText('ń╝¢ÕÅĘ’╝Ü'+num, Math.round(104*PX_PER_MM*sc), row1H/2);
                    } else {
                        ctx.fillText('ń╝¢ÕÅĘ’╝Ü'+num, 0, row1H/2);
                    }
                    var fsLg = Math.round(10.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.font='400 '+fsLg+'px "Noto Serif SC",serif';
                    ctx.textAlign='right';
                    var _ttEl = document.querySelector('#page-jingsai .bd-header-row [contenteditable], #page-yuedu-jingsai .bd-header-row [contenteditable]');
                    ctx.fillText((_ttEl?_ttEl.textContent.trim():'')||'ń©┐ń║ĖõĮ£ńŁö', w, row1H/2);
                    var infoY = row1H + Math.round(3*PX_PER_MM*sc);
                    var infoH = h - infoY;
                    ctx.fillStyle='#eef4fb'; ctx.fillRect(0,infoY,w,infoH);
                    var fsI = Math.round(9.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.fillStyle='#1a4070'; ctx.font='500 '+fsI+'px "Microsoft YaHei",sans-serif';
                    ctx.textAlign='left';
                    var pad = Math.round(2*PX_PER_MM*sc);
                    if (_isYJ) {
                        var _qEl = document.getElementById('yuedu-jingsai-question');
                        ctx.fillText('ķóśńø«’╝Ü'+(_qEl?(_qEl.innerText||'').replace(/\n/g,' ').trim():''), pad, infoY+infoH/2);
                    } else {
                        ctx.fillText('ń╗äÕł½’╝Ü'+group, pad, infoY+infoH/2);
                        ctx.fillText('ķóśńø«’╝Ü'+title, Math.round(w*0.42), infoY+infoH/2);
                    }
                    return cv.toDataURL('image/png');
                }

                // ŌöĆŌöĆ õ╗Ä span µīēÕØÉµĀćķćŹÕ╗║µ¢ćÕŁŚ’╝łµē╣ķćÅµēōÕŹ░µ¢ćõ╗Čńö©’╝ēŌöĆŌöĆ
                function readSpans(container) {
                    if (!container) return '';
                    var spans = Array.from(container.querySelectorAll('span'));
                    if (!spans.length) return '';
                    // µöČķøåÕö»õĖĆĶĪī’╝łtop Ķ»»ÕĘ« <3px ń«ŚÕÉīĶĪī’╝ē
                    var tops = [];
                    spans.forEach(function(s) {
                        var t = parseFloat(s.style.top)||0;
                        for (var i=0; i<tops.length; i++) { if (Math.abs(tops[i]-t)<3) return; }
                        tops.push(t);
                    });
                    tops.sort(function(a,b){return a-b;});
                    var text = '';
                    tops.forEach(function(rowTop, ri) {
                        var row = spans.filter(function(s){ return Math.abs((parseFloat(s.style.top)||0)-rowTop)<3; });
                        row.sort(function(a,b){ return (parseFloat(a.style.left)||0)-(parseFloat(b.style.left)||0); });
                        if (ri>0) text += '\n';
                        row.forEach(function(s){ text += s.textContent; });
                    });
                    return text;
                }

                // ŌöĆŌöĆ ĶĪīµĢ░Ķ«Īń«Ś’╝łÕÄ╗µ£½Õ░Šń®║ĶĪī’╝ēŌöĆŌöĆ
                function countRows(text) {
                    if (!text) return 0;
                    var rows = [], col = 0, hasContent = false;
                    for (var i=0; i<text.length; i++) {
                        var ch = text[i];
                        if (ch==='\n') { rows.push(hasContent); col=0; hasContent=false; }
                        else { col++; if (ch!=='ŃĆĆ'&&ch!==' ') hasContent=true; if(col>=COLS){rows.push(hasContent);col=0;hasContent=false;} }
                    }
                    rows.push(hasContent);
                    while (rows.length>1 && !rows[rows.length-1]) rows.pop();
                    return rows.length;
                }

                // ŌöĆŌöĆ µīēĶĪīµĢ░Õłćµ¢ćÕŁŚ ŌöĆŌöĆ
                function cutRows(text, maxRows) {
                    var i=0, row=0, col=0;
                    while (i<text.length && row<maxRows) {
                        if (text[i]==='\n') { row++; col=0; i++; }
                        else { col++; i++; if(col>=COLS){col=0;row++;} }
                    }
                    return { slice: text.slice(0,i), remaining: text.slice(i) };
                }

                // ŌöĆŌöĆ Ķ»╗ÕÅ¢ÕŁ”ńö¤õ┐Īµü» ŌöĆŌöĆ
                var anonCb = document.getElementById('anon-print-cb');
                var isAnon = anonCb && anonCb.checked;
                var nameEl = document.getElementById(_isYJ?'yuedu-jingsai-name':'jingsai-name');
                var classEl = document.getElementById(_isYJ?'yuedu-jingsai-class':'jingsai-class');
                var numEl = document.getElementById('jingsai-num');
                var nameVal = isAnon?'':(nameEl?nameEl.value.trim():'');
                var classVal = isAnon?'':(classEl?classEl.value.trim():'');
                var numVal = numEl?numEl.value.trim():'';
                var groupSel = pg.querySelector('select');
                var groupVal = groupSel&&groupSel.selectedIndex>0?groupSel.options[groupSel.selectedIndex].text:'';
                var titleInp = document.getElementById('jingsai-title-input');
                var titleVal = titleInp?titleInp.value.trim():'';

                // ŌöĆŌöĆ Ķ»╗ń¼¼õĖĆķóśµ¢ćÕŁŚ ŌöĆŌöĆ
                var allText = '';
                // õ╝śÕģł’╝ÜÕ╝ĢµōÄµÄźÕÅŻ
                if (typeof window._jingsaiGetState==='function') {
                    var _st = window._jingsaiGetState();
                    if (_st&&_st.text) allText = _st.text;
                }
                if (!allText && typeof window._jingsaiGetText==='function') {
                    allText = window._jingsaiGetText()||'';
                }
                // fallback’╝Üõ╗Ä span Ķ»╗’╝łµē╣ķćÅµēōÕŹ░µ¢ćõ╗Č’╝ē
                if (!allText) {
                    var _q1Layer = pg.querySelector('.jingsai-text-canvas');
                    if (_q1Layer) allText = readSpans(_q1Layer);
                }

                // ŌöĆŌöĆ Ķ»╗ķóØÕż¢ķóśńø« ŌöĆŌöĆ
                var extraUnits = [];
                if (_isYJ) {
                    var _yjCont = document.getElementById('yj-extra-container');
                    if (_yjCont) {
                        _yjCont.querySelectorAll('.yj-extra-unit').forEach(function(unitEl) {
                            var _titleEl = unitEl.querySelector('.yj-extra-q-label,.yj-extra-title,label,.yj-extra-question');
                            var _title = _titleEl?(_titleEl.innerText||_titleEl.textContent||'').trim():'';
                            var _gw = unitEl.querySelector('.yj-extra-grid-wrap');
                            var _text = '';
                            if (_gw && typeof _gw._yjGetText==='function') _text = _gw._yjGetText();
                            if (!_text) {
                                var _etl = _gw?_gw.querySelector('.yj-extra-text'):null;
                                if (_etl) _text = readSpans(_etl);
                            }
                            extraUnits.push({ title: _title, text: _text||'' });
                        });
                    }
                }

                // ŌöĆŌöĆ µ×äÕ╗║ÕåģÕ«╣ÕØŚ ŌöĆŌöĆ
                var blocks = [{ type:'grid', text: allText }];
                extraUnits.forEach(function(u) {
                    if (u.title) blocks.push({ type:'title', text: u.title });
                    blocks.push({ type:'grid', text: u.text });
                });

                // ŌöĆŌöĆ ńö¤µłÉ PDF ŌöĆŌöĆ
                var jsPDF = window.jspdf.jsPDF;
                var pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
                var hdrUrl = makeHeader(nameVal, classVal, numVal, groupVal, titleVal, isAnon);
                var curY = MARGIN;

                function newPage() { pdf.addPage(); curY = MARGIN; }
                function remain() { return PAGE_H - MARGIN - curY; }

                // ń¼¼õĖĆķĪĄķĪĄń£ē
                pdf.addImage(hdrUrl, 'PNG', X0, curY, CONTENT_W, HDR_H);
                curY += HDR_H + HDR_GAP;

                blocks.forEach(function(block) {
                    if (block.type === 'title') {
                        if (remain() < Q_H + Q_GAP + ROW_H_MM) newPage();
                        var tc = makeTitle(block.text);
                        pdf.addImage(tc.dataUrl, 'PNG', X0, curY, CONTENT_W, tc.h_mm);
                        curY += tc.h_mm + Q_GAP;
                    } else {
                        var rem = block.text;
                        var totalR = countRows(rem);
                        if (totalR < 1) totalR = 1;
                        var first = true;
                        while (true) {
                            var avail = remain();
                            var maxR = Math.floor((avail - 2) / ROW_H_MM);
                            if (maxR < 1) { newPage(); continue; }
                            var rInText = countRows(rem);
                            var rowsToDraw, cut;
                            if (rInText <= maxR) {
                                rowsToDraw = Math.max(1, rInText);

                            first = false;

    function importStudentData(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        event.target.value = "";
        const results = [];
        let loaded = 0;
        files.forEach(function(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) data.forEach(function(d){ results.push(d); });
                    else results.push(data);
                } catch(err) {
                    alert("µ¢ćõ╗ČµĀ╝Õ╝ÅķöÖĶ»»’╝Ü" + file.name);
                }
                loaded++;
                if (loaded === files.length) showImportedData(results);
            };
            reader.readAsText(file, "utf-8");
        });
    }

    function applyRoster(btn) {
        // µēŠÕł░ÕÉīń╗äńÜä textarea ÕÆī missingList
        var container = btn.parentElement; // flex row with textarea + button
        var groupDiv = container.parentElement; // group div
        var textarea = container.querySelector('.rosterInput');
        var ml = groupDiv.querySelector('.missingList');
        if (!textarea || !ml) return;

        var raw = textarea.value.trim();
        var rosterKey = textarea.getAttribute('data-key');
        if (rosterKey) localStorage.setItem(rosterKey, raw);

        var names = raw.split(/[\n,’╝īŃĆü\s]+/).map(function(n){ return n.trim(); }).filter(Boolean);
        if (!names.length) { ml.innerHTML = ''; return; }

        // µöČķøåµ£¼ń╗äÕĘ▓µÅÉõ║żÕ¦ōÕÉŹ
        var submitted = new Set();
        groupDiv.querySelectorAll('.import-row-cb').forEach(function(cb) {
            try {
                var r = JSON.parse(decodeURIComponent(cb.getAttribute('data-record')));
                if (r.studentName) submitted.add(r.studentName.trim());
            } catch(e) {}
        });

        var missing = names.filter(function(n) {
            // ń▓ŠńĪ«Õī╣ķģŹ µł¢ µ©Īń│ŖÕī╣ķģŹ’╝łõ║ÆõĖ║ÕŁÉõĖ▓’╝ē
            var nl = n.trim();
            for (var s of submitted) {
                if (s === nl) return false;           // ń▓ŠńĪ«
                if (s.indexOf(nl) !== -1) return false; // µÅÉõ║żńÜäÕīģÕÉ½ÕÉŹÕŹĢÕÉŹ
                if (nl.indexOf(s) !== -1) return false; // ÕÉŹÕŹĢÕÉŹÕīģÕÉ½µÅÉõ║żńÜä
            }
            return true;
        });

        if (missing.length === 0) {
            ml.innerHTML = '<div style="font-size:9pt;color:#0f6e56;font-weight:600;">Ō£ģ Õģ©ńÅŁÕĘ▓µÅÉõ║ż</div>';
        } else {

            });

        }

    // ŌöĆŌöĆ µÄÆÕ║ÅĶŠģÕŖ®’╝ÜĶÄĘÕÅ¢ÕĮōÕēŹÕŗŠķĆēńÜä records’╝łµīēµÄÆÕ║ÅÕÉÄķĪ║Õ║Å’╝ēŌöĆŌöĆ
    function _getSortedCheckedRecords() {
        const sel = document.getElementById('batchSortSelect');
        const sortMode = sel ? sel.value : 'num';

        var records = [];
        if (sortMode === 'manual') {
            // µēŗÕŖ©µŗ¢µÄÆ’╝Üµīē DOM õĖŁĶĪīńÜäķĪ║Õ║Å
            document.querySelectorAll('.import-row-cb:checked').forEach(function(cb) {
                try { records.push(JSON.parse(decodeURIComponent(cb.getAttribute('data-record')))); } catch(e) {}
            });
        } else {
            document.querySelectorAll('.import-row-cb:checked').forEach(function(cb) {
                try { records.push(JSON.parse(decodeURIComponent(cb.getAttribute('data-record')))); } catch(e) {}
            });
            records.sort(function(a, b) {
                if (sortMode === 'num') {
                    return (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'name') {
                    return (a.studentName||'').localeCompare(b.studentName||'', 'zh-Hans-CN', {sensitivity:'base'});
                } else if (sortMode === 'class') {
                    var cc = (a.class||'').localeCompare(b.class||'', 'zh-Hans-CN');
                    return cc !== 0 ? cc : (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'source') {
                    // µ║ÉµĄü’╝ÜG3ÕŹÄµ¢ć < ķ½śÕŹÄ’╝īń╗äÕåģµīēń╝¢ÕÅĘ
                    function _srcOrder(r) {
                        var g = (r.jingsai_group || r['inputs.jingsai_group'] || (r.inputs&&r.inputs.jingsai_group) || r.class || '').toLowerCase();
                        if (g.indexOf('g3') !== -1) return 0;
                        if (g.indexOf('ķ½śÕŹÄ') !== -1) return 1;
                        return 2;
                    }
                    var so = _srcOrder(a) - _srcOrder(b);
                    return so !== 0 ? so : (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'time') {
                    return (a.submitTime||'').localeCompare(b.submitTime||'');
                }
                return 0;
            });
        }
        return records;
    }

        if (info) {

    function fetchFromGAS() {
        const url = document.getElementById('scriptUrl').value.trim();
        if (!url) { alert('Ķ»ĘÕģłÕ£©ķĮ┐ĶĮ«Ķ«ŠńĮ«ķćīÕĪ½Õģź Apps Script URL'); return; }

        function onMessage(event) {
            if (!event.data || event.data.source !== 'GAS_WORKSHEET') return;
            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = 'Ōśü’ĖÅ õ╗Ä Drive Ķ»╗ÕÅ¢'; btn.disabled = false; }

                return;
            }
            showImportedData(data.records);

        window.addEventListener('message', onMessage);

        // Õ╝Ćµ¢░ń¬ŚÕÅŻ’╝łÕ┐ģķĪ╗Õ£©ńö©µłĘńé╣Õć╗õ║ŗõ╗Čķćīńø┤µÄźĶ░āńö©’╝īÕÉ”ÕłÖĶó½µŗ”µł¬’╝ē
        const readerUrl = url + '?action=getAll&type=worksheet&mode=postMessage';

            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = 'Ōśü’ĖÅ õ╗Ä Drive Ķ»╗ÕÅ¢'; btn.disabled = false; }
            if (popup && !popup.closed) popup.close();
        }, 30000);

            const canvases = (r.canvases && Object.keys(r.canvases).length > 0) ? r.canvases : null;

    // ŌöĆŌöĆ Õģ©Õ▒Ćµ│©ķćŖ Tooltip’╝łfixedÕ«ÜõĮŹ’╝īõĖŹÕÅŚoverflow:hiddenµł¬µ¢Ł’╝ēŌöĆŌöĆ
    (function() {
        var tip = document.getElementById('kt-tooltip');
        if (!tip) return;
        document.addEventListener('mouseover', function(e) {
            var ruby = e.target.closest && e.target.closest('.kt-ruby');
            if (!ruby) return;
            var text = ruby.getAttribute('data-tip');
            if (!text) return;
            tip.textContent = text;
            tip.style.display = 'block';
        });
        document.addEventListener('mousemove', function(e) {
            // Õ”éµ×£ķ╝ĀµĀćÕ£© kt-draw-canvas õĖŖ’╝īńö© elementFromPoint ń®┐ķĆÅµ¤źµēŠ ruby Õģāń┤Ā
            if (e.target && e.target.id === 'kt-draw-canvas') {
                var canvas = e.target;
                canvas.style.pointerEvents = 'none';
                var below = document.elementFromPoint(e.clientX, e.clientY);
                canvas.style.pointerEvents = '';
                var ruby = below && below.closest && below.closest('.kt-ruby');
                if (ruby) {
                    var text = ruby.getAttribute('data-tip');
                    if (text) { tip.textContent = text; tip.style.display = 'block'; }
                } else {
                    tip.style.display = 'none';
                }
            }
            if (tip.style.display === 'none') return;
            var tw = tip.offsetWidth, th = tip.offsetHeight;
            var wx = window.innerWidth;
            tip.style.left = Math.min(e.clientX + 14, wx - tw - 14) + 'px';
            tip.style.top = (e.clientY - th - 12 < 8) ? (e.clientY + 18) + 'px' : (e.clientY - th - 12) + 'px';
        });
        document.addEventListener('mouseout', function(e) {
            var ruby = e.target.closest && e.target.closest('.kt-ruby');
            if (!ruby) return;
            tip.style.display = 'none';
        });
    })();

(function() {
    function hex2rgb(hex) {
        hex = (hex||'').replace('#','');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    }
    document.querySelectorAll('.kt-ruby').forEach(function(r) {
        // õ╝śÕģłĶ»╗ data-color’╝īµ▓Īµ£ēÕłÖõ╗Ä style.color Ķ┐üń¦╗
        var hex = r.getAttribute('data-color');
        if (!hex) {
            var sc = r.style.color;
            if (sc && sc.indexOf('#') === 0) { hex = sc; }
            else if (sc && sc.indexOf('rgb') === 0) {
                var m = sc.match(/\d+/g);
                if (m) hex = '#'+('0'+parseInt(m[0]).toString(16)).slice(-2)+('0'+parseInt(m[1]).toString(16)).slice(-2)+('0'+parseInt(m[2]).toString(16)).slice(-2);
            }
            hex = hex || '#1565c0';
            r.setAttribute('data-color', hex);
        }
        // µ▓Īµ£ē data-rubystyle ńÜäµŚ¦µ│©ķćŖķ╗śĶ«żńö© soft’╝łµĘĪĶē▓ÕØŚ’╝ē
        if (!r.getAttribute('data-rubystyle')) {
            r.setAttribute('data-rubystyle', 'soft');
        }
        var style = r.getAttribute('data-rubystyle') || 'soft';
        var rgb = hex2rgb(hex);
        r.style.setProperty('--rc', hex);
        var alpha = (style === 'highlight') ? '0.45' : '0.18';
        r.style.setProperty('--rca', 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+alpha+')');
        // µĖģķÖżµŚ¦ńÜä style.color’╝łķś▓µŁóÕ╣▓µē░ CSS ÕÅśķćÅ’╝ē
        r.style.removeProperty('color');
        // µüóÕżŹÕŁŚĶē▓ CSS ÕÅśķćÅ’╝łdata-fc-color’╝ē
        var fcColor = r.getAttribute('data-fc-color');
        if (fcColor) {
            r.style.setProperty('--kt-fc-span-color', fcColor);
            // ń╗ÖÕåģķā©ÕŁŚĶē▓ span ÕŖĀõĖŖ class’╝łÕģ╝Õ«╣µŚ¦ÕŁśµĪŻ’╝ē
            var inner = r.querySelector('span:not(rt)');
            if (inner && inner.style.color) {
                inner.className = (inner.className ? inner.className + ' ' : '') + 'kt-fc-span';
                inner.style.removeProperty('color');
            }
        }
    });
})();

    document.addEventListener('mousemove', function(e) {
        // Õ”éµ×£ķ╝ĀµĀćÕ£© kt-draw-canvas õĖŖ’╝īńö© elementFromPoint ń®┐ķĆÅµ¤źµēŠ ruby Õģāń┤Ā
        if (e.target && e.target.id === 'kt-draw-canvas') {
            var canvas = e.target;

            var below = document.elementFromPoint(e.clientX, e.clientY);
            canvas.style.pointerEvents = '';
            var ruby = below && below.closest && below.closest('.kt-ruby');

        if (tip.style.display === 'none') return;

<script>

(function(){

function _drawCSSGrid(containerEl, rows) {

    var dpr=window.devicePixelRatio||1;
    // µ»ÅõĖ¬Õ«×õŠŗĶć¬ÕĘ▒ńÜäńŖČµĆü

    var _cW,_cH,_auxH,_gH,_TW,_TH;
    var _text='ŃĆĆŃĆĆ', _cur=2, _composing=false;

    var block=document.createElement('div');

    var outer=document.createElement('div');

    var wrap=document.createElement('div');
    wrap.style.cssText='position:relative;background:#fff;overflow:visible;cursor:text;width:100%;';
    var cv=document.createElement('canvas');

    // ńö╗µĀ╝ÕŁÉ
    function _drawGrid(r2) {

        var fs=Math.round(_cH*0.60);
        var topOff=Math.round((_cH-fs)/2);
        var row=0,col=0;
        for(var idx=0;idx<_text.length;idx++){
            if(idx===_cur){_showCursor(row,col,fs,topOff);}

                var sp=document.createElement('span');
                sp.textContent=ch;
                sp.style.cssText='position:absolute;left:'+(col*_cW)+'px;top:'+(row*_gH+topOff)+'px;width:'+_cW+'px;height:'+fs+'px;display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:100;line-height:1;color:#1a2a3a;font-family:SimSun,Õ«ŗõĮō,STSong,serif;box-sizing:border-box;transform:translateY(-'+Math.round(fs*0.08)+'px);';

            if(_text[i]==='\n'){row++;col=0;}

        return _text.length;

    // ĶŠōÕģźÕżäńÉå
    function _insert(str){

    function _del(before){

            var prev=_text[_cur-1];

                _text=_text.slice(0,_cur-3)+_text.slice(_cur);_cur-=3;

    containerEl._yjGetText=function(){return _text;};

                    e.preventDefault();

                    var _trimmed = _text.replace(/^[\u3000\s\n]+$/, '');

                        var _unitEl=containerEl.closest('.yj-extra-unit');

}
