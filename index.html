<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #64748b; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background: linear-gradient(to bottom, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden; /* 防止全屏切换时出现微小的横向抖动 */
        }
        
        header {
            background: var(--bg-gradient);
            padding: 80px 20px 110px; 
            text-align: center;
            color: white;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 15px; /* 宽屏下极具美感 */
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif; font-size: 0.85rem;
            letter-spacing: 6px; opacity: 0.8; font-weight: 300;
        }

        /* 核心布局：控制全屏与非全屏的宽度感 */
        .container {
            max-width: 1080px; /* 限制最大宽度，防止全屏时散架 */
            width: 90%;
            margin: -45px auto 0; 
            padding: 0 20px;
            flex: 1;
        }

        .grid {
            display: grid;
            /* 智能响应：在不同屏幕下自动调整列数 */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 80px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.06);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 25px 50px -15px rgba(0, 0, 0, 0.12); 
            border-color: var(--primary-blue);
        }
        
        .icon { font-size: 56px; margin-bottom: 30px; transition: transform 0.4s ease; }
        .card h2 { font-size: 1.5rem; letter-spacing: 6px; color: var(--text-main); margin-bottom: 12px; font-weight: 400;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; color: var(--text-sub); letter-spacing: 2px; }

        /* 名句看板：移除标签，优化间距 */
        .quote-board {
            text-align: center;
            max-width: 600px;
            margin: 60px auto 120px; /* 增加底部间距，彻底解决“太空”感 */
            padding: 40px 20px;
            position: relative;
        }
        /* 增加一个极淡的装饰性引号，提升高级感 */
        .quote-board::before {
            content: "“";
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            font-size: 4rem; color: rgba(0, 78, 124, 0.05); font-family: serif;
        }
        .quote-text {
            font-size: 1.15rem;
            line-height: 2.2;
            color: #64748b;
            letter-spacing: 4px;
            font-weight: 300;
        }

        footer {
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.03);
            background: rgba(255,255,255,0.3);
        }
        .footer-text { font-size: 0.8rem; color: #94a3b8; letter-spacing: 3px; font-weight: 300; }

        /* 适配不同尺寸屏幕 */
        @media (max-width: 768px) {
            .brand { font-size: 1.8rem; letter-spacing: 8px; }
            .grid { grid-template-columns: 1fr; }
            .quote-text { font-size: 1rem; letter-spacing: 2px; }
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <div class="container">
        <div class="grid">
            <a href="./01-learning-guide/index.html" class="card">
                <span class="icon">🧭</span>
                <h2>学法指引</h2>
                <div class="subtitle">LEARNING GUIDE</div>
            </a>
            <a href="./02-interaction/index.html" class="card">
                <span class="icon">⚡</span>
                <h2>课堂互动</h2>
                <div class="subtitle">CLASS INTERACTION</div>
            </a>
            <a href="./03-gallery/index.html" class="card">
                <span class="icon">⭐</span>
                <h2>佳作视界</h2>
                <div class="subtitle">EXCELLENCE GALLERY</div>
            </a>
        </div>

        <div class="quote-board">
            <p class="quote-text">
                博观而约取，厚积而薄发。<br>
                以华文为桥，连接更广阔的世界。
            </p>
        </div>
    </div>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · DESIGNED FOR EXCELLENCE</div>
    </footer>
</body>
</html>
