<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #64748b; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 增加最小高度，确保页面始终撑开 */
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc; 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-gradient);
            padding: 80px 20px 100px; 
            text-align: center;
            color: white;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            opacity: 0.8;
            font-weight: 300;
        }

        .container {
            max-width: 1000px; 
            margin: -40px auto 0; /* 悬浮效果 */
            padding: 0 40px;
            flex: 1; /* 自动撑开中间区域 */
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
            margin-bottom: 100px; /* 给卡片下方留出呼吸感 */
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 25px 50px -15px rgba(0, 0, 0, 0.12); 
            border-color: var(--primary-blue);
        }
        
        .icon { font-size: 56px; margin-bottom: 30px; transition: transform 0.4s ease; }
        .card:hover .icon { transform: scale(1.1); }
        
        .card h2 { font-size: 1.5rem; letter-spacing: 6px; color: var(--text-main); margin-bottom: 12px; font-weight: 500;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; color: var(--text-sub); letter-spacing: 2px; }

        /* 重点：新增优雅页脚 */
        footer {
            padding: 60px 20px;
            text-align: center;
            background-color: transparent;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .footer-text {
            font-size: 0.9rem;
            color: #94a3b8;
            letter-spacing: 3px;
        }
        .quote {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #cbd5e1;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .brand { font-size: 1.8rem; letter-spacing: 6px; }
            .container { margin-top: 20px; padding: 0 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <div class="container">
        <div class="grid">
            <a href="./01-learning-guide/index.html" class="card">
                <span class="icon">🧭</span>
                <h2>学法指引</h2>
                <div class="subtitle">LEARNING GUIDE</div>
            </a>
            <a href="./02-interaction/index.html" class="card">
                <span class="icon">⚡</span>
                <h2>课堂互动</h2>
                <div class="subtitle">CLASS INTERACTION</div>
            </a>
            <a href="./03-gallery/index.html" class="card">
                <span class="icon">⭐</span>
                <h2>佳作视界</h2>
                <div class="subtitle">EXCELLENCE GALLERY</div>
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS</div>
        <div class="quote">“以华文为桥，连接更广阔的世界。”</div>
    </footer>
</body>
</html>
