    // ── Canvas 手写 ──
    // ── 全局 undo/redo 分发（用 WeakMap 记录每个 canvas 的栈）──
    const _canvasUndoMap = new WeakMap(); // canvas → {undo:[], redo:[]}
    var _lastFocusedCanvas = null;
    var _lastFocusedEditable = null; // 最近获得焦点的 contenteditable 元素
    var _lastActionType = null; // 'canvas' | 'highlight' | 'checkbox' | 'editable' | null

    // ── contenteditable 自定义 undo/redo 栈 ──
    // 关键：始终把快照存在"顶层可编辑根元素"上，不管 activeElement 是其哪个子孙
    const _ceUndoMap = new WeakMap(); // el → {undo:[], redo:[], lastSnap:str}

    // 找到离 el 最近的、真正是"编辑根节点"的 contenteditable 祖先
    // 即：自身或祖先中最靠近根的那个 contenteditable="true" 元素
    function _ceRoot(el) {
        if (!el) return null;
        var node = el;
        var root = null;
        while (node && node !== document.body) {
            if (node.contentEditable === 'true') root = node;
            node = node.parentElement;
        }
        return root || (el.contentEditable === 'true' ? el : null);
    }

    function _getCeStacks(el) {
        if (!_ceUndoMap.has(el)) _ceUndoMap.set(el, {undo:[], redo:[], lastSnap: el.innerHTML});
        return _ceUndoMap.get(el);
    }
    function _ceSnapshot(el) {
        var root = _ceRoot(el);
        if (!root) return;
        var s = _getCeStacks(root);
        var now = root.innerHTML;
        if (s.lastSnap === now) return;
        s.undo.push(s.lastSnap);
        if (s.undo.length > 80) s.undo.shift();
        s.redo = [];
        s.lastSnap = now;
    }
    function _ceUndo(el) {
        var root = _ceRoot(el) || el; // 如直接传入编辑根节点本身（如 kt-text-content），也支持
        if (!root || !root.innerHTML) return;
        var s = _getCeStacks(root);
        if (s.undo.length === 0) return;
        s.redo.push(root.innerHTML);
        var html = s.undo.pop();
        s.lastSnap = html;
        root.innerHTML = html;
        _lastFocusedEditable = root; _lastActionType = 'editable';
        try { root.focus(); var r = document.createRange(); r.selectNodeContents(root); r.collapse(false); var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r); } catch(ex){}
    }
    function _ceRedo(el) {
        var root = _ceRoot(el) || el;
        if (!root || !root.innerHTML) return;
        var s = _getCeStacks(root);
        if (s.redo.length === 0) return;
        s.undo.push(root.innerHTML);
        var html = s.redo.pop();
        s.lastSnap = html;
        root.innerHTML = html;
        _lastFocusedEditable = root; _lastActionType = 'editable';
        try { root.focus(); var r = document.createRange(); r.selectNodeContents(root); r.collapse(false); var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r); } catch(ex){}
    }
    // 防抖定时器：每次 input 后 300ms 快照一次
    var _ceSnapTimer = null;
    function _scheduleCeSnapshot(el) {
        clearTimeout(_ceSnapTimer);
        _ceSnapTimer = setTimeout(function() { _ceSnapshot(el); }, 300);
    }

    // capture phase：在 contenteditable 区域按下任意普通键之前，先快照（存修改前的状态）
    document.addEventListener('keydown', function(e) {
        if (e.ctrlKey || e.metaKey || e.altKey) return;
        var ae = document.activeElement;
        if (!ae) return;
        var root = _ceRoot(ae);
        if (!root) return;
        _ceSnapshot(ae); // 会自动找到 root 来快照
    }, true);

    // ── textarea / input[text] 自定义 undo/redo 栈 ──
    const _taUndoMap = new WeakMap(); // el → {undo:[], redo:[], lastSnap:str}
    var _lastFocusedTextarea = null;

    function _getTaStacks(el) {
        if (!_taUndoMap.has(el)) _taUndoMap.set(el, {undo:[], redo:[], lastSnap: el.value});
        return _taUndoMap.get(el);
    }
    function _taSnapshot(el) {
        var s = _getTaStacks(el);
        var now = el.value;
        if (s.lastSnap === now) return;
        s.undo.push(s.lastSnap);
        if (s.undo.length > 80) s.undo.shift();
        s.redo = [];
        s.lastSnap = now;
    }
    function _taUndo(el) {
        var s = _getTaStacks(el);
        if (s.undo.length === 0) return;
        s.redo.push(el.value);
        var val = s.undo.pop();
        s.lastSnap = val;
        el.value = val;
        el.focus();
        el.setSelectionRange(val.length, val.length);
    }
    function _taRedo(el) {
        var s = _getTaStacks(el);
        if (s.redo.length === 0) return;
        s.undo.push(el.value);
        var val = s.redo.pop();
        s.lastSnap = val;
        el.value = val;
        el.focus();
        el.setSelectionRange(val.length, val.length);
    }
    var _taSnapTimer = null;
    function _scheduleTaSnapshot(el) {
        clearTimeout(_taSnapTimer);
        _taSnapTimer = setTimeout(function() { _taSnapshot(el); }, 300);
    }
    function _isManagedTextarea(el) {
        if (!el) return false;
        var tag = el.tagName;
        return (tag === 'TEXTAREA') || (tag === 'INPUT' && (el.type === 'text' || el.type === ''));
    }

    // 追踪 contenteditable 的 focus/blur，记录最后编辑的元素
    document.addEventListener('focusin', function(e) {
        // textarea / input[text] 追踪
        if (_isManagedTextarea(e.target)) {
            _lastFocusedTextarea = e.target;
            _lastActionType = 'textarea';
            var s = _getTaStacks(e.target);
            if (s.lastSnap !== e.target.value) s.lastSnap = e.target.value;
            return;
        }
        var root = _ceRoot(e.target);
        if (root) {
            _lastFocusedEditable = root;
            _lastActionType = 'editable';
            // 进入时确保有初始快照
            var s = _getCeStacks(root);
            if (s.lastSnap !== root.innerHTML) s.lastSnap = root.innerHTML;
        }
    });
    document.addEventListener('input', function(e) {
        // textarea / input[text] 追踪
        if (_isManagedTextarea(e.target)) {
            _lastFocusedTextarea = e.target;
            _lastActionType = 'textarea';
            _scheduleTaSnapshot(e.target);
            return;
        }
        var root = _ceRoot(e.target);
        if (root) {
            _lastFocusedEditable = root;
            _lastActionType = 'editable';
            _scheduleCeSnapshot(root);
        }
    });

    // ── 勾选框 undo/redo ──
    var _cbUndoStack = [], _cbRedoStack = [];
    function _saveCbSnapshot(el) {
        _cbUndoStack.push({ el: el, checked: !el.checked }); // 保存变更前的状态
        if (_cbUndoStack.length > 30) _cbUndoStack.shift();
        _cbRedoStack = [];
        _lastActionType = 'checkbox';
    }
    function _cbUndo() {
        if (_cbUndoStack.length === 0) return;
        var s = _cbUndoStack.pop();
        _cbRedoStack.push({ el: s.el, checked: s.el.checked });
        s.el.checked = s.checked;
    }
    function _cbRedo() {
        if (_cbRedoStack.length === 0) return;
        var s = _cbRedoStack.pop();
        _cbUndoStack.push({ el: s.el, checked: s.el.checked });
        s.el.checked = s.checked;
    }

    // 给页面上所有 checkbox 绑定事件（含动态添加的）
    document.addEventListener('change', function(e) {
        if (e.target && e.target.type === 'checkbox') {
            _saveCbSnapshot(e.target);
        }
    });

    function _getCanvasStacks(canvas) {
        if (!_canvasUndoMap.has(canvas)) _canvasUndoMap.set(canvas, {undo:[], redo:[]});
        return _canvasUndoMap.get(canvas);
    }
    function _saveCanvasSnapshot(canvas) {
        var s = _getCanvasStacks(canvas);
        s.undo.push(canvas.toDataURL());
        if (s.undo.length > 30) s.undo.shift();
        s.redo = [];
    }
    function _canvasUndo(canvas) {
        if (!canvas) return;
        var s = _getCanvasStacks(canvas);
        if (s.undo.length === 0) return;
        s.redo.push(canvas.toDataURL());
        var data = s.undo.pop();
        var ctx = canvas.getContext('2d', {willReadFrequently:true});
        var img = new Image();
        img.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = data;
    }
    function _canvasRedo(canvas) {
        if (!canvas) return;
        var s = _getCanvasStacks(canvas);
        if (s.redo.length === 0) return;
        s.undo.push(canvas.toDataURL());
        var data = s.redo.pop();
        var ctx = canvas.getContext('2d', {willReadFrequently:true});
        var img = new Image();
        img.onload = function() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        };
        img.src = data;
    }

    // ── 全局撤销/重做核心逻辑（供按钮和快捷键共用）──
    function _doUndo() {
        if (_lastActionType === 'checkbox' && _cbUndoStack.length > 0) { _cbUndo(); return; }
        if (_lastActionType === 'highlight' && window._hlUndo && window._hlUndoStack && window._hlUndoStack.length > 0) {
            window._hlUndo(); return;
        }
        if (_lastActionType === 'canvas' && _lastFocusedCanvas) {
            _canvasUndo(_lastFocusedCanvas); return;

    // 用 WeakSet 追踪已初始化的 canvas，彻底防止重复绑定事件监听器
    const _initializedCanvases = new WeakSet();

    function setupCanvas(canvas, lineWidth) {
        if (!canvas) return;
        if (_initializedCanvases.has(canvas)) return;
        _initializedCanvases.add(canvas);
        canvas.style.background = '#ffffff';
        var ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = lineWidth || (_ktDrawLineWidth||1);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        // Keep pixel size in sync with CSS size to prevent black-on-resize
        var _syncTimer = null;
        var _restoring = false; // 修改A：图像恢复期间锁，防止二次sync覆盖笔迹
        function syncCanvasSize() {
            // 防抖：避免 resize 过程中频繁触发
            if (_syncTimer) return;
            if (_restoring) return; // 修改A：正在恢复图像时跳过，等恢复完再说
            _syncTimer = requestAnimationFrame(function() {
                _syncTimer = null;
                var r = canvas.getBoundingClientRect();
                var w = Math.round(r.width), h = Math.round(r.height);
                if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
                    var data = null;
                    try { data = canvas.toDataURL(); } catch(ex){}
                    canvas.width = w; canvas.height = h;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h); // 防止黑色背景
                    ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = lineWidth||(_ktDrawLineWidth||1);
                    ctx.lineCap='round'; ctx.lineJoin='round';
                    if (data) {
                        _restoring = true; // 修改A：锁定，img.onload 是异步的
                        var img = new Image();
                        img.onload = function() {
                            ctx.clearRect(0, 0, w, h);
                            ctx.drawImage(img, 0, 0, w, h);
                            _restoring = false; // 修改A：恢复完成，解锁
                        };
                        img.src = data;
                    }
                }
            });
        }
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(syncCanvasSize).observe(canvas);
        }
        // 初始化时立即同步一次尺寸
        requestAnimationFrame(function() {
            var r = canvas.getBoundingClientRect();
            var w = Math.round(r.width), h = Math.round(r.height);
            if (w > 0 && h > 0) {
                canvas.width = w; canvas.height = h;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, w, h);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = lineWidth||(_ktDrawLineWidth||1);
                ctx.lineCap='round'; ctx.lineJoin='round';
            }
        });
        let drawing = false, lastX = 0, lastY = 0;
        let shiftStart = null;
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const scaleX = canvas.width / r.width;
            const scaleY = canvas.height / r.height;
            if (e.touches) {
                return [(e.touches[0].clientX - r.left) * scaleX,
                        (e.touches[0].clientY - r.top) * scaleY];
            }
            return [(e.clientX - r.left) * scaleX, (e.clientY - r.top) * scaleY];

        // ── Shift 直线 overlay ──
        var overlayCanvas = document.createElement('canvas');
        overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;';
        if (canvas.parentElement) canvas.parentElement.appendChild(overlayCanvas);
        function syncOverlay() { overlayCanvas.width = canvas.width; overlayCanvas.height = canvas.height; }
        syncOverlay();
        function drawStraightPreview(x, y) {
            if (!shiftStart) return;
            syncOverlay();

            oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            oc.strokeStyle = ctx.strokeStyle; oc.lineWidth = ctx.lineWidth; oc.lineCap = 'round';
            oc.setLineDash([6, 4]);

        function clearOverlay() { var oc = overlayCanvas.getContext('2d'); oc.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height); }

            drawing = false; clearOverlay(); shiftStart = null;
            _lastFocusedCanvas = null; // 离开 canvas 后清空，让高亮/文字输入能正常撤销
        });
        canvas.addEventListener('mousedown', e => {
            _lastFocusedCanvas = canvas;
            _lastActionType = 'canvas';
            _saveCanvasSnapshot(canvas);

        canvas.addEventListener('mousemove', e => {
            if (!drawing) return;

                ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();

            }
        });

            if (drawing && shiftStart) {
                const [x, y] = getPos(e);

                ctx.beginPath(); ctx.moveTo(shiftStart[0], shiftStart[1]); ctx.lineTo(x, y); ctx.stroke();

    }

    // ══ 草稿自动暂存系统（仅学生版） ══
    // localStorage key = 班级 + 任务 + fileToken
    // fileToken 在生成时写入，每次生成都不同，确保不同学生版草稿互不污染
    function _draftKey() {
        const m = window.STUDENT_META;
        if (!m) return null;
        const token = m.fileToken || '';
        return 'draft__' + (m.class || '') + '__' + (m.assignTitle || '') + (token ? '__' + token : '');
    }

    function saveDraft(silent) {
        const key = _draftKey();
        if (!key) return;

        const _pid = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const inputs = {};
        document.querySelectorAll(_pid + ' input[type="text"], ' + _pid + ' textarea').forEach((el, i) => {
            inputs['f' + i] = el.value;
        });
        // jingsai：_text和_cur存入草稿
        if (typeof currentTemplate !== 'undefined' && currentTemplate === 'jingsai') {
            if (typeof window._jingsaiGetState === 'function') {
                var _js = window._jingsaiGetState();
                inputs['jingsai_text'] = _js.text;
                inputs['jingsai_cur'] = _js.cur;
            }
        }
        document.querySelectorAll(_pid + ' input[type="checkbox"]').forEach((el, i) => {
            inputs['c' + i] = el.checked;
        });

        const canvases = {};
        document.querySelectorAll(_pid + ' canvas').forEach(canvas => {
            if (!canvas.id) return;
            if (canvas.width === 0 || canvas.height === 0) return;
            try {
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                // 修复I：检查非白色非透明像素（笔迹），与isCanvasBlank逻辑一致
                const step = Math.max(1, Math.floor(canvas.height / 8));
                let hasPixel = false;
                outer: for (let y = 0; y < canvas.height; y += step) {
                    const d = ctx.getImageData(0, y, canvas.width, 1).data;
                    for (let i = 0; i < d.length; i += 4) {
                        const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
                        if (a > 10 && !(r > 240 && g > 240 && b > 240)) { hasPixel = true; break outer; }
                    }
                }
                if (hasPixel) canvases[canvas.id] = canvas.toDataURL('image/jpeg', 0.4);
            } catch(e) {}
        });

        try {
            localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases }));
        } catch(e) {
            try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases: {} })); } catch(e2) {}
        }

        if (!silent) _showDraftToast('✅ Draft saved');
    }

    function restoreDraft() {
        const key = _draftKey();
        if (!key) return;
        let raw;
        try { raw = localStorage.getItem(key); } catch(e) { return; }
        if (!raw) return;

        let data;
        try { data = JSON.parse(raw); } catch(e) { return; }

        const ts = data.ts ? new Date(data.ts).toLocaleString('zh-SG', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

        const confirmed = true; // 静默恢复，不弹确认框
        if (!confirmed) {
            localStorage.removeItem(key);
            return;
        }

        const _pid2 = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        if (data.inputs) {
            document.querySelectorAll(_pid2 + ' input[type="text"], ' + _pid2 + ' textarea').forEach((el, i) => {
                const v = data.inputs['f' + i];
                if (v !== undefined) el.value = v;
            });
            // jingsai：恢复_text和_cur
            if (typeof currentTemplate !== 'undefined' && currentTemplate === 'jingsai') {
                if (data.inputs['jingsai_text'] !== undefined && typeof window._jingsaiSetState === 'function') {
                    window._jingsaiSetState(data.inputs['jingsai_text'], data.inputs['jingsai_cur']||0);
                }
            }
            document.querySelectorAll(_pid2 + ' input[type="checkbox"]').forEach((el, i) => {
                const v = data.inputs['c' + i];
                if (v !== undefined) {
                    el.checked = v;
                    if (el.classList.contains('other-reason-cb') || el.classList.contains('other-action-cb')) {
                        const label = el.closest('label');
                        if (label) {
                            const inp = label.querySelector('input[type="text"]');
                            if (inp) {
                                inp.disabled = !v;
                                inp.style.opacity = v ? '1' : '0.5';
                                inp.style.cursor = v ? 'text' : 'not-allowed';
                            }

                    }
                }
            });
        }

        if (data.canvases) {
            const ids = Object.keys(data.canvases);
            requestAnimationFrame(() => requestAnimationFrame(() => {

                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    };

                });

        // 还原后同步论题输入框宽度
        var _yti = document.getElementById('yo-topic-input');
        var _ytm = document.getElementById('yo-topic-mirror');
        if (_yti && _ytm) { _ytm.textContent = _yti.value || _yti.placeholder; _yti.style.width = Math.max(120, _ytm.offsetWidth + 8) + 'px'; }
    }

    var _phCurrentTarget = null;
    function _showPhPopover(inputEl, iconEl) {
        var pop = _getPhPopover();
        _phCurrentTarget = inputEl;
        var inp = document.getElementById('ph-pop-input');
        inp.value = inputEl.placeholder || '';

        // Position near the icon
        var rect = iconEl.getBoundingClientRect();
        var popW = 260;
        var left = rect.left;
        var top = rect.bottom + 6;
        // Keep inside viewport
        if (left + popW > window.innerWidth - 12) left = window.innerWidth - popW - 12;
        if (left < 8) left = 8;
        if (top + 120 > window.innerHeight) top = rect.top - 120;

        pop.style.left = left + 'px';
        pop.style.top = top + 'px';
        pop.style.display = 'flex';
        setTimeout(function() { inp.focus(); inp.select(); }, 30);
    }

    function _hidePhPopover() {
        if (_phPopover) _phPopover.style.display = 'none';
        _phCurrentTarget = null;
    }

    function _confirmPhEdit() {
        if (!_phCurrentTarget) { _hidePhPopover(); return; }
        var newPh = document.getElementById('ph-pop-input').value;
        _phCurrentTarget.placeholder = newPh;
        _phCurrentTarget.setAttribute('placeholder', newPh);
        _hidePhPopover();
    }

    // Attach/detach edit icons on all eligible inputs & textareas
    var _phIconsAttached = false;
    function syncPlaceholderEditMode(isEditing) {
        if (isEditing) {
            _attachPlaceholderIcons();
        } else {
            _detachPlaceholderIcons();
            _hidePhPopover();
        }
    }

    function _attachPlaceholderIcons() {
        if (_phIconsAttached) return;
        _phIconsAttached = true;

        var els = document.querySelectorAll('input[type="text"], input:not([type]), textarea');
        els.forEach(function(el) {
            if (_isInExcludedZone(el)) return;
            if (el.id === 'classSelect' || el.id === 'assignTitle') return;
            if (el.style.display === 'none' || el.offsetParent === null) return;
            if (el.dataset.phIconAttached) return;
            el.dataset.phIconAttached = '1';

            // Wrap the field in a hover-container so icon stays visible when
            // moving from field → icon (both are inside the same container)
            var wrapper = document.createElement('span');
            wrapper.className = 'ph-wrap';
            wrapper.style.cssText = 'position:relative;display:inline-block;width:100%;';
            // For block-level textarea keep display:block
            if (el.tagName === 'TEXTAREA' || window.getComputedStyle(el).display === 'block') {
                wrapper.style.display = 'block';
            }
            el.parentNode.insertBefore(wrapper, el);
            wrapper.appendChild(el);

            // Pencil icon
            var icon = document.createElement('span');
            icon.className = 'ph-edit-icon';
            icon.title = '修改提示语';
            icon.textContent = '✏';
            var iconTop = el.tagName === 'TEXTAREA' ? '4px' : '50%';
            var iconTransform = el.tagName === 'TEXTAREA' ? 'none' : 'translateY(-50%)';
            icon.style.cssText = [
                'position:absolute;z-index:50;',
                'right:4px;top:' + iconTop + ';transform:' + iconTransform + ';',
                'font-size:10px;line-height:1;',
                'background:rgba(46,134,193,0.90);color:#fff;',
                'border-radius:4px;padding:2px 5px;',
                'cursor:pointer;',
                'display:inline-flex;align-items:center;',
                'box-shadow:0 1px 5px rgba(0,0,0,.22);',
                'white-space:nowrap;opacity:0;transition:opacity .12s;',
                'pointer-events:none;user-select:none;'
            ].join('');
            wrapper.appendChild(icon);
            el._phIcon = icon;

            // Show/hide on wrapper hover (covers both field AND icon)
            wrapper.addEventListener('mouseenter', function() {
                if (!isEditMode) return;
                icon.style.opacity = '1';
                icon.style.pointerEvents = 'auto';
            });
            wrapper.addEventListener('mouseleave', function() {
                icon.style.opacity = '0';
                icon.style.pointerEvents = 'none';
            });

            icon.addEventListener('click', function(e) {
                e.stopPropagation();
                _showPhPopover(el, icon);
            });
        });
    }

    function _detachPlaceholderIcons() {
        if (!_phIconsAttached) return;
        _phIconsAttached = false;
        // Unwrap ph-wrap containers and remove icons
        document.querySelectorAll('span.ph-wrap').forEach(function(wrapper) {
            var input = wrapper.querySelector('input, textarea');
            if (input) wrapper.parentNode.insertBefore(input, wrapper);
            wrapper.remove();
        });
        document.querySelectorAll('[data-ph-icon-attached]').forEach(function(el) {
            delete el.dataset.phIconAttached;
            delete el._phIcon;
        });
    }

    function _phIconClick(e) {
        e.stopPropagation();
        var icon = e.currentTarget;
        var wrapper = icon.parentElement;
        var input = wrapper.querySelector('input[type="text"],input:not([type]),textarea');
        if (!input) return;
        _showPhPopover(input, icon);
    }

    // ── 发布后同步更新对应目录的 index.html 文章清单 ──
    function _updateDirIndex(cat, fileName, title, cls) {
        // 每个目录用不同的标记名，避免混淆
        var markerMap = {
            '03-gallery':       ['// ARTICLES_START', '// ARTICLES_END', 'ARTICLES'],
            '01-learning-guide':['// ITEMS_START',    '// ITEMS_END',    'ITEMS'],
            '02-interaction':   ['// ITEMS_START',    '// ITEMS_END',    'ITEMS']
        };
        var m = markerMap[cat];
        if (!m) return;

        var indexPath = cat + '/index.html';
        var indexUrl  = 'https://api.github.com/repos/' + GH_PUB_USER + '/' + GH_PUB_REPO + '/contents/' + indexPath;
        var headers   = { 'Authorization': 'token ' + GH_PUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' };

        fetch(indexUrl, { headers: headers })
        .then(function(r){ return r.json(); })
        .then(function(existing){
            if (!existing || !existing.content) return;
            var currentHtml = decodeURIComponent(escape(atob(existing.content.replace(/\s/g,''))));

            var today = new Date();
            var dateStr = today.getFullYear() + '.'
                        + String(today.getMonth()+1).padStart(2,'0') + '.'
                        + String(today.getDate()).padStart(2,'0');

            var newEntry = '  { file:"' + fileName + '", title:"' + title.replace(/"/g,'\\"') + '", cls:"' + cls.replace(/"/g,'\\"') + '", date:"' + dateStr + '" }';

            var startMark = m[0], endMark = m[1], varName = m[2];
            var updated;
            // 空数组
            var emptyRe = new RegExp(startMark.replace(/\//g,'\\/') + '\\s*\\nvar ' + varName + ' = \\[\\];\\s*\\n' + endMark.replace(/\//g,'\\/'));
            if (emptyRe.test(currentHtml)) {
                updated = currentHtml.replace(emptyRe,
                    startMark + '\nvar ' + varName + ' = [\n' + newEntry + '\n];\n' + endMark);
            } else {
                // 已有条目，末尾追加
                var appendRe = new RegExp('(' + startMark.replace(/\//g,'\\/') + '[\\s\\S]*?var ' + varName + ' = \\[[\\s\\S]*?)(\\n\\];\\s*\\n' + endMark.replace(/\//g,'\\/') + ')');
                updated = currentHtml.replace(appendRe, '$1,\n' + newEntry + '$2');
            }
            if (updated === currentHtml) return;

            var b64new = btoa(unescape(encodeURIComponent(updated)));
            return fetch(indexUrl, {
                method: 'PUT',
                headers: Object.assign({}, headers, {'Content-Type':'application/json'}),
                body: JSON.stringify({
                    message: 'Add ' + fileName + ' to ' + cat + ' index',
                    content: b64new,
                    sha: existing.sha
                })
            });
        })
        .catch(function(){ /* 静默忽略，不影响主发布流程 */ });
    }

    // ── Canvas 是否空白 ──
    function isCanvasBlank(canvas) {
        if (!canvas) return true;
        if (canvas.width === 0 || canvas.height === 0) return true;
        try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            // 修复I：原来只检查alpha通道，但canvas背景是白色（alpha=255）
            // 导致空白签名canvas也被判断为"有内容"，签名验证失效
            // 正确做法：检查是否有非白色、非透明的像素（即真正的笔迹）
            const step = Math.max(1, Math.floor(canvas.height / 10));
            for (let y = 0; y < canvas.height; y += step) {
                const data = ctx.getImageData(0, y, canvas.width, 1).data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                    // 有不透明且非白色的像素 = 有笔迹
                    if (a > 10 && !(r > 240 && g > 240 && b > 240)) return false;
                }
            }
            return true;
        } catch(e) { return true; }
    }

                var ymQ2p2 = pg.querySelector('#ym-q2-block .ym-point-row[data-p="2"] input.ym-point-input');
                var ymQ2p3row = pg.querySelector('#ym-q2-p3');
                if (ymQ2p1 && !ymQ2p1.value.trim()) return '问题二 — 分论点一';
                if (ymQ2p2 && !ymQ2p2.value.trim()) return '问题二 — 分论点二';
                if (_isVisible(ymQ2p3row)) {
                    var ymQ2p3 = ymQ2p3row.querySelector('input.ym-point-input');
                    if (ymQ2p3 && !ymQ2p3.value.trim()) return '问题二 — 分论点三';
                }
            }
            // 必须选择要展开的分论点
            var ymSel = pg.querySelector('input[name="ym-select"]:checked');
            if (!ymSel) return '请选择要展开的分论点（点击左边的圆圈）';
            // 展开论述：所有可见 textarea 必填
            var ymExpand = pg.querySelector('#ym-expand-box');
            if (_isVisible(ymExpand)) {
                var ymTas = pg.querySelectorAll('textarea.ym-expand-ta');
                for (var ei=0; ei<ymTas.length; ei++) {
                    if (_isVisible(ymTas[ei]) && !ymTas[ei].value.trim()) {
                        var ymBlk = ymTas[ei].closest('.ym-expand-block');
                        var ymLbl = ymBlk ? (ymBlk.querySelector('.ym-block-label')||{textContent:''}).textContent : '';
                        return '展开论述 — ' + (ymLbl || ('第'+(ei+1)+'框'));
                    }
                }
            }
        } else if (tpl === 'yuedu') {
            if (!v(2)) return 'Question number (main)';
            var mainLabels = ['summary of main answer','analysis of error','strategy for next time','key takeaway'];
            for (var i=0;i<4;i++) { if (!v(i+3)) return mainLabels[i]; }
            // 主选题分享区
            var sc1el = pg.querySelector('canvas#canvas-yuedu-sign-1');
            if (_isVisible(sc1el)) {
                if (!v(7)) return 'Sharing partner name (main question)';
                if (isCanvasBlank(sc1el)) return 'Sharing partner signature (main question)';
            }
            // 次选题
            if (!v(8)) return 'Question number (secondary)';
            var subLabels = ['what you wrote incorrectly','the correct version','strategy for next time'];
            for (var i=0;i<3;i++) { if (!v(i+9)) return subLabels[i]; }
            var sc2el = pg.querySelector('canvas#canvas-yuedu-sign-2');
            if (_isVisible(sc2el)) {
                if (!v(12)) return 'Sharing partner name (secondary question)';
                if (isCanvasBlank(sc2el)) return 'Sharing partner signature (secondary question)';
                var p1 = v(7) ? v(7).toLowerCase() : '';
                var p2 = v(12) ? v(12).toLowerCase() : '';
                if (p1 && p2 && p1 === p2) return 'Same sharing partner for both questions';
            }
        }

        if (tpl === 'langdu') {
            if (!window._langduAudioBlob) return 'Recording not completed';
        }

        if (tpl === 'pazhao') {
            var pzName = document.getElementById('pz-name');
            var pzNum  = document.getElementById('pz-num');
            if (!pzName || !pzName.value.trim()) return 'Student name';
            if (!pzNum  || !pzNum.value.trim())  return 'Index number';
            if (!window._pzPhotos || window._pzPhotos.length === 0) return 'Photo required';
        }

        if (tpl === 'jingsai') {
            // 姓名已由上方v(0)验证，编号由v(1)验证
            // 验证正文有实质内容（去掉段首两个全角空格后不能为空）
            var jText = (typeof window._jingsaiGetState === 'function') ? window._jingsaiGetState().text : '';
            var jContent = jText.replace(/^\u3000\u3000/, '').replace(/\n\u3000\u3000/g, '').trim();
            if (!jContent) return 'Essay content required';
        }

        // ── 写后复盘 checkbox：整个复盘区隐藏则跳过 ──
        var reviewConfig = {
            ketang:  { wrapper:'#kt-phase2-wrapper',
                       groups:['kt-self-1','kt-self-2','kt-self-3'],
                       labels:['理解','作答','收获'] },
            miaoxie: { wrapper:'#miaoxie-review-box',
                       groups:['miaoxie-self-1','miaoxie-self-2','miaoxie-self-3','miaoxie-self-4'],
                       labels:['语言描写','动作描写','神态描写','外貌描写'] },
            yilun:   { wrapper:'#yilun-review-box',
                       groups:['yilun-self-1','yilun-self-2','yilun-self-3','yilun-self-4'],
                       labels:['立场','理由','例子','总结'] },
            shiyong: { wrapper:'#shiyong-review-box',
                       groups:['shiyong-self-1','shiyong-self-2','shiyong-self-3'],
                       labels:['要点','说明','扣回'] },
            'yilun-mini': { wrapper:'#yilun-mini-review-box',
                       groups:['ym-self-1','ym-self-2','ym-self-3','ym-self-4'],
                       labels:['论点','论据','分析','小结'] },
            yuedu:   null, biaoda: null, langdu: null
        };
        var rc = reviewConfig[tpl];
        if (rc) {
            var wrapperEl = rc.wrapper ? pg.querySelector(rc.wrapper) : null;
            // 整个复盘区不可见 → 全部跳过
            if (_isVisible(wrapperEl)) {
                for (var ri=0; ri<rc.groups.length; ri++) {
                    var cbs = pg.querySelectorAll('input[data-group="'+rc.groups[ri]+'"]');
                    // 该组 checkbox 不可见则跳过
                    var visibleCbs = Array.from(cbs).filter(_isVisible);
                    if (visibleCbs.length === 0) continue;
                    var anyChecked = visibleCbs.some(function(cb){ return cb.checked; });
                    if (!anyChecked) return '写后复盘「' + rc.labels[ri] + '」未选（是/不是）';
                }
            }
        }

        // ── 分享者姓名 & 签名：分享区整体隐藏则跳过 ──
        if (tpl !== 'yuedu') {
            // 分享区 wrapper（ketang 用 kt-share-wrapper，其余用 .share-zone）
            var shareWrapSel = {
                ketang:'#kt-share-wrapper', miaoxie:'.share-zone',
                yilun:'.share-zone', shiyong:'.share-zone',
                'yilun-mini':'.share-zone',
                yuedu:null,
                biaoda:null, langdu:null
            };
            var shareWrapEl = shareWrapSel[tpl]
                ? pg.querySelector(shareWrapSel[tpl]) : null;

            if (_isVisible(shareWrapEl)) {
                var shareNames = pg.querySelectorAll('input.share-name-input');
                for (var si=0; si<shareNames.length; si++) {
                    if (!_isVisible(shareNames[si])) continue;
                    if (!shareNames[si].value.trim()) return 'Sharing partner name';
                }
                var signSel = {
                    ketang:'canvas#canvas-kt-sign', miaoxie:'canvas#canvas-miaoxie-sign',
                    yilun:'canvas#canvas-yilun-sign', shiyong:'canvas#canvas-shiyong-sign',
                    'yilun-mini':'canvas#canvas-yilun-mini-sign',
                    biaoda:null, langdu:null
                };
                var ss = signSel[tpl];
                if (ss) {
                    var sc = pg.querySelector(ss);
                    if (_isVisible(sc) && isCanvasBlank(sc)) return 'Sharing partner signature';
                }
            }
        }

        return null;  // ✅ 全部通过
    }

    // timerCheckRequired 直接调用统一验证函数
    function timerCheckRequired(tpl) {
        return checkRequired(tpl);
    }

    function timerShowFinalOverlay(type, missingField) {
        // 移除旧的（如有）
        var old = document.getElementById('final-submit-overlay');
        if (old) document.body.removeChild(old);

        var overlay = document.createElement('div');
        overlay.id = 'final-submit-overlay';
        overlay.style.cssText = 'position:fixed;inset:0;background:' + _BG_COLOR + ';z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;box-sizing:border-box;';

        if (type === 'success') {
            overlay.innerHTML =
                '<div style="font-size:52px;">✅</div>' +
                '<div style="font-size:22pt;font-weight:700;color:#fff;">All done! Submitting…</div>' +
                '<div style="font-size:12pt;color:#a0aec0;text-align:center;line-height:1.7;max-width:420px;">Please wait a moment.</div>' +
                '<button onclick="document.getElementById(\'final-submit-overlay\').remove();" style="margin-top:8px;padding:10px 32px;font-size:11pt;font-family:inherit;background:transparent;color:#a0aec0;border:1.5px solid #a0aec0;border-radius:10px;cursor:pointer;">← Back</button>';
        } else {
            // 未完成：仅显示缺失项 + 申请延时按钮，不自动计时
            _finalSubmitExtensionsUsed++;
            overlay.innerHTML =
                '<div style="font-size:46px;">⚠️</div>' +
                '<div style="font-size:18pt;font-weight:700;color:#fff;text-align:center;">Not done yet</div>' +

                    'Missing: <strong>' + missingField + '</strong><br>' +

                '</div>' +
                '<button onclick="timerFinalExtension()" style="padding:16px 48px;font-size:14pt;font-weight:700;font-family:inherit;background:#0f6e56;color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 24px rgba(15,110,86,0.5);letter-spacing:0.3px;">Request Extension</button>' +
                '<div style="font-size:9pt;color:#475569;">Extension #' + _finalSubmitExtensionsUsed + '</div>';
            // ★ 不自动开始倒计时 — 由 timerFinalExtension() 在点击后启动
        }

        document.body.appendChild(overlay);
    }

    function timerFinalExtension() {
        // 关闭 overlay，解锁所有，从此刻起才开始 1 分钟倒计时
        clearInterval(_finalSubmitInterval);
        var oldOv = document.getElementById('final-submit-overlay');
        if (oldOv) document.body.removeChild(oldOv);
        var tpl = _finalSubmitTpl;
        // 记录到 _timerExtendLog
        if (tpl) {
            if (!_timerExtendLog[tpl]) _timerExtendLog[tpl] = [];
            _timerExtendLog[tpl].push({
                phase: 'post-submit-ext-' + _finalSubmitExtensionsUsed,
                time: new Date().toLocaleString('zh-SG'),
                secs: 60,
                count: _finalSubmitExtensionsUsed
            });
        }
        // 解锁全部
        if (tpl) timerUnlockAllInputs(tpl);
        // toolbar：从点击瞬间开始计时
        var tfC = document.getElementById('tf-clock');
        var tfP = document.getElementById('tf-phase');
        if (tfC) { tfC.textContent = '01:00'; tfC.className = 'tf-clock'; }
        if (tfP) tfP.textContent = 'Extension #' + _finalSubmitExtensionsUsed;
        // ★ 倒计时从此刻启动
        var secs2 = 60;
        var extInterval = setInterval(function(){
            secs2--;
            if (tfC) {
                tfC.textContent = '00:' + String(secs2).padStart(2,'0');
                tfC.className = secs2 <= 30 ? 'tf-clock danger' : (secs2 <= 60 ? 'tf-clock warning' : 'tf-clock');
            }
            if (secs2 <= 0) {
                clearInterval(extInterval);
                if (tpl) timerLockAllInputs(tpl);
                setTimeout(function(){ timerTriggerFinalSubmit(tpl); }, 600);
            }
        }, 1000);
    }

    function timerFinalTimeUp() {
        // 倒计时到零：锁定 + 重新触发提交
        var old = document.getElementById('final-submit-overlay');
        if (old) document.body.removeChild(old);
        if (_finalSubmitTpl) timerLockAllInputs(_finalSubmitTpl);
        setTimeout(function(){ timerTriggerFinalSubmit(_finalSubmitTpl); }, 600);
    }

    function timerFinalForceSubmit() {
        clearInterval(_finalSubmitInterval);
        var old = document.getElementById('final-submit-overlay');
        if (old) document.body.removeChild(old);
        submitWork();
    }

    var _submitting = false; // 修复F：提交锁，防止重复点击发出多个请求
    function _setSubmitBtn(disabled) {
        var btn = document.querySelector('#submitPanel button[onclick="submitWork()"]');
        if (!btn) return;
        btn.disabled = disabled;
        btn.style.opacity = disabled ? '0.5' : '1';
        btn.style.cursor  = disabled ? 'not-allowed' : 'pointer';
    }
    function submitWork(onDone) {
        const meta = window.STUDENT_META;
        if (!meta) { alert('This feature is only available in the student version.'); return; }
        if (_submitting) { if (onDone) onDone(false, 'busy'); return; }

        // 收集文字数据 — 根据当前模板页面取姓名/编号
        const _activePage = document.getElementById('page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda'));
        const _nameInputs = _activePage ? _activePage.querySelectorAll('input[type="text"]') : [];
        // pazhao 用专属输入框
        const _isPz = (typeof currentTemplate !== 'undefined' && currentTemplate === 'pazhao');
        const name = _isPz
            ? ((document.getElementById('pz-name') || {}).value || '').trim()
            : (_nameInputs[0]?.value?.trim() || '');
        const num  = _isPz
            ? ((document.getElementById('pz-num')  || {}).value || '').trim()
            : (_nameInputs[1]?.value?.trim() || '');

        if (!name) { if (onDone) onDone(false, 'validation'); showModal('❗', 'Name required', 'Please fill in your name before submitting.'); return; }
        if (!num)  { if (onDone) onDone(false, 'validation'); showModal('❗', 'Index number required', 'Please fill in your index number before submitting.'); return; }

        // ── 各模板必填验证 ──
        const tpl = typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda';
        const pg = document.getElementById('page-' + tpl);
        if (!pg) { if (onDone) onDone(false, 'validation'); showModal('❗', 'Error', 'Cannot find the current page.'); return; }

        // jingsai：提交前把_text同步到隐藏field供后端读取
        if (tpl === 'jingsai' && typeof window._jingsaiGetState === 'function') {
            var _js = window._jingsaiGetState();
            var _jHidden = document.getElementById('jingsai-essay');
            if (_jHidden) _jHidden.value = _js.text;
        }

        // ── 统一验证：调用 checkRequired()，所有规则集中在那一个函数里维护 ──
        const missing = checkRequired(tpl);
        if (missing) {
            // 把内部描述转成对学生友好的弹窗提示
            const msgMap = {
                'Student name':                          ['Name required',             'Please fill in your name.'],
                'Index number':                          ['Index number required',      'Please fill in your index number.'],
                'Response (question area)':              ['Incomplete',                 'Please fill in your response.'],
                'Your writing':                          ['Incomplete',                 'Please complete your writing.'],
                'main argument':                         ['Incomplete',                 'Please fill in your main argument.'],
                'supporting point 1':                    ['Incomplete',                 'Please fill in supporting point 1.'],
                'supporting point 2':                    ['Incomplete',                 'Please fill in supporting point 2.'],
                'supporting point 3':                    ['Incomplete',                 'Please fill in supporting point 3.'],
                'Your rewrite':                          ['Incomplete',                 'Please complete your rewrite.'],
                'Question number (main)':                ['Incomplete',                 'Please fill in the question number (main question).'],
                'summary of main answer':                ['Main question incomplete',   'Please fill in your summary of the main answer.'],
                'analysis of error':                     ['Main question incomplete',   'Please fill in your analysis of the error.'],
                'strategy for next time':                ['Main question incomplete',   'Please fill in your strategy for next time.'],
                'key takeaway':                          ['Main question incomplete',   'Please fill in your key takeaway.'],
                'Sharing partner name (main question)':  ['Main question incomplete',   "Please fill in your sharing partner's name (main question)."],
                'Sharing partner signature (main question)': ['Signature missing',      'Please get your sharing partner to sign (main question).'],
                'Question number (secondary)':           ['Incomplete',                 'Please fill in the question number (secondary question).'],
                'what you wrote incorrectly':            ['Secondary question incomplete','Please fill in what you wrote incorrectly.'],
                'the correct version':                   ['Secondary question incomplete','Please fill in the correct version.'],
                'Sharing partner name (secondary question)':['Secondary question incomplete',"Please fill in your sharing partner's name (secondary question)."],
                'Sharing partner signature (secondary question)':['Signature missing',  'Please get your sharing partner to sign (secondary question).'],
                'Same sharing partner for both questions':['Same sharing partner',       'Your sharing partners for both questions must be different people.'],
                'Sharing partner name':                  ['Incomplete',                 "Please fill in your sharing partner's name."],
                'Sharing partner signature':             ['Signature missing',           'Please get your sharing partner to sign.'],
                'Recording not completed':              ['Recording required',           'Please complete your recording before submitting.'],
                'Photo required':                       ['No photos',                    'Please take at least one photo before submitting.'],
                'Essay content required':               ['Incomplete',                   'Please write your essay before submitting.'],
            };
            const entry = msgMap[missing];
            if (entry) {
                if (onDone) onDone(false, 'validation'); showModal('❗', entry[0], entry[1]); return;
            }
            // 写后复盘：missing 形如 '写后复盘「语言描写」未选（是/不是）'
            if (missing.indexOf('写后复盘') === 0) {
                if (onDone) onDone(false, 'validation'); showModal('❗', '写后复盘未完成', missing.replace('未选（是/不是）', '」一栏，请选择「是」或「不是」。')); return;
            }
            // 兜底
            if (onDone) onDone(false, 'validation'); showModal('❗', 'Incomplete', missing); return;
        }
        for (let n = 1; n <= 3; n++) {
            // 判断第一页是否有这个错别字（canvas 有内容）
            const p1canvas = document.getElementById('bd-wrong-' + n);
            const hasP1 = p1canvas && !isCanvasBlank(p1canvas);
            if (!hasP1) continue; // 这个错别字没填，跳过整个色块

            const card = document.getElementById('share-card-' + n);
            if (!card) continue;

            // 第二页"我把"文字框
            const wroteText = document.getElementById('wrote-text-' + n);
            if (!wroteText || !wroteText.value.trim()) {
                showModal('❗', `Misspelling No.${n} incomplete`, `Please fill in the "I wrote ___ as ___" field.`); return;
            }

            // 用 data-group 精准定位当前卡的两组 checkbox
            const reasonGroup = Array.from(document.querySelectorAll('input[data-group="reason-' + n + '"]'));
            const actionGroup = Array.from(document.querySelectorAll('input[data-group="action-' + n + '"]'));

            if (!reasonGroup.some(c => c.checked)) {
                showModal('❗', `Misspelling No.${n} incomplete`, `Please select a reason for your mistake.`); return;
            }
            const otherReasonCb = card.querySelector('.other-reason-cb');
            if (otherReasonCb && otherReasonCb.checked) {
                const otherReasonInput = document.getElementById('other-reason-' + n);
                if (!otherReasonInput || !otherReasonInput.value.trim()) {
                    showModal('❗', `Misspelling No.${n} incomplete`, `Please fill in the "Other reason" field.`); return;
                }
            }

            if (!actionGroup.some(c => c.checked)) {
                showModal('❗', `Misspelling No.${n} incomplete`, `Please select what you will do differently next time.`); return;
            }
            const otherActionCb = card.querySelector('.other-action-cb');
            if (otherActionCb && otherActionCb.checked) {
                const otherActionInput = document.getElementById('other-action-' + n);
                if (!otherActionInput || !otherActionInput.value.trim()) {
                    showModal('❗', `Misspelling No.${n} incomplete`, `Please fill in the "Other action" field.`); return;
                }
            }

            // 签名：华文名字 + canvas
            const signInputs = card.querySelectorAll('.bd-promise-sign input[type="text"]');
            if (!signInputs[0] || !signInputs[0].value.trim()) {
                showModal('❗', `Misspelling No.${n} incomplete`, `Please fill in your classmate's name.`); return;
            }
            const signCanvas = document.getElementById('canvas-sign-' + n);
            if (!signCanvas || isCanvasBlank(signCanvas)) {
                showModal('❗', `Misspelling No.${n} incomplete`, `Please get your classmate to sign.`); return;
            }
        }

        // ── 验证病句色块（独立：两个 textarea 有填则全部必填）──
        const card4 = document.getElementById('share-card-4');
        if (card4) {
            const textareas = card4.querySelectorAll('textarea');
            const bingju1 = textareas[0]?.value?.trim() || '';
            const bingju2 = textareas[1]?.value?.trim() || '';
            const hasBingju = bingju1 || bingju2;
            if (hasBingju) {
                if (!bingju1) { showModal('❗', 'Wrong sentence No.1 incomplete', 'Please fill in "The sentence I wrote incorrectly".'); return; }
                if (!bingju2) { showModal('❗', 'Wrong sentence No.1 incomplete', 'Please fill in "The correct version".'); return; }

                // 用 data-group 直接定位，完全不依赖顺序
                const reasonCbs4 = Array.from(document.querySelectorAll('input[data-group="reason-4"]'));
                const actionCbs4 = Array.from(document.querySelectorAll('input[data-group="action-4"]'));

                if (!reasonCbs4.some(c => c.checked)) {
                    showModal('❗', 'Wrong sentence No.1 incomplete', 'Please select a reason for your mistake.'); return;
                }
                const otherReasonCb4 = card4.querySelector('.other-reason-cb');
                if (otherReasonCb4?.checked) {
                    const inp = document.getElementById('other-reason-4');
                    if (!inp?.value.trim()) { showModal('❗', 'Wrong sentence No.1 incomplete', 'Please fill in the "Other reason" field.'); return; }
                }
                if (!actionCbs4.some(c => c.checked)) {
                    showModal('❗', 'Wrong sentence No.1 incomplete', 'Please select what you will do differently next time.'); return;
                }
                const otherActionCb4 = card4.querySelector('.other-action-cb');
                if (otherActionCb4?.checked) {
                    const inp = document.getElementById('other-action-4');
                    if (!inp?.value.trim()) { showModal('❗', 'Wrong sentence No.1 incomplete', 'Please fill in the "Other action" field.'); return; }
                }
                const signInputs4 = card4.querySelectorAll('.bd-promise-sign input[type="text"]');
                if (!signInputs4[0]?.value.trim()) {
                    showModal('❗', 'Wrong sentence No.1 incomplete', 'Please fill in your classmate\'s name.'); return;
                }
                const signCanvas4 = document.getElementById('canvas-sign-4');
                if (!signCanvas4 || isCanvasBlank(signCanvas4)) {
                    showModal('❗', 'Wrong sentence No.1 incomplete', 'Please get your classmate to sign.'); return;
                }
            }
        }

        // 收集所有输入
        const _pageId = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const inputs = {};
        document.querySelectorAll(_pageId + ' input[type="text"], ' + _pageId + ' textarea').forEach((el, i) => {
            inputs['field_' + i] = el.value;
        });
        document.querySelectorAll(_pageId + ' input[type="checkbox"]').forEach((el, i) => {
            inputs['check_' + i] = el.checked;
        });

        // 修改C：先显示"Submitting…"，让浏览器渲染一帧，再做同步的 canvas 编码
        // 避免学生点击后页面假死、看不到任何反馈
        const hint = document.getElementById('submitHint');
        hint.textContent = 'Submitting…';
        _submitting = true;  // 修复F：加锁
        _setSubmitBtn(true); // 修复F：禁用按钮

        setTimeout(function() {

        // 收集 Canvas（PNG 完整画质），跳过空白
        const canvases = {};
        document.querySelectorAll(_pageId + ' canvas').forEach(canvas => {
            const key = canvas.id || ('jingsai-canvas-'+Array.from(document.querySelectorAll(_pageId+' canvas')).indexOf(canvas));
            if (isCanvasBlank(canvas)) return;
            canvases[key] = canvas.toDataURL('image/png');
        });

        // jingsai：额外保存文字内容
        if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'&&window._jingsaiGetState){
            const st=window._jingsaiGetState();
            inputs['jingsai_text']=st.text||'';
        }

        const submitTime = new Date().toLocaleString('zh-SG');

        // fileKey：唯一标识「某班级·某作业·某学生」的稳定 key
        // GAS 端用此 key 搜索同名文件：存在则覆盖更新，不存在才新建
        const fileKey = [meta.class, meta.assignTitle, name, num]
            .map(s => String(s).replace(/[^\w\u4e00-\u9fff]/g, '_'))
            .join('__');

        const payload = {
            type: 'worksheet',
            fileKey,
            template: currentTemplate,
            grade: 'worksheet_' + meta.class,
            class: meta.class,
            assignTitle: meta.assignTitle,
            studentName: name,
            studentNum: num,
            submitTime,
            inputs,
            canvases,
            timerExtensions: _timerExtendLog[currentTemplate] || [],
            finalExtensionCount: _finalSubmitExtensionsUsed || 0
        };

        // 朗读录音：附加音频 base64
        function _doFetch(payloadObj) {
            fetch(meta.scriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                // no-cors 只允许 text/plain，不能设 application/json
                // GAS 的 e.postData.contents 照样能读到 JSON 字符串
                headers: {'Content-Type': 'text/plain'},
                body: JSON.stringify(payloadObj)
            })
        .then(() => {
            hint.textContent = '✅ Submitted';
            if (onDone) onDone(true);
            // 修复F：成功后保持锁定，已提交不应再次提交
            clearDraft();
            // 成功全屏提示
            var old = document.getElementById('final-submit-overlay');
            if (old) document.body.removeChild(old);
            var ov = document.createElement('div');
            ov.id = 'final-submit-overlay';
            ov.style.cssText = 'position:fixed;inset:0;background:rgba(10,50,30,0.96);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;box-sizing:border-box;';
            ov.innerHTML =
                '<div style="font-size:60px;">🎉</div>' +
                '<div style="font-size:22pt;font-weight:700;color:#fff;">Submitted!</div>' +
                '<div style="font-size:10pt;color:#6ee7b7;margin-top:4px;">Your work has been received.</div>' +
                '<button onclick="document.getElementById(\'final-submit-overlay\').remove();" style="margin-top:8px;padding:10px 32px;font-size:11pt;font-family:inherit;background:transparent;color:#6ee7b7;border:1.5px solid #6ee7b7;border-radius:10px;cursor:pointer;">← Back</button>';
            document.body.appendChild(ov);
        })
        .catch(() => {
            hint.textContent = 'Submission failed — try again.';
            if (onDone) onDone(false, 'network');
            _submitting = false;  // 修复F：失败后解锁，允许重试
            _setSubmitBtn(false); // 修复F：恢复按钮
            // 失败全屏提示
            var old = document.getElementById('final-submit-overlay');
            if (old) document.body.removeChild(old);
            var ov = document.createElement('div');
            ov.id = 'final-submit-overlay';
            ov.style.cssText = 'position:fixed;inset:0;background:rgba(60,0,0,0.95);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:24px;box-sizing:border-box;';
            ov.innerHTML =
                '<div style="font-size:52px;">❌</div>' +
                '<div style="font-size:20pt;font-weight:700;color:#fff;">Submission Failed</div>' +
                '<div style="font-size:11pt;color:#fca5a5;text-align:center;line-height:1.7;max-width:420px;">' +
                    'Network error. Please check your connection and try again.<br>' +
                    'If the problem persists, take a screenshot and show your teacher.' +
                '</div>' +
                '<div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">' +
                    '<button onclick="document.getElementById(\'final-submit-overlay\').remove();submitWork();" style="padding:12px 32px;font-size:12pt;font-weight:700;font-family:inherit;background:#dc2626;color:#fff;border:none;border-radius:10px;cursor:pointer;">Try Again</button>' +
                    '<button onclick="document.getElementById(\'final-submit-overlay\').remove();" style="padding:12px 28px;font-size:11pt;font-family:inherit;background:transparent;color:#94a3b8;border:1px solid #475569;border-radius:10px;cursor:pointer;">Dismiss</button>' +
                '</div>';
            document.body.appendChild(ov);
        });
        } // end _doFetch

        // 朗读录音：归类到「2-口试录音」，加 category:'2' 让 GAS 存到正确目录
        if (currentTemplate === 'langdu' && window._langduAudioBlob) {
            payload.type     = 'audio';   // GAS 情况A：纯音频处理路径
            payload.category = '2';       // → 2-口试录音
            var rdr = new FileReader();
            rdr.onloadend = function(){
                payload.audioBase64 = rdr.result.split(',')[1];
                payload.audioMimeType = window._langduAudioBlob.type || 'audio/webm';
                _doFetch(payload);
            };
            rdr.readAsDataURL(window._langduAudioBlob);
        } else if (currentTemplate === 'pazhao' && window._pzPhotos && window._pzPhotos.length > 0) {
            // 拍照上传：把所有图片 base64 附加到 payload
            payload.type = 'worksheet';
            payload.pzPhotos = window._pzPhotos.map(function(p, i) {
                return { index: i + 1, dataUrl: p.dataUrl };
            });
            // 姓名学号从专用输入框读取（覆盖通用逻辑）
            var _pzN = document.getElementById('pz-name');
            var _pzI = document.getElementById('pz-num');
            payload.studentName = _pzN ? _pzN.value.trim() : name;
            payload.studentNum  = _pzI ? _pzI.value.trim() : num;
            _doFetch(payload);
        } else {
            _doFetch(payload);
        }

        }, 0); // 修改C：setTimeout 结束，让"Submitting…"先渲染再做编码
    }

    // ── 保存 PDF（学生端）──
    function savePDF() {
        var pdfBtn = document.querySelector('#submitPanel button[onclick="savePDF()"]') ||
                     [...document.querySelectorAll('#submitPanel button')].find(function(b){ return (b.getAttribute('onclick')||'').includes('savePDF'); });
        var origText = pdfBtn ? pdfBtn.textContent : null;
        if (pdfBtn) { pdfBtn.textContent = '⏳ 生成中…'; pdfBtn.disabled = true; }

        function restore() {
            if (pdfBtn) { pdfBtn.textContent = origText || '📄 Save as PDF'; pdfBtn.disabled = false; }
        }

        var pg = document.getElementById('page-jingsai');
        if (!pg || pg.style.display === 'none') {
            window.print();
            setTimeout(restore, 3000);
            return;
        }

        // Ensure text is rendered
        if (typeof window.jingsaiRender === 'function') window.jingsaiRender();

        function doExport() {
            try {
                var COLS = window._jingsaiCOLS || 20;
                var ROWS = window._jingsaiROWS || 22;
                var cW_screen = window._jingsaiCW || 0;
                if (cW_screen <= 0) { restore(); return; }

                // ── PDF layout constants (mm) ──
                var PAGE_W = 210, PAGE_H = 297;
                var MARGIN = 12, PAD_LR = 8;
                var CONTENT_W = PAGE_W - 2*MARGIN - 2*PAD_LR; // 170mm
                var X0 = MARGIN + PAD_LR;
                var HDR_H = 27;   // header height mm
                var GREEN = '#4caf50';

                // ── Draw grid onto an offscreen canvas ──
                // We use PDF content width (mm→px at target DPI)
                // jsPDF uses pt internally; we work in mm and use addImage
                var TARGET_DPI = 150;
                var PX_PER_MM = TARGET_DPI / 25.4;
                var sc = 2; // supersampling

                function makeGridCanvas(rows, chars) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var cWp = w / COLS;
                    var maxCH = (957/31.8) * (TARGET_DPI/96) * sc;
                    var cH = Math.min(cWp, maxCH);
                    var auxH = Math.round(cH * 0.4);
                    var gH = cH + auxH;
                    var TH = (rows-1)*gH + cH;
                    var h = Math.round(TH);
                    var h_mm = h / PX_PER_MM / sc;

                    var cv = document.createElement('canvas');
                    cv.width = w; cv.height = h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);

                    // Inner grid lines
                    ctx.strokeStyle = GREEN;
                    ctx.lineWidth = Math.max(1, 0.6 * TARGET_DPI/96 * sc);
                    for (var r = 0; r < rows; r++) {
                        var base = r*gH, wb = base+cH, ab = wb+auxH;
                        ctx.beginPath(); ctx.moveTo(0, Math.round(wb)); ctx.lineTo(w, Math.round(wb)); ctx.stroke();
                        if (r < rows-1) {
                            ctx.beginPath(); ctx.moveTo(0, Math.round(ab)); ctx.lineTo(w, Math.round(ab)); ctx.stroke();
                        }
                        for (var c = 1; c < COLS; c++) {
                            var x = Math.round(c*cWp);
                            ctx.beginPath(); ctx.moveTo(x, Math.round(base)); ctx.lineTo(x, Math.round(wb)); ctx.stroke();
                        }
                    }

                    // Outer border - same weight as inner lines
                    var innerLW = Math.max(1, 0.6 * TARGET_DPI/96 * sc);
                    ctx.lineWidth = innerLW;
                    ctx.strokeRect(innerLW/2, innerLW/2, w-innerLW, h-innerLW);

                    // Characters - handle \n like screen (skip to next row)
                    if (chars && chars.length) {
                        var fs = Math.round(cH * 0.62);
                        ctx.fillStyle = '#1a2a3a';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.font = '100 ' + fs + 'px SimSun,"宋体",STSong,serif';
                        var ci = 0, rr = 0, cc = 0;
                        while (ci < chars.length && rr < rows) {
                            var ch = chars[ci++];
                            if (ch === '\n') {
                                // newline: skip rest of current row
                                rr++; cc = 0;
                            } else {
                                ctx.fillText(ch, Math.round(cc*cWp + cWp/2), Math.round(rr*gH + cH/2));
                                cc++;
                                if (cc >= COLS) { cc = 0; rr++; }
                            }
                        }
                    }
                    return { dataUrl: cv.toDataURL('image/png'), h_mm: h_mm };
                }

                function makeHeaderCanvas(name, cls, num, group, title) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var h = Math.round(HDR_H * PX_PER_MM * sc);
                    var cv = document.createElement('canvas');
                    cv.width = w; cv.height = h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);

                    var fs = Math.round(11 * PX_PER_MM/96 * sc * 25.4);
                    var fsLg = Math.round(10.5 * PX_PER_MM/96 * sc * 25.4);
                    var fsInfo = Math.round(9.5 * PX_PER_MM/96 * sc * 25.4);

                    // Row 1: name | title
                    var row1H = Math.round(9 * PX_PER_MM * sc);
                    ctx.fillStyle = '#1a2a3a';
                    ctx.textBaseline = 'middle';
                    ctx.font = '500 ' + fs + 'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign = 'left';
                    if (!isAnon) {
                        ctx.fillText('姓名：' + name, 0, row1H/2);
                        ctx.fillText('班级：' + cls, Math.round(52*PX_PER_MM*sc), row1H/2);
                        ctx.fillText('编号：' + num, Math.round(104*PX_PER_MM*sc), row1H/2);
                    } else {
                        // 匿名模式：只显示编号
                        ctx.fillText('编号：' + num, 0, row1H/2);
                    }
                    ctx.font = '400 ' + fsLg + 'px "Noto Serif SC","Source Han Serif SC",serif';
                    ctx.textAlign = 'right';
                    ctx.fillText('稿纸作答模式', w, row1H/2);

                    // Divider
                    var divY = row1H + Math.round(1.5*PX_PER_MM*sc);
                    ctx.strokeStyle = '#b4c8dc';
                    ctx.lineWidth = Math.max(1, Math.round(0.4*PX_PER_MM*sc));
                    ctx.beginPath(); ctx.moveTo(0, divY); ctx.lineTo(w, divY); ctx.stroke();

                    // Info box
                    var infoY = row1H + Math.round(3*PX_PER_MM*sc);
                    var infoH = h - infoY;
                    ctx.fillStyle = '#eef4fb';
                    ctx.fillRect(0, infoY, w, infoH);
                    var rh = infoH / 2;
                    ctx.fillStyle = '#1a4070';
                    ctx.font = '500 ' + fsInfo + 'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign = 'left';
                    var pad = Math.round(2*PX_PER_MM*sc);
                    // Single row: 参赛组别 | 作文题目
                    var infoMidY = infoY + infoH/2;
                    ctx.fillText('参赛组别：' + group, pad, infoMidY);
                    ctx.fillText('　作文题目：' + title, Math.round(w * 0.42), infoMidY);

                    return cv.toDataURL('image/png');
                }

                // ── Read values from page ──
                var nameEl  = document.getElementById('jingsai-name') || pg.querySelector('input[type="text"]');
                var classEl = document.getElementById('jingsai-class');
                var numEl   = document.getElementById('jingsai-num') || pg.querySelectorAll('input[type="text"]')[1];
                var anonCb  = document.getElementById('anon-print-cb');
                var isAnon  = anonCb && anonCb.checked;
                var nameVal  = isAnon ? '' : ((nameEl  ? nameEl.value.trim()  : '') || '');
                var classVal = isAnon ? '' : ((classEl ? classEl.value.trim() : '') || '');
                var numVal   = (numEl ? numEl.value.trim() : '') || '';
                var groupSel = pg.querySelector('select');
                var groupVal = groupSel && groupSel.selectedIndex > 0 ? groupSel.options[groupSel.selectedIndex].text : '';
                var topicVal = ''; // removed
                var titleInp = document.getElementById('jingsai-title-input');
                var titleVal = titleInp ? titleInp.value.trim() : '';

                // ── Collect text: use raw _text (exact match with screen layout) ──
                var allText = '';
                if (window._jingsaiGetText) {
                    allText = window._jingsaiGetText();
                } else {
                    // fallback: collect from DOM spans
                    pg.querySelectorAll('.jingsai-page-block').forEach(function(block) {
                        var tb = block.querySelector('.jingsai-text-canvas');
                        if (!tb) return;
                        tb.querySelectorAll('span').forEach(function(s) { allText += s.textContent; });
                    });
                }

                // Split into pages
                var PAGE_CHARS = COLS * ROWS;
                var textPages = [];
                for (var i = 0; i < Math.max(allText.length, PAGE_CHARS); i += PAGE_CHARS) {
                    textPages.push(allText.slice(i, i + PAGE_CHARS));
                }

                // ── Build PDF ──
                var { jsPDF } = window.jspdf;
                var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

                var hdrDataUrl = makeHeaderCanvas(nameVal, classVal, numVal, groupVal, titleVal);

                // Page 1 uses 20 rows (header takes space), other pages use 22
                var ROWS_P1 = 20;
                var ROWS_REST = ROWS; // 22

                // Split text into pages respecting \n (each \n fills rest of row)
                function splitTextToPages(text, rowsP1, rowsRest, cols) {
                    var pages = [];
                    var i = 0;
                    var totalLen = text.length;
                    function getPageSlice(rows) {
                        var startI = i;
                        var row = 0, col = 0;
                        while (i < totalLen && row < rows) {
                            var ch = text[i];
                            if (ch === '\n') { row++; col = 0; i++; }
                            else { col++; i++; if (col >= cols) { col = 0; row++; } }
                        }
                        return text.slice(startI, i);
                    }
                    // Page 1
                    pages.push(getPageSlice(rowsP1));
                    // Remaining pages
                    while (i < totalLen) {
                        pages.push(getPageSlice(rowsRest));
                    }
                    // Always at least 2 pages for consistent appearance
                    if (pages.length < 2) pages.push('');
                    return pages;
                }
                var textPages2 = splitTextToPages(allText, ROWS_P1, ROWS_REST, COLS);

                // Calculate grid heights for vertical centering
                var grid_p1 = makeGridCanvas(ROWS_P1, '');
                var grid_rest = makeGridCanvas(ROWS_REST, '');
                var avail_p1 = PAGE_H - 2*MARGIN - HDR_H - 2;
                var avail_rest = PAGE_H - 2*MARGIN;
                var top_p1 = MARGIN + HDR_H + 2 + (avail_p1 - grid_p1.h_mm) / 2;
                var top_rest = MARGIN + (avail_rest - grid_rest.h_mm) / 2;

                for (var pi = 0; pi < textPages2.length; pi++) {
                    if (pi > 0) pdf.addPage();
                    var y = MARGIN;

                    // Header on page 1 only
                    if (pi === 0) {
                        pdf.addImage(hdrDataUrl, 'PNG', X0, y, CONTENT_W, HDR_H);
                    }

                    // Vertically centered grid
                    var pageRows = (pi === 0) ? ROWS_P1 : ROWS_REST;
                    var gridY = (pi === 0) ? top_p1 : top_rest;
                    var grid = makeGridCanvas(pageRows, textPages2[pi]);
                    pdf.addImage(grid.dataUrl, 'PNG', X0, gridY, CONTENT_W, grid.h_mm);

                    // Page number - render as canvas image to support Chinese
                    (function(pageNum, gX, gY, gH) {
                        var pgW = 30, pgH = 5;
                        var sc = 3;
                        var pc = document.createElement('canvas');
                        pc.width = Math.round(pgW * PX_PER_MM * sc);
                        pc.height = Math.round(pgH * PX_PER_MM * sc);
                        var pcx = pc.getContext('2d');
                        pcx.fillStyle = '#ffffff';
                        pcx.fillRect(0, 0, pc.width, pc.height);
                        pcx.fillStyle = '#999999';
                        pcx.font = Math.round(8 * PX_PER_MM/96 * sc * 25.4) + 'px "Microsoft YaHei","PingFang SC",sans-serif';
                        pcx.textAlign = 'right';
                        pcx.textBaseline = 'middle';
                        pcx.fillText('第 ' + pageNum + ' 页', pc.width, pc.height/2);
                        pdf.addImage(pc.toDataURL('image/png'), 'PNG', gX + CONTENT_W - pgW, gY + gH + 1, pgW, pgH);
                    })(pi+1, X0, gridY, grid.h_mm);
                }

                // Download
                var meta = window.STUDENT_META;
                var assignTitle = meta ? (meta.assignTitle || '稿纸') : '稿纸';
                var fname = (isAnon ? (numVal||'Student') : (nameVal||'Student')) + (classVal?'_'+classVal:'') + '_' + assignTitle + '.pdf';
                fname = fname.replace(/[^\u4e00-\u9fffa-zA-Z0-9._-]/g, '_');
                pdf.save(fname);
                restore();

            } catch(e) {
                console.error('PDF error:', e);
                alert('PDF生成失败: ' + e.message);
                restore();
            }
        }

        // Load jsPDF if needed
        if (window.jspdf && window.jspdf.jsPDF) {
            doExport();
        } else {
            var s = document.createElement('script');
            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
            s.onload = doExport;
            s.onerror = function() { window.print(); setTimeout(restore, 3000); };
            document.head.appendChild(s);
        }
    }

    function saveLocalJSON() {
        const meta = window.STUDENT_META;
        const _pageId2 = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const name = document.querySelector(_pageId2 + ' input[type="text"]')?.value?.trim() || '未知同学';
        const num  = document.querySelectorAll(_pageId2 + ' input[type="text"]')[1]?.value?.trim() || '';

        const inputs = {};
        document.querySelectorAll(_pageId2 + ' input[type="text"], ' + _pageId2 + ' textarea').forEach((el, i) => {
            inputs['field_' + i] = el.value;
        });
        document.querySelectorAll(_pageId2 + ' input[type="checkbox"]').forEach((el, i) => {
            inputs['check_' + i] = el.checked;
        });

        const canvases = {};
        document.querySelectorAll(_pageId2 + ' canvas').forEach(canvas => {
            const key = canvas.id || ('jingsai-canvas-'+Array.from(document.querySelectorAll(_pageId2+' canvas')).indexOf(canvas));
            if (isCanvasBlank(canvas)) return;
            canvases[key] = canvas.toDataURL('image/png');
        });

        // jingsai：额外保存文字内容
        if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'&&window._jingsaiGetState){
            const st=window._jingsaiGetState();
            inputs['jingsai_text']=st.text||'';
        }

        const payload = {
            type: 'worksheet',
            template: currentTemplate,
            grade: 'worksheet_' + (meta ? meta.class : ''),
            class: meta ? meta.class : '',
            assignTitle: meta ? meta.assignTitle : '',
            studentName: name,
            studentNum: num,
            submitTime: new Date().toLocaleString('zh-SG'),
            inputs,
            canvases
        };

        const json = JSON.stringify(payload);
        const blob = new Blob([json], {type: 'application/json;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const safeName = name.replace(/[^\w\u4e00-\u9fff]/g, '_');
        const title = meta ? meta.assignTitle.replace(/[^\w\u4e00-\u9fff]/g, '_') : '作业';
        a.download = safeName + '_' + title + '.json';
        a.click();
    }

    // ── 议论练笔打印：临时移除所有 overflow:hidden 防止内容被裁，并撑高 textarea ──
    window.addEventListener('beforeprint', function() {
        if (typeof currentTemplate === 'undefined' || currentTemplate !== 'yilun') return;

        // 1. 移除所有 overflow:hidden
        document.querySelectorAll('#page-yilun *').forEach(function(el) {
            var inlineStyle = el.getAttribute('style') || '';
            if (inlineStyle.indexOf('overflow:hidden') !== -1 || inlineStyle.indexOf('overflow: hidden') !== -1) {
                el.setAttribute('data-print-ov', el.style.overflow);
                el.style.setProperty('overflow', 'visible', 'important');
            }
        });

        // 2. 把每个 textarea 的 inline height 设为实际内容高度，防止打印引擎截断
        document.querySelectorAll('#page-yilun textarea.yilun-ta').forEach(function(ta) {
            ta.setAttribute('data-print-h', ta.style.height || '');
            ta.style.setProperty('height', 'auto', 'important');
            // scrollHeight 只在可见状态下可靠；此时页面是可见的，所以直接读取
            var sh = ta.scrollHeight;
            ta.style.setProperty('height', sh + 'px', 'important');
            ta.style.setProperty('overflow', 'visible', 'important');
        });

        // 3. 让所有包含 textarea 的父容器也 overflow:visible
        document.querySelectorAll('#page-yilun').forEach(function(el) {
            el.style.setProperty('overflow', 'visible', 'important');
        });
    });
    window.addEventListener('afterprint', function() {
        // 恢复 overflow
        document.querySelectorAll('#page-yilun [data-print-ov]').forEach(function(el) {
            var orig = el.getAttribute('data-print-ov');
            if (orig) { el.style.overflow = orig; } else { el.style.removeProperty('overflow'); }
            el.removeAttribute('data-print-ov');
        });

    function importStudentData(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        event.target.value = "";
        const results = [];
        let loaded = 0;
        files.forEach(function(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) data.forEach(function(d){ results.push(d); });
                    else results.push(data);
                } catch(err) {
                    alert("文件格式错误：" + file.name);
                }
                loaded++;
                if (loaded === files.length) showImportedData(results);
            };
            reader.readAsText(file, "utf-8");
        });
    }
