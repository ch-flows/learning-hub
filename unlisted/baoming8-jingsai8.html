    /* ── 课堂研习注释 ruby ── */
    .kt-ruby { cursor:help; position:relative; display:inline; }

    /* ── 各风格：所有颜色通过 CSS 变量 --rc 传递（由 JS 设置） ── */

    /* fill（遮盖，默认）：纯色完全遮盖，白字 */
    .kt-ruby:not([data-rubystyle]),
    .kt-ruby[data-rubystyle="fill"] {
        background-color: var(--rc, #1565c0) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* solid：纯色填充——背景色跟随 --rc，白字，无圆角（与遮盖区分） */
    .kt-ruby[data-rubystyle="solid"] {
        background-color: var(--rc, #c0392b) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 0 !important;
        padding: 0 3px 1px !important;
    }

    /* font-color：仅改变字体颜色，无背景无装饰 */
    .kt-ruby[data-rubystyle="font-color"] {
        background: transparent !important;
        color: var(--rc, #c0392b) !important;
        border-bottom: none !important;
        padding: 0 !important;
    }

    /* highlight：荧光笔——半透明背景，文字颜色保持原色 */
    .kt-ruby[data-rubystyle="highlight"] {
        background-color: var(--rca, rgba(255,235,59,0.55)) !important;
        color: inherit !important;
        border-bottom: none !important;
        border-radius: 2px !important;
        padding: 0 2px 2px !important;
    }

    /* soft：浅色背景色块（原来的"填色"轻量版），字色与块色一致 */
    .kt-ruby[data-rubystyle="soft"] {
        background-color: var(--rca, rgba(21,101,192,0.15)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* underline：仅下划线 */
    .kt-ruby[data-rubystyle="underline"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: 2px solid var(--rc, #1565c0) !important;
        border-radius: 0 !important;
        padding: 0 1px !important;
    }

    /* wave：波浪下划线 */
    .kt-ruby[data-rubystyle="wave"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        padding: 0 1px 2px !important;
        text-decoration: underline wavy var(--rc, #1565c0) !important;
        text-underline-offset: 2px !important;
    }

    /* box：边框圈选 */
    .kt-ruby[data-rubystyle="box"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        outline: 1.5px solid var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 2px !important;
    }

    /* tag：圆角标签（背景色很淡，左侧有色条） */
    .kt-ruby[data-rubystyle="tag"] {
        background-color: var(--rca, rgba(21,101,192,0.1)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-left: 3px solid var(--rc, #1565c0) !important;
        border-radius: 0 3px 3px 0 !important;
        padding: 0 4px 0 3px !important;
    }

    /* ── 深浅修饰（叠加在风格之上） ── */
    .kt-ruby[data-shade="light"] { filter: saturate(0.7) brightness(1.1); }
    .kt-ruby[data-shade="normal"] { filter: none; }
    .kt-ruby[data-shade="deep"]  { filter: saturate(1.4) brightness(0.82); }

    .kt-ruby rt { font-size:0; line-height:0; display:none; visibility:hidden; }
    /* 加粗注释 */
    .kt-ruby[data-bold="1"] > span { font-weight: 700 !important; }
    /* 字色 span 使用 CSS 变量传递颜色，突破父元素 !important 限制 */
    .kt-ruby > span.kt-fc-span { color: var(--kt-fc-span-color) !important; }
    .kt-ruby > .kt-an-fc-inner { color: var(--kt-fc-span-color) !important; }

    /* 编辑模式下 ruby 悬停 */
    body.edit-mode-on .kt-ruby { cursor:pointer; }
    body.edit-mode-on .kt-ruby:hover { filter:brightness(0.88) !important; outline:1.5px dashed var(--rc,#1565c0) !important; outline-offset:1px; }
    /* tooltip via JS fixed div — no pseudo element needed */
    #kt-tooltip {
        display:none;
        position:fixed;
        background:#eef4fb;
        color:#1a3a5c;
        border:1px solid #b8d4ee;
        font-size:7.5pt;
        line-height:1.8;
        padding:6px 12px;
        border-radius:6px;
        white-space:pre;
        z-index:9999;
        pointer-events:none;
        box-shadow:0 3px 12px rgba(42,100,160,0.15);
        font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    }

        .tb-icon-btn {

        /* ══ 工具栏 tooltip ══ */
        /* 仅工具栏按钮显示 data-tip 悬浮提示，排除内容区 kt-ruby 注释词 */
        .toolbar [data-tip] { position: relative; }
        .toolbar [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 7px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,25,40,0.93);
            color: #e8edf2;
            font-size: 7pt;
            white-space: nowrap;
            padding: 4px 9px;
            border-radius: 5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.18s;
            z-index: 9999;
            font-family: "Microsoft YaHei","PingFang SC",sans-serif;
            letter-spacing: 0.3px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
        }
        .toolbar [data-tip]:hover::after { opacity: 1; }

function _ldBridge(){

<script>
// ══ 朗读录音模块 ══
(function(){
    var _ldStream = null, _ldMR = null, _ldChunks = [], _ldCtx = null, _ldAnalyser = null,
        _ldDataArr = null, _ldAnimId = null, _ldTimerInt = null, _ldSeconds = 0,
        _ldReady = false, _ldFontSize = 11;

    function _el(id){ return document.getElementById(id); }

    function langduInitMic() {
        if (_ldReady) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            _el('langdu-mic-error').style.display = 'block'; return;
        }
        navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
            _ldStream = stream;
            _ldCtx = new (window.AudioContext || window.webkitAudioContext)();
            _ldAnalyser = _ldCtx.createAnalyser();
            _ldAnalyser.fftSize = 256;
            _ldCtx.createMediaStreamSource(stream).connect(_ldAnalyser);
            _ldDataArr = new Uint8Array(_ldAnalyser.frequencyBinCount);
            _ldMR = new MediaRecorder(stream, {audioBitsPerSecond: 96000});
            _ldMR.ondataavailable = function(e){ if(e.data && e.data.size>0) _ldChunks.push(e.data); };
            _ldMR.onstop = function(){
                var blob = new Blob(_ldChunks, {type:'audio/webm'});
                var url  = URL.createObjectURL(blob);
                _el('langdu-preview').src = url;
                var pa = _el('langdu-playback-area');
                pa.style.display = 'flex';
                _el('langdu-meter-bar').style.width = '0%';
                _el('langdu-status-text').textContent = 'Done — play back to check';
                window._langduAudioBlob = blob;
                // 学生版才显示上传按钮
                var sw = _el('langdu-submit-wrap');
                if (sw && window.STUDENT_META) sw.style.display = 'block';
            };
            _ldReady = true;
            _el('langdu-rec-btn').disabled = false;
            _el('langdu-status-text').textContent = 'Microphone ready';
        }).catch(function(){
            _el('langdu-mic-error').style.display = 'block';
        });
    }

    function _drawMeter(){
        _ldAnalyser.getByteFrequencyData(_ldDataArr);
        var avg = _ldDataArr.reduce(function(a,b){return a+b;},0) / _ldDataArr.length;
        _el('langdu-meter-bar').style.width = Math.min(avg * 3, 100) + '%';
        _ldAnimId = requestAnimationFrame(_drawMeter);
    }

    window.langduStartRec = function(){
        if (!_ldReady) { alert('Microphone not ready yet, please wait.'); return; }
        if (_ldCtx && _ldCtx.state === 'suspended') _ldCtx.resume();
        _ldChunks = [];
        _ldSeconds = 0;
        _el('langdu-timer-display').textContent = '00:00';
        _el('langdu-playback-area').style.display = 'none';
        _el('langdu-upload-status').textContent = '';
        window._langduAudioBlob = null;
        _ldMR.start(200);
        _el('langdu-rec-btn').disabled = true;
        _el('langdu-rec-btn').style.background = '#dc2626';
        _el('langdu-rec-btn').textContent = '● Recording…';
        _el('langdu-stop-btn').disabled = false;
        _el('langdu-stop-btn').style.background = '#4a35c8';
        _el('langdu-stop-btn').style.color = '#fff';
        _el('langdu-status-text').textContent = 'Recording…';
        _ldTimerInt = setInterval(function(){
            _ldSeconds++;
            var m = Math.floor(_ldSeconds/60), s = _ldSeconds % 60;
            _el('langdu-timer-display').textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
        }, 1000);
        _drawMeter();
    };

    window.langduStopRec = function(){
        if (!_ldMR || _ldMR.state === 'inactive') return;
        _ldMR.stop();
        clearInterval(_ldTimerInt);
        cancelAnimationFrame(_ldAnimId);
        _el('langdu-rec-btn').disabled = false;
        _el('langdu-rec-btn').style.background = '#4a35c8';
        _el('langdu-rec-btn').textContent = '● Record';
        _el('langdu-stop-btn').disabled = true;
        _el('langdu-stop-btn').style.background = '#e8e0f8';
        _el('langdu-stop-btn').style.color = '#888';
    };

    window.langduReRecord = function(){
        _el('langdu-playback-area').style.display = 'none';
        _el('langdu-preview').src = '';
        window._langduAudioBlob = null;
        _ldChunks = [];
        _ldSeconds = 0;
        _el('langdu-timer-display').textContent = '00:00';
        _el('langdu-status-text').textContent = 'Microphone ready — record again';
        _el('langdu-upload-status').textContent = '';
        var hint = _el('langdu-save-hint');
        if (hint) hint.style.display = 'none';
        var bar = _el('langdu-convert-bar');
        var wrap = _el('langdu-convert-bar-wrap');
        if (bar)  bar.style.width = '0%';
        if (wrap) wrap.style.display = 'none';
        var saveBtn = _el('langdu-save-btn');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '↓ Save MP3'; }
        // 重新录音时隐藏上传按钮
        var sw = _el('langdu-submit-wrap');
        if (sw) sw.style.display = 'none';
    };

    // ── 构建文件名（共用） ───────────────────────────────
    function _ldBuildFileName(ext) {
        var page   = document.getElementById('page-langdu');
        var inputs = page ? page.querySelectorAll('input[type="text"]') : [];
        var sName  = (inputs[0] && inputs[0].value.trim()) || 'student';
        var meta   = window.STUDENT_META;
        var task   = (meta && meta.assignTitle) ? meta.assignTitle : 'reading';
        var now    = new Date();
        var stamp  = now.getFullYear()
                   + String(now.getMonth()+1).padStart(2,'0')
                   + String(now.getDate()).padStart(2,'0')
                   + '_'
                   + String(now.getHours()).padStart(2,'0')
                   + String(now.getMinutes()).padStart(2,'0');
        var safe = function(s){ return s.replace(/[\/\\:*?"<>|\s]/g,'_'); };
        return safe(sName) + '_' + safe(task) + '_' + stamp + ext;
    }

    // ── 触发下载 ─────────────────────────────────────────
    function _ldTriggerDownload(blob, fileName) {
        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href  = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 15000);
    }

    // ── 进度条辅助 ────────────────────────────────────────
    function _ldSetProgress(pct, msg) {
        var bar  = _el('langdu-convert-bar');
        var wrap = _el('langdu-convert-bar-wrap');
        var hint = _el('langdu-save-hint');
        if (bar)  bar.style.width = pct + '%';
        if (wrap) wrap.style.display = pct >= 100 || pct < 0 ? 'none' : 'block';
        if (hint) { hint.textContent = msg || ''; hint.style.display = msg ? 'block' : 'none'; }
    }

    // ── 主入口：WebM → MP3（via lamejs），fallback → WebM ──
    window.langduSaveLocal = function(){
        if (!window._langduAudioBlob) return;

        var saveBtn = _el('langdu-save-btn');
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '⏳ Converting…'; }
        _ldSetProgress(5, '');

        // 1. 把 WebM blob 解码成 PCM AudioBuffer
        var reader = new FileReader();
        reader.onloadend = function() {
            var arrayBuf = reader.result;
            var audioCtxTmp = new (window.AudioContext || window.webkitAudioContext)();
            audioCtxTmp.decodeAudioData(arrayBuf, function(audioBuf) {
                _ldSetProgress(30, '');
                _ldEncodeMp3(audioBuf, function(mp3Blob) {
                    var fileName = _ldBuildFileName('.mp3');
                    _ldTriggerDownload(mp3Blob, fileName);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '↓ Save MP3'; }
                    _ldSetProgress(100, '');
                    _ldSetProgress(-1, '✓ Saved as ' + fileName + '(MP3 — plays on all devices)');
                }, function(err) {
                    // lamejs 加载失败 → fallback 下载 WebM
                    console.warn('MP3 encode failed, saving WebM:', err);
                    var fileName = _ldBuildFileName('.webm');
                    _ldTriggerDownload(window._langduAudioBlob, fileName);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '↓ Save MP3'; }
                    _ldSetProgress(-1, '⚠ Saved as WebM (MP3 conversion failed — open in Chrome on iPhone/iPad)');
                });
            }, function() {
                // decodeAudioData 失败 → fallback
                var fileName = _ldBuildFileName('.webm');
                _ldTriggerDownload(window._langduAudioBlob, fileName);
                if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = '↓ Save MP3'; }
                _ldSetProgress(-1, '⚠ Saved as WebM (decode failed — open in Chrome on iPhone/iPad)');
            });
        };
        reader.readAsArrayBuffer(window._langduAudioBlob);
    };

    // ── lamejs MP3 编码 ────────────────────────────────────
    // 动态加载 lamejs（CDN），成功后编码，失败则回调 onError
    function _ldEncodeMp3(audioBuf, onDone, onError) {
        function _doEncode(lamejs) {
            try {
                var nCh      = Math.min(audioBuf.numberOfChannels, 2);
                var sRate    = audioBuf.sampleRate;
                var kbps     = 128;
                var mp3enc   = new lamejs.Mp3Encoder(nCh, sRate, kbps);
                var samples  = audioBuf.length;
                var CHUNK    = 1152 * 8;   // lamejs 每帧 1152 样本，批量处理加速
                var mp3Data  = [];

                // 取各声道数据并转成 Int16
                var left  = _ldFloat32ToInt16(audioBuf.getChannelData(0));
                var right = nCh > 1 ? _ldFloat32ToInt16(audioBuf.getChannelData(1)) : null;

                var processed = 0;
                function encodeChunk() {
                    var end = Math.min(processed + CHUNK, samples);
                    var lChunk = left.subarray(processed, end);
                    var rChunk = right ? right.subarray(processed, end) : lChunk;
                    var mp3buf = nCh > 1
                        ? mp3enc.encodeBuffer(lChunk, rChunk)
                        : mp3enc.encodeBuffer(lChunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                    processed = end;

                    var pct = 30 + Math.round((processed / samples) * 65);
                    _ldSetProgress(pct, '');

                    if (processed < samples) {
                        // 分帧异步处理，不阻塞 UI
                        setTimeout(encodeChunk, 0);
                    } else {
                        var final = mp3enc.flush();
                        if (final.length > 0) mp3Data.push(final);
                        onDone(new Blob(mp3Data, { type: 'audio/mpeg' }));
                    }
                }
                encodeChunk();
            } catch(e) { onError(e); }
        }

        // 已加载过则直接用
        if (window._lameLoaded && window.lamejs) { _doEncode(window.lamejs); return; }

        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js';
        s.onload  = function(){ window._lameLoaded = true; _doEncode(window.lamejs); };
        s.onerror = function(){ onError(new Error('lamejs CDN load failed')); };
        document.head.appendChild(s);
    }

    // Float32 [-1,1] → Int16
    function _ldFloat32ToInt16(f32) {
        var int16 = new Int16Array(f32.length);
        for (var i = 0; i < f32.length; i++) {
            var v = Math.max(-1, Math.min(1, f32[i]));
            int16[i] = v < 0 ? v * 32768 : v * 32767;
        }
        return int16;
    }

    // ── 朗读录音：上传录音（走学习单提交流程，用回调获取结果）──
    window.langduSubmitRecording = function(){
        if (!window._langduAudioBlob) {
            _el('langdu-upload-status').textContent = '⚠ Please complete your recording first.';
            return;
        }
        var submitBtn = _el('langdu-submit-wrap') ? _el('langdu-submit-wrap').querySelector('button') : null;
        if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '⏳ Uploading…'; }
        _el('langdu-upload-status').textContent = 'Uploading, please wait…';

        submitWork(function(success, reason) {
            if (success) {
                _el('langdu-upload-status').textContent = '✓ Submitted successfully!';
                if (submitBtn) { submitBtn.style.display = 'none'; }
            } else if (reason === 'validation') {
                // 验证失败：弹窗已由 showModal 处理，这里只恢复按钮
                _el('langdu-upload-status').textContent = '';
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '↑ Submit Recording'; }
            } else if (reason === 'busy') {
                _el('langdu-upload-status').textContent = '⚠ Submission in progress, please wait.';
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '↑ Submit Recording'; }
            } else {
                // 网络错误：全屏提示已由 submitWork 处理
                _el('langdu-upload-status').textContent = '⚠ Submission failed, please try again.';
                if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '↑ Submit Recording'; }
            }
        });
    };

    window.langduChangeFontSize = function(delta){

    };

    // ── 老师打开评分总表 ──────────────────────────────────
    window.langduOpenScoreSheet = function() {
        var scriptUrl = '';
        var urlEl = document.getElementById('scriptUrl');
        if (urlEl) scriptUrl = urlEl.value.trim();
        var hint = _el('langdu-sheet-hint');

        if (!scriptUrl) {
            if (hint) hint.textContent = '⚠ Please set up Script URL in settings first';
            return;
        }

        // 取班级和任务名（老师版从 toolbar 读，学生版从 STUDENT_META 读）
        var cls   = '';
        var title = '';

        var queryUrl = scriptUrl
            + '?type=getSheetUrl'

        if (hint) hint.textContent = 'Fetching link…';
        fetch(queryUrl)
            .then(function(r){ return r.json(); })
            .then(function(d){
                if (d.sheetUrl) {
                    window.open(d.sheetUrl, '_blank');

    function _ldOpenDriveFallback(hint) {
        // fallback：打开 Drive 搜索反馈表
        window.open('https://drive.google.com/drive/search?q=%E5%8F%8D%E9%A6%88%E8%A1%A8', '_blank');

    window.langduQueryFeedback = function() {
        var nameEl   = _el('langdu-query-name');
        var resultEl = _el('langdu-query-result');
        var statusEl = _el('langdu-query-status');
        if (!nameEl) return;
        var name = nameEl.value.trim();
        if (!name) { statusEl.textContent = 'Please enter your name'; return; }

        // 取 scriptUrl（老师版存在 #scriptUrl，学生版存在 STUDENT_META）
        var scriptUrl = '';
        var urlEl = document.getElementById('scriptUrl');
        if (urlEl) scriptUrl = urlEl.value.trim();
        if (!scriptUrl && window.STUDENT_META) scriptUrl = window.STUDENT_META.scriptUrl || '';
        if (!scriptUrl) { statusEl.textContent = '⚠ No Script URL configured. Contact your teacher.'; return; }

        // 取 assignTitle
        var assignTitle = '';
        if (window.STUDENT_META) assignTitle = window.STUDENT_META.assignTitle || '';

        statusEl.textContent = 'Searching…';
        resultEl.style.display = 'none';

        // 取班级（学生版从 STUDENT_META，老师版从 toolbar）
        var cls = '';
        if (window.STUDENT_META) cls = window.STUDENT_META.class || '';
        if (!cls) { var clsEl2 = document.getElementById('classSelect'); if (clsEl2) cls = clsEl2.value.trim(); }

        var url = scriptUrl
            + '?type=query'
            + '&name='         + encodeURIComponent(name)
            + '&assignTitle='  + encodeURIComponent(assignTitle)
            + '&class='        + encodeURIComponent(cls)
            + '&category=2'
            + '&template=langdu';

        fetch(url)
            .then(function(r){ return r.json(); })
            .then(function(d) {
                statusEl.textContent = '';
                resultEl.style.display = 'block';
                if (d.found) {
                    var html = '';
                    if (d.score !== undefined && d.score !== '')
                        html += '<div><b style="color:var(--ld-timer,#6556cc)">Score: </b>' + d.score + '</div>';
                    if (d.comment !== undefined && d.comment !== '')
                        html += '<div style="margin-top:8px;"><b style="color:var(--ld-timer,#6556cc)">Comments: </b><span style="white-space:pre-wrap;">' + d.comment + '</span></div>';
                    if (!html) html = '<div style="color:#888;">No feedback yet — check back later.</div>';
                    // 显示上次已读时间（如有）
                    if (d.readTime && d.readTime !== '' && (d.score !== '' || d.comment !== '')) {
                        html += '<div style="margin-top:10px;font-size:7.5pt;color:#aaa;border-top:0.5px solid #e8e0f8;padding-top:6px;">Last viewed: ' + d.readTime + '</div>';
                    }
                    resultEl.innerHTML = html;
                } else {
                    resultEl.innerHTML = '<div style="color:#888;">No record found. Check your name spelling, or wait for your teacher to mark your recording.</div>';
                }
            })
            .catch(function() {
                statusEl.textContent = '⚠ Query failed. Check your connection and try again.';
                resultEl.style.display = 'none';
            });
    };

    // 当模板切换到 langdu 时初始化麦克风
    // 在所有脚本加载完成后，包装 switchTemplate
    window.addEventListener('load', function(){
        var _orig = (typeof switchTemplate === 'function') ? switchTemplate : null;
        if (_orig) {
            window.switchTemplate = function(name){
                _orig(name);
                if (name === 'langdu') langduInitMic();
            };
        }
        // 如果页面加载时就是 langdu 模板，也初始化
        if (document.getElementById('page-langdu') &&
            document.getElementById('page-langdu').style.display !== 'none') {
            langduInitMic();
        }
    });
})();

<script>
    let isEditMode = false;
    let currentTemplate = 'ketang';

    const ALL_TEMPLATES = ['ketang','miaoxie','yilun','yilun-outline','yilun-mini','shiyong','yuedu','biaoda','langdu','pazhao','wenma','jingsai','baoming'];

    function toggleDropdown() {
        const menu = document.getElementById('tplMenu');
        const btn = document.getElementById('tplBtn');
        menu.classList.toggle('open');
        btn.classList.toggle('active');
    }

    document.addEventListener('click', function(e) {
        const dd = document.getElementById('tplDropdown');
        if (!dd.contains(e.target)) {
            document.getElementById('tplMenu').classList.remove('open');
            document.getElementById('tplBtn').classList.remove('active');
        }
    });

    function smartPrint() {
        // 打印前强制只显示当前模板页面，防止其他模板被打印
        var _printTpl = typeof currentTemplate !== 'undefined' ? currentTemplate : '';
        // 如果稿纸页面可见，强制以jingsai模式打印
        var _jsPg = document.getElementById('page-jingsai');
        if (_jsPg && _jsPg.style.display !== 'none') { _printTpl = 'jingsai'; }
        // 如果当前是jingsai，使用savePDF生成PDF（更可靠）
        if (_printTpl === 'jingsai' && typeof savePDF === 'function') {
            savePDF();
            return;
        }
        var _hiddenPages = [];
        document.querySelectorAll('.page').forEach(function(pg) {
            if (pg.id !== 'page-' + _printTpl && pg.style.display !== 'none') {
                pg.style.display = 'none';
                _hiddenPages.push(pg);
            }
        });

        // 打印前：把所有可见页面的 textarea 替换成高度自适应的 div
        const replacements = [];
        document.querySelectorAll('.page textarea').forEach(function(ta) {
            const div = document.createElement('div');
            const st = ta.getAttribute('style') || '';
            const newSt = st.replace(/\bheight\s*:[^;]+;?/gi, '')
                           .replace(/\bmin-height\s*:[^;]+;?/gi, '')
                           .replace(/\bmax-height\s*:[^;]+;?/gi, '')
                           .replace(/\boverflow\s*:[^;]+;?/gi, '')
                           .replace(/\bresize\s*:[^;]+;?/gi, '');
            div.setAttribute('style', newSt + 'white-space:pre-wrap;word-break:break-word;box-sizing:border-box;');
            if (ta.className) div.className = ta.className;
            div.textContent = ta.value;
            ta.parentNode.insertBefore(div, ta);
            ta.style.display = 'none';
            replacements.push({ ta: ta, div: div });
        });

        // grid 容器高度
        const savedGrids = [];
        ['page-yilun','page-miaoxie','page-yilun-outline','page-yilun-mini'].forEach(function(pid) {
            const page = document.getElementById(pid);
            if (!page) return;
            page.querySelectorAll('div[style*="grid-template-columns"]').forEach(function(g) {
                savedGrids.push({ el: g, h: g.style.height });
                g.style.height = 'auto';
            });
        });

        // 议论练笔：临时缩小 @page margin，腾出足够空间放进一页
        var yilunPageStyle = null;
        var yilunEl = document.getElementById('page-yilun');
        if (yilunEl && yilunEl.style.display !== 'none') {
            yilunPageStyle = document.createElement('style');
            yilunPageStyle.id = '_yilun_page_margin_';
            yilunPageStyle.textContent = '@page { size: A4; margin: 7mm; }';
            document.head.appendChild(yilunPageStyle);
        }

        // 全局打印样式（textarea高度撑开等）
        var yueduPrintStyle = document.createElement('style');
        yueduPrintStyle.id = '_yuedu_print_fix_';
        yueduPrintStyle.textContent = [
            '.page textarea { height:auto !important; max-height:none !important; overflow:visible !important; }',
            '.page div.yuedu-input, .page div.miaoxie-ta, .page div.yilun-ta, .page div.bd-input { height:auto !important; overflow:visible !important; }'
        ].join('');
        document.head.appendChild(yueduPrintStyle);

        // 稿纸模式打印：文字画入canvas，清除inline height让CSS height:auto生效
        (function(){
          var pg=document.getElementById('page-jingsai');
          if(!pg||pg.style.display==='none')return;
          if(typeof window.jingsaiRender==='function') window.jingsaiRender();
          var _cW=window._jingsaiCW||0;
          var saved=[];
          pg.querySelectorAll('.jingsai-page-block').forEach(function(block){
            var cv=block.querySelector('.jingsai-grid-canvas');
            var wrap=block.querySelector('.jingsai-grid-wrap');
            var outer=wrap?wrap.parentNode:null;
            var tb=block.querySelector('.jingsai-text-canvas');

            // 把文字画入canvas（格子线已画好，直接叠加文字）
            if(cv&&tb&&_cW>0){
              var spans=tb.querySelectorAll('span');
              if(spans.length){
                var ctx=cv.getContext('2d');
                ctx.fillStyle='#1a2a3a';
                ctx.textAlign='center';
                ctx.textBaseline='middle';
                spans.forEach(function(s){
                  var l=parseFloat(s.style.left)||0;
                  var t=parseFloat(s.style.top)||0;
                  var w=parseFloat(s.style.width)||_cW;
                  var h=parseFloat(s.style.height)||_cW;
                  ctx.font='100 '+Math.round(h*0.60)+'px SimSun,"宋体",STSong,serif';
                  ctx.fillText(s.textContent,l+w/2,t+h/2);
                });
              }
            }

            // 清除inline height，让CSS的height:auto!important真正生效
            var s={};
            if(cv){s.cv=cv;s.cvH=cv.style.height;cv.style.height='auto';}
            if(wrap){s.wrap=wrap;s.wrapH=wrap.style.height;wrap.style.height='auto';}
            if(outer){s.outer=outer;s.outerH=outer.style.height;outer.style.height='auto';}
            saved.push(s);
          });

          // afterprint恢复inline height
          var done=false;
          function restore(){
            if(done)return;done=true;
            window.removeEventListener('afterprint',restore);
            saved.forEach(function(s){
              if(s.cv)s.cv.style.height=s.cvH;
              if(s.wrap)s.wrap.style.height=s.wrapH;
              if(s.outer)s.outer.style.height=s.outerH;
            });
          }
          window.addEventListener('afterprint',restore);
          setTimeout(restore,5000);
        })();

        window.print();
        // 恢复被临时隐藏的页面
        _hiddenPages.forEach(function(pg){ pg.style.display = ''; });

        if (yueduPrintStyle.parentNode) yueduPrintStyle.parentNode.removeChild(yueduPrintStyle);
        replacements.forEach(function(item) {
            item.ta.style.display = '';
            if (item.div.parentNode) item.div.parentNode.removeChild(item.div);
        });
        savedGrids.forEach(function(item) {
            item.el.style.height = item.h;
        });
        if (yilunPageStyle && yilunPageStyle.parentNode) {
            yilunPageStyle.parentNode.removeChild(yilunPageStyle);
        }

    }

    // ══ 课堂研习：完整功能 ══
    var ktQCount = 1;
    var KT_BOX_HEIGHTS = { s: 36, m: 58, l: 100 };

    // ── 工具模式管理（高亮 / 画笔）──
    var _ktToolMode = 'draw'; // 'highlight' | 'draw'
    var _ktHLColor = '#fff176';

    // ── 批注画笔总开关（学生版文本区 toggle switch）──
    var _ktAnnotateOn = false;
    function ktToggleAnnotate() {
        _ktAnnotateOn = !_ktAnnotateOn;
        var dc    = document.getElementById('kt-draw-canvas');
        var tc    = document.getElementById('kt-text-content');
        var body  = document.getElementById('kt-text-body');
        var track = document.getElementById('kt-annotate-track');
        var thumb = document.getElementById('kt-annotate-thumb');

        if (_ktAnnotateOn) {
            // ── ON：同步画布尺寸 → 显示 → 激活 ──
            if (dc && body) {
                var bw = body.offsetWidth || 300;
                var bh = body.scrollHeight || body.offsetHeight || 300;
                var saved = null;
                try { if (dc.width > 10 && dc.height > 10) saved = dc.toDataURL(); } catch(e) {}
                dc.width  = bw;
                dc.height = bh;
                if (saved) {
                    var img2 = new Image();
                    img2.onload = function() {
                        dc.getContext('2d').drawImage(img2, 0, 0);
                    };
                    img2.src = saved;
                }
                dc.style.display       = 'block';
                dc.style.pointerEvents = 'auto';
                dc.style.cursor        = 'crosshair';
                ktInitDrawCanvas();
            }
            if (tc) { tc.style.userSelect = 'none'; tc.style.webkitUserSelect = 'none'; }
            if (track) track.style.background = '#2e86c1';
            if (thumb) thumb.style.left = '16px';
            // 工具栏恢复正常
            var ht = document.getElementById('kt-highlight-toolbar');
            if (ht) { ht.querySelectorAll('button,select').forEach(function(el){ el.style.opacity=''; el.style.pointerEvents=''; }); }
            _ktToolMode = 'draw';
        } else {
            // ── OFF：隐藏画布，恢复正常阅读 ──
            if (dc) { dc.style.display = 'none'; dc.style.pointerEvents = 'none'; }
            if (tc) { tc.style.userSelect = ''; tc.style.webkitUserSelect = ''; }
            if (track) track.style.background = '#d1d5db';
            if (thumb) thumb.style.left = '2px';
            // 工具栏灰化（label 本身保持正常，让 toggle 可点）
            var ht = document.getElementById('kt-highlight-toolbar');
            if (ht) {
                ht.querySelectorAll('button,select').forEach(function(el){
                    el.style.opacity = '0.35';
                    el.style.pointerEvents = 'none';
                });
            }
            _ktToolMode = 'highlight';
        }
    }

    // toggle switch label 绑定（click 触发 ktToggleAnnotate）
    document.addEventListener('DOMContentLoaded', function() {
        var lbl = document.getElementById('kt-annotate-label');
        if (lbl) lbl.addEventListener('click', ktToggleAnnotate);
    });

    function ktSetMode(mode) {
        _ktToolMode = mode;
        var hlBtn    = document.getElementById('kt-mode-hl-btn');
        var eraseBtn = document.getElementById('kt-hl-erase');
        var drawBtn  = document.getElementById('kt-mode-draw-btn');
        // Reset all button styles
        if (hlBtn)    { hlBtn.style.background='#fff'; hlBtn.style.borderColor='#e0c97a'; hlBtn.style.color='#7a5800'; hlBtn.style.fontWeight='600'; hlBtn.style.boxShadow='none'; }
        if (eraseBtn) { eraseBtn.style.background='#fff8e1'; eraseBtn.style.borderColor='#ffe082'; eraseBtn.style.boxShadow='none'; }
        if (drawBtn)  { drawBtn.style.background='#fff'; drawBtn.style.borderColor='#c0d4e8'; drawBtn.style.color='#555'; drawBtn.style.fontWeight='400'; drawBtn.style.boxShadow='none'; }
        // Active state
        if (mode==='highlight' && hlBtn)    { hlBtn.style.background='#fdf0c0'; hlBtn.style.borderColor='#e6b800'; hlBtn.style.boxShadow='0 0 0 2px #ffe57a inset'; }
        if (mode==='hl-erase'  && eraseBtn) { eraseBtn.style.background='#fffbeb'; eraseBtn.style.borderColor='#f59e0b'; eraseBtn.style.boxShadow='0 0 0 2px #fcd34d inset'; }
        if (mode==='draw'      && drawBtn)  { drawBtn.style.background='#e8f2fb'; drawBtn.style.borderColor='#2e86c1'; drawBtn.style.color='#2e86c1'; drawBtn.style.fontWeight='700'; drawBtn.style.boxShadow='0 0 0 2px #7ec8e3 inset'; }
        // touch-action: allow text selection for highlight, none for draw
        var tc = document.getElementById('kt-text-content');
        if (tc) {
            if (mode==='draw') {
                tc.style.userSelect = 'none';
                tc.style.webkitUserSelect = 'none';
            } else {
                tc.style.userSelect = '';
                tc.style.webkitUserSelect = '';
            }
        }
        // canvas pointer-events: only draw mode sends events to draw canvas
        var dc = document.getElementById('kt-draw-canvas');
        if (dc) {
            dc.style.pointerEvents = (mode==='draw') ? 'auto' : 'none';
            // Re-sync canvas size when entering draw mode
            if (mode==='draw') {
                var body2 = document.getElementById('kt-text-body');
                if (body2 && body2.offsetWidth > 0) {
                    if (dc.width !== body2.offsetWidth || dc.height !== body2.offsetHeight) {

                    }
                }
            }
        }
    }


    function ktSetHLColor(color) {
        _ktHLColor = color;
        // highlight all border colors to show active
        ['kt-hl-y','kt-hl-b','kt-hl-g','kt-hl-p'].forEach(function(id) {
            var b = document.getElementById(id);

    // ── 高亮笔：mousedown→mousemove→mouseup 区间选中并高亮 ──
    var _ktHLDown = false, _ktHLRange = null;

    function ktInitHighlightMode() {
        var tc = document.getElementById('kt-text-content');
        if (!tc || tc._hlInited) return;
        tc._hlInited = true;
        tc.style.userSelect = 'text';
        tc.style.webkitUserSelect = 'text';

        var range = sel.getRangeAt(0);

        var walker = document.createTreeWalker(frag, NodeFilter.SHOW_TEXT, null, false);

                var el = node.parentElement;
                var isBold = false;
                while (el && tc !== el) {
                    if (el.tagName === 'STRONG' || el.tagName === 'B') { isBold = true; break; }
                    el = el.parentElement;
                }
                if (!isBold) { allBold = false; break; }
            }

        if (!hasText) return;
        if (allBold) {
            var strongsInRange = [];
            tc.querySelectorAll('strong, b').forEach(function(s) {

        }
        sel.removeAllRanges();
    }

        document.body.appendChild(overlay);

        function _ktAnUpdatePreviewFc(pv) {
            var fcHex = pv.getAttribute('data-fc-color');

            var existFc = pv.querySelector('.kt-an-fc-inner');

                    var textNodes = [];
                    pv.childNodes.forEach(function(n){ if(n.nodeName !== 'RT' && n.nodeName !== 'SPAN') textNodes.push(n); });
                    if (textNodes.length) {
                        var sp = document.createElement('span');
                        sp.className = 'kt-an-fc-inner';
                        sp.style.color = fcHex;
                        textNodes.forEach(function(n){ pv.insertBefore(sp, n); sp.appendChild(n); });
                    }
                } else {
                    existFc.style.color = fcHex;
                }
            } else {
                if (existFc) {
                    var p = existFc.parentNode;
                    while (existFc.firstChild) p.insertBefore(existFc.firstChild, existFc);
                    p.removeChild(existFc);

            }

        document.getElementById('kt-an-ok').onclick = function() {

            doClose();

            // 构建 tooltip 文字
            var tipLines = [];
            if (pinyin)    tipLines.push('拼音：' + pinyin);
            if (zhMeaning) tipLines.push('华文：' + zhMeaning);

            var tipText = tipLines.join('\n');

            ktApplyRubyColor(ruby, annotColor, chosenStyle);

            ruby.setAttribute('data-py', pinyin);
            ruby.setAttribute('data-zh', zhMeaning);
            ruby.setAttribute('data-en', enMeaning);
            ruby.setAttribute('data-tip', tipText);
            try {
                // ── 稳健插入：先在原位插入占位符，再用 ruby 替换，避免 extractContents 拆断行内元素 ──
                var placeholder = document.createElement('span');

                // 删除原选区内容

            } catch(e) { console.warn('ktAddAnnotation insert error:', e); }

            ktRefreshAnnotationList();
        };

        overlay.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('kt-an-ok').click(); if (e.key === 'Escape') doClose(); });

            var innerSpan = ruby.querySelector('span:not(.kt-an-fc-inner)') || null;
            // 重新包裹内容 span（如果有加粗或字色）

                        ruby.removeChild(n);
                    }
                });
            }
            // rt 更新
            if (newPy) {
                if (!rt) { rt = document.createElement('rt'); ruby.appendChild(rt); }
                rt.textContent = newPy;
            } else {
                if (rt) rt.remove();
            }

        function getPos(e) {
            var rect = canvas.getBoundingClientRect();

        function start(e) {
            e.preventDefault(); _ktDrawing = true;

        function end(e) {

    function ktMmTabKey(e) {
        var ta = e.target;
        var start = ta.selectionStart, end2 = ta.selectionEnd;
        var val = ta.value;

        if (e.key === 'Tab') {
            e.preventDefault();
            _ktMmIndentTA(ta, e.shiftKey ? -1 : 1);
        } else if (e.key === 'Enter') {
            // Auto-continue: detect current line's prefix and repeat it
            var lineStart = val.lastIndexOf('\n', start - 1) + 1;
            var currentLine = val.substring(lineStart, start);
            // Get the indent of the current line
            var indentMatch = currentLine.match(/^(\s*)/);
            var indent = indentMatch ? indentMatch[1] : '';
            // Check for list marker: "- ", "1. ", "2. " etc
            var listMatch = currentLine.trimStart().match(/^(-|\*|\d+[.。）)、])\s/);
            var prefix = indent;
            if (listMatch) {
                var marker = listMatch[1];
                // If numbered, increment the number
                var numMatch = marker.match(/^(\d+)/);
                if (numMatch) {
                    prefix += (parseInt(numMatch[1]) + 1) + marker.replace(/^\d+/, '') + ' ';
                } else {
                    prefix += marker + ' ';
                }
            }
            // If current line (after trim) is empty or just a marker, remove the prefix (stop list)
            var trimmed = currentLine.trim().replace(/^(-|\*|\d+[.。）)、])\s*$/, '');
            if (!trimmed && listMatch) {
                // Empty list item — remove the marker from current line and stop
                e.preventDefault();
                ta.value = val.substring(0, lineStart) + indent + val.substring(start);
                ta.selectionStart = ta.selectionEnd = lineStart + indent.length;
                return;
            }
            if (prefix !== '\n') {
                e.preventDefault();
                var insert = '\n' + prefix;
                ta.value = val.substring(0, start) + insert + val.substring(end2);
                ta.selectionStart = ta.selectionEnd = start + insert.length;
            }
        }
    }

    // ── 思维导图缩进辅助（Tab键和按钮共用）──
    function _ktMmIndentTA(ta, dir) {
        var start = ta.selectionStart;
        var val = ta.value;
        var lineStart = val.lastIndexOf('\n', start - 1) + 1;
        if (dir > 0) {
            ta.value = val.substring(0, lineStart) + '  ' + val.substring(lineStart);
            ta.selectionStart = ta.selectionEnd = start + 2;
        } else {
            var sub = val.substring(lineStart);
            var remove = sub.match(/^ {1,2}/) ? sub.match(/^ {1,2}/)[0].length : 0;
            if (remove > 0) {
                ta.value = val.substring(0, lineStart) + val.substring(lineStart + remove);
                ta.selectionStart = ta.selectionEnd = Math.max(lineStart, start - remove);
            }
        }
        if (typeof ktMmLivePreview === 'function') ktMmLivePreview(ta);
    }

    // ── 气泡图 ──
    function ktBuildBubbleMindmap(text) {
        var nodes = ktParseMindmapLines(text);

        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];

        var R = 145;

            var angle = (2*Math.PI*i/Math.max(l1.length,1)) - Math.PI/2;

            svgParts.push('<circle cx="'+nx+'" cy="'+ny+'" r="'+r+'" fill="'+col+'" opacity="0.85"/>');

            children.forEach(function(c,ci){
                var cAngle = angle + (ci-(children.length-1)/2)*0.45;

            });

        return '<svg viewBox="0 0 680 400" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // ── 括号图（大纲展开式，左→右层级括号）──
    function ktBuildBracketMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;">无内容</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b'];

            // bracket line to children
            var nextSameOrHigher = -1;
            for(var j=i+1;j<nodes.length;j++){if(nodes[j].level<=n.level){nextSameOrHigher=j;break;}}
            var childCount = (nextSameOrHigher>0?nextSameOrHigher:nodes.length) - (i+1);
            if(childCount>0){
                var yEnd = PAD + (i+childCount)*H_PER + H_PER/2;

        });

        return '<svg viewBox="0 0 '+Math.max(500,maxX)+' '+Math.max(120,totalH)+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // ── 鱼骨图 ──
    function ktBuildFishboneMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;">无内容</p>';
        var l0 = nodes.filter(function(n){return n.level===0;})[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var W=680, H=320, spineY=H/2, headX=W-60, tailX=60;

        var spineLen = headX - tailX;
        l1.forEach(function(n, i) {
            var side = i%2===0 ? -1 : 1; // -1=top, 1=bottom
            var boneX = headX - (spineLen/(l1.length+1)) * (Math.floor(i/2)+1);
            var boneLen = 70;
            var boneEndY = spineY + side*boneLen;
            var col = colors[i%colors.length];

    // Shared mindmap helper
    function _mmParse(text) {
        var rawLines = text.split('\n');
        var result = [];
        rawLines.forEach(function(line) {
            if (!line.trim()) return;
            // Tab → 2 spaces
            var normalized = '';
            for (var i=0; i<line.length; i++) {
                normalized += (line[i] === '\t') ? '  ' : line[i];
            }
            var indent = normalized.match(/^(\s*)/)[1].length;
            var level = Math.floor(indent / 2);
            var txt = normalized.trim();
            // Check if this is a list-marker line (-, *, 1., ①, etc.)
            var isListItem = /^[-*•·]\s+/.test(txt) || /^\d+[.。）)、]\s*/.test(txt) || /^[①②③④⑤⑥⑦⑧⑨⑩]\s*/.test(txt);
            // Strip the list marker
            txt = txt.replace(/^[-*•·]\s+/, '').replace(/^\d+[.。）)、]\s*/, '').replace(/^[①②③④⑤⑥⑦⑧⑨⑩]\s*/, '');
            if (!txt) return;
            // If it's a list item with no indentation AND it's not the first node,
            // treat it as at least level 1 (child of root)
            if (isListItem && level === 0 && result.length > 0) {
                level = 1;
            }
            result.push({ text: txt, level: level });
        });
        if (result.length === 0) return result;
        // Normalize levels: remove gaps (e.g. 0,2,4 → 0,1,2)
        var sortedLevels = [];
        result.forEach(function(n) { if (sortedLevels.indexOf(n.level) < 0) sortedLevels.push(n.level); });
        sortedLevels.sort(function(a,b){return a-b;});
        var levelMap = {};
        sortedLevels.forEach(function(lv, idx) { levelMap[lv] = idx; });
        result.forEach(function(n) { n.level = levelMap[n.level]; });
        return result;
    }


    function _mmParent(nodes) {
        var parent = new Array(nodes.length).fill(-1);
        for (var i=1;i<nodes.length;i++) {
            for (var j=i-1;j>=0;j--) {
                if (nodes[j].level === nodes[i].level-1) { parent[i]=j; break; }
            }
        }
        return parent;
    }
    function _mmLeaves(i, parent, n) {
        var ch = [];
        for (var k=0;k<n;k++) if (parent[k]===i) ch.push(k);
        return ch.length ? ch.reduce(function(s,k){return s+_mmLeaves(k,parent,n);},0) : 1;
    }

    function ktBuildTree(text, vertical) {
        var nodes = _mmParse(text);
        if (!nodes.length) return '<p style="color:#aaa;padding:8px;">无内容</p>';
        if (vertical) return _buildTreeV(nodes);
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#c0392b'], PAD=12, RH=26, IND=118;
        var y=PAD, sn=[], maxX=0;
        nodes.forEach(function(n,i){
            var tw=Math.max(60,n.text.length*7.8+16);
            var x=PAD+n.level*IND;
            maxX=Math.max(maxX,x+tw);
            sn.push({x:x,y:y,w:tw,h:20,cx:x+tw/2,cy:y+10,text:n.text,col:C[n.level%C.length],lv:n.level});

        });
        var paths='';
        for(var i=1;i<sn.length;i++){
            var n=sn[i];
            for(var j=i-1;j>=0;j--){
                if(sn[j].lv===n.lv-1){
                    var p=sn[j],mx=(p.x+p.w+n.x)/2;
                    paths+='<path d="M'+(p.x+p.w)+','+p.cy+' C'+mx+','+p.cy+' '+mx+','+n.cy+' '+n.x+','+n.cy+'" fill="none" stroke="'+n.col+'" stroke-width="1.4" opacity="0.6"/>';
                    break;
                }
            }
        }
        var rects=sn.map(function(n){
            return '<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+(n.lv===0?6:4)+'" fill="'+n.col+'" opacity="'+(n.lv===0?1:0.88)+'"/>'+

    function ktBuildOval(text, vertical) {
        var nodes=_mmParse(text); if(!nodes.length)return '<p style="color:#aaa;padding:8px;">无内容</p>';
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#d35400'];

        function cntL(i){var ch=getChld(i,nodes[i].level);return ch.length?ch.reduce(function(s,c){return s+cntL(c);},0):1;}

                    var root_edge=dir==='t'?CY-13:CY+13;
                    var my=(root_edge+ny)/2;
                    all.push('<path d="M'+CX+','+root_edge+' C'+CX+','+my+' '+cx+','+my+' '+cx+','+ny+'" fill="none" stroke="'+col+'" stroke-width="1.5" opacity="0.55"/>');
                    all.push('<rect x="'+(cx-tw/2)+'" y="'+(ny-10)+'" width="'+tw+'" height="20" rx="5" fill="'+col+'" opacity="0.88"/>');
                    all.push('<text x="'+cx+'" y="'+(ny+4)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="600">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                    track(cx-tw/2,ny-10); track(cx+tw/2,ny+10);
                    var ch2=getChld(ni,1),cX2=x0;
                    ch2.forEach(function(ci){
                        var cn=nodes[ci],cl=cntL(ci),ccx=cX2+cl*RW/2;
                        var cc=C[(l1.indexOf(n)+2)%C.length];
                        var ctw=Math.max(54,cn.text.length*7+12);
                        var cny=dir==='t'?ny-(GAP_V+20):ny+(GAP_V+20);
                        var ny_edge=dir==='t'?ny-10:ny+10;
                        var cmy=(ny_edge+cny)/2;
                        all.push('<path d="M'+cx+','+ny_edge+' C'+cx+','+cmy+' '+ccx+','+cmy+' '+ccx+','+cny+'" fill="none" stroke="'+cc+'" stroke-width="1.2" opacity="0.4"/>');
                        all.push('<rect x="'+(ccx-ctw/2)+'" y="'+(cny-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+cc+'" opacity="0.7"/>');
                        all.push('<text x="'+ccx+'" y="'+(cny+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+cn.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                        track(ccx-ctw/2,cny-9); track(ccx+ctw/2,cny+9);
                        cX2+=cl*RW;
                    });
                    x0+=ml*RW;
                });
            }
            layV(topNodes,'t');
            layV(botNodes,'b');
        }

        var PAD=20;
        // Ensure minimum viewBox width of 600 to prevent upscaling
        var vw=Math.max(maxX-minX+PAD*2, 600);
        var vh=maxY-minY+PAD*2;
        // Centre the content horizontally if narrower than 600
        var vx=minX-PAD-(vw-(maxX-minX+PAD*2))/2;
        return '<svg viewBox="'+vx+' '+(minY-PAD)+' '+vw+' '+vh+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+all.join('')+'</svg>';
    }








    // ── 题目画布（每道题独立）──
    var _ktQCanvasInited = new WeakSet();
    function ktInitQCanvas(canvas) {
        if (!canvas || _ktQCanvasInited.has(canvas)) return;
        _ktQCanvasInited.add(canvas);
        var ctx = canvas.getContext('2d', { willReadFrequently: true });
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        var drawing = false, lastX = 0, lastY = 0;
        var erasing = false;

        // ── 同步画布分辨率与 CSS 尺寸，防止拉伸后不可画 ──
        var _syncTimer = null;
        function syncCanvasSize() {
            if (_syncTimer) return;
            _syncTimer = requestAnimationFrame(function() {
                _syncTimer = null;
                var r = canvas.getBoundingClientRect();
                var w = Math.round(r.width), h = Math.round(r.height);
                if (w > 0 && h > 0 && (canvas.width !== w || canvas.height !== h)) {
                    var data = null;
                    try { data = canvas.toDataURL(); } catch(ex){}
                    canvas.width = w; canvas.height = h;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    if (data) { var img = new Image(); img.onload = function(){ ctx.clearRect(0,0,w,h); ctx.drawImage(img,0,0,w,h); }; img.src = data; }
                }
            });
        }
        if (typeof ResizeObserver !== 'undefined') {
            var _roTarget = canvas.closest('.kt-mode-canvas') || canvas;
            new ResizeObserver(syncCanvasSize).observe(_roTarget);
        }
        requestAnimationFrame(function() {
            var r = canvas.getBoundingClientRect();
            var w = Math.round(r.width), h = Math.round(r.height);
            if (w > 0 && h > 0) {
                canvas.width = w; canvas.height = h;
                ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            }
        });
        function getPos(e) {
            var r = canvas.getBoundingClientRect();
            var t = e.touches ? e.touches[0] : e;
            return { x: (t.clientX - r.left) * canvas.width / r.width,
                     y: (t.clientY - r.top)  * canvas.height / r.height };
        }
        function start(e) { e.preventDefault(); drawing = true; var p = getPos(e); lastX = p.x; lastY = p.y; }
        function move(e) {
            e.preventDefault(); if (!drawing) return;
            var p = getPos(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(p.x, p.y);
            if (_ktDrawErase) { ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=18; ctx.strokeStyle='rgba(0,0,0,1)'; }
            else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=_ktDrawColor; ctx.lineWidth=2.2; }
            ctx.stroke(); lastX = p.x; lastY = p.y;
        }
        function end(e) { e.preventDefault(); drawing = false; }
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move);
        canvas.addEventListener('mouseup', end); canvas.addEventListener('mouseleave', end);
        canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false});
        canvas.addEventListener('touchend', end, {passive:false});
    }

    function ktRenderMindmap(btn) {
        var block = btn.closest('.kt-mode-mindmap');
        if (!block) return;
        var raw = block.querySelector('.kt-mm-input').value.trim();
        if (!raw) { alert('请先输入大纲内容。'); return; }
        var input = ktNormalizeMmInput(raw);
        var styleRadio = block.querySelector('input[type="radio"]:checked');
        var style = styleRadio ? styleRadio.value : 'tree';
        var dirToggle = block.querySelector('.kt-mm-dir-toggle');
        var isV = dirToggle && dirToggle.getAttribute('data-dir') === 'v';
        var preview = block.querySelector('.kt-mm-preview');
        var wrap    = block.querySelector('.kt-mm-svg-wrap');
        var svg;
        if      (style==='tree')    svg = ktBuildTree(input, isV);
        else if (style==='bracket') svg = ktBuildBracket(input, isV);
        else if (style==='oval')    svg = ktBuildOval(input, isV);
        else                        svg = ktBuildTree(input, false);

    // 大纲输入规范化：识别Tab、- 开头、数字. 开头，统一转为两空格缩进
    function ktNormalizeMmInput(raw) {
        var lines = raw.split('\n');
        return lines.map(function(line) {
            if (!line.trim()) return '';
            // Count leading tabs → convert each tab to 2 spaces
            var tabMatch = line.match(/^(\t+)/);
            if (tabMatch) {
                return '  '.repeat(tabMatch[1].length) + line.replace(/^\t+/, '').replace(/^[-\d]+\.\s*/, '').replace(/^-\s*/, '');
            }
            // Strip leading - or digits.
            var stripped = line.replace(/^(\s*)[-\d]+\.\s*/, '$1').replace(/^(\s*)-\s*/, '$1');
            return stripped;
        }).filter(function(l){ return l.trim() !== ''; }).join('\n');
    }

    // ── 为原有预设分享/复盘项目注入删除按钮（编辑模式时可见）──
    function initPresetDeleteBtns() {

        // ══ SHARE grids ══════════════════════════════════
        // 结构：display:contents 的 label，子节点直接是 grid cell
        // 策略：把删除按钮放在 label 最后一个 span（文字 span）内部，
        //       用 inline-flex 方式对齐，避免破坏 grid 列数
        var shareSets = [
            {id:'kt-share-items',           cls:'kt-share-label'},
            {id:'miaoxie-share-items',      cls:'miaoxie-share-label'},
            {id:'yilun-share-items',        cls:'yilun-share-label'},
            {id:'shiyong-share-items',      cls:'shiyong-share-label'},
            {id:'kt-share-intro-grid',      cls:'kt-share-intro-label'},
            {id:'miaoxie-share-intro-grid', cls:'miaoxie-share-intro-label'},
            {id:'yilun-share-intro-grid',   cls:'yilun-share-intro-label'},
            {id:'shiyong-share-intro-grid', cls:'shiyong-share-intro-label'},
        ];

        shareSets.forEach(function(cfg) {
            var container = document.getElementById(cfg.id);
            if (!container) return;
            container.querySelectorAll('label.' + cfg.cls).forEach(function(lbl) {
                if (lbl.querySelector('.share-item-del')) return;
                // 文字 span = label 里最后一个 span
                var allSpans = Array.from(lbl.querySelectorAll('span'));
                var textSpan = allSpans[allSpans.length - 1];
                if (!textSpan) return;
                // 让文字 span 变成 inline-flex，使按钮右对齐且垂直居中
                textSpan.style.cssText += ';display:inline-flex;align-items:center;width:100%;';
                var del = _makeDelBtn('share-item-del', function(){ lbl.remove(); });
                textSpan.appendChild(del);
            });
        });

        // ══ REVIEW grids（5列：序号|名称|说明|是|不是）══
        // 策略：给同一 data-group 的所有格子加 data-delrow=groupName，
        //       删除时按该属性一次性移除整行所有格子，完全不依赖索引位置
        function processReviewGrid(grid) {
            var groups = {};
            Array.from(grid.querySelectorAll('input[type="checkbox"][data-group]')).forEach(function(cb) {
                var g = cb.getAttribute('data-group');
                if (!groups[g]) groups[g] = [];
                groups[g].push(cb);
            });
            Object.keys(groups).forEach(function(g) {
                var pair = groups[g];
                if (pair.length < 2) return;
                // 找这一行所有 5 个格子（都在同一个 grid 下）
                // 用 closest 找到每个 checkbox 直属的 grid 子元素
                var rowCells = [];
                pair.forEach(function(cb) {
                    // 直接子元素 = grid cell
                    var cell = cb.parentElement;
                    while (cell && cell.parentElement !== grid) cell = cell.parentElement;
                    if (cell && rowCells.indexOf(cell) < 0) rowCells.push(cell);
                });
                // 序号格和名称格：在 pair[0]（是）格之前的 3 个兄弟节点
                var yesCell = (function(){
                    var c = pair[0].parentElement;
                    while (c && c.parentElement !== grid) c = c.parentElement;
                    return c;
                })();
                if (yesCell) {
                    var prev = yesCell;
                    for (var k = 0; k < 3; k++) {
                        prev = prev ? prev.previousElementSibling : null;
                        if (prev && rowCells.indexOf(prev) < 0) rowCells.unshift(prev);
                    }
                }
                // 给所有格子打标记
                var rowId = 'row-' + g;
                rowCells.forEach(function(cell){ cell.setAttribute('data-delrow', rowId); });

                var noLabel = pair[1].closest('label');
                if (!noLabel || noLabel.querySelector('.review-item-del')) return;
                // 让 noLabel 变成 flex 以便按钮自然右对齐
                noLabel.style.cssText += ';display:flex;align-items:center;';
                var del = _makeDelBtn('review-item-del', function(){
                    grid.querySelectorAll('[data-delrow="' + rowId + '"]').forEach(function(cell){
                        if (cell.parentNode) cell.parentNode.removeChild(cell);
                    });
                });
                noLabel.appendChild(del);
            });
        }

        var ktGrid = document.getElementById('kt-review-grid');
        if (ktGrid) processReviewGrid(ktGrid);
        ['miaoxie','yilun','shiyong'].forEach(function(tpl) {
            var page = document.getElementById('page-' + tpl);
            if (!page) return;
            page.querySelectorAll('[style*="grid-template-columns:1.4em"]').forEach(processReviewGrid);
        });
    }








    function ktParseMindmapLines(text) {
        var lines = text.split('\n');
        var nodes = [];
        lines.forEach(function(line) {
            if (!line.trim()) return;
            var indent = line.match(/^(\s*)/)[1].length;
            var level = Math.floor(indent / 2);
            nodes.push({ text: line.trim(), level: level });
        });
        return nodes;
    }

    function ktBuildTreeMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">无内容</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var PAD = 16, NODE_H = 30, INDENT = 130, MIN_W = 70;
        var y = PAD;
        var svgNodes = [];
        var maxX = 0;
        nodes.forEach(function(n, i) {
            var x = PAD + n.level * INDENT;
            var col = colors[n.level % colors.length];
            var tw = Math.max(MIN_W, n.text.length * 8 + 20);
            maxX = Math.max(maxX, x + tw);
            svgNodes.push({ x:x, y:y, w:tw, h:24, cx:x+tw/2, cy:y+12, text:n.text, col:col, level:n.level, idx:i });
            y += NODE_H;
        });
        var SVG_W = maxX + PAD;
        var SVG_H = y + PAD;
        // Build connection lines: for each node find nearest ancestor
        var paths = '';
        for (var i = 1; i < svgNodes.length; i++) {
            var n = svgNodes[i];
            for (var j = i - 1; j >= 0; j--) {
                if (svgNodes[j].level === n.level - 1) {
                    var p = svgNodes[j];
                    var x1 = p.x + p.w, y1 = p.cy;
                    var x2 = n.x,       y2 = n.cy;
                    var mx = (x1 + x2) / 2;
                    paths += '<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+n.col+'" stroke-width="1.4" opacity="0.55" stroke-dasharray="none"/>';
                    break;
                }
            }
        }
        // Draw nodes
        var rects = svgNodes.map(function(n) {
            var r = n.level === 0 ? 7 : 5;
            var fs = n.level === 0 ? 9 : 8;
            var fw = n.level === 0 ? 'bold' : 'normal';
            var op = n.level === 0 ? '1' : '0.88';
            return '<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+r+'" fill="'+n.col+'" opacity="'+op+'"/>'+
                   '<text x="'+n.cx+'" y="'+(n.y+16)+'" text-anchor="middle" font-size="'+fs+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+fw+'">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>';
        }).join('');
        return '<svg viewBox="0 0 '+SVG_W+' '+SVG_H+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+paths+rects+'</svg>';
    }

    function ktBuildRadialMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">无内容</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var CX = 340, CY = 200, R1 = 105, R2 = 195;
        var root = nodes[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var svgParts = [];
        // root
        svgParts.push('<ellipse cx="'+CX+'" cy="'+CY+'" rx="52" ry="22" fill="'+colors[0]+'" opacity="0.95"/>');
        svgParts.push('<text x="'+CX+'" y="'+(CY+5)+'" text-anchor="middle" font-size="9" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="700">'+(root?root.text:'').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        l1.forEach(function(n, i) {
            var angle = (2*Math.PI*i/Math.max(l1.length,1)) - Math.PI/2;
            var nx = Math.round(CX + R1*Math.cos(angle));
            var ny = Math.round(CY + R1*Math.sin(angle));
            var col = colors[(i+1)%colors.length];
            var tw = Math.max(56, n.text.length*7+14);
            // Line from root edge to branch
            var ex = Math.round(CX + 52*Math.cos(angle));
            var ey = Math.round(CY + 22*Math.sin(angle));
            svgParts.push('<line x1="'+ex+'" y1="'+ey+'" x2="'+nx+'" y2="'+ny+'" stroke="'+col+'" stroke-width="1.6" opacity="0.5"/>');
            svgParts.push('<rect x="'+(nx-tw/2)+'" y="'+(ny-11)+'" width="'+tw+'" height="22" rx="5" fill="'+col+'" opacity="0.88"/>');
            svgParts.push('<text x="'+nx+'" y="'+(ny+5)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            // children
            var myIdx = nodes.indexOf(n);
            var children=[];
            for(var j=myIdx+1;j<nodes.length;j++){if(nodes[j].level===2)children.push(nodes[j]);else if(nodes[j].level<=1)break;}
            children.forEach(function(c,ci){
                var spread = Math.min(0.55, 0.8/Math.max(children.length,1));
                var cAngle = angle + (ci-(children.length-1)/2)*spread;
                var cx2 = Math.round(CX+R2*Math.cos(cAngle));
                var cy2 = Math.round(CY+R2*Math.sin(cAngle));
                var ctw = Math.max(44, c.text.length*6.5+12);
                // Line from branch edge to child
                var bex = Math.round(nx + (tw/2)*Math.cos(cAngle));
                var bey = Math.round(ny + 11*Math.sin(cAngle));
                svgParts.push('<line x1="'+bex+'" y1="'+bey+'" x2="'+cx2+'" y2="'+cy2+'" stroke="'+col+'" stroke-width="1" opacity="0.35"/>');
                svgParts.push('<rect x="'+(cx2-ctw/2)+'" y="'+(cy2-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+col+'" opacity="0.6"/>');
                svgParts.push('<text x="'+cx2+'" y="'+(cy2+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            });
        });
        return '<svg viewBox="0 0 680 400" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // ── 写后复盘 开/关（适用于描写/议论/实用练笔）──
    // 内部辅助：根据复盘/分享两个区块的实际显示状态，统一调整 grid
    function _syncPenGrid(tpl) {
        var gridCfg = {
            miaoxie: { grid: 'miaoxie-main-grid', twoCol: '62fr 38fr', review: 'miaoxie-review-box' },
            yilun:   { grid: 'yilun-main-grid',   twoCol: '5fr 4fr',   review: 'yilun-review-box'   },
            shiyong: { grid: 'shiyong-main-grid',  twoCol: '3fr 2fr',  review: 'shiyong-review-box'  }
        };
        var t = gridCfg[tpl];
        if (!t) return;
        var pg       = document.getElementById('page-' + tpl);
        var gridEl   = document.getElementById(t.grid);
        var reviewEl = document.getElementById(t.review);
        var shareEl  = pg ? pg.querySelector('.share-zone') : null;
        if (!gridEl) return;

        var rVis = reviewEl && reviewEl.style.display !== 'none';
        var sVis = shareEl  && shareEl.style.display  !== 'none';

        if (rVis && sVis) {
            // 两者都显示：恢复原始两列比例，各回自己的 grid-column
            gridEl.style.gridTemplateColumns = t.twoCol;
            if (reviewEl) reviewEl.style.gridColumn = '1';
            if (shareEl)  shareEl.style.gridColumn  = '2';
        } else if (rVis && !sVis) {
            // 只有复盘
            gridEl.style.gridTemplateColumns = '1fr';
            if (reviewEl) reviewEl.style.gridColumn = '1';
        } else if (!rVis && sVis) {
            // 只有分享
            gridEl.style.gridTemplateColumns = '1fr';
            if (shareEl) shareEl.style.gridColumn = '1';
        } else {
            // 两者都隐藏
            gridEl.style.gridTemplateColumns = '1fr';
        }
    }

    // ── 更新两个悬浮计时器显示 ──
    function timerUpdateDisplay(tpl) {
        var state = _timerState[tpl]; if (!state) return;
        var r = Math.max(0, state.remaining);
        var str = String(Math.floor(r/60)).padStart(2,'0') + ':' + String(r%60).padStart(2,'0');
        var cls = 'tf-clock' + (r<=30?' danger':r<=60?' warning':'');
        var phase = _phaseNames[state.phase] || ('Phase '+(state.phase+1));
        // 右侧
        var tfC = document.getElementById('tf-clock'); if(tfC){tfC.textContent=str;tfC.className=cls;}
        var tfP = document.getElementById('tf-phase'); if(tfP) tfP.textContent=phase;

        // 进度条
        var fill = document.getElementById('timer-fill-'+tpl);
        if(fill) fill.style.width = Math.max(0, r/state.total*100)+'%';
    }

    function timerGetConfig(tpl) {
        var meta = window.STUDENT_META;
        if (meta && meta.timerCfg) {
            var c = meta.timerCfg;
            if(c.n1) _phaseNames[0]=c.n1; if(c.n2) _phaseNames[1]=c.n2; if(c.n3) _phaseNames[2]=c.n3;
            return { phases:[c.t1*60,c.t2*60,c.t3*60], extend:c.te*60, extendName:c.ne||'Extension' };
        }
        var t1=parseInt((document.getElementById('t1-'+tpl)||{}).value)||15;
        var t2=parseInt((document.getElementById('t2-'+tpl)||{}).value)||5;
        var t3=parseInt((document.getElementById('t3-'+tpl)||{}).value)||5;
        var te=parseInt((document.getElementById('te-'+tpl)||{}).value)||5;
        var pn=JSON.parse(localStorage.getItem('timerPhaseNames')||'{}');
        if(pn.n1) _phaseNames[0]=pn.n1; if(pn.n2) _phaseNames[1]=pn.n2; if(pn.n3) _phaseNames[2]=pn.n3;
        return { phases:[t1*60,t2*60,t3*60], extend:te*60, extendName:pn.ne||'Extension' };
    }

    // ══ 双栏拖拽调整宽度 ══
    (function() {
        var handle = document.getElementById('kt-dual-handle');
        var pane   = document.getElementById('kt-dual-pane');
        if (!handle || !pane) return;
        var dragging = false, startX = 0, startW = 0, totalW = 0;
        handle.addEventListener('mousedown', function(e) {
            dragging = true;
            startX   = e.clientX;
            var left = pane.querySelector('#kt-text-section');
            startW   = left ? left.offsetWidth : 0;
            totalW   = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var delta = e.clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            var newRight = totalW - newLeft;
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + newRight + 'px';
        });
        document.addEventListener('mouseup', function() { dragging = false; });
        // Touch support
        handle.addEventListener('touchstart', function(e) {
            dragging = true;
            startX = e.touches[0].clientX;
            var left = pane.querySelector('#kt-text-section');
            startW = left ? left.offsetWidth : 0;
            totalW = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        }, {passive:false});
        document.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var delta = e.touches[0].clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + (totalW - newLeft) + 'px';
        }, {passive:false});
        document.addEventListener('touchend', function() { dragging = false; });
    })();

    function timerStartWithCountdown(tpl) {
        // 隐藏整个 toolbar（含 Let's Go 按钮）
        var toolbar = document.getElementById('student-toolbar');
        if (toolbar) toolbar.style.visibility = 'hidden';

        // 全屏深绿倒计时 3-2-1（z-index 高于 toolbar 的 1000）
        var ov = document.createElement('div');
        ov.id = 'start-countdown-overlay';
        ov.style.cssText = 'position:fixed;inset:0;background:' + _BG_COLOR + ';z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;';
        ov.innerHTML =
            '<div style="font-size:14pt;color:#86efac;font-weight:600;letter-spacing:1px;">计时即将开始</div>' +
            '<div id="start-cd-num" style="font-size:96pt;font-weight:700;color:#fff;font-family:"Calibri Light","Calibri",sans-serif;line-height:1;min-width:120px;text-align:center;">3</div>';
        document.body.appendChild(ov);

        var n = 3;
        var iv = setInterval(function(){
            n--;
            var el = document.getElementById('start-cd-num');
            if (el) {
                if (n > 0) {
                    el.textContent = String(n);
                } else {
                    clearInterval(iv);
                    document.body.removeChild(ov);
                    // 恢复 toolbar 可见性
                    var tb = document.getElementById('student-toolbar');
                    if (tb) tb.style.visibility = 'visible';
                    timerStart(tpl);
                }
            } else {
                clearInterval(iv);
            }
        }, 1000);
    }

    function timerStart(tpl) {
        var cfg = timerGetConfig(tpl);
        var state = { tpl:tpl, phase:0, remaining:cfg.phases[0], total:cfg.phases[0], cfg:cfg, interval:null, extCount:0 };
        _timerState[tpl] = state;
        _timerExtendLog[tpl] = [];
        // 隐藏开始按钮，显示进度条
        var startEl = document.getElementById('timer-start-inline-'+tpl);
        var prog = document.getElementById('timer-progress-'+tpl);
        if(startEl) startEl.style.display='none';
        if(prog){ prog.style.display='block'; prog.classList.add('active'); }
        // 隐藏 Let's Go 按钮，显示计时器
        var startBtn = document.getElementById('toolbar-start-btn');
        if(startBtn) startBtn.style.display='none';
        var floatR = document.getElementById('timer-float');
        if(floatR) floatR.style.display='flex';
        // 延时按钮文字
        var tfExt = document.getElementById('tf-extend');
        if(tfExt) tfExt.textContent = 'Request Extension';
        // 开始时解锁所有区域
        timerUnlockAllInputs(tpl);
        try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:0,remaining:cfg.phases[0],ts:Date.now(),cfg:cfg,extCount:0})); } catch(e){}
        timerUpdateDisplay(tpl);
        state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
    }

    function timerTick(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        state.remaining--;
        timerUpdateDisplay(tpl);
        try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:state.phase,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
        if(state.remaining <= 0) timerPhaseEnd(tpl);
    }

    function timerPhaseEnd(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        clearInterval(state.interval);
        timerLockPhaseInputs(tpl, state.phase);
        var tfExt = document.getElementById('tf-extend');
        var tfCnt = document.getElementById('tf-count');
        var remaining = MAX_EXTENSIONS - state.extCount;
        if(state.phase < 2) {
            var next = state.phase + 1;
            if(tfExt){ tfExt.style.display='block'; tfExt.textContent='Request Extension'; }
            if(tfCnt){ tfCnt.style.display='block'; tfCnt.textContent=remaining+' left'; }
            if(next === 2) {
                // 第二阶段结束 → 全屏黑幕，等学生准备好才开始第三阶段
                timerShowSharingPrompt(tpl, state, next, tfExt, tfCnt);
            } else {
                timerShowAlert('\u2705 '+_phaseNames[state.phase]+' ended \u2014 '+_phaseNames[next]+' starting\u2026');
                setTimeout(function(){
                    state.phase = next;
                    state.remaining = state.cfg.phases[next];
                    state.total = state.cfg.phases[next];
                    timerLockAllInputs(tpl);
                    timerUnlockPhaseInputs(tpl, next);
                    if(tfExt) tfExt.style.display='none';
                    if(tfCnt) tfCnt.style.display='none';
                    timerUpdateDisplay(tpl);
                    state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
                    try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:next,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
                }, 4000);
            }
        } else {

        try { page.querySelectorAll(sel).forEach(function(el){

    function timerLockAllInputs(tpl) {
        var page = document.getElementById('page-'+tpl); if(!page) return;

        var header = page.querySelector('.page-header, .bd-page-header');
        if (header) exemptZones.push(header);
        var timerSetup = page.querySelector('.timer-setup-bar');
        if (timerSetup) exemptZones.push(timerSetup);

        if (timerStart) exemptZones.push(timerStart);
        page.querySelectorAll('input:not([type="number"]):not([type="radio"]), textarea, canvas').forEach(function(el) {
            for (var i = 0; i < exemptZones.length; i++) {
                if (exemptZones[i].contains(el)) return;
            }
            el.classList.add('phase-locked');
            // 同时锁父 label，防止点击 label 绕过 pointer-events

    function timerRestoreFromStorage(tpl) {
        try {
            var raw = localStorage.getItem('_timer_'+tpl); if(!raw) return;
            var saved = JSON.parse(raw);
            var elapsed = Math.floor((Date.now()-saved.ts)/1000);
            var remaining = Math.max(0, saved.remaining - elapsed);
            if(remaining <= 0){ localStorage.removeItem('_timer_'+tpl); return; }
            var state = {tpl:tpl,phase:saved.phase,remaining:remaining,total:saved.cfg.phases[saved.phase],cfg:saved.cfg,interval:null,extCount:saved.extCount||0};
            _timerState[tpl] = state;
            var startEl = document.getElementById('timer-start-inline-'+tpl);
            var prog = document.getElementById('timer-progress-'+tpl);
            var floatR = document.getElementById('timer-float');
            if(startEl) startEl.style.display='none';
            if(prog){ prog.style.display='block'; prog.classList.add('active'); }
            if(floatR) floatR.style.display='flex';
            // 恢复锁定状态：锁定前面已完成的阶段
            timerUnlockAllInputs(tpl);
            for(var i=0; i<saved.phase; i++) timerLockPhaseInputs(tpl, i);
            timerUpdateDisplay(tpl);
            state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
        } catch(e){}
    }
