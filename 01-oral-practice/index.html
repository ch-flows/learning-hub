<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASKS | CH-FLOWS</title>
    <style>
        /* 1. 延续 CH-FLOWS 极简风格 */
        body { font-family: -apple-system, sans-serif; background: #fcfcfc; color: #334155; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { padding: 60px 0 40px; text-align: center; }
        .brand { font-size: 1.25rem; font-weight: 200; letter-spacing: 6px; color: #0c4a6e; text-transform: uppercase; text-decoration: none; }
        .sub { font-size: 0.7rem; color: #94a3b8; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        /* 2. 列表容器：白色圆角卡片 */
        .list-container { width: 90%; max-width: 600px; background: white; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px rgba(0,0,0,0.02); overflow: hidden; padding: 10px 0; }
        
        /* 3. 自动列表生成的样式兼容 (适配您的 auto-list.js) */
        .task-link { display: flex !important; justify-content: space-between; align-items: center; padding: 25px 30px; text-decoration: none; color: #1e293b; border-bottom: 1px solid #f8fafc; transition: all 0.2s ease; }
        .task-link:hover { background-color: #f0f9ff; padding-left: 35px; }
        .task-link:last-child { border-bottom: none; }
        .task-name { font-size: 1.05rem; }
        .task-date { font-size: 0.75rem; color: #94a3b8; }

        /* 4. 底部小房子图标 */
        .back-home-icon { margin: 60px 0; padding: 12px; border-radius: 50%; transition: all 0.3s ease; display: inline-flex; }
        .back-home-icon:hover { background: #f1f5f9; transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="brand">CH-FLOWS</a>
        <div id="folder-title" class="sub">LOADING...</div>
    </header>

    <div class="list-container" id="file-list">
        <p style="text-align: center; color: #94a3b8; padding: 20px;">正在同步任务...</p>
    </div>

    <a href="../index.html" class="back-home-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </a>

    <script src="../assets/js/auto-list.js"></script>
    <script>
        const currentFolder = window.location.pathname.split('/').slice(-2, -1)[0] || '01-oral-practice';
        document.getElementById('folder-title').innerText = currentFolder.toUpperCase();
        
        // 确保 renderFileList 是您 JS 文件里的函数名
        if (typeof renderFileList === "function") {
            renderFileList(currentFolder, 'file-list');
        } else {
            document.getElementById('file-list').innerHTML = "<p style='text-align:center; padding:20px;'>脚本加载失败，请检查路径</p>";
        }
    </script>
</body>
</html>
