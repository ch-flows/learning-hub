<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORAL BUDDY | CH-FLOWS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #fcfcfc; color: #334155; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { padding: 60px 0 40px; text-align: center; }
        .brand { font-size: 1.25rem; font-weight: 200; letter-spacing: 6px; color: #0c4a6e; text-transform: uppercase; text-decoration: none; }
        .sub { font-size: 0.7rem; color: #94a3b8; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; }

        /* 表单卡片样式 */
        .buddy-container { width: 90%; max-width: 450px; background: white; border-radius: 24px; border: 1px solid #f1f5f9; padding: 40px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; font-weight: 500; }
        .input-group input { width: 100%; padding: 14px; border: 1px solid #f1f5f9; border-radius: 12px; font-size: 1rem; box-sizing: border-box; outline: none; background: #fbfcfd; }
        .input-group input:focus { border-color: #0369a1; background: #fff; }

        /* 录音按钮状态 */
        .btn-record { background: #0369a1; color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: 500; }
        .btn-record.recording { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        #status { margin-top: 20px; font-size: 0.85rem; color: #64748b; line-height: 1.6; }
        audio { width: 100%; margin-top: 20px; border-radius: 8px; }

        .back-home-icon { margin: 50px 0; padding: 12px; border-radius: 50%; transition: 0.3s; display: inline-flex; }
        .back-home-icon:hover { background: #f1f5f9; transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <a href="../index.html" class="brand">CH-FLOWS</a>
        <div class="sub">My Oral Buddy System</div>
    </header>

    <div class="buddy-container">
        <div class="input-group">
            <label>学生姓名 Name</label>
            <input type="text" id="studentName" placeholder="如：王小明">
        </div>
        <div class="input-group">
            <label>学生编号 Index No.</label>
            <input type="number" id="studentNum" placeholder="如：01">
        </div>

        <button id="recordBtn" class="btn-record">开始录音 Start Recording</button>
        <div id="status">请填写上方信息后开始录音</div>
        <div id="previewArea"></div>
    </div>

    <a href="../index.html" class="back-home-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
    </a>

    <script>
        // 【关键配置】请务必将此处改为您部署 GAS 后生成的 Web App URL
        const SCRIPT_URL = "您的_GOOGLE_SCRIPT_WEB_APP_URL"; 

        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('recordBtn');
        const status = document.getElementById('status');

        recordBtn.onclick = async () => {
            const name = document.getElementById('studentName').value.trim();
            const num = document.getElementById('studentNum').value.trim();

            if(!name || !num) {
                alert("请先填写姓名和编号！");
                return;
            }

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.textContent = "开始录音 Start Recording";
                recordBtn.classList.remove('recording');
                status.textContent = "正在处理音频，请稍候...";
            } else {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = async () => {
                            const base64Data = reader.result.split(',')[1];
                            uploadData(base64Data, name, num);
                        };
                        
                        // 显示预览
                        const audioUrl = URL.createObjectURL(audioBlob);
                        document.getElementById('previewArea').innerHTML = `<audio controls src="${audioUrl}"></audio>`;
                    };
                    mediaRecorder.start();
                    recordBtn.textContent = "停止录音 Stop Recording";
                    recordBtn.classList.add('recording');
                    status.textContent = "正在录制您的回答...";
                } catch (err) {
                    alert("无法访问麦克风，请确保已授权。");
                }
            }
        };

        async function uploadData(base64, name, num) {
            status.innerHTML = "<b>⏳ 正在上传至服务器，请勿关闭页面...</b>";
            
            const payload = {
                type: "audio",
                category: "2", // 对应您 GAS 代码中的 2-口试录音
                studentName: name,
                studentNum: num,
                class: "Sec2-Group", // 这里可以根据您的班级自行修改
                assignTitle: "Oral_Practice_" + new Date().toLocaleDateString(),
                audioBase64: base64,
                audioMimeType: "audio/webm"
            };

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    status.innerHTML = "<b>✅ 上传成功！老师已收到您的录音。</b>";
                    recordBtn.disabled = true;
                    recordBtn.style.background = "#10b981";
                    recordBtn.textContent = "提交完毕 Done";
                } else {
                    throw new Error(result.msg);
                }
            } catch (err) {
                status.innerHTML = "<b>❌ 上传失败</b><br>错误原因：" + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
