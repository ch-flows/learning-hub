    function initPresetDeleteBtns() {

        // в•җв•җ SHARE grids в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
        // з»“жһ„пјҡdisplay:contents зҡ„ labelпјҢеӯҗиҠӮзӮ№зӣҙжҺҘжҳҜ grid cell
        // зӯ–з•ҘпјҡжҠҠеҲ йҷӨжҢүй’®ж”ҫеңЁ label жңҖеҗҺдёҖдёӘ spanпјҲж–Үеӯ— spanпјүеҶ…йғЁпјҢ
        //       з”Ё inline-flex ж–№ејҸеҜ№йҪҗпјҢйҒҝе…Қз ҙеқҸ grid еҲ—ж•°
        var shareSets = [
            {id:'kt-share-items',           cls:'kt-share-label'},
            {id:'miaoxie-share-items',      cls:'miaoxie-share-label'},
            {id:'yilun-share-items',        cls:'yilun-share-label'},
            {id:'shiyong-share-items',      cls:'shiyong-share-label'},
            {id:'kt-share-intro-grid',      cls:'kt-share-intro-label'},
            {id:'miaoxie-share-intro-grid', cls:'miaoxie-share-intro-label'},
            {id:'yilun-share-intro-grid',   cls:'yilun-share-intro-label'},
            {id:'shiyong-share-intro-grid', cls:'shiyong-share-intro-label'},
        ];

        shareSets.forEach(function(cfg) {
            var container = document.getElementById(cfg.id);
            if (!container) return;
            container.querySelectorAll('label.' + cfg.cls).forEach(function(lbl) {
                if (lbl.querySelector('.share-item-del')) return;
                // ж–Үеӯ— span = label йҮҢжңҖеҗҺдёҖдёӘ span
                var allSpans = Array.from(lbl.querySelectorAll('span'));
                var textSpan = allSpans[allSpans.length - 1];
                if (!textSpan) return;
                // и®©ж–Үеӯ— span еҸҳжҲҗ inline-flexпјҢдҪҝжҢүй’®еҸіеҜ№йҪҗдё”еһӮзӣҙеұ…дёӯ
                textSpan.style.cssText += ';display:inline-flex;align-items:center;width:100%;';
                var del = _makeDelBtn('share-item-del', function(){ lbl.remove(); });
                textSpan.appendChild(del);
            });
        });

        // в•җв•җ REVIEW gridsпјҲ5еҲ—пјҡеәҸеҸ·|еҗҚз§°|иҜҙжҳҺ|жҳҜ|дёҚжҳҜпјүв•җв•җ
        // зӯ–з•Ҙпјҡз»ҷеҗҢдёҖ data-group зҡ„жүҖжңүж јеӯҗеҠ  data-delrow=groupNameпјҢ
        //       еҲ йҷӨж—¶жҢүиҜҘеұһжҖ§дёҖж¬ЎжҖ§з§»йҷӨж•ҙиЎҢжүҖжңүж јеӯҗпјҢе®Ңе…ЁдёҚдҫқиө–зҙўеј•дҪҚзҪ®
        function processReviewGrid(grid) {
            var groups = {};
            Array.from(grid.querySelectorAll('input[type="checkbox"][data-group]')).forEach(function(cb) {
                var g = cb.getAttribute('data-group');
                if (!groups[g]) groups[g] = [];
                groups[g].push(cb);
            });
            Object.keys(groups).forEach(function(g) {
                var pair = groups[g];
                if (pair.length < 2) return;
                // жүҫиҝҷдёҖиЎҢжүҖжңү 5 дёӘж јеӯҗпјҲйғҪеңЁеҗҢдёҖдёӘ grid дёӢпјү
                // з”Ё closest жүҫеҲ°жҜҸдёӘ checkbox зӣҙеұһзҡ„ grid еӯҗе…ғзҙ 
                var rowCells = [];
                pair.forEach(function(cb) {
                    // зӣҙжҺҘеӯҗе…ғзҙ  = grid cell
                    var cell = cb.parentElement;
                    while (cell && cell.parentElement !== grid) cell = cell.parentElement;
                    if (cell && rowCells.indexOf(cell) < 0) rowCells.push(cell);
                });
                // еәҸеҸ·ж је’ҢеҗҚз§°ж јпјҡеңЁ pair[0]пјҲжҳҜпјүж јд№ӢеүҚзҡ„ 3 дёӘе…„ејҹиҠӮзӮ№
                var yesCell = (function(){
                    var c = pair[0].parentElement;
                    while (c && c.parentElement !== grid) c = c.parentElement;
                    return c;
                })();
                if (yesCell) {
                    var prev = yesCell;
                    for (var k = 0; k < 3; k++) {
                        prev = prev ? prev.previousElementSibling : null;
                        if (prev && rowCells.indexOf(prev) < 0) rowCells.unshift(prev);
                    }
                }
                // з»ҷжүҖжңүж јеӯҗжү“ж Үи®°
                var rowId = 'row-' + g;
                rowCells.forEach(function(cell){ cell.setAttribute('data-delrow', rowId); });

                var noLabel = pair[1].closest('label');
                if (!noLabel || noLabel.querySelector('.review-item-del')) return;
                // и®© noLabel еҸҳжҲҗ flex д»ҘдҫҝжҢүй’®иҮӘз„¶еҸіеҜ№йҪҗ
                noLabel.style.cssText += ';display:flex;align-items:center;';
                var del = _makeDelBtn('review-item-del', function(){
                    grid.querySelectorAll('[data-delrow="' + rowId + '"]').forEach(function(cell){
                        if (cell.parentNode) cell.parentNode.removeChild(cell);
                    });
                });
                noLabel.appendChild(del);
            });
        }

        var ktGrid = document.getElementById('kt-review-grid');
        if (ktGrid) processReviewGrid(ktGrid);
        ['miaoxie','yilun','shiyong'].forEach(function(tpl) {
            var page = document.getElementById('page-' + tpl);
            if (!page) return;
            page.querySelectorAll('[style*="grid-template-columns:1.4em"]').forEach(processReviewGrid);
        });
    }








    function ktParseMindmapLines(text) {
        var lines = text.split('\n');
        var nodes = [];
        lines.forEach(function(line) {
            if (!line.trim()) return;
            var indent = line.match(/^(\s*)/)[1].length;
            var level = Math.floor(indent / 2);
            nodes.push({ text: line.trim(), level: level });
        });
        return nodes;
    }

    function ktBuildTreeMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">ж— еҶ…е®№</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var PAD = 16, NODE_H = 30, INDENT = 130, MIN_W = 70;
        var y = PAD;
        var svgNodes = [];
        var maxX = 0;
        nodes.forEach(function(n, i) {
            var x = PAD + n.level * INDENT;
            var col = colors[n.level % colors.length];
            var tw = Math.max(MIN_W, n.text.length * 8 + 20);
            maxX = Math.max(maxX, x + tw);
            svgNodes.push({ x:x, y:y, w:tw, h:24, cx:x+tw/2, cy:y+12, text:n.text, col:col, level:n.level, idx:i });
            y += NODE_H;
        });
        var SVG_W = maxX + PAD;
        var SVG_H = y + PAD;
        // Build connection lines: for each node find nearest ancestor
        var paths = '';
        for (var i = 1; i < svgNodes.length; i++) {
            var n = svgNodes[i];
            for (var j = i - 1; j >= 0; j--) {
                if (svgNodes[j].level === n.level - 1) {
                    var p = svgNodes[j];
                    var x1 = p.x + p.w, y1 = p.cy;
                    var x2 = n.x,       y2 = n.cy;
                    var mx = (x1 + x2) / 2;
                    paths += '<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'" fill="none" stroke="'+n.col+'" stroke-width="1.4" opacity="0.55" stroke-dasharray="none"/>';
                    break;
                }
            }
        }
        // Draw nodes
        var rects = svgNodes.map(function(n) {
            var r = n.level === 0 ? 7 : 5;
            var fs = n.level === 0 ? 9 : 8;
            var fw = n.level === 0 ? 'bold' : 'normal';
            var op = n.level === 0 ? '1' : '0.88';
            return '<rect x="'+n.x+'" y="'+n.y+'" width="'+n.w+'" height="'+n.h+'" rx="'+r+'" fill="'+n.col+'" opacity="'+op+'"/>'+
                   '<text x="'+n.cx+'" y="'+(n.y+16)+'" text-anchor="middle" font-size="'+fs+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+fw+'">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>';
        }).join('');
        return '<svg viewBox="0 0 '+SVG_W+' '+SVG_H+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+paths+rects+'</svg>';
    }

    function ktBuildRadialMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;padding:8px;">ж— еҶ…е®№</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var CX = 340, CY = 200, R1 = 105, R2 = 195;
        var root = nodes[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var svgParts = [];
        // root
        svgParts.push('<ellipse cx="'+CX+'" cy="'+CY+'" rx="52" ry="22" fill="'+colors[0]+'" opacity="0.95"/>');
        svgParts.push('<text x="'+CX+'" y="'+(CY+5)+'" text-anchor="middle" font-size="9" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="700">'+(root?root.text:'').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        l1.forEach(function(n, i) {
            var angle = (2*Math.PI*i/Math.max(l1.length,1)) - Math.PI/2;
            var nx = Math.round(CX + R1*Math.cos(angle));
            var ny = Math.round(CY + R1*Math.sin(angle));
            var col = colors[(i+1)%colors.length];
            var tw = Math.max(56, n.text.length*7+14);
            // Line from root edge to branch
            var ex = Math.round(CX + 52*Math.cos(angle));
            var ey = Math.round(CY + 22*Math.sin(angle));
            svgParts.push('<line x1="'+ex+'" y1="'+ey+'" x2="'+nx+'" y2="'+ny+'" stroke="'+col+'" stroke-width="1.6" opacity="0.5"/>');
            svgParts.push('<rect x="'+(nx-tw/2)+'" y="'+(ny-11)+'" width="'+tw+'" height="22" rx="5" fill="'+col+'" opacity="0.88"/>');
            svgParts.push('<text x="'+nx+'" y="'+(ny+5)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            // children
            var myIdx = nodes.indexOf(n);
            var children=[];
            for(var j=myIdx+1;j<nodes.length;j++){if(nodes[j].level===2)children.push(nodes[j]);else if(nodes[j].level<=1)break;}
            children.forEach(function(c,ci){
                var spread = Math.min(0.55, 0.8/Math.max(children.length,1));
                var cAngle = angle + (ci-(children.length-1)/2)*spread;
                var cx2 = Math.round(CX+R2*Math.cos(cAngle));
                var cy2 = Math.round(CY+R2*Math.sin(cAngle));
                var ctw = Math.max(44, c.text.length*6.5+12);
                // Line from branch edge to child
                var bex = Math.round(nx + (tw/2)*Math.cos(cAngle));
                var bey = Math.round(ny + 11*Math.sin(cAngle));
                svgParts.push('<line x1="'+bex+'" y1="'+bey+'" x2="'+cx2+'" y2="'+cy2+'" stroke="'+col+'" stroke-width="1" opacity="0.35"/>');
                svgParts.push('<rect x="'+(cx2-ctw/2)+'" y="'+(cy2-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+col+'" opacity="0.6"/>');
                svgParts.push('<text x="'+cx2+'" y="'+(cy2+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            });
        });
        return '<svg viewBox="0 0 680 400" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

            });

        }

        // еӣәе®ҡеҸҢж Ҹй«ҳеәҰпјҢйҡҗи—ҸжӢ–жӢҪжүӢжҹ„
        var _dualPane = pageEl.querySelector('#kt-dual-pane');

    // в”Җв”Җ еҗҢеӯҰеҲҶдә« ејҖ/е…іпјҲйҖӮз”ЁдәҺжҸҸеҶҷ/и®®и®ә/е®һз”Ё/йҳ…иҜ»еӨҚзӣҳ/иЎЁиҫҫзІҫиҝӣпјүв”Җв”Җ
    window.toggleShareZone = function(show) {
        var cfg = {
            miaoxie: { share: '.share-zone', grid: 'miaoxie-main-grid', orig: '62fr 38fr' },
            yilun:   { share: '.share-zone', grid: 'yilun-main-grid',   orig: '5fr 4fr'   },
            shiyong: { share: '.share-zone', grid: 'shiyong-main-grid', orig: '3fr 2fr'   },
            'yilun-mini': { share: '.share-zone', grid: null, orig: null },
            yuedu:   { share: null,          grid: 'yuedu-main-grid',   orig: '55% 45%'   },
            biaoda:  { share: null,          grid: null,                orig: null         }
        };

        var tpl = (typeof currentTemplate !== 'undefined') ? currentTemplate : 'miaoxie';
        var t   = cfg[tpl];
        if (!t) return;

        if (tpl === 'biaoda') {
            // иЎЁиҫҫзІҫиҝӣпјҡйҡҗи—Ҹж•ҙдёӘз¬¬дәҢйЎө
            var p2 = document.getElementById('biaoda-page2');
            if (p2) p2.style.display = show ? '' : 'none';
            return;
        }

        if (tpl === 'yuedu') {
            // йҳ…иҜ»еӨҚзӣҳпјҡйҡҗи—Ҹз¬¬2еҲ—зҡ„еҲҶдә«еҚЎпјҲgrid-column:2 зҡ„е…ғзҙ пјү
            var grid = document.getElementById('yuedu-main-grid');
            if (!grid) return;
            var col2els = grid.querySelectorAll('[style*="grid-column:2"]');
            col2els.forEach(function(el){ el.style.display = show ? '' : 'none'; });
            grid.style.gridTemplateColumns = show ? '55% 45%' : '1fr';
            return;
        }

        // жҸҸеҶҷ/и®®и®ә/е®һз”Ёпјҡйҡҗи—Ҹ .share-zoneпјҢйҖҡиҝҮ _syncPenGrid з»ҹдёҖи°ғж•ҙ grid
        var pg = document.getElementById('page-' + tpl);
        if (!pg) return;
        var shareEl = pg.querySelector('.share-zone');
        if (shareEl) shareEl.style.display = show ? '' : 'none';
        _syncPenGrid(tpl);
    };

    // в”Җв”Җ еҶҷеҗҺеӨҚзӣҳ ејҖ/е…іпјҲйҖӮз”ЁдәҺжҸҸеҶҷ/и®®и®ә/е®һз”Ёз»ғз¬”пјүв”Җв”Җ
    // еҶ…йғЁиҫ…еҠ©пјҡж №жҚ®еӨҚзӣҳ/еҲҶдә«дёӨдёӘеҢәеқ—зҡ„е®һйҷ…жҳҫзӨәзҠ¶жҖҒпјҢз»ҹдёҖи°ғж•ҙ grid
    function _syncPenGrid(tpl) {
        var gridCfg = {
            miaoxie: { grid: 'miaoxie-main-grid', twoCol: '62fr 38fr', review: 'miaoxie-review-box' },
            yilun:   { grid: 'yilun-main-grid',   twoCol: '5fr 4fr',   review: 'yilun-review-box'   },
            shiyong: { grid: 'shiyong-main-grid',  twoCol: '3fr 2fr',  review: 'shiyong-review-box'  }
        };
        var t = gridCfg[tpl];
        if (!t) return;
        var pg       = document.getElementById('page-' + tpl);
        var gridEl   = document.getElementById(t.grid);
        var reviewEl = document.getElementById(t.review);
        var shareEl  = pg ? pg.querySelector('.share-zone') : null;
        if (!gridEl) return;

        var rVis = reviewEl && reviewEl.style.display !== 'none';
        var sVis = shareEl  && shareEl.style.display  !== 'none';

        if (rVis && sVis) {
            // дёӨиҖ…йғҪжҳҫзӨәпјҡжҒўеӨҚеҺҹе§ӢдёӨеҲ—жҜ”дҫӢпјҢеҗ„еӣһиҮӘе·ұзҡ„ grid-column
            gridEl.style.gridTemplateColumns = t.twoCol;
            if (reviewEl) reviewEl.style.gridColumn = '1';
            if (shareEl)  shareEl.style.gridColumn  = '2';
        } else if (rVis && !sVis) {
            // еҸӘжңүеӨҚзӣҳ
            gridEl.style.gridTemplateColumns = '1fr';
            if (reviewEl) reviewEl.style.gridColumn = '1';
        } else if (!rVis && sVis) {
            // еҸӘжңүеҲҶдә«
            gridEl.style.gridTemplateColumns = '1fr';
            if (shareEl) shareEl.style.gridColumn = '1';
        } else {
            // дёӨиҖ…йғҪйҡҗи—Ҹ
            gridEl.style.gridTemplateColumns = '1fr';
        }
    }

    function timerUpdateDisplay(tpl) {
        var state = _timerState[tpl]; if (!state) return;
        var r = Math.max(0, state.remaining);
        var str = String(Math.floor(r/60)).padStart(2,'0') + ':' + String(r%60).padStart(2,'0');
        var cls = 'tf-clock' + (r<=30?' danger':r<=60?' warning':'');
        var phase = (_phaseNames[state.phase] !== undefined && _phaseNames[state.phase] !== null) ? _phaseNames[state.phase] : ('Phase '+(state.phase+1));
        // еҸідҫ§
        var tfC = document.getElementById('tf-clock'); if(tfC){tfC.textContent=str;tfC.className=cls;}
        var tfP = document.getElementById('tf-phase'); if(tfP){ tfP.textContent=phase; tfP.style.display=phase?'':'none'; }
        var tfDiv = document.getElementById('tf-divider'); if(tfDiv){ tfDiv.style.display=phase?'':'none'; }

        // иҝӣеәҰжқЎ
        var fill = document.getElementById('timer-fill-'+tpl);
        if(fill) fill.style.width = Math.max(0, r/state.total*100)+'%';

    function timerGetConfig(tpl) {
        var meta = window.STUDENT_META;
        if (meta && meta.timerCfg) {
            var c = meta.timerCfg;
            // е§Ӣз»ҲиҰҶзӣ–йҳ¶ж®өеҗҚпјҢеҢ…жӢ¬з©әеӯ—з¬ҰдёІпјҲjingsai дј е…Ҙ n1='' йңҖжё…з©әпјү
            _phaseNames[0] = c.n1 !== undefined ? c.n1 : 'з¬¬дёҖйҳ¶ж®ө';
            _phaseNames[1] = c.n2 !== undefined ? c.n2 : 'з¬¬дәҢйҳ¶ж®ө';
            _phaseNames[2] = c.n3 !== undefined ? c.n3 : 'з¬¬дёүйҳ¶ж®ө';
            return { phases:[c.t1*60,c.t2*60,c.t3*60], extend:c.te*60, extendName:c.ne||'Extension' };
        }
        // jingsai / yuedu-jingsai: single phase, no phase name label
        if (tpl === 'jingsai' || tpl === 'yuedu-jingsai') {
            var _yjId = tpl === 'yuedu-jingsai' ? 'yuedu-jingsai' : 'jingsai';
            var t1 = parseInt((document.getElementById('t1-'+_yjId)||{}).value) || (tpl === 'yuedu-jingsai' ? 20 : 45);
            var te = parseInt((document.getElementById('te-'+_yjId)||{}).value) || 5;
            _phaseNames[0] = '';
            return { phases:[t1*60, 0, 0], extend:te*60, extendName:'е»¶ж—¶' };
        }
        var t1=parseInt((document.getElementById('t1-'+tpl)||{}).value)||15;
        var t2=parseInt((document.getElementById('t2-'+tpl)||{}).value)||5;
        var t3=parseInt((document.getElementById('t3-'+tpl)||{}).value)||5;
        var te=parseInt((document.getElementById('te-'+tpl)||{}).value)||5;
        var pn=JSON.parse(localStorage.getItem('timerPhaseNames')||'{}');
        if(pn.n1) _phaseNames[0]=pn.n1; if(pn.n2) _phaseNames[1]=pn.n2; if(pn.n3) _phaseNames[2]=pn.n3;
        return { phases:[t1*60,t2*60,t3*60], extend:te*60, extendName:pn.ne||'Extension' };
    }

    // в•җв•җ еҸҢж ҸжӢ–жӢҪи°ғж•ҙе®ҪеәҰ в•җв•җ
    (function() {
        var handle = document.getElementById('kt-dual-handle');
        var pane   = document.getElementById('kt-dual-pane');
        if (!handle || !pane) return;
        var dragging = false, startX = 0, startW = 0, totalW = 0;
        handle.addEventListener('mousedown', function(e) {
            dragging = true;
            startX   = e.clientX;
            var left = pane.querySelector('#kt-text-section');
            startW   = left ? left.offsetWidth : 0;
            totalW   = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        });
        document.addEventListener('mousemove', function(e) {
            if (!dragging) return;
            var delta = e.clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            var newRight = totalW - newLeft;
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + newRight + 'px';
        });
        document.addEventListener('mouseup', function() { dragging = false; });
        // Touch support
        handle.addEventListener('touchstart', function(e) {
            dragging = true;
            startX = e.touches[0].clientX;
            var left = pane.querySelector('#kt-text-section');
            startW = left ? left.offsetWidth : 0;
            totalW = pane.offsetWidth - handle.offsetWidth;
            e.preventDefault();
        }, {passive:false});
        document.addEventListener('touchmove', function(e) {
            if (!dragging) return;
            var delta = e.touches[0].clientX - startX;
            var newLeft = Math.min(Math.max(startW + delta, totalW * 0.25), totalW * 0.95);
            pane.style.gridTemplateColumns = newLeft + 'px 8px ' + (totalW - newLeft) + 'px';
        }, {passive:false});
        document.addEventListener('touchend', function() { dragging = false; });
    })();

        }, {passive:false});
        document.addEventListener('touchend', function() { dragging = false; });
    })();

        var ov = document.createElement('div');

    function timerStart(tpl) {
        var cfg = timerGetConfig(tpl);
        var state = { tpl:tpl, phase:0, remaining:cfg.phases[0], total:cfg.phases[0], cfg:cfg, interval:null, extCount:0 };
        _timerState[tpl] = state;
        _timerExtendLog[tpl] = [];
        // йҡҗи—ҸејҖе§ӢжҢүй’®пјҢжҳҫзӨәиҝӣеәҰжқЎ
        var startEl = document.getElementById('timer-start-inline-'+tpl);
        var prog = document.getElementById('timer-progress-'+tpl);
        if(startEl) startEl.style.display='none';
        if(prog){ prog.style.display='block'; prog.classList.add('active'); }
        // йҡҗи—Ҹ Let's Go жҢүй’®пјҢжҳҫзӨәи®Ўж—¶еҷЁ
        var startBtn = document.getElementById('toolbar-start-btn');
        if(startBtn) startBtn.style.display='none';
        var floatR = document.getElementById('timer-float');
        if(floatR) floatR.style.display='flex';
        // е»¶ж—¶жҢүй’®ж–Үеӯ—
        var tfExt = document.getElementById('tf-extend');
        if(tfExt) tfExt.textContent = 'Request Extension';
        // ејҖе§Ӣж—¶и§Јй”ҒжүҖжңүеҢәеҹҹ
        timerUnlockAllInputs(tpl);
        // jingsaiпјҡи§Јй”ҒеҗҺиҮӘеҠЁ focus йҡҗи—Ҹ inputпјҢж— йңҖзӮ№еҮ»еҚіеҸҜзӣҙжҺҘиҫ“е…Ҙ
        if (tpl === 'jingsai') {
            setTimeout(function(){
                var hi = document.getElementById('jingsai-hi');
                if (hi) hi.focus();
            }, 50);
        }
        try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:0,remaining:cfg.phases[0],ts:Date.now(),cfg:cfg,extCount:0})); } catch(e){}
        timerUpdateDisplay(tpl);
        state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
    }

    function timerTick(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        state.remaining--;
        timerUpdateDisplay(tpl);
        try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:state.phase,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
        if(state.remaining <= 0) timerPhaseEnd(tpl);
    }

    function timerPhaseEnd(tpl) {
        var state = _timerState[tpl]; if(!state) return;
        clearInterval(state.interval);
        timerLockPhaseInputs(tpl, state.phase);
        var tfExt = document.getElementById('tf-extend');
        var tfCnt = document.getElementById('tf-count');
        var remaining = MAX_EXTENSIONS - state.extCount;
        // jingsai is single-phase: when phase 0 ends, go straight to final submit
        var maxPhase = (tpl === 'jingsai') ? 0 : 2;
        if(state.phase < maxPhase) {
            var next = state.phase + 1;
            if(tfExt){ tfExt.style.display='block'; tfExt.textContent='Request Extension'; }
            if(tfCnt){ tfCnt.style.display='block'; tfCnt.textContent=remaining+' left'; }
            if(next === 2) {
                // з¬¬дәҢйҳ¶ж®өз»“жқҹ вҶ’ е…ЁеұҸй»‘е№•пјҢзӯүеӯҰз”ҹеҮҶеӨҮеҘҪжүҚејҖе§Ӣз¬¬дёүйҳ¶ж®ө
                timerShowSharingPrompt(tpl, state, next, tfExt, tfCnt);
            } else {
                timerShowAlert('\u2705 '+_phaseNames[state.phase]+' ended \u2014 '+_phaseNames[next]+' starting\u2026');
                setTimeout(function(){
                    state.phase = next;
                    state.remaining = state.cfg.phases[next];
                    state.total = state.cfg.phases[next];
                    timerLockAllInputs(tpl);
                    timerUnlockPhaseInputs(tpl, next);
                    if(tfExt) tfExt.style.display='none';
                    if(tfCnt) tfCnt.style.display='none';
                    timerUpdateDisplay(tpl);
                    state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
                    try { localStorage.setItem('_timer_'+tpl, JSON.stringify({phase:next,remaining:state.remaining,ts:Date.now(),cfg:state.cfg,extCount:state.extCount})); } catch(e){}
                }, 4000);
            }
        } else {
            // е…ЁйғЁз»“жқҹпјҡй”Ғе®ҡжүҖжңүиҫ“е…ҘпјҢи§ҰеҸ‘жҸҗдәӨжөҒзЁӢ
            timerLockAllInputs(tpl);
            var tfC = document.getElementById('tf-clock'); if(tfC){tfC.textContent='00:00';tfC.className='tf-clock';}
            var tfPe = document.getElementById('tf-phase'); if(tfPe){tfPe.textContent='';tfPe.style.display='none';}
            var tfDe = document.getElementById('tf-divider'); if(tfDe){tfDe.style.display='none';}
            if(tfExt) tfExt.style.display='none';
            if(tfCnt) tfCnt.style.display='none';
            try { localStorage.removeItem('_timer_'+tpl); } catch(e){}
            setTimeout(function(){ timerTriggerFinalSubmit(tpl); }, 800);
        }
    }

    function timerShowAlert(msg) {
        var floatEl = document.getElementById('timer-float'); if(!floatEl) return;
        var old = floatEl.querySelector('.tf-alert'); if(old) old.remove();
        var el = document.createElement('div');

        el.style.cssText = 'position:absolute;inset:0;background:rgba(15,110,86,0.96);display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:9pt;font-weight:600;color:#fff;padding:8px;text-align:center;z-index:1;';

    function timerExtendFloat() {
        var tpl = Object.keys(_timerState)[0]; if(!tpl) return;
        var state = _timerState[tpl]; if(!state) return;
        if(state.extCount >= MAX_EXTENSIONS) {
            var tfExt = document.getElementById('tf-extend');
            if(tfExt){ tfExt.textContent='Max reached'; tfExt.disabled=true; tfExt.style.opacity='0.5'; }
            return;
        }
        state.extCount++;
        var secs = state.cfg.extend;
        if(!_timerExtendLog[tpl]) _timerExtendLog[tpl]=[];
        _timerExtendLog[tpl].push({phase:state.phase,time:new Date().toLocaleString('zh-SG'),secs:secs,count:state.extCount});
        // и§Јй”ҒжүҖжңүеҢәеҹҹ
        timerUnlockAllInputs(tpl);
        state.remaining = secs; state.total = secs;
        var tfExt = document.getElementById('tf-extend');
        var tfDone = document.getElementById('tf-done');
        var tfCnt = document.getElementById('tf-count');
        var remaining = MAX_EXTENSIONS - state.extCount;
        if(tfExt){ if(remaining<=0){tfExt.style.display='none';}else{tfExt.textContent='Request Extension';} }
        if(tfDone){ tfDone.style.display='block'; tfDone.textContent='+'+Math.round(secs/60)+'min granted ('+state.extCount+'/'+MAX_EXTENSIONS+')'; setTimeout(function(){if(tfDone)tfDone.style.display='none';},3000); }
        if(tfCnt){ tfCnt.style.display=remaining>0?'block':'none'; tfCnt.textContent=remaining+' left'; }
        timerUpdateDisplay(tpl);
        clearInterval(state.interval);
        state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
    }

    function timerLockPhaseInputs(tpl, phaseIdx) {
        var page = document.getElementById('page-'+tpl); if(!page) return;
        var sel = (_timerInputSelectors[tpl]||[])[phaseIdx]; if(!sel) return;
        try { page.querySelectorAll(sel).forEach(function(el){
            el.classList.add('phase-locked');
            // еҗҢж—¶й”ҒзҲ¶ labelпјҲlabel зҡ„зӮ№еҮ»дјҡз»•иҝҮ input зҡ„ pointer-eventsпјү
            if(el.parentElement && el.parentElement.tagName === 'LABEL') el.parentElement.classList.add('phase-locked');
        }); } catch(e){}
    }

    function timerUnlockPhaseInputs(tpl, phaseIdx) {
        var page = document.getElementById('page-'+tpl); if(!page) return;
        var sel = (_timerInputSelectors[tpl]||[])[phaseIdx]; if(!sel) return;
        try { page.querySelectorAll(sel).forEach(function(el){
            el.classList.remove('phase-locked');
            if(el.parentElement && el.parentElement.tagName === 'LABEL') el.parentElement.classList.remove('phase-locked');
        }); } catch(e){}
        // з¬¬дәҢйҳ¶ж®өпјҲphaseIdx=1пјүејҖе§ӢпјҡеҲҶдә«еҢәи§Јй”Ғ
        if(phaseIdx === 1) {
            page.querySelectorAll('.share-zone input, .share-zone textarea, .share-zone canvas, .share-zone label').forEach(function(el){
                el.classList.remove('phase-locked');
            });
        }
    }

    function timerLockAllInputs(tpl) {
        // зЁҝзәёжЁЎејҸпјҡи®ҫе…ЁеұҖй”Ғе®ҡж Үеҝ—пјҢйҳ»жӯў canvas иҫ“е…Ҙ
        if(tpl === 'jingsai' || tpl === 'yuedu-jingsai') {
            window._jingsaiInputLocked = true;
            // й”Ғе®ҡжүҖжңүйўқеӨ–йўҳзӣ®иҝ·дҪ е®һдҫӢ
            document.querySelectorAll('.yj-extra-grid-wrap').forEach(function(gw){
                if(typeof gw._yjSetLocked==='function') gw._yjSetLocked(true);
            });
        }
        var page = document.getElementById('page-'+tpl); if(!page) return;
        var exemptZones = [];
        var header = page.querySelector('.page-header, .bd-page-header');
        if (header) exemptZones.push(header);
        var timerSetup = page.querySelector('.timer-setup-bar');
        if (timerSetup) exemptZones.push(timerSetup);
        var timerStart = page.querySelector('.timer-start-inline');
        if (timerStart) exemptZones.push(timerStart);
        page.querySelectorAll('input:not([type="number"]):not([type="radio"]), textarea, canvas').forEach(function(el) {
            for (var i = 0; i < exemptZones.length; i++) {
                if (exemptZones[i].contains(el)) return;
            }
            el.classList.add('phase-locked');
            // еҗҢж—¶й”ҒзҲ¶ labelпјҢйҳІжӯўзӮ№еҮ» label з»•иҝҮ pointer-events
            if(el.parentElement && el.parentElement.tagName === 'LABEL') el.parentElement.classList.add('phase-locked');
        });
    }

    function timerUnlockAllInputs(tpl) {
        // зЁҝзәёжЁЎејҸпјҡжё…йҷӨе…ЁеұҖй”Ғе®ҡж Үеҝ—
        if(tpl === 'jingsai' || tpl === 'yuedu-jingsai') {
            window._jingsaiInputLocked = false;
            document.querySelectorAll('.yj-extra-grid-wrap').forEach(function(gw){
                if(typeof gw._yjSetLocked==='function') gw._yjSetLocked(false);
            });
        }
        var page = document.getElementById('page-'+tpl); if(!page) return;
        page.querySelectorAll('.phase-locked').forEach(function(el){ el.classList.remove('phase-locked'); });
    }

    function timerRestoreFromStorage(tpl) {
        try {
            var raw = localStorage.getItem('_timer_'+tpl); if(!raw) return;
            var saved = JSON.parse(raw);
            var elapsed = Math.floor((Date.now()-saved.ts)/1000);
            var remaining = Math.max(0, saved.remaining - elapsed);
            if(remaining <= 0){ localStorage.removeItem('_timer_'+tpl); return; }
            var state = {tpl:tpl,phase:saved.phase,remaining:remaining,total:saved.cfg.phases[saved.phase],cfg:saved.cfg,interval:null,extCount:saved.extCount||0};
            _timerState[tpl] = state;
            var startEl = document.getElementById('timer-start-inline-'+tpl);
            var prog = document.getElementById('timer-progress-'+tpl);
            var floatR = document.getElementById('timer-float');
            if(startEl) startEl.style.display='none';
            if(prog){ prog.style.display='block'; prog.classList.add('active'); }
            if(floatR) floatR.style.display='flex';
            // жҒўеӨҚй”Ғе®ҡзҠ¶жҖҒпјҡй”Ғе®ҡеүҚйқўе·Іе®ҢжҲҗзҡ„йҳ¶ж®ө
            timerUnlockAllInputs(tpl);
            for(var i=0; i<saved.phase; i++) timerLockPhaseInputs(tpl, i);
            timerUpdateDisplay(tpl);
            state.interval = setInterval(function(){ timerTick(tpl); }, 1000);
        } catch(e){}
    }

    // в”Җв”Җ Canvas жүӢеҶҷ в”Җв”Җ
    // в”Җв”Җ е…ЁеұҖ undo/redo еҲҶеҸ‘пјҲз”Ё WeakMap и®°еҪ•жҜҸдёӘ canvas зҡ„ж Ҳпјүв”Җв”Җ
    const _canvasUndoMap = new WeakMap(); // canvas вҶ’ {undo:[], redo:[]}
    var _lastFocusedCanvas = null;
    var _lastFocusedEditable = null; // жңҖиҝ‘иҺ·еҫ—з„ҰзӮ№зҡ„ contenteditable е…ғзҙ 
    var _lastActionType = null; // 'canvas' | 'highlight' | 'checkbox' | 'editable' | null

    // в”Җв”Җ contenteditable иҮӘе®ҡд№ү undo/redo ж Ҳ в”Җв”Җ
    // е…ій”®пјҡе§Ӣз»ҲжҠҠеҝ«з…§еӯҳеңЁ"йЎ¶еұӮеҸҜзј–иҫ‘ж №е…ғзҙ "дёҠпјҢдёҚз®Ў activeElement жҳҜе…¶е“ӘдёӘеӯҗеӯҷ
    const _ceUndoMap = new WeakMap(); // el вҶ’ {undo:[], redo:[], lastSnap:str}

    // жүҫеҲ°зҰ» el жңҖиҝ‘зҡ„гҖҒзңҹжӯЈжҳҜ"зј–иҫ‘ж №иҠӮзӮ№"зҡ„ contenteditable зҘ–е…Ҳ
    // еҚіпјҡиҮӘиә«жҲ–зҘ–е…ҲдёӯжңҖйқ иҝ‘ж №зҡ„йӮЈдёӘ contenteditable="true" е…ғзҙ 
    function _ceRoot(el) {
        if (!el) return null;
        var node = el;
        var root = null;
        while (node && node !== document.body) {
            if (node.contentEditable === 'true') root = node;
            node = node.parentElement;
        }
        return root || (el.contentEditable === 'true' ? el : null);

        canvas.addEventListener('mouseup', e => {
            if (drawing && shiftStart) {
                const [x, y] = getPos(e);
                clearOverlay();
                ctx.beginPath(); ctx.moveTo(shiftStart[0], shiftStart[1]); ctx.lineTo(x, y); ctx.stroke();
            }
            drawing = false; shiftStart = null; clearOverlay();
            if(typeof _scheduleDraft==='function') _scheduleDraft();
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault(); drawing = true; shiftStart = null;
            _lastFocusedCanvas = canvas;
            _lastActionType = 'canvas';
            _saveCanvasSnapshot(canvas);
            [lastX, lastY] = getPos(e);
        }, {passive:false});
        canvas.addEventListener('touchmove', e => {
            e.preventDefault(); if (!drawing) return;
            const [x, y] = getPos(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
            [lastX, lastY] = [x, y];
        }, {passive:false});
        canvas.addEventListener('touchend', () => { drawing = false; hideDot(); if(typeof _scheduleDraft==='function') _scheduleDraft(); });
    }

    // в•җв•җ иҚүзЁҝиҮӘеҠЁжҡӮеӯҳзі»з»ҹпјҲд»…еӯҰз”ҹзүҲпјү в•җв•җ
    // localStorage key = зҸӯзә§ + д»»еҠЎ + fileToken
    // fileToken еңЁз”ҹжҲҗж—¶еҶҷе…ҘпјҢжҜҸж¬Ўз”ҹжҲҗйғҪдёҚеҗҢпјҢзЎ®дҝқдёҚеҗҢеӯҰз”ҹзүҲиҚүзЁҝдә’дёҚжұЎжҹ“
    function _draftKey() {
        const m = window.STUDENT_META;
        if (!m) return null;
        const token = m.fileToken || '';
        return 'draft__' + (m.class || '') + '__' + (m.assignTitle || '') + (token ? '__' + token : '');
    }

    function saveDraft(silent) {
        const key = _draftKey();
        if (!key) return;

        const _pid = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const inputs = {};
        document.querySelectorAll(_pid + ' input[type="text"], ' + _pid + ' textarea').forEach((el, i) => {
            inputs['f' + i] = el.value;
        });
        // jingsai/yuedu-jingsaiпјҡ_textе’Ң_curеӯҳе…ҘиҚүзЁҝ
        if (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai')) {
            if (typeof window._jingsaiGetState === 'function') {
                var _js = window._jingsaiGetState();
                inputs['jingsai_text'] = _js.text;
                inputs['jingsai_cur'] = _js.cur;
            }
        }
        document.querySelectorAll(_pid + ' input[type="checkbox"]').forEach((el, i) => {
            inputs['c' + i] = el.checked;
        });

        const canvases = {};
        document.querySelectorAll(_pid + ' canvas').forEach(canvas => {
            if (!canvas.id) return;
            if (canvas.width === 0 || canvas.height === 0) return;
            try {
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                // дҝ®еӨҚIпјҡжЈҖжҹҘйқһзҷҪиүІйқһйҖҸжҳҺеғҸзҙ пјҲз¬”иҝ№пјүпјҢдёҺisCanvasBlankйҖ»иҫ‘дёҖиҮҙ
                const step = Math.max(1, Math.floor(canvas.height / 8));
                let hasPixel = false;
                outer: for (let y = 0; y < canvas.height; y += step) {
                    const d = ctx.getImageData(0, y, canvas.width, 1).data;
                    for (let i = 0; i < d.length; i += 4) {
                        const r=d[i],g=d[i+1],b=d[i+2],a=d[i+3];
                        if (a > 10 && !(r > 240 && g > 240 && b > 240)) { hasPixel = true; break outer; }
                    }
                }
                if (hasPixel) canvases[canvas.id] = canvas.toDataURL('image/jpeg', 0.4);
            } catch(e) {}
        });

        try {
            localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases }));
        } catch(e) {
            try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), inputs, canvases: {} })); } catch(e2) {}
        }

        if (!silent) _showDraftToast('вң… Draft saved');
    }

    function restoreDraft() {
        const key = _draftKey();
        if (!key) return;
        let raw;
        try { raw = localStorage.getItem(key); } catch(e) { return; }
        if (!raw) return;

        let data;
        try { data = JSON.parse(raw); } catch(e) { return; }

        const ts = data.ts ? new Date(data.ts).toLocaleString('zh-SG', {month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '';

        const confirmed = true; // йқҷй»ҳжҒўеӨҚпјҢдёҚеј№зЎ®и®ӨжЎҶ
        if (!confirmed) {
            localStorage.removeItem(key);
            return;
        }

        const _pid2 = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        if (data.inputs) {
            document.querySelectorAll(_pid2 + ' input[type="text"], ' + _pid2 + ' textarea').forEach((el, i) => {
                const v = data.inputs['f' + i];
                if (v !== undefined) el.value = v;
            });
            // jingsai/yuedu-jingsaiпјҡжҒўеӨҚ_textе’Ң_cur
            if (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai')) {
                if (data.inputs['jingsai_text'] !== undefined && typeof window._jingsaiSetState === 'function') {
                    window._jingsaiSetState(data.inputs['jingsai_text'], data.inputs['jingsai_cur']||0);
                }
                if (data.inputs['yj_units'] !== undefined) {
                    try {
                        var _yjRestoreUnits = JSON.parse(data.inputs['yj_units']);
                        if (typeof window.yjInit === 'function') window.yjInit(_yjRestoreUnits);
                    } catch(e) {}
                } else if (data.inputs['yuedu_jingsai_question'] !== undefined) {
                    // е…је®№ж—§ж јејҸ
                    if (typeof window.yjInit === 'function') {
                        window.yjInit([{question: data.inputs['yuedu_jingsai_question']||'', text: data.inputs['jingsai_text']||'гҖҖгҖҖ', cur:2}]);
                    }
                }
            }
            document.querySelectorAll(_pid2 + ' input[type="checkbox"]').forEach((el, i) => {
                const v = data.inputs['c' + i];
                if (v !== undefined) {
                    el.checked = v;
                    if (el.classList.contains('other-reason-cb') || el.classList.contains('other-action-cb')) {
                        const label = el.closest('label');
                        if (label) {
                            const inp = label.querySelector('input[type="text"]');
                            if (inp) {
                                inp.disabled = !v;
                                inp.style.opacity = v ? '1' : '0.5';
                                inp.style.cursor = v ? 'text' : 'not-allowed';
                            }
                        }
                    }
                }
            });
        }

        // иҝҳеҺҹ canvasпјҲдёӨеё§еҗҺжү§иЎҢзЎ®дҝқ canvas е°әеҜёе·ІеёғеұҖпјү
        if (data.canvases) {
            const ids = Object.keys(data.canvases);
            requestAnimationFrame(() => requestAnimationFrame(() => {
                ids.forEach(id => {
                    const canvas = document.getElementById(id);
                    const dataUrl = data.canvases[id];
                    if (!canvas || !dataUrl) return;
                    const img = new Image();
                    img.onload = () => {
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    };
                    img.src = dataUrl;
                });
            }));
        }

        _showDraftToast('рҹ“Ӣ Draft restored');
        // иҝҳеҺҹеҗҺеҗҢжӯҘи®әйўҳиҫ“е…ҘжЎҶе®ҪеәҰ
        var _yti = document.getElementById('yo-topic-input');
        var _ytm = document.getElementById('yo-topic-mirror');
        if (_yti && _ytm) { _ytm.textContent = _yti.value || _yti.placeholder; _yti.style.width = Math.max(120, _ytm.offsetWidth + 8) + 'px'; }
    }

    function clearDraft() {

    function _showDraftToast(msg) {
        const el = document.getElementById('draftToast');
        if (!el) {
            // toast div дёҚеӯҳеңЁж—¶з”Ёз®ҖеҚ•жҸҗзӨәжқЎд»Јжӣҝ
            const tmp = document.createElement('div');

    // иҮӘеҠЁжҡӮеӯҳпјҡйҳІжҠ–пјҢиҫ“е…ҘеҒңжӯў 4 з§’еҗҺдҝқеӯҳ
    let _draftDebounceTimer = null;

    // в•җв•җ жҸҗзӨәиҜӯпјҲplaceholderпјүзј–иҫ‘зі»з»ҹ в•җв•җ
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

    // в”Җв”Җ еҸ‘еёғеҗҺеҗҢжӯҘжӣҙж–°еҜ№еә”зӣ®еҪ•зҡ„ index.html ж–Үз« жё…еҚ• в”Җв”Җ
    function _updateDirIndex(cat, fileName, title, cls) {
        // жҜҸдёӘзӣ®еҪ•з”ЁдёҚеҗҢзҡ„ж Үи®°еҗҚпјҢйҒҝе…Қж··ж·Ҷ
        var markerMap = {
            '03-gallery':       ['// ARTICLES_START', '// ARTICLES_END', 'ARTICLES'],
            '01-learning-guide':['// ITEMS_START',    '// ITEMS_END',    'ITEMS'],
            '02-interaction':   ['// ITEMS_START',    '// ITEMS_END',    'ITEMS']
        };
        var m = markerMap[cat];
        if (!m) return;

        var indexPath = cat + '/index.html';
        var indexUrl  = 'https://api.github.com/repos/' + GH_PUB_USER + '/' + GH_PUB_REPO + '/contents/' + indexPath;
        var headers   = { 'Authorization': 'token ' + GH_PUB_TOKEN, 'Accept': 'application/vnd.github.v3+json' };

        fetch(indexUrl, { headers: headers })
        .then(function(r){ return r.json(); })
        .then(function(existing){
            if (!existing || !existing.content) return;
            var currentHtml = decodeURIComponent(escape(atob(existing.content.replace(/\s/g,''))));

            var today = new Date();
            var dateStr = today.getFullYear() + '.'
                        + String(today.getMonth()+1).padStart(2,'0') + '.'
                        + String(today.getDate()).padStart(2,'0');

            var newEntry = '  { file:"' + fileName + '", title:"' + title.replace(/"/g,'\\"') + '", cls:"' + cls.replace(/"/g,'\\"') + '", date:"' + dateStr + '" }';

            var startMark = m[0], endMark = m[1], varName = m[2];
            var updated;
            // з©әж•°з»„
            var emptyRe = new RegExp(startMark.replace(/\//g,'\\/') + '\\s*\\nvar ' + varName + ' = \\[\\];\\s*\\n' + endMark.replace(/\//g,'\\/'));
            if (emptyRe.test(currentHtml)) {
                updated = currentHtml.replace(emptyRe,
                    startMark + '\nvar ' + varName + ' = [\n' + newEntry + '\n];\n' + endMark);
            } else {
                // е·ІжңүжқЎзӣ®пјҢжң«е°ҫиҝҪеҠ 
                var appendRe = new RegExp('(' + startMark.replace(/\//g,'\\/') + '[\\s\\S]*?var ' + varName + ' = \\[[\\s\\S]*?)(\\n\\];\\s*\\n' + endMark.replace(/\//g,'\\/') + ')');
                updated = currentHtml.replace(appendRe, '$1,\n' + newEntry + '$2');
            }
            if (updated === currentHtml) return;

            var b64new = btoa(unescape(encodeURIComponent(updated)));
            return fetch(indexUrl, {
                method: 'PUT',
                headers: Object.assign({}, headers, {'Content-Type':'application/json'}),
                body: JSON.stringify({
                    message: 'Add ' + fileName + ' to ' + cat + ' index',
                    content: b64new,
                    sha: existing.sha
                })
            });
        })
        .catch(function(){ /* йқҷй»ҳеҝҪз•ҘпјҢдёҚеҪұе“Қдё»еҸ‘еёғжөҒзЁӢ */ });
    }

    // в”Җв”Җ Canvas жҳҜеҗҰз©әзҷҪ в”Җв”Җ
    function isCanvasBlank(canvas) {
        if (!canvas) return true;
        if (canvas.width === 0 || canvas.height === 0) return true;
        try {
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            // дҝ®еӨҚIпјҡеҺҹжқҘеҸӘжЈҖжҹҘalphaйҖҡйҒ“пјҢдҪҶcanvasиғҢжҷҜжҳҜзҷҪиүІпјҲalpha=255пјү
            // еҜјиҮҙз©әзҷҪзӯҫеҗҚcanvasд№ҹиў«еҲӨж–ӯдёә"жңүеҶ…е®№"пјҢзӯҫеҗҚйӘҢиҜҒеӨұж•Ҳ
            // жӯЈзЎ®еҒҡжі•пјҡжЈҖжҹҘжҳҜеҗҰжңүйқһзҷҪиүІгҖҒйқһйҖҸжҳҺзҡ„еғҸзҙ пјҲеҚізңҹжӯЈзҡ„з¬”иҝ№пјү
            const step = Math.max(1, Math.floor(canvas.height / 10));
            for (let y = 0; y < canvas.height; y += step) {
                const data = ctx.getImageData(0, y, canvas.width, 1).data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
                    // жңүдёҚйҖҸжҳҺдё”йқһзҷҪиүІзҡ„еғҸзҙ  = жңүз¬”иҝ№
                    if (a > 10 && !(r > 240 && g > 240 && b > 240)) return false;
                }
            }
            return true;
        } catch(e) { return true; }
    }

    function timerFinalExtension() {
        // е…ій—ӯ overlayпјҢи§Јй”ҒжүҖжңүпјҢд»ҺжӯӨеҲ»иө·жүҚејҖе§Ӣ 1 еҲҶй’ҹеҖ’и®Ўж—¶
        clearInterval(_finalSubmitInterval);
        var oldOv = document.getElementById('final-submit-overlay');
        if (oldOv) document.body.removeChild(oldOv);
        var tpl = _finalSubmitTpl;
        // и®°еҪ•еҲ° _timerExtendLog
        if (tpl) {
            if (!_timerExtendLog[tpl]) _timerExtendLog[tpl] = [];
            _timerExtendLog[tpl].push({
                phase: 'post-submit-ext-' + _finalSubmitExtensionsUsed,
                time: new Date().toLocaleString('zh-SG'),
                secs: 60,
                count: _finalSubmitExtensionsUsed
            });
        }
        // и§Јй”Ғе…ЁйғЁпјҲеҗ« jingsai canvas иҫ“е…Ҙпјү
        if (tpl) timerUnlockAllInputs(tpl);
        // jingsaiпјҡи§Јй”ҒеҗҺиҮӘеҠЁ focusпјҢж— йңҖзӮ№еҮ»еҚіеҸҜиҫ“е…Ҙ
        if (tpl === 'jingsai') {
            setTimeout(function(){
                var hi = document.getElementById('jingsai-hi');
                if (hi) hi.focus();
            }, 50);
        }
        // йҮҚзҪ®жҸҗдәӨй”ҒпјҢзЎ®дҝқе»¶ж—¶еҗҺеҸҜд»ҘйҮҚж–°жҸҗдәӨ
        _submitting = false;
        _setSubmitBtn(false);
        // toolbarпјҡд»ҺзӮ№еҮ»зһ¬й—ҙејҖе§Ӣи®Ўж—¶
        var tfC = document.getElementById('tf-clock');
        var tfP = document.getElementById('tf-phase');
        var tfDiv = document.getElementById('tf-divider');
        var extLabel = 'Extension #' + _finalSubmitExtensionsUsed;
        if (tfC) { tfC.textContent = '01:00'; tfC.className = 'tf-clock'; }
        if (tfP) { tfP.textContent = extLabel; tfP.style.display = extLabel ? '' : 'none'; }
        if (tfDiv) { tfDiv.style.display = extLabel ? '' : 'none'; }
        // вҳ… еҖ’и®Ўж—¶д»ҺжӯӨеҲ»еҗҜеҠЁ
        var secs2 = 60;
        _finalSubmitInterval = setInterval(function(){
            secs2--;
            if (tfC) {
                tfC.textContent = '00:' + String(secs2).padStart(2,'0');
                tfC.className = secs2 <= 30 ? 'tf-clock danger' : (secs2 <= 60 ? 'tf-clock warning' : 'tf-clock');
            }
            if (secs2 <= 0) {
                clearInterval(_finalSubmitInterval);
                _finalSubmitInterval = null;
                if (tpl) timerLockAllInputs(tpl);
                setTimeout(function(){ timerTriggerFinalSubmit(tpl); }, 600);
            }
        }, 1000);
    }

    function timerFinalTimeUp() {
        // еҖ’и®Ўж—¶еҲ°йӣ¶пјҡй”Ғе®ҡ + йҮҚж–°и§ҰеҸ‘жҸҗдәӨ
        var old = document.getElementById('final-submit-overlay');
        if (old) document.body.removeChild(old);
        if (_finalSubmitTpl) timerLockAllInputs(_finalSubmitTpl);
        setTimeout(function(){ timerTriggerFinalSubmit(_finalSubmitTpl); }, 600);
    }

    var _submitting = false; // дҝ®еӨҚFпјҡжҸҗдәӨй”ҒпјҢйҳІжӯўйҮҚеӨҚзӮ№еҮ»еҸ‘еҮәеӨҡдёӘиҜ·жұӮ

    function submitWork(onDone) {
        const meta = window.STUDENT_META;
        if (!meta) { alert('This feature is only available in the student version.'); return; }
        if (_submitting) { if (onDone) onDone(false, 'busy'); return; }

        // ж”¶йӣҶж–Үеӯ—ж•°жҚ® вҖ” ж №жҚ®еҪ“еүҚжЁЎжқҝйЎөйқўеҸ–е§“еҗҚ/зј–еҸ·
        const _activePage = document.getElementById('page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda'));
        const _nameInputs = _activePage ? _activePage.querySelectorAll('input[type="text"]') : [];
        // pazhao з”Ёдё“еұһиҫ“е…ҘжЎҶпјӣjingsai йЎәеәҸпјҡе§“еҗҚ(0)гҖҒзҸӯзә§(1)гҖҒзј–еҸ·(2)
        const _isPz = (typeof currentTemplate !== 'undefined' && currentTemplate === 'pazhao');
        const _isJs = (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai'));
        const name = _isPz
            ? ((document.getElementById('pz-name') || {}).value || '').trim()
            : (_nameInputs[0]?.value?.trim() || '');
        const num  = _isPz
            ? ((document.getElementById('pz-num')  || {}).value || '').trim()
            : _isJs
            ? (_nameInputs[1]?.value?.trim() || '')
            : (_nameInputs[1]?.value?.trim() || '');

        if (!name) { if (onDone) onDone(false, 'validation'); showModal('вқ—', 'Name required', 'Please fill in your name before submitting.'); return; }

        // в”Җв”Җ еҗ„жЁЎжқҝеҝ…еЎ«йӘҢиҜҒ в”Җв”Җ
        const tpl = typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda';
        const pg = document.getElementById('page-' + tpl);
        if (!pg) { if (onDone) onDone(false, 'validation'); showModal('вқ—', 'Error', 'Cannot find the current page.'); return; }

        // jingsaiпјҡжҸҗдәӨеүҚжҠҠ_textеҗҢжӯҘеҲ°йҡҗи—ҸfieldдҫӣеҗҺз«ҜиҜ»еҸ–

            var _js = window._jingsaiGetState();

        // в”Җв”Җ з»ҹдёҖйӘҢиҜҒпјҡи°ғз”Ё checkRequired()пјҢжүҖжңүи§„еҲҷйӣҶдёӯеңЁйӮЈдёҖдёӘеҮҪж•°йҮҢз»ҙжҠӨ в”Җв”Җ
        const missing = checkRequired(tpl);
        if (missing) {
            // жҠҠеҶ…йғЁжҸҸиҝ°иҪ¬жҲҗеҜ№еӯҰз”ҹеҸӢеҘҪзҡ„еј№зӘ—жҸҗзӨә
            const msgMap = {
                'Student name':                          ['Name required',             'Please fill in your name.'],

                'supporting point 1':                    ['Incomplete',                 'Please fill in supporting point 1.'],
                'supporting point 2':                    ['Incomplete',                 'Please fill in supporting point 2.'],
                'supporting point 3':                    ['Incomplete',                 'Please fill in supporting point 3.'],

            try {
                var COLS = 20;
                var _isYJ = (typeof currentTemplate !== 'undefined' && currentTemplate === 'yuedu-jingsai');
                var PAGE_W = 210, PAGE_H = 297;
                var MARGIN = 12, PAD_LR = 8;
                var CONTENT_W = PAGE_W - 2*MARGIN - 2*PAD_LR;
                var X0 = MARGIN + PAD_LR;
                var HDR_H = 27, HDR_GAP = 3;
                var Q_H = 10, Q_GAP = 2, BLOCK_GAP = 4;
                var GREEN = '#4caf50';
                var TARGET_DPI = 150, PX_PER_MM = TARGET_DPI / 25.4, sc = 2;

                // иЎҢй«ҳи®Ўз®—
                var _tw = Math.round(CONTENT_W * PX_PER_MM * sc);
                var _maxCH = (957/31.8) * (TARGET_DPI/96) * sc;
                var _cH0 = Math.min(_tw/COLS, _maxCH);
                var _auxH0 = Math.round(_cH0 * 0.4);
                var _gH0 = _cH0 + _auxH0;
                var ROW_H_MM = _gH0 / PX_PER_MM / sc;

                // з”»ж јеӯҗеӣҫ
                function makeGrid(rows, chars) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var cWp = w / COLS;
                    var cH = Math.min(cWp, _maxCH);
                    var auxH = Math.round(cH * 0.4);
                    var gH = cH + auxH;
                    var TH = (rows-1)*gH + cH + 2;
                    var h = Math.round(TH);
                    var h_mm = h / PX_PER_MM / sc;
                    var cv = document.createElement('canvas');
                    cv.width = w; cv.height = h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle = '#fff'; ctx.fillRect(0,0,w,h);
                    ctx.strokeStyle = GREEN; ctx.lineWidth = 0.7;
                    for (var r = 0; r < rows; r++) {
                        var base = r*gH, wb = base+cH, ab = wb+auxH;
                        ctx.beginPath(); ctx.moveTo(0,wb); ctx.lineTo(w,wb); ctx.stroke();
                        if (r < rows-1) { ctx.beginPath(); ctx.moveTo(0,ab); ctx.lineTo(w,ab); ctx.stroke(); }
                        for (var c = 1; c < COLS; c++) { ctx.beginPath(); ctx.moveTo(c*cWp,base); ctx.lineTo(c*cWp,wb); ctx.stroke(); }
                    }
                    ctx.lineWidth = 1.5; ctx.strokeRect(0.75, 0.75, w-1.5, h-1.5);
                    if (chars) {
                        var fs = Math.round(cH * 0.62);
                        ctx.fillStyle = '#1a2a3a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        ctx.font = '100 ' + fs + 'px SimSun,"е®ӢдҪ“",STSong,serif';
                        var ci = 0, rr = 0, cc = 0;
                        while (ci < chars.length && rr < rows) {
                            var ch = chars[ci++];
                            if (ch === '\n') { rr++; cc = 0; }
                            else { ctx.fillText(ch, Math.round(cc*cWp+cWp/2), Math.round(rr*gH+cH/2) - Math.round(fs*0.08)); cc++; if (cc>=COLS){cc=0;rr++;} }
                        }
                    }
                    return { dataUrl: cv.toDataURL('image/png'), h_mm: h_mm };
                }

                // з”»йўҳзӣ®ж Үйўҳ
                function makeTitle(text) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var h = Math.round(Q_H * PX_PER_MM * sc);
                    var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle='#eef4fb'; ctx.fillRect(0,0,w,h);
                    ctx.fillStyle='#1a4f8a'; ctx.fillRect(0,0,Math.round(3*sc),h);
                    ctx.fillStyle='#1a2a3a';
                    var fs = Math.round(9.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.font = '600 '+fs+'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign='left'; ctx.textBaseline='middle';
                    ctx.fillText(text, Math.round(8*sc), h/2);
                    return { dataUrl: cv.toDataURL('image/png'), h_mm: Q_H };
                }

                // з”»йЎөзңү
                function makeHeader(name, cls, num, group, title, isAnon) {
                    var w = Math.round(CONTENT_W * PX_PER_MM * sc);
                    var h = Math.round(HDR_H * PX_PER_MM * sc);
                    var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
                    var ctx = cv.getContext('2d');
                    ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
                    var row1H = Math.round(9 * PX_PER_MM * sc);
                    var fs = Math.round(11 * PX_PER_MM/96 * sc * 25.4);
                    ctx.fillStyle='#1a2a3a'; ctx.textBaseline='middle';
                    ctx.font='500 '+fs+'px "Microsoft YaHei","PingFang SC",sans-serif';
                    ctx.textAlign='left';
                    if (!isAnon) {
                        ctx.fillText('е§“еҗҚпјҡ'+name, 0, row1H/2);
                        ctx.fillText('зҸӯзә§пјҡ'+cls, Math.round(52*PX_PER_MM*sc), row1H/2);
                        ctx.fillText('зј–еҸ·пјҡ'+num, Math.round(104*PX_PER_MM*sc), row1H/2);
                    } else {
                        ctx.fillText('зј–еҸ·пјҡ'+num, 0, row1H/2);
                    }
                    var fsLg = Math.round(10.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.font='400 '+fsLg+'px "Noto Serif SC",serif';
                    ctx.textAlign='right';
                    var _ttEl = document.querySelector('#page-jingsai .bd-header-row [contenteditable], #page-yuedu-jingsai .bd-header-row [contenteditable]');
                    ctx.fillText((_ttEl?_ttEl.textContent.trim():'')||'зЁҝзәёдҪңзӯ”', w, row1H/2);
                    var infoY = row1H + Math.round(3*PX_PER_MM*sc);
                    var infoH = h - infoY;
                    ctx.fillStyle='#eef4fb'; ctx.fillRect(0,infoY,w,infoH);
                    var fsI = Math.round(9.5 * PX_PER_MM/96 * sc * 25.4);
                    ctx.fillStyle='#1a4070'; ctx.font='500 '+fsI+'px "Microsoft YaHei",sans-serif';
                    ctx.textAlign='left';
                    var pad = Math.round(2*PX_PER_MM*sc);
                    if (_isYJ) {
                        var _qEl = document.getElementById('yuedu-jingsai-question');
                        ctx.fillText('йўҳзӣ®пјҡ'+(_qEl?(_qEl.innerText||'').replace(/\n/g,' ').trim():''), pad, infoY+infoH/2);
                    } else {
                        ctx.fillText('з»„еҲ«пјҡ'+group, pad, infoY+infoH/2);
                        ctx.fillText('йўҳзӣ®пјҡ'+title, Math.round(w*0.42), infoY+infoH/2);
                    }
                    return cv.toDataURL('image/png');
                }

                // в”Җв”Җ д»Һ span жҢүеқҗж ҮйҮҚе»әж–Үеӯ—пјҲжү№йҮҸжү“еҚ°ж–Үд»¶з”Ёпјүв”Җв”Җ
                function readSpans(container) {
                    if (!container) return '';
                    var spans = Array.from(container.querySelectorAll('span'));
                    if (!spans.length) return '';
                    // ж”¶йӣҶе”ҜдёҖиЎҢпјҲtop иҜҜе·® <3px з®—еҗҢиЎҢпјү
                    var tops = [];
                    spans.forEach(function(s) {
                        var t = parseFloat(s.style.top)||0;
                        for (var i=0; i<tops.length; i++) { if (Math.abs(tops[i]-t)<3) return; }
                        tops.push(t);
                    });
                    tops.sort(function(a,b){return a-b;});
                    var text = '';
                    tops.forEach(function(rowTop, ri) {
                        var row = spans.filter(function(s){ return Math.abs((parseFloat(s.style.top)||0)-rowTop)<3; });
                        row.sort(function(a,b){ return (parseFloat(a.style.left)||0)-(parseFloat(b.style.left)||0); });
                        if (ri>0) text += '\n';
                        row.forEach(function(s){ text += s.textContent; });
                    });
                    return text;
                }

                // в”Җв”Җ иЎҢж•°и®Ўз®—пјҲеҺ»жң«е°ҫз©әиЎҢпјүв”Җв”Җ
                function countRows(text) {
                    if (!text) return 0;
                    var rows = [], col = 0, hasContent = false;
                    for (var i=0; i<text.length; i++) {
                        var ch = text[i];
                        if (ch==='\n') { rows.push(hasContent); col=0; hasContent=false; }
                        else { col++; if (ch!=='гҖҖ'&&ch!==' ') hasContent=true; if(col>=COLS){rows.push(hasContent);col=0;hasContent=false;} }
                    }
                    rows.push(hasContent);
                    while (rows.length>1 && !rows[rows.length-1]) rows.pop();
                    return rows.length;
                }

                // в”Җв”Җ жҢүиЎҢж•°еҲҮж–Үеӯ— в”Җв”Җ
                function cutRows(text, maxRows) {
                    var i=0, row=0, col=0;
                    while (i<text.length && row<maxRows) {
                        if (text[i]==='\n') { row++; col=0; i++; }
                        else { col++; i++; if(col>=COLS){col=0;row++;} }
                    }
                    return { slice: text.slice(0,i), remaining: text.slice(i) };
                }

                // в”Җв”Җ иҜ»еҸ–еӯҰз”ҹдҝЎжҒҜ в”Җв”Җ
                var anonCb = document.getElementById('anon-print-cb');
                var isAnon = anonCb && anonCb.checked;
                var nameEl = document.getElementById(_isYJ?'yuedu-jingsai-name':'jingsai-name');
                var classEl = document.getElementById(_isYJ?'yuedu-jingsai-class':'jingsai-class');
                var numEl = document.getElementById('jingsai-num');
                var nameVal = isAnon?'':(nameEl?nameEl.value.trim():'');
                var classVal = isAnon?'':(classEl?classEl.value.trim():'');
                var numVal = numEl?numEl.value.trim():'';
                var groupSel = pg.querySelector('select');
                var groupVal = groupSel&&groupSel.selectedIndex>0?groupSel.options[groupSel.selectedIndex].text:'';
                var titleInp = document.getElementById('jingsai-title-input');
                var titleVal = titleInp?titleInp.value.trim():'';

                // в”Җв”Җ иҜ»з¬¬дёҖйўҳж–Үеӯ— в”Җв”Җ
                var allText = '';
                // дјҳе…Ҳпјҡеј•ж“ҺжҺҘеҸЈ
                if (typeof window._jingsaiGetState==='function') {
                    var _st = window._jingsaiGetState();
                    if (_st&&_st.text) allText = _st.text;
                }
                if (!allText && typeof window._jingsaiGetText==='function') {
                    allText = window._jingsaiGetText()||'';
                }
                // fallbackпјҡд»Һ span иҜ»пјҲжү№йҮҸжү“еҚ°ж–Үд»¶пјү
                if (!allText) {
                    var _q1Layer = pg.querySelector('.jingsai-text-canvas');
                    if (_q1Layer) allText = readSpans(_q1Layer);
                }

                // в”Җв”Җ иҜ»йўқеӨ–йўҳзӣ® в”Җв”Җ
                var extraUnits = [];
                if (_isYJ) {
                    var _yjCont = document.getElementById('yj-extra-container');
                    if (_yjCont) {
                        _yjCont.querySelectorAll('.yj-extra-unit').forEach(function(unitEl) {
                            var _titleEl = unitEl.querySelector('.yj-extra-q-label,.yj-extra-title,label,.yj-extra-question');
                            var _title = _titleEl?(_titleEl.innerText||_titleEl.textContent||'').trim():'';
                            var _gw = unitEl.querySelector('.yj-extra-grid-wrap');
                            var _text = '';
                            if (_gw && typeof _gw._yjGetText==='function') _text = _gw._yjGetText();
                            if (!_text) {
                                var _etl = _gw?_gw.querySelector('.yj-extra-text'):null;
                                if (_etl) _text = readSpans(_etl);
                            }
                            extraUnits.push({ title: _title, text: _text||'' });
                        });
                    }
                }

                // в”Җв”Җ жһ„е»әеҶ…е®№еқ— в”Җв”Җ
                var blocks = [{ type:'grid', text: allText }];
                extraUnits.forEach(function(u) {
                    if (u.title) blocks.push({ type:'title', text: u.title });
                    blocks.push({ type:'grid', text: u.text });
                });

                // в”Җв”Җ з”ҹжҲҗ PDF в”Җв”Җ
                var jsPDF = window.jspdf.jsPDF;
                var pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
                var hdrUrl = makeHeader(nameVal, classVal, numVal, groupVal, titleVal, isAnon);
                var curY = MARGIN;

                function newPage() { pdf.addPage(); curY = MARGIN; }
                function remain() { return PAGE_H - MARGIN - curY; }

                // з¬¬дёҖйЎөйЎөзңү
                pdf.addImage(hdrUrl, 'PNG', X0, curY, CONTENT_W, HDR_H);
                curY += HDR_H + HDR_GAP;

                blocks.forEach(function(block) {
                    if (block.type === 'title') {
                        if (remain() < Q_H + Q_GAP + ROW_H_MM) newPage();
                        var tc = makeTitle(block.text);
                        pdf.addImage(tc.dataUrl, 'PNG', X0, curY, CONTENT_W, tc.h_mm);
                        curY += tc.h_mm + Q_GAP;
                    } else {
                        var rem = block.text;
                        var totalR = countRows(rem);
                        if (totalR < 1) totalR = 1;
                        var first = true;
                        while (true) {
                            var avail = remain();
                            var maxR = Math.floor((avail - 2) / ROW_H_MM);
                            if (maxR < 1) { newPage(); continue; }
                            var rInText = countRows(rem);
                            var rowsToDraw, cut;
                            if (rInText <= maxR) {
                                rowsToDraw = Math.max(1, rInText);
                                cut = { slice: rem, remaining: '' };
                            } else {
                                rowsToDraw = maxR;
                                cut = cutRows(rem, maxR);
                            }
                            var grid = makeGrid(rowsToDraw, cut.slice);
                            pdf.addImage(grid.dataUrl, 'PNG', X0, curY, CONTENT_W, grid.h_mm);
                            curY += grid.h_mm + 2;
                            rem = cut.remaining;
                            first = false;
                            if (!rem) break;
                            newPage();
                        }
                        curY += BLOCK_GAP;
                    }
                });

                // в”Җв”Җ дҝқеӯҳ в”Җв”Җ
                _lockJingsaiPage();
                var meta = window.STUDENT_META;
                var assignTitle = meta?(meta.assignTitle||'зЁҝзәё'):'зЁҝзәё';
                var fname = (isAnon?(numVal||'Student'):(nameVal||'Student')) + (classVal?'_'+classVal:'') + '_' + assignTitle + '.pdf';
                fname = fname.replace(/[^\u4e00-\u9fffa-zA-Z0-9._-]/g,'_');
                pdf.save(fname);

                if (pdfBtn) { pdfBtn.textContent='вң… PDFе·Ідҝқеӯҳ'; pdfBtn.disabled=true; pdfBtn.style.background='#388e3c'; }
                var sp = document.getElementById('submitPanel');
                if (sp && !sp.querySelector('#reEditBtn')) {
                    var reBtn = document.createElement('button');
                    reBtn.id = 'reEditBtn';
                    reBtn.textContent = 'рҹ”“ йҮҚж–°зј–иҫ‘';
                    reBtn.style.cssText = 'padding:8px 18px;border-radius:6px;border:1.5px solid #888;background:#fff;color:#555;font-size:10pt;font-family:inherit;cursor:pointer;font-weight:600;';
                    reBtn.onclick = function() {
                        _unlockJingsaiPage();
                        if (pdfBtn) { pdfBtn.textContent='рҹ“„ Save as PDF'; pdfBtn.disabled=false; pdfBtn.style.background=''; }
                        reBtn.remove();
                    };
                    sp.appendChild(reBtn);
                }

            } catch(e) {
                console.error('PDF error:', e);
                alert('PDFз”ҹжҲҗеӨұиҙҘ: ' + e.message);
                restore();
            }
        }
    }

    function saveLocalJSON() {

        const _pageId2 = '#page-' + (typeof currentTemplate !== 'undefined' ? currentTemplate : 'biaoda');
        const _isJs2 = (typeof currentTemplate !== 'undefined' && (currentTemplate === 'jingsai' || currentTemplate === 'yuedu-jingsai'));
        const name = document.querySelector(_pageId2 + ' input[type="text"]')?.value?.trim() || 'жңӘзҹҘеҗҢеӯҰ';
        const num  = _isJs2
            ? (document.querySelectorAll(_pageId2 + ' input[type="text"]')[2]?.value?.trim() || '')
            : (document.querySelectorAll(_pageId2 + ' input[type="text"]')[1]?.value?.trim() || '');

        const inputs = {};
        document.querySelectorAll(_pageId2 + ' input[type="text"], ' + _pageId2 + ' textarea').forEach((el, i) => {
            inputs['field_' + i] = el.value;
        });
        document.querySelectorAll(_pageId2 + ' input[type="checkbox"]').forEach((el, i) => {

            if (isCanvasBlank(canvas)) return;
            canvases[key] = canvas.toDataURL('image/png');
        });

        // jingsaiпјҡйўқеӨ–дҝқеӯҳж–Үеӯ—еҶ…е®№ + еҸӮиөӣз»„еҲ« + дҪңж–Үйўҳзӣ®
        if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'&&window._jingsaiGetState){
            const st=window._jingsaiGetState();
            inputs['jingsai_text']=st.text||'';
        }
        if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'){
            var _gSel2=document.getElementById('jingsai-group-sel');

                var _yjAll=window.yjGetAllUnits();

                // е…је®№ж—§еӯ—ж®өпјҡз”ЁжүҖжңүеҚ•е…ғзҡ„ж–Үеӯ—жӢјжҺҘ
                inputs['jingsai_text']=_yjAll.map(function(u){return u.text||'';}).join('\n---\n');
            }
        }

        const payload = {
            type: 'worksheet',
            template: currentTemplate,
            grade: 'worksheet_' + (meta ? meta.class : ''),
            class: meta ? meta.class : '',
            assignTitle: meta ? meta.assignTitle : '',
            studentName: name,
            studentNum: num,
            submitTime: new Date().toLocaleString('zh-SG'),
            inputs,
            canvases
        };

        const json = JSON.stringify(payload);
        const blob = new Blob([json], {type: 'application/json;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        const safeName = name.replace(/[^\w\u4e00-\u9fff]/g, '_');
        const title = meta ? meta.assignTitle.replace(/[^\w\u4e00-\u9fff]/g, '_') : 'дҪңдёҡ';
        a.download = safeName + '_' + title + '.json';
        a.click();
    }

    // в”Җв”Җ и®®и®әз»ғз¬”жү“еҚ°пјҡдёҙж—¶з§»йҷӨжүҖжңү overflow:hidden йҳІжӯўеҶ…е®№иў«иЈҒпјҢе№¶ж’‘й«ҳ textarea в”Җв”Җ
    window.addEventListener('beforeprint', function() {
        if (typeof currentTemplate === 'undefined' || currentTemplate !== 'yilun') return;

        // 1. з§»йҷӨжүҖжңү overflow:hidden
        document.querySelectorAll('#page-yilun *').forEach(function(el) {
            var inlineStyle = el.getAttribute('style') || '';
            if (inlineStyle.indexOf('overflow:hidden') !== -1 || inlineStyle.indexOf('overflow: hidden') !== -1) {
                el.setAttribute('data-print-ov', el.style.overflow);
                el.style.setProperty('overflow', 'visible', 'important');
            }
        });

        // 2. жҠҠжҜҸдёӘ textarea зҡ„ inline height и®ҫдёәе®һйҷ…еҶ…е®№й«ҳеәҰпјҢйҳІжӯўжү“еҚ°еј•ж“ҺжҲӘж–ӯ
        document.querySelectorAll('#page-yilun textarea.yilun-ta').forEach(function(ta) {
            ta.setAttribute('data-print-h', ta.style.height || '');
            ta.style.setProperty('height', 'auto', 'important');
            // scrollHeight еҸӘеңЁеҸҜи§ҒзҠ¶жҖҒдёӢеҸҜйқ пјӣжӯӨж—¶йЎөйқўжҳҜеҸҜи§Ғзҡ„пјҢжүҖд»ҘзӣҙжҺҘиҜ»еҸ–
            var sh = ta.scrollHeight;
            ta.style.setProperty('height', sh + 'px', 'important');
            ta.style.setProperty('overflow', 'visible', 'important');
        });

        // 3. и®©жүҖжңүеҢ…еҗ« textarea зҡ„зҲ¶е®№еҷЁд№ҹ overflow:visible
        document.querySelectorAll('#page-yilun').forEach(function(el) {
            el.style.setProperty('overflow', 'visible', 'important');
        });
    });
    window.addEventListener('afterprint', function() {
        // жҒўеӨҚ overflow
        document.querySelectorAll('#page-yilun [data-print-ov]').forEach(function(el) {
            var orig = el.getAttribute('data-print-ov');
            if (orig) { el.style.overflow = orig; } else { el.style.removeProperty('overflow'); }
            el.removeAttribute('data-print-ov');
        });

        // жҒўеӨҚ textarea й«ҳеәҰпјҲи§ҰеҸ‘ autoResize и®©е®ғйҮҚж–°и®Ўз®—пјү
        document.querySelectorAll('#page-yilun textarea.yilun-ta').forEach(function(ta) {
            var orig = ta.getAttribute('data-print-h');

    function importStudentData(event) {
        const files = Array.from(event.target.files);
        if (!files.length) return;
        event.target.value = "";
        const results = [];
        let loaded = 0;
        files.forEach(function(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) data.forEach(function(d){ results.push(d); });
                    else results.push(data);
                } catch(err) {
                    alert("ж–Үд»¶ж јејҸй”ҷиҜҜпјҡ" + file.name);
                }
                loaded++;
                if (loaded === files.length) showImportedData(results);
            };
            reader.readAsText(file, "utf-8");
        });
    }

    function applyRoster(btn) {
        // жүҫеҲ°еҗҢз»„зҡ„ textarea е’Ң missingList
        var container = btn.parentElement; // flex row with textarea + button
        var groupDiv = container.parentElement; // group div
        var textarea = container.querySelector('.rosterInput');
        var ml = groupDiv.querySelector('.missingList');
        if (!textarea || !ml) return;

        var raw = textarea.value.trim();
        var rosterKey = textarea.getAttribute('data-key');
        if (rosterKey) localStorage.setItem(rosterKey, raw);

        var names = raw.split(/[\n,пјҢгҖҒ\s]+/).map(function(n){ return n.trim(); }).filter(Boolean);
        if (!names.length) { ml.innerHTML = ''; return; }

        // ж”¶йӣҶжң¬з»„е·ІжҸҗдәӨе§“еҗҚ
        var submitted = new Set();
        groupDiv.querySelectorAll('.import-row-cb').forEach(function(cb) {
            try {
                var r = JSON.parse(decodeURIComponent(cb.getAttribute('data-record')));
                if (r.studentName) submitted.add(r.studentName.trim());
            } catch(e) {}
        });

        var missing = names.filter(function(n) {
            // зІҫзЎ®еҢ№й…Қ жҲ– жЁЎзіҠеҢ№й…ҚпјҲдә’дёәеӯҗдёІпјү
            var nl = n.trim();
            for (var s of submitted) {
                if (s === nl) return false;           // зІҫзЎ®
                if (s.indexOf(nl) !== -1) return false; // жҸҗдәӨзҡ„еҢ…еҗ«еҗҚеҚ•еҗҚ
                if (nl.indexOf(s) !== -1) return false; // еҗҚеҚ•еҗҚеҢ…еҗ«жҸҗдәӨзҡ„
            }
            return true;
        });

        if (missing.length === 0) {
            ml.innerHTML = '<div style="font-size:9pt;color:#0f6e56;font-weight:600;">вң… е…ЁзҸӯе·ІжҸҗдәӨ</div>';
        } else {
            var h = '<div style="font-size:9pt;color:#92400e;font-weight:600;margin-bottom:4px;">вҡ пёҸ жңӘжҸҗдәӨпјҲ' + missing.length + ' дәәпјүпјҡ</div>';
            h += '<div style="display:flex;flex-wrap:wrap;gap:5px;">';
            missing.forEach(function(n) {
                h += '<span style="background:#fffbeb;color:#92400e;border:1px solid #fde68a;border-radius:5px;padding:2px 9px;font-size:9pt;">' + n + '</span>';
            });
            h += '</div>';
            ml.innerHTML = h;
        }
    }

    // в”Җв”Җ жҺ’еәҸиҫ…еҠ©пјҡиҺ·еҸ–еҪ“еүҚеӢҫйҖүзҡ„ recordsпјҲжҢүжҺ’еәҸеҗҺйЎәеәҸпјүв”Җв”Җ
    function _getSortedCheckedRecords() {
        const sel = document.getElementById('batchSortSelect');
        const sortMode = sel ? sel.value : 'num';

        var records = [];
        if (sortMode === 'manual') {
            // жүӢеҠЁжӢ–жҺ’пјҡжҢү DOM дёӯиЎҢзҡ„йЎәеәҸ
            document.querySelectorAll('.import-row-cb:checked').forEach(function(cb) {
                try { records.push(JSON.parse(decodeURIComponent(cb.getAttribute('data-record')))); } catch(e) {}
            });
        } else {
            document.querySelectorAll('.import-row-cb:checked').forEach(function(cb) {
                try { records.push(JSON.parse(decodeURIComponent(cb.getAttribute('data-record')))); } catch(e) {}
            });
            records.sort(function(a, b) {
                if (sortMode === 'num') {
                    return (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'name') {
                    return (a.studentName||'').localeCompare(b.studentName||'', 'zh-Hans-CN', {sensitivity:'base'});
                } else if (sortMode === 'class') {
                    var cc = (a.class||'').localeCompare(b.class||'', 'zh-Hans-CN');
                    return cc !== 0 ? cc : (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'source') {
                    // жәҗжөҒпјҡG3еҚҺж–Ү < й«ҳеҚҺпјҢз»„еҶ…жҢүзј–еҸ·
                    function _srcOrder(r) {
                        var g = (r.jingsai_group || r['inputs.jingsai_group'] || (r.inputs&&r.inputs.jingsai_group) || r.class || '').toLowerCase();
                        if (g.indexOf('g3') !== -1) return 0;
                        if (g.indexOf('й«ҳеҚҺ') !== -1) return 1;
                        return 2;
                    }
                    var so = _srcOrder(a) - _srcOrder(b);
                    return so !== 0 ? so : (parseInt(a.studentNum)||0) - (parseInt(b.studentNum)||0);
                } else if (sortMode === 'time') {
                    return (a.submitTime||'').localeCompare(b.submitTime||'');
                }
                return 0;
            });
        }
        return records;
    }

    // в”Җв”Җ еә”з”ЁжҺ’еәҸеҗҺеҲ·ж–°жҸҗзӨә в”Җв”Җ
    window.applyBatchSort = function() {
