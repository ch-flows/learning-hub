        if (info) {
            if (mode === 'manual') {
                info.style.display = '';
                info.innerHTML = 'рҹ–ұ жүӢеҠЁжӢ–жҺ’жЁЎејҸпјҡеҸҜеңЁдёӢж–№еҲ—иЎЁдёӯжӢ–еҠЁиЎҢи°ғж•ҙйЎәеәҸпјҢз”ҹжҲҗж—¶е°ҶжҢүеҪ“еүҚ DOM йЎәеәҸжү“еҚ°гҖӮ';
            } else {
                info.style.display = '';
                info.innerHTML = 'вң… е·ІйҖүжӢ©жҺ’еәҸж–№ејҸпјҡ<strong>' + (labels[mode]||mode) + '</strong>гҖӮз”ҹжҲҗжү№йҮҸжү“еҚ°ж–Үд»¶ж—¶е°ҶжҢүжӯӨйЎәеәҸжҺ’еҲ—гҖӮ';
            }
        }
        // иӢҘжүӢеҠЁжӢ–жҺ’пјҢз»ҷиЎЁж јиЎҢеҠ жӢ–жӢҪ
        if (mode === 'manual') _enableDragSort();
        else _disableDragSort();
    };

    // в”Җв”Җ жүӢеҠЁжӢ–жҺ’ в”Җв”Җ
    function _enableDragSort() {
        var tbody = document.querySelector('#importDataOverlay tbody');
        if (!tbody) return;
        tbody.querySelectorAll('tr').forEach(function(tr) {
            tr.draggable = true;
            tr.style.cursor = 'grab';
            tr.addEventListener('dragstart', _dragStart);
            tr.addEventListener('dragover', _dragOver);
            tr.addEventListener('drop', _dragDrop);
        });
    }
    function _disableDragSort() {
        var tbody = document.querySelector('#importDataOverlay tbody');
        if (!tbody) return;
        tbody.querySelectorAll('tr').forEach(function(tr) {
            tr.draggable = false;
            tr.style.cursor = '';
            tr.removeEventListener('dragstart', _dragStart);
            tr.removeEventListener('dragover', _dragOver);
            tr.removeEventListener('drop', _dragDrop);
        });
    }
    var _dragSrc = null;
    function _dragStart(e) { _dragSrc = this; e.dataTransfer.effectAllowed = 'move'; }
    function _dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
    function _dragDrop(e) {
        e.preventDefault();
        if (_dragSrc && _dragSrc !== this) {
            var tbody = this.parentNode;
            var rows = Array.from(tbody.querySelectorAll('tr'));
            var srcIdx = rows.indexOf(_dragSrc);
            var tgtIdx = rows.indexOf(this);
            if (srcIdx < tgtIdx) tbody.insertBefore(_dragSrc, this.nextSibling);
            else tbody.insertBefore(_dragSrc, this);
        }
    }

    // в”Җв”Җ еҜјеҮә WordпјҲд»…йҷҗ jingsai зЁҝзәёжЁЎжқҝпјҢйҖҗдәәеҜјеҮәпјүв”Җв”Җ
    window.batchExportWord = function() {
        var records = _getSortedCheckedRecords();
        if (!records.length) return;

        // иҝҮж»ӨеҮәжңүзЁҝзәёж–Үеӯ—зҡ„и®°еҪ•пјҲjingsai / yuedu-jingsai жЁЎжқҝпјү
        var jRecords = records.filter(function(r) {
            var tpl = r.template || (function(){
                var t = (r.assignTitle||'').replace(/\s/g,'');
                if(t.indexOf('зЁҝзәё')!==-1) return 'jingsai';
                if(t.indexOf('зІҫз»ғ')!==-1) return 'yuedu-jingsai';
                if(t.indexOf('йҳ…иҜ»')!==-1) return 'yuedu';
                if(t.indexOf('и®®и®ә')!==-1) return 'yilun';
                if(t.indexOf('жҸҸеҶҷ')!==-1) return 'miaoxie';
                return 'other';
            })();
            return tpl === 'jingsai' || tpl === 'yuedu-jingsai';
        });
        if (!jRecords.length) { alert('д»…зЁҝзәёжЁЎжқҝж”ҜжҢҒеҜјеҮә WordпјҢжүҖйҖүи®°еҪ•дёӯжңӘеҸ‘зҺ°зЁҝзәёжЁЎжқҝж•°жҚ®гҖӮ'); return; }

        // жүҖжңүиҖғз”ҹеҗҲе№¶иҝӣдёҖдёӘ Word ж–Үд»¶пјҢжҜҸдәәз”ЁеҲҶйЎөз¬Ұйҡ”ејҖ
        var allBodyHtml = '';
        jRecords.forEach(function(r, idx) {
            var name  = (r.inputs && r.inputs['field_0']) || r.studentName || '';
            var num   = (r.inputs && r.inputs['field_1']) || r.studentNum  || '';
            var title = (r.inputs && r.inputs['jingsai_title']) || '';
            var group = (r.inputs && r.inputs['jingsai_group']) || '';
            var text  = (r.inputs && r.inputs['jingsai_text'])  || '';
            var paras = text.split('\n');
            var bodyHtml = paras.map(function(p){
                // еҺ»жҺүж®өйҰ–е·Іжңүзҡ„е…Ёи§’з©әж јпјҢз”ұ CSS text-indent иҙҹиҙЈзј©иҝӣ
                var clean = p.replace(/^[гҖҖ\s]+/, '');
                return '<p style="text-indent:2em;line-height:1.8;margin:0 0 6pt 0;font-family:SimSun,serif;font-size:12pt;">'+(clean||'&nbsp;')+'</p>';
            }).join('');

            // еҲҶйЎөз¬ҰпјҲз¬¬дёҖдәәдёҚйңҖиҰҒпјү
            var pageBreak = idx > 0 ? '<div style="page-break-before:always;"></div>' : '';

            allBodyHtml += pageBreak
                + (title ? '<h2 style="font-size:14pt;text-align:center;margin-bottom:12pt;">'+title+'</h2>' : '')
                + '<div style="font-size:11pt;margin-bottom:16pt;">'
                + (name  ? 'е§“еҗҚпјҡ'+name+'&nbsp;&nbsp;&nbsp;&nbsp;' : '')
                + (num   ? 'зј–еҸ·пјҡ'+num +'&nbsp;&nbsp;&nbsp;&nbsp;' : '')
                + (group ? 'з»„еҲ«пјҡ'+group : '')
                + '</div>'
                + bodyHtml;
        });

        var assignTitle = (jRecords[0].assignTitle || 'еӯҰд№ еҚ•');
        var html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" '
            + 'xmlns:w="urn:schemas-microsoft-com:office:word" '
            + 'xmlns="http://www.w3.org/TR/REC-html40">'
            + '<head><meta charset="utf-8"><style>'
            + '@page{size:210mm 297mm;margin:25mm 25mm 25mm 25mm;}'
            + 'body{font-family:SimSun,serif;font-size:12pt;line-height:1.8;color:#000;}'
            + '</style></head><body>'
            + allBodyHtml
            + '</body></html>';

        var blob = new Blob([html], {type:'application/msword;charset=utf-8'});
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = assignTitle + '_жү№йҮҸеҜјеҮә_' + jRecords.length + 'дәә.doc';
        a.click();
    };

    // в”Җв”Җ з¬¬дёҖз§Қпјҡз”ҹжҲҗжү№йҮҸжү“еҚ° HTML ж–Үд»¶пјҲжң¬ең°пјҢдёҖж¬Ўжү“еҚ°е…ЁйғЁпјүв”Җв”Җ
    function batchGenerateHTML() {

        (function(){

    function fetchFromGAS() {
        const url = document.getElementById('scriptUrl').value.trim();
        if (!url) { alert('иҜ·е…ҲеңЁйҪҝиҪ®и®ҫзҪ®йҮҢеЎ«е…Ҙ Apps Script URL'); return; }

        const btn = document.getElementById('fetchGASBtn');
        if (btn) { btn.textContent = 'вҸі иҜ»еҸ–дёӯвҖҰ'; btn.disabled = true; }

        // зӣ‘еҗ¬ postMessageпјҲGAS йЎөйқўдјҡжҠҠж•°жҚ®еҸ‘иҝҮжқҘпјү
        function onMessage(event) {
            if (!event.data || event.data.source !== 'GAS_WORKSHEET') return;
            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = 'вҳҒпёҸ д»Һ Drive иҜ»еҸ–'; btn.disabled = false; }
            const data = event.data.payload;
            if (!data || !data.records || !data.records.length) {
                alert('Google Drive дёҠжІЎжңүжүҫеҲ°еӯҰд№ еҚ•ж•°жҚ®гҖӮ');
                return;
            }
            showImportedData(data.records);
        }
        window.addEventListener('message', onMessage);

        // ејҖж–°зӘ—еҸЈпјҲеҝ…йЎ»еңЁз”ЁжҲ·зӮ№еҮ»дәӢд»¶йҮҢзӣҙжҺҘи°ғз”ЁпјҢеҗҰеҲҷиў«жӢҰжҲӘпјү
        const readerUrl = url + '?action=getAll&type=worksheet&mode=postMessage';
        const popup = window.open(readerUrl, '_blank', 'width=500,height=200,left=200,top=200');
        closeWsScriptConfig();

        // и¶…ж—¶дҝқжҠӨ
        setTimeout(function() {
            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = 'вҳҒпёҸ д»Һ Drive иҜ»еҸ–'; btn.disabled = false; }
            if (popup && !popup.closed) popup.close();
        }, 30000);
    }

            if (idx >= records.length) {

                        switchTemplate(currentTemplate);
                        clearAllInputs();
                    }, 500);
                }, 600);
                return;
            }
            const r = records[idx];
            idx++;
            // еҲҮжҚўжЁЎжқҝе№¶иҝҳеҺҹж•°жҚ®
            const tpl = r.template || (function() {
                const title = (r.assignTitle || '').replace(/\s/g,'');
                if (title.indexOf('йҳ…иҜ»')!==-1) return 'yuedu';
                if (title.indexOf('и®®и®ә')!==-1) return 'yilun';
                if (title.indexOf('жҸҸеҶҷ')!==-1) return 'miaoxie';
                if (title.indexOf('е®һз”Ё')!==-1) return 'shiyong';
                if (title.indexOf('иЎЁиҫҫ')!==-1) return 'biaoda';
                if (title.indexOf('иҜҫе Ӯ')!==-1) return 'ketang';
                if (title.indexOf('зЁҝзәё')!==-1) return 'jingsai';
                return 'biaoda';
            })();
            switchTemplate(tpl);
            const pageSelector = '#page-' + tpl;

            // жё…з©әеҪ“еүҚйЎөйқў
            document.querySelectorAll(pageSelector + ' input[type="text"], ' + pageSelector + ' textarea').forEach(function(el){ el.value=''; });
            document.querySelectorAll(pageSelector + ' input[type="checkbox"]').forEach(function(el){ el.checked=false; });
            document.querySelectorAll(pageSelector + ' canvas').forEach(function(c){ try{ c.getContext('2d').clearRect(0,0,c.width,c.height); }catch(e){} });

            // иҝҳеҺҹж–Үеӯ—
            if (r.inputs) {
                document.querySelectorAll(pageSelector + ' input[type="text"], ' + pageSelector + ' textarea').forEach(function(el, i){
                    var v = r.inputs['field_'+i]; if (v !== undefined) el.value = v;
                });
                document.querySelectorAll(pageSelector + ' input[type="checkbox"]').forEach(function(el, i){
                    var v = r.inputs['check_'+i]; if (v !== undefined) el.checked = v;
                });
                // jingsai/yuedu-jingsaiпјҡиҝҳеҺҹзЁҝзәёж–Үеӯ—
                if ((tpl === 'jingsai' || tpl === 'yuedu-jingsai') && r.inputs['jingsai_text'] !== undefined && typeof window._jingsaiSetState === 'function') {
                    window._jingsaiSetState(r.inputs['jingsai_text'], r.inputs['jingsai_cur'] || 0);
                }
                // yuedu-jingsaiпјҡиҝҳеҺҹйўҳзӣ®е’ҢйўқеӨ–йўҳзӣ®
                if (tpl === 'yuedu-jingsai') {
                    if (r.inputs['yj_units']) {
                        try {
                            var _yjRestoreU = JSON.parse(r.inputs['yj_units']);
                            // жҒўеӨҚз¬¬дёҖйўҳйўҳзӣ®
                            if (_yjRestoreU[0]) {

                            if (typeof window.yjInit === 'function') window.yjInit(_yjRestoreU);
                        } catch(e) {}
                    } else if (r.inputs['yuedu_jingsai_question'] !== undefined) {
                        var _yjQEl = document.getElementById('yuedu-jingsai-question');

                // jingsaiпјҡиҝҳеҺҹеҸӮиөӣз»„еҲ«е’ҢдҪңж–Үйўҳзӣ® select
                if (tpl === 'jingsai') {

                        if (_bTSel && r.inputs['jingsai_title'] !== undefined) {
                            var _bTitle = r.inputs['jingsai_title'];
                            setTimeout(function() {

            const canvases = (r.canvases && Object.keys(r.canvases).length > 0) ? r.canvases : null;
            function afterRestore() {
                if (idx < records.length) {
                    setTimeout(function() {
                        smartPrint();
                        setTimeout(renderNext, 800);
                    }, 400);
                } else {
                    setTimeout(function() {
                        smartPrint();
                    }, 400);
                }
            }

            if (canvases) {
                const ids = Object.keys(canvases);
                let done = 0;
                requestAnimationFrame(function(){ requestAnimationFrame(function(){
                    if (ids.length === 0) { afterRestore(); return; }
                    ids.forEach(function(id){
                        const canvas = document.getElementById(id);
                        const dataUrl = canvases[id];
                        if (!canvas || !dataUrl || dataUrl.length < 1500) { done++; if(done===ids.length) afterRestore(); return; }
                        const img = new Image();
                        img.onload = function(){ canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height); done++; if(done===ids.length) afterRestore(); };
                        img.onerror = function(){ done++; if(done===ids.length) afterRestore(); };
                        img.src = dataUrl;
                    });
                });});
            } else {
                setTimeout(afterRestore, 300);
            }
        }

        renderNext();
    }

            if (e.target && e.target.id === 'kt-draw-canvas') {
                var canvas = e.target;
                canvas.style.pointerEvents = 'none';

                canvas.style.pointerEvents = '';
                var ruby = below && below.closest && below.closest('.kt-ruby');

                    var text = ruby.getAttribute('data-tip');
                    if (text) { tip.textContent = text; tip.style.display = 'block'; }
                } else {
                    tip.style.display = 'none';
                }
            }
            if (tip.style.display === 'none') return;
            var tw = tip.offsetWidth, th = tip.offsetHeight;
            var wx = window.innerWidth;
            tip.style.left = Math.min(e.clientX + 14, wx - tw - 14) + 'px';
            tip.style.top = (e.clientY - th - 12 < 8) ? (e.clientY + 18) + 'px' : (e.clientY - th - 12) + 'px';

<script>
// в”Җв”Җ иҝҒз§»пјҡдёәе·ІеӯҳеңЁзҡ„ .kt-ruby е…ғзҙ и®ҫзҪ® CSS йўңиүІеҸҳйҮҸ в”Җв”Җ
(function() {
    function hex2rgb(hex) {
        hex = (hex||'').replace('#','');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    }
    document.querySelectorAll('.kt-ruby').forEach(function(r) {
        // дјҳе…ҲиҜ» data-colorпјҢжІЎжңүеҲҷд»Һ style.color иҝҒз§»
        var hex = r.getAttribute('data-color');
        if (!hex) {
            var sc = r.style.color;
            if (sc && sc.indexOf('#') === 0) { hex = sc; }
            else if (sc && sc.indexOf('rgb') === 0) {
                var m = sc.match(/\d+/g);
                if (m) hex = '#'+('0'+parseInt(m[0]).toString(16)).slice(-2)+('0'+parseInt(m[1]).toString(16)).slice(-2)+('0'+parseInt(m[2]).toString(16)).slice(-2);
            }
            hex = hex || '#1565c0';
            r.setAttribute('data-color', hex);
        }
        // жІЎжңү data-rubystyle зҡ„ж—§жіЁйҮҠй»ҳи®Өз”Ё softпјҲж·ЎиүІеқ—пјү
        if (!r.getAttribute('data-rubystyle')) {
            r.setAttribute('data-rubystyle', 'soft');
        }
        var style = r.getAttribute('data-rubystyle') || 'soft';
        var rgb = hex2rgb(hex);
        r.style.setProperty('--rc', hex);
        var alpha = (style === 'highlight') ? '0.45' : '0.18';
        r.style.setProperty('--rca', 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+alpha+')');
        // жё…йҷӨж—§зҡ„ style.colorпјҲйҳІжӯўе№Іжү° CSS еҸҳйҮҸпјү
        r.style.removeProperty('color');
        // жҒўеӨҚеӯ—иүІ CSS еҸҳйҮҸпјҲdata-fc-colorпјү
        var fcColor = r.getAttribute('data-fc-color');
        if (fcColor) {
            r.style.setProperty('--kt-fc-span-color', fcColor);
            // з»ҷеҶ…йғЁеӯ—иүІ span еҠ дёҠ classпјҲе…је®№ж—§еӯҳжЎЈпјү
            var inner = r.querySelector('span:not(rt)');
            if (inner && inner.style.color) {
                inner.className = (inner.className ? inner.className + ' ' : '') + 'kt-fc-span';
                inner.style.removeProperty('color');
            }
        }
    });
})();
</script>

        // еҰӮжһңйј ж ҮеңЁ kt-draw-canvas дёҠпјҢз”Ё elementFromPoint з©ҝйҖҸжҹҘжүҫ ruby е…ғзҙ 
        if (e.target && e.target.id === 'kt-draw-canvas') {
            var canvas = e.target;
            canvas.style.pointerEvents = 'none';
            var below = document.elementFromPoint(e.clientX, e.clientY);
            canvas.style.pointerEvents = '';
            var ruby = below && below.closest && below.closest('.kt-ruby');
            if (ruby) {
                var text = ruby.getAttribute('data-tip');
                if (text) { tip.textContent = text; tip.style.display = 'block'; }
            } else {
                tip.style.display = 'none';
            }
        }
        if (tip.style.display === 'none') return;
        var tw = tip.offsetWidth, th = tip.offsetHeight;
        var wx = window.innerWidth, wy = window.innerHeight;
        tip.style.left = Math.min(e.clientX + 14, wx - tw - 14) + 'px';
        tip.style.top = (e.clientY - th - 12 < 8) ? (e.clientY + 18) + 'px' : (e.clientY - th - 12) + 'px';
    });
    document.addEventListener('mouseout', function(e) {
        var ruby = e.target.closest && e.target.closest('.kt-ruby');
        if (e.target && e.target.id === 'kt-draw-canvas') { tip.style.display = 'none'; return; }
        if (!ruby) return;
        tip.style.display = 'none';
    });
})();
</script>
<script>
// в•җв•җ и®®и®әе°ҸзәІжЁЎеқ— в•җв•җ
(function(){

    // йўңиүІеҫӘзҺҜпјҡж–°еўһжЎҶж—¶иҪ®жҚўж ҮзӯҫйўңиүІ
    var _ymColors = [
        {color:'#4a7fc1', bg:'#e8f2fb'},
        {color:'#1e8449', bg:'#e9f7ef'},
        {color:'#b7770d', bg:'#fef9e7'},
        {color:'#8e44ad', bg:'#f5eef8'},
        {color:'#c0392b', bg:'#fdedec'},
        {color:'#117a8b', bg:'#e0f7fa'}
    ];

    // зј–иҫ‘жЁЎејҸзӣ‘еҗ¬пјҡжҳҫзӨә/йҡҗи—Ҹзј–иҫ‘жҢүй’®пјҢд»ҘеҸҠж Үзӯҫ/иҜҙжҳҺеҸҳдёәеҸҜзј–иҫ‘
    var _ymLastEdit = null;
    function _ymCheckEdit() {
        var isEdit = document.body.classList.contains('edit-mode-on');
        if (isEdit === _ymLastEdit) return;
        _ymLastEdit = isEdit;
        var pg = document.getElementById('page-yilun-mini');
        if (!pg) return;
        // зј–иҫ‘жҢүй’®жҳҫзӨә/йҡҗи—Ҹ
        pg.querySelectorAll('.ym-edit-only').forEach(function(el){
            el.style.display = isEdit ? 'flex' : 'none';
        });
        // й—®йўҳж ҮйўҳеҸҜзј–иҫ‘
        pg.querySelectorAll('.ym-q-title').forEach(function(el){
            el.contentEditable = isEdit ? 'true' : 'false';
        });
        // еұ•ејҖжЎҶж Үзӯҫе’ҢиҜҙжҳҺеҸҜзј–иҫ‘
        pg.querySelectorAll('.ym-block-label, .ym-block-hint').forEach(function(el){
            el.contentEditable = isEdit ? 'true' : 'false';
        });
    }
    var _ymObs = new MutationObserver(_ymCheckEdit);
    _ymObs.observe(document.body, {attributes:true, attributeFilter:['class']});

    // еҠ еұ•ејҖжЎҶ
    window.ymAddExpandBlock = function() {
        var container = document.getElementById('ym-expand-blocks');
        if (!container) return;
        var blocks = container.querySelectorAll('.ym-expand-block');
        var n = blocks.length + 1;
        var c = _ymColors[(n-1) % _ymColors.length];
        var div = document.createElement('div');
        div.className = 'ym-expand-block';
        div.dataset.block = n;
        div.innerHTML =
            '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">'
            + '<span class="ym-block-label" style="font-size:8pt;font-weight:700;color:'+c.color+';background:'+c.bg+';padding:1px 9px;border-radius:3px;white-space:nowrap;outline:none;" contenteditable="true">ж Үзӯҫ</span>'
            + '<span class="ym-block-hint" style="font-size:7.5pt;color:#888;outline:none;" contenteditable="true">иҜҙжҳҺж–Үеӯ—</span>'
            + '</div>'
            + '<textarea class="ym-expand-ta" placeholder="еңЁиҝҷйҮҢдҪңзӯ”вҖҰвҖҰ" style="width:100%;height:58px;border:0.5px solid #c0d4e8;border-radius:5px;padding:6px 9px;font-size:9pt;font-family:inherit;resize:vertical;line-height:1.7;box-sizing:border-box;background:transparent;outline:none;"></textarea>';
        container.appendChild(div);
    };

    // еҮҸеұ•ејҖжЎҶпјҲжңҖе°‘дҝқз•ҷ1дёӘпјү
    window.ymRemoveExpandBlock = function() {
        var container = document.getElementById('ym-expand-blocks');
        if (!container) return;
        var blocks = container.querySelectorAll('.ym-expand-block');
        if (blocks.length <= 1) return;
        container.removeChild(blocks[blocks.length - 1]);
    };

    // зүҲйқўиҸңеҚ•пјҡжҳҫзӨә/йҡҗи—Ҹй—®йўҳдәҢж•ҙеқ—
    window.ymToggleQ2 = function(show) {
        var block = document.getElementById('ym-q2-block');
        if (!block) return;
        block.style.display = show ? '' : 'none';
        // иӢҘйҡҗи—Ҹж—¶й—®йўҳдәҢжңүиў«йҖүдёӯзҡ„еҲҶи®әзӮ№пјҢжё…йҷӨ
        if (!show) {
            block.querySelectorAll('input[type="radio"]').forEach(function(r){
                if (r.checked) { r.checked = false; ymSyncSelected(); }
            });
        }
    };

    // еҠ /еҮҸз¬¬3дёӘеҲҶи®әзӮ№пјҲgridеёғеұҖпјҡйҡҗи—Ҹж—¶зј©дёәдёӨеҲ—пјү
    window.ymTogglePoints = function(qNum, pNum) {
        var row = document.getElementById('ym-q'+qNum+'-p'+pNum);
        var grid = document.getElementById('ym-q'+qNum+'-points-grid');
        if (!row) return;
        var showing = row.style.display !== 'none';
        row.style.display = showing ? 'none' : '';
        if (grid) grid.style.gridTemplateColumns = showing ? '1fr 1fr' : '1fr 1fr 1fr';
        // иӢҘйҡҗи—Ҹж—¶иҜҘзӮ№иў«йҖүдёӯпјҢжё…йҷӨйҖүжӢ©
        if (showing) {
            var r = row.querySelector('input[type="radio"]');
            if (r && r.checked) { r.checked = false; ymSyncSelected(); }
        }
    };

    // еҗҢжӯҘйҖүдёӯеҲҶи®әзӮ№еҲ°еұ•ејҖеҢәж Үзӯҫе’ҢеҲҶдә«еҢә
    window.ymSyncSelected = function() {
        var sel = document.querySelector('#page-yilun-mini input[name="ym-select"]:checked');
        var label = document.getElementById('ym-expand-label');
        var shareWhich = document.getElementById('ym-share-which');
        if (!sel) {
            if (label) label.style.display = 'none';
            if (shareWhich) shareWhich.textContent = 'пјҹ';
            return;
        }
        var parts = sel.value.split('-'); // e.g. "1-2" вҶ’ q=1, p=2
        var qNum = parts[0], pNum = parts[1];
        var pMap = {'1':'дёҖ','2':'дәҢ','3':'дёү'};
        var txt = 'й—®йўҳ' + (pMap[qNum]||qNum) + ' В· и®әзӮ№' + (pMap[pNum]||pNum);
        if (label) { label.textContent = txt; label.style.display = ''; }
        if (shareWhich) shareWhich.textContent = txt;
    };

})();
</script>
<script>
// в•җв•җ йҳ…иҜ»зІҫз»ғйўқеӨ–йўҳзӣ®еј•ж“ҺпјҲз®ҖеҢ–зүҲпјүв•җв•җ
(function(){

var _yjExtraUnits = []; // {id, question, rows}
var _yjExtraCounter = 0;

// йўқеӨ–йўҳзӣ®пјҡе®Ңе…ЁзӢ¬з«Ӣзҡ„иҝ·дҪ jingsaiе®һдҫӢпјҲдёҚе…ұдә«д»»дҪ•е…ЁеұҖзҠ¶жҖҒпјү
function _drawCSSGrid(containerEl, rows) {
    var COLS=20, ROWS_E=22, G='#4caf50';
    var dpr=window.devicePixelRatio||1;
    // жҜҸдёӘе®һдҫӢиҮӘе·ұзҡ„зҠ¶жҖҒ
    var _r = rows||10; // еҪ“еүҚжҳҫзӨәиЎҢж•°пјҲд»ҺrowsејҖе§ӢйҖҗиЎҢжү©еұ•пјү
    var _cW,_cH,_auxH,_gH,_TW,_TH;
    var _text='гҖҖгҖҖ', _cur=2, _composing=false;
    var _history=[];
    var _locked=false;

    containerEl.innerHTML='';
    containerEl.style.cssText='width:100%;display:block;';

    // page-blockз»“жһ„пјҲдёҺQ1дёҖж ·пјү
    var block=document.createElement('div');
    block.className='jingsai-page-block yj-mini-block';
    block.style.cssText='width:100%;';
    var outer=document.createElement('div');
    outer.style.cssText='display:block;width:100%;box-sizing:border-box;background:#fff;line-height:0;font-size:0;position:relative;overflow:visible;';
    var wrap=document.createElement('div');
    wrap.style.cssText='position:relative;background:#fff;overflow:visible;cursor:text;width:100%;';
    var cv=document.createElement('canvas');
    cv.style.cssText='display:block;width:100%;';
    var textDiv=document.createElement('div');
    textDiv.style.cssText='position:absolute;top:0;left:0;pointer-events:none;overflow:visible;';
    var cursor=document.createElement('div');
    cursor.style.cssText='position:absolute;width:1.5px;background:#2e7d32;pointer-events:none;display:none;animation:jc-blink 1s step-end infinite;z-index:4;';
    wrap.appendChild(cv); wrap.appendChild(textDiv); wrap.appendChild(cursor);
    outer.appendChild(wrap); block.appendChild(outer);
    var pn=document.createElement('div');
    pn.style.cssText='font-size:8pt;color:#999;text-align:right;padding-right:4px;margin-top:5px;line-height:1;';
    pn.textContent='з¬¬ 1 йЎө';
    block.appendChild(pn);
    containerEl.appendChild(block);

    // з”»ж јеӯҗ
    function _drawGrid(r2) {
        var W=wrap.clientWidth; if(W<10)return false;
        _TW=W; _cW=W/COLS; _cH=Math.min(_cW,Math.floor(957/31.8));
        _auxH=Math.round(_cH*0.4); _gH=_cH+_auxH; _TH=(r2-1)*_gH+_cH;
        var BOT=2;
        cv.width=Math.round(W*dpr); cv.height=Math.round((_TH+BOT)*dpr);
        cv.style.width=W+'px'; cv.style.height=(_TH+BOT)+'px';
        wrap.style.height=(_TH+BOT)+'px';
        outer.style.height=(_TH+BOT+4)+'px';
        textDiv.style.width=W+'px'; textDiv.style.height=(_TH+BOT)+'px';
        var ctx=cv.getContext('2d');
        ctx.scale(dpr,dpr); ctx.clearRect(0,0,W,_TH+BOT);
        ctx.strokeStyle=G; ctx.lineWidth=0.7;
        for(var ri=0;ri<r2;ri++){
            var base=ri*_gH,wb=base+_cH,ab=wb+_auxH;
            if(ri<r2-1){ctx.beginPath();ctx.moveTo(0,wb);ctx.lineTo(W,wb);ctx.stroke();}
            if(ri<r2-1){ctx.beginPath();ctx.moveTo(0,ab);ctx.lineTo(W,ab);ctx.stroke();}
            for(var ci=1;ci<COLS;ci++){ctx.beginPath();ctx.moveTo(ci*_cW,base);ctx.lineTo(ci*_cW,wb);ctx.stroke();}
        }
        ctx.lineWidth=1.5; ctx.strokeRect(0.75,0.75,W-1.5,_TH+BOT-1.5);
        return true;
    }

    // жёІжҹ“ж–Үеӯ—
    function _render() {
        if(!_cW)return;
        // и®Ўз®—йңҖиҰҒеӨҡе°‘иЎҢ
        var usedR=0,usedC=0;
        for(var i=0;i<_text.length;i++){
            if(_text[i]==='\n'){usedR++;usedC=0;}
            else{usedC++;if(usedC>=COLS){usedR++;usedC=0;}}
        }
        usedR++;
        // йҖҗиЎҢжү©еұ•
        if(usedR>_r&&_r<ROWS_E){_r++;_drawGrid(_r);}
        // жё…з©әж–Үеӯ—еұӮ
        textDiv.innerHTML='';
        var fs=Math.round(_cH*0.60);
        var topOff=Math.round((_cH-fs)/2);
        var row=0,col=0;
        for(var idx=0;idx<_text.length;idx++){
            if(idx===_cur){_showCursor(row,col,fs,topOff);}
            var ch=_text[idx];
            if(ch==='\n'){row++;col=0;if(row>=ROWS_E){break;}continue;}
            if(row<_r){
                var sp=document.createElement('span');
                sp.textContent=ch;
                sp.style.cssText='position:absolute;left:'+(col*_cW)+'px;top:'+(row*_gH+topOff)+'px;width:'+_cW+'px;height:'+fs+'px;display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:100;line-height:1;color:#1a2a3a;font-family:SimSun,е®ӢдҪ“,STSong,serif;box-sizing:border-box;transform:translateY(-'+Math.round(fs*0.08)+'px);';
                textDiv.appendChild(sp);
            }
            col++;
            if(col>=COLS){row++;col=0;if(row>=ROWS_E)break;}
        }
        if(_cur>=_text.length){_showCursor(row,col,fs,topOff);}
    }

    function _showCursor(row,col,fs,topOff){
        if(row>=_r)return;
        cursor.style.display='block';
        cursor.style.left=(col*_cW+1)+'px';
        cursor.style.top=(row*_gH+topOff)+'px';
        cursor.style.height=fs+'px';
    }

    // дҪҚзҪ®иҪ¬жҚў
    function _rcToPos(r2,c2){
        var pos=0,row=0,col=0;
        for(var i=0;i<_text.length;i++){
            if(row===r2&&col===c2)return i;
            if(_text[i]==='\n'){row++;col=0;}
            else{col++;if(col>=COLS){row++;col=0;}}
        }
        return _text.length;
    }

    // иҫ“е…ҘеӨ„зҗҶ
    function _insert(str){
        var clean='';
        for(var i=0;i<str.length;i++){
            var ch=str[i];
            if(ch==='\n'){clean+='\nгҖҖгҖҖ';}
            else{clean+=ch;}
        }
        if(!clean)return;
        _text=_text.slice(0,_cur)+clean+_text.slice(_cur);
        _cur+=clean.length;
        _render();
    }

    function _del(before){
        if(before&&_cur>0){
            // еҲ йҷӨеүҚдёҖдёӘеӯ—пјҲеӨ„зҗҶе…Ёи§’з©әж јж®өйҰ–пјү
            var prev=_text[_cur-1];
            if(prev==='\n'&&_cur>=3&&_text[_cur-2]==='гҖҖ'&&_text[_cur-3]==='гҖҖ'){
                _text=_text.slice(0,_cur-3)+_text.slice(_cur);_cur-=3;
            } else {
                _text=_text.slice(0,_cur-1)+_text.slice(_cur);_cur--;
            }
        } else if(!before&&_cur<_text.length){
            _text=_text.slice(0,_cur)+_text.slice(_cur+1);
        }
        _render();
    }

    // иҺ·еҸ–/и®ҫзҪ®ж–Үеӯ—пјҲдҫӣеӨ–йғЁиҜ»еҸ–пјү
    containerEl._yjGetText=function(){return _text;};
    containerEl._yjSetText=function(t,c){_text=t||'гҖҖгҖҖ';_cur=c||2;};
    containerEl._yjSetLocked=function(v){_locked=v;cursor.style.display='none';};

    // з»‘е®ҡclick
    wrap.addEventListener('click',function(ev){
        if(_locked)return;
        if(!_cW)return;
        var rect=wrap.getBoundingClientRect();
        var x=ev.clientX-rect.left, y=ev.clientY-rect.top;
        var clickCol=Math.max(0,Math.min(Math.floor(x/_cW),COLS-1));
        var clickRow=Math.max(0,Math.min(Math.floor(y/_gH),_r-1));
        _cur=_rcToPos(clickRow,clickCol);
        _render();
        // жҝҖжҙ»йҡҗи—Ҹinput
        var hi=_getOrCreateHI();
        if(hi)hi.focus();
        // жҠҠй”®зӣҳдәӢд»¶еј•еҗ‘жӯӨе®һдҫӢ
        window._yjActiveExtra=containerEl;
    });

    function _getOrCreateHI(){
        var id='yj-extra-hi-'+Math.random().toString(36).slice(2);
        var hi=containerEl._hi;
        if(!hi){
            hi=document.createElement('input');
            hi.type='text'; hi.autocomplete='off'; hi.autocorrect='off'; hi.autocapitalize='off';
            hi.style.cssText='position:fixed;opacity:0;width:1px;height:1px;border:none;outline:none;z-index:9999;font-size:16px;background:transparent;left:0;top:0;pointer-events:none;';
            hi.setAttribute('inputmode','text');
            document.body.appendChild(hi);
            containerEl._hi=hi;

            hi.addEventListener('compositionstart',function(){_composing=true;});
            hi.addEventListener('compositionend',function(e){
                _composing=false;
                if(e.data)_insert(e.data);
                hi.value='';
            });
            hi.addEventListener('input',function(e){
                if(_composing)return;
                var v=hi.value;
                if(v){_insert(v);hi.value='';}
            });
            hi.addEventListener('keydown',function(e){
                if(_locked)return;
                if(e.key==='Backspace'){e.preventDefault();_del(true);}
                else if(e.key==='Delete'){e.preventDefault();_del(false);}
                else if(e.key==='Enter'){e.preventDefault();_insert('\n');}
                else if(e.key==='ArrowLeft'){e.preventDefault();if(_cur>0){_cur--;_render();}}
                else if(e.key==='ArrowRight'){e.preventDefault();if(_cur<_text.length){_cur++;_render();}}
            });
            hi.addEventListener('blur',function(){cursor.style.display='none';window._yjActiveExtra=null;});
        }
        return hi;
    }

    // еҲқе§ӢеҢ–пјҡзӯүеҫ…layoutеҗҺз”»ж јеӯҗ
    function _tryInit(n){
        if(_drawGrid(_r)){_render();}
        else if(n>0){setTimeout(function(){_tryInit(n-1);},80);}
    }
    setTimeout(function(){_tryInit(30);},50);
}

// еҲӣе»әйўқеӨ–йўҳзӣ®еҚ•е…ғ
function _makeExtraUnit(uid, qText, isEdit) {
    var unit = document.createElement('div');
    unit.className = 'yj-extra-unit';
    unit.dataset.uid = uid;
    unit.style.cssText = 'margin-bottom:32px;';

    var qWrap = document.createElement('div');
    qWrap.style.cssText = 'background:#eef4fb;border-radius:8px;padding:10px 16px;margin-bottom:10px;position:relative;';

    var qLabel = document.createElement('div');
    qLabel.style.cssText = 'font-size:8.5pt;font-weight:600;color:#1a4070;margin-bottom:6px;';
    qLabel.setAttribute('contenteditable','false');
    qLabel.textContent = 'рҹ“Ң йўҳзӣ®пјҡ';

    var qBox = document.createElement('div');
    qBox.className = 'yj-extra-question';
    qBox.setAttribute('contenteditable', isEdit ? 'true' : 'false');
    qBox.setAttribute('spellcheck','false');
    qBox.style.cssText = 'font-size:9.5pt;color:#1a2a3a;line-height:1.8;min-height:44px;outline:none;font-family:inherit;white-space:pre-wrap;';
    qBox.textContent = qText || 'пјҲиҖҒеёҲеңЁжӯӨиҫ“е…Ҙйўҳзӣ®пјү';

    var delBtn = document.createElement('button');
    delBtn.className = 'yj-del-btn';
    delBtn.style.cssText = 'position:absolute;top:8px;right:10px;background:none;border:none;color:#c0392b;font-size:10pt;cursor:pointer;padding:2px 6px;display:' + (isEdit ? 'block' : 'none') + ';';
    delBtn.textContent = 'рҹ—‘';
    delBtn.onclick = function(){ yjDeleteExtraUnit(uid); };

    qWrap.appendChild(qLabel);
    qWrap.appendChild(qBox);
    qWrap.appendChild(delBtn);

    var gridWrap = document.createElement('div');
    gridWrap.className = 'yj-extra-grid-wrap';
    gridWrap.style.cssText = 'width:100%;';
    _drawCSSGrid(gridWrap, 10);

    // зӮ№еҮ»йўқеӨ–йўҳзӣ®ж јеӯҗж—¶пјҢеҲҮжҚўjingsaiеј•ж“ҺеҲ°жӯӨе®№еҷЁ
    gridWrap.addEventListener('click', function(ev) {
        ev.stopPropagation();
        yjActivateExtra(uid);
    });

    unit.appendChild(qWrap);
    unit.appendChild(gridWrap);
    return unit;
}

// жҝҖжҙ»йўқеӨ–йўҳзӣ®пјҲиҝ·дҪ е®һдҫӢйҖҡиҝҮclickиҮӘе·ұеӨ„зҗҶпјү
window.yjActivateExtra = function(uid) {
    window._yjCurrentExtra = uid;
};

// жҒўеӨҚз¬¬дёҖйўҳпјҲзӮ№еҮ»з¬¬дёҖйўҳж—¶пјү
window.yjActivateQ1 = function() {
    if (window._yjCurrentExtra && window._jingsaiGetState) {
        var oldState = _yjExtraUnits.find(function(u){ return u.id === window._yjCurrentExtra; });
        if (oldState) { var st = window._jingsaiGetState(); oldState.text = st.text; oldState.cur = st.cur; }
    }
    window._yjCurrentExtra = null;
    var container = document.getElementById('yuedu-jingsai-pages-container');
    if (typeof window._jingsaiSetContainer === 'function') window._jingsaiSetContainer(container);
    if (typeof window._jingsaiSetRows === 'function') window._jingsaiSetRows(window._jingsaiGetRows ? window._jingsaiGetRows() : 10);
    if (window._yjQ1State && typeof window._jingsaiSetState === 'function') {

window.yjDeleteExtraUnit = function(uid) {

window.yjGetAllUnits = function() {

    var q1El = document.getElementById('yuedu-jingsai-question');

        var _extraState = _yjExtraUnits.find(function(u){ return u.id === window._yjCurrentExtra; });

            var _st = window._jingsaiGetState();

        // еҲҮеӣһQ1иҜ»еҸ–зҠ¶жҖҒ

    var units = [{index:0, question:q1Text, text:q1Answer, cur:2, rows:10}];

// yjInit: restore from saved data (student file)
window.yjInit = function(savedUnits) {

        var dom = _makeExtraUnit(uid, u.question, isEdit);
        container.appendChild(dom);
        // жҒўеӨҚиҝ·дҪ е®һдҫӢзҠ¶жҖҒ
        if (u.text && u.text !== 'гҖҖгҖҖ') {

                if (gw && typeof gw._yjSetText === 'function') {
                    gw._yjSetText(savedText, savedCur || 2);

        }

};

// _yjDrawAllGrids: no-op for extra units (CSS grids already drawn)
window._yjDrawAllGrids = function() {};

<script>
(function(){
  var COLS=20,ROWS=22,PAGE_CHARS=COLS*ROWS,G='#4caf50';
  var TOTAL=PAGE_CHARS*10; // ж”ҜжҢҒжңҖеӨҡ10йЎөпјҲж— е®һйҷ…дёҠйҷҗпјҢеҠЁжҖҒжү©еұ•пјү
  var dpr=window.devicePixelRatio||1;
  var cW,cH,auxH,gH,TW,TH;
  var _text='гҖҖгҖҖ',_cur=2,_composing=false;
  var _history=[];
  var _pageCount=1; // еҪ“еүҚе·ІжёІжҹ“зҡ„йЎөж•°
  function _pushHistory(){if(_history.length>20)_history.shift();_history.push({text:_text,cur:_cur});}

  // в”Җв”Җ еӨҡйЎөиҫ…еҠ©пјҡиҝ”еӣһз¬¬nйЎөпјҲ0-indexedпјүзҡ„wrap/canvas/box/cursor в”Җв”Җ
  function _getPageEls(pageIdx){
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    if(pageIdx>=blocks.length)return null;
    var b=blocks[pageIdx];
    return {
      wrap:b.querySelector('.jingsai-grid-wrap'),
      cv:b.querySelector('.jingsai-grid-canvas'),
      box:b.querySelector('.jingsai-text-canvas'),
      cur:b.querySelector('.jingsai-cursor')
    };
  }

  // в”Җв”Җ еҚ•йЎөж— йҷҗжү©еұ•пјҢе§Ӣз»Ҳиҝ”еӣһ1 в”Җв”Җ
  function _calcPageCount(text){ return 1; } // dead code removed
  function _calcPageCount_unused(text){
    // йҖҗеӯ—з¬Ұжү«жҸҸпјҢз»ҹи®ЎиЎҢж•°
    var row=0,col=0;
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
    }
    var rows = _activeRows || ROWS;
    return Math.max(1,Math.ceil((row+1)/rows));
  }

  // в”Җв”Җ зЎ®дҝқDOMдёӯжңүи¶іеӨҹйЎөж•° в”Җв”Җ
  function _ensurePages(n){
    var container=_yjContainer();
    if(!container)return;
    var existing=container.querySelectorAll('.jingsai-page-block').length;
    for(var i=existing;i<n;i++){
      var pageNum=i+1;
      var block=document.createElement('div');
      block.className='jingsai-page-block';
      block.setAttribute('data-page',i);
      block.innerHTML=
        '<div style="display:block;width:100%;box-sizing:border-box;background:#fff;line-height:0;font-size:0;height:auto !important;overflow:visible !important;position:relative;">'+
          '<div class="jingsai-grid-wrap" style="position:relative;background:#fff;overflow:visible !important;">'+
            '<canvas class="jingsai-grid-canvas" style="display:block;width:100%;"></canvas>'+
            '<div class="jingsai-text-canvas" style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible;"></div>'+
            '<div class="jingsai-cursor" style="position:absolute;width:1.5px;background:#2e7d32;pointer-events:none;display:none;animation:jc-blink 1s step-end infinite;z-index:4;"></div>'+
          '</div>'+
        '</div>'+
        '<div class="jingsai-page-num" style="font-size:8pt;color:#999;text-align:right;padding-right:4px;margin-top:5px;line-height:1;">з¬¬ '+pageNum+' йЎө</div>';
      // ж–°йЎөпјҡйҳ…иҜ»зІҫз»ғд»Һ10иЎҢејҖе§ӢпјҢжҷ®йҖҡзЁҝзәё22иЎҢ
      var _yjCheck = document.getElementById('page-yuedu-jingsai');
      var _isYJNP = _yjCheck && _yjCheck.style.display !== 'none';
      if (_isYJNP) block.dataset.rows = '10';
      container.appendChild(block);
      if (_isYJNP) {
        var _savedAR4 = _activeRows, _savedTH4 = TH;
        _activeRows = 10; TH = (_activeRows-1)*gH+cH;
        _drawGridForPage(i);
        _activeRows = _savedAR4; TH = _savedTH4;
      } else {
        _drawGridForPage(i);
      }
      if (typeof _bindPageClick === 'function') _bindPageClick(i);
    }
  }

  // в”Җв”Җ е…је®№ж—§жҺҘеҸЈ в”Җв”Җ
  function getWrap(){var e=_getPageEls(0);return e?e.wrap:null;}
  function getCV(){var e=_getPageEls(0);return e?e.cv:null;}
  function getBox(){var e=_getPageEls(0);return e?e.box:null;}
  function getCurEl(){var e=_getPageEls(0);return e?e.cur:null;}

  // в”Җв”Җ з»ҳеҲ¶еҚ•йЎөж јеӯҗ в”Җв”Җ
  function _drawGridForPage(pageIdx){
    var e=_getPageEls(pageIdx);if(!e||!e.wrap||!e.cv)return;
    var wrap=e.wrap,cv=e.cv;
    if(!TW){TW=wrap.clientWidth;if(TW<10)TW=wrap.parentNode.clientWidth||300;}
    if(TW<10)return;
    if(!cW){
      cW=TW/COLS;
      var maxCH=Math.floor(957/31.8);
      cH=Math.min(cW,maxCH);
      auxH=Math.round(cH*0.4);gH=cH+auxH;
      TH=(_activeRows-1)*gH+cH;
    }
    var pageRows=_activeRows;
    var BOT=2;
    cv.width=Math.round(TW*dpr);cv.height=Math.round((TH+BOT)*dpr);
    cv.style.width=TW+'px';cv.style.height=(TH+BOT)+'px';
    wrap.style.height=(TH+BOT)+'px';
    var outerDiv=wrap.parentNode;
    if(outerDiv){outerDiv.style.height=(TH+BOT+4)+'px';}
    var ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);ctx.clearRect(0,0,TW,TH+BOT);
    ctx.strokeStyle=G;ctx.lineWidth=0.7;
    for(var r=0;r<pageRows;r++){
      var base=r*gH,wb=base+cH,ab=wb+auxH;
      if(r<pageRows-1){ctx.beginPath();ctx.moveTo(0,wb);ctx.lineTo(TW,wb);ctx.stroke();}
      if(r<pageRows-1){ctx.beginPath();ctx.moveTo(0,ab);ctx.lineTo(TW,ab);ctx.stroke();}
      for(var c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*cW,base);ctx.lineTo(c*cW,wb);ctx.stroke();}
    }
    // еӨ–жЎҶпјҡlineWidth=1.5жңҖеҗҺз»ҳеҲ¶пјҢзЎ®дҝқеӣӣиҫ№жё…жҷ°еҸҜи§Ғ
    ctx.lineWidth=1.5;ctx.strokeRect(0.75,0.75,TW-1.5,TH+BOT-1.5);
  }

  // йҳ…иҜ»зІҫз»ғжЁЎејҸдёӢжҜҸйЎөзҡ„иЎҢж•°пјҲй»ҳи®Ө10иЎҢпјҢи¶…еҮәж—¶з”ұ renderChars еҠЁжҖҒжү©еұ•еҲ°22иЎҢпјү
  var _activeRows = 1; // д»Һ1иЎҢејҖе§ӢйҖҗиЎҢжү©еұ•
  window._jingsaiSetRows = function(n) { _activeRows = Math.max(1, n); };
  window._jingsaiGetRows = function() { return _activeRows; };

  function drawGrid(){
    // йҮҚзҪ®е°әеҜёпјҲresizeж—¶йңҖйҮҚз®—пјү
    var e0=_getPageEls(0);
    if(e0&&e0.wrap){TW=e0.wrap.clientWidth;if(TW<10)return;}
    cW=TW/COLS;
    var maxCH=Math.floor(957/31.8);
    cH=Math.min(cW,maxCH);
    auxH=Math.round(cH*0.4);gH=cH+auxH;TH=(_activeRows-1)*gH+cH;
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var i=0;i<blocks.length;i++){_drawGridForPage(i);}
  }

  function posToRC(pos){
    var r=0,c=0,txt=_text.substring(0,pos);
    for(var i=0;i<txt.length;i++){
      if(txt[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return {r:r,c:c};
  }

  function rcToPos(row,col){
    if(row<0)return 0;
    var r=0,c=0;
    for(var i=0;i<_text.length;i++){
      if(r===row&&c===col)return i;
      if(r>row)return i;
      if(_text[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return _text.length;
  }

  function renderChars(){
    if(!cW)return;

    // в”Җв”Җ и®Ўз®—йңҖиҰҒеӨҡе°‘йЎөпјҢйҳ…иҜ»зІҫз»ғжЁЎејҸдёӢе…Ҳе°қиҜ•жү©еұ•иЎҢж•°еҶҚжү©еұ•йЎөж•° в”Җв”Җ
    var _yjPg = document.getElementById('page-yuedu-jingsai');
    var _isYjMode = _yjPg && _yjPg.style.display !== 'none'; // йҳ…иҜ»зІҫз»ғжЁЎејҸпјҲеҢ…жӢ¬Q1е’ҢйўқеӨ–йўҳпјү

    // йҖҗиЎҢж— йҷҗжү©еұ•пјҡи®Ўз®—е®һйҷ…йңҖиҰҒиЎҢж•°пјҢжү©еұ• _activeRows
    var _needR = 0, _needC2 = 0;
    for (var _ni = 0; _ni < _text.length; _ni++) {
      if (_text[_ni] === '\n') { _needR++; _needC2 = 0; }
      else { _needC2++; if (_needC2 >= COLS) { _needR++; _needC2 = 0; } }
    }
    _needR++;
    if (_needR > _activeRows) {
      _activeRows = _needR;
      TH = (_activeRows - 1) * gH + cH;
      _drawGridForPage(0);
      var _p0els = _getPageEls(0);
      if (_p0els && _p0els.box) {
        _p0els.box.style.height = TH + 'px';
        _p0els.box.style.width = TW + 'px';
      }
    }
    _ensurePages(1);

    // в”Җв”Җ жё…з©әжүҖжңүзҺ°жңүйЎөзҡ„ж–Үжң¬еұӮ в”Җв”Җ
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.box){
        // з”ЁиҜҘйЎөе®һйҷ…иЎҢж•°и®Ўз®—boxй«ҳеәҰпјҲж”ҜжҢҒйҖҗиЎҢжү©еұ•пјү
        var _biRows = blocks[bi].dataset.rows ? parseInt(blocks[bi].dataset.rows) : _activeRows;
        var _biTH = (_biRows-1)*gH+cH;
        be.box.innerHTML='';
        be.box.style.width=TW+'px';
        be.box.style.height=_biTH+'px';
        be.box.style.overflow='visible';
      }
      if(be&&be.cur){be.cur.style.display='none';}
    }

    // в”Җв”Җ йҖҗеӯ—з¬ҰеҲҶй…ҚеҲ°еҗ„йЎө в”Җв”Җ
    var fs=Math.round(cH*0.60);
    var pageIdx=0,row=0,col=0;
    var curPage=_getPageEls(pageIdx);
    var curBox=curPage?curPage.box:null;

    // еҪ“еүҚе…үж ҮжүҖеңЁйЎөе’Ңж ј
    var curRC=null; // {page,row,col}

    for(var idx=0;idx<_text.length;idx++){
      var ch=_text[idx];

      // и®°еҪ•е…үж ҮдҪҚзҪ®
      if(idx===_cur){curRC={page:pageIdx,row:row,col:col};}

      if(ch==='\n'){
        row++;col=0;
        continue;
      }

      // жёІжҹ“еӯ—з¬Ұ
      if(curBox){
        var s=document.createElement('span');
        s.textContent=ch;
        var _topOffset=Math.round((cH-fs)/2);
        s.style.cssText='position:absolute;left:'+(col*cW)+'px;top:'+(row*gH+_topOffset)+'px;width:'+cW+'px;height:'+fs+'px;display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:100;line-height:1;color:#1a2a3a;font-family:"SimSun","е®ӢдҪ“","STSong",serif;box-sizing:border-box;-webkit-font-smoothing:antialiased;transform:translateY(-'+Math.round(fs*0.08)+'px);';
        curBox.appendChild(s);
      }

      col++;
      if(col>=COLS){row++;col=0;}
    }

    // е…үж ҮдҪҚзҪ®жңӘе‘ҪдёӯпјҲеңЁжң«е°ҫпјү
    if(!curRC){curRC={page:pageIdx,row:row,col:col};}

    updateCursorEl(curRC);
  }

  function updateCursorEl(curRC){
    if(!cW)return;
    if(!curRC){var rc=_getCursorRC();curRC=rc;}
    // йҡҗи—ҸжүҖжңүйЎөе…үж Ү
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.cur)be.cur.style.display='none';
    }
    var e=_getPageEls(curRC.page);
    if(!e||!e.cur)return;
    var fs=Math.round(cH*0.60),pt=Math.round((cH-fs)/2);
    e.cur.style.display='block';
    e.cur.style.left=(curRC.col*cW+1)+'px';
    e.cur.style.top=(curRC.row*gH+pt)+'px';
    e.cur.style.height=fs+'px';
    moveHiToCurrentCell(curRC);
  }

  // и®Ўз®—_curеҜ№еә”зҡ„{page,row,col}
  function _getCursorRC(){
    var row=0,col=0;
    for(var idx=0;idx<_cur;idx++){
      if(idx>=_text.length)break;
      var ch=_text[idx];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
    }
    return {page:0,row:row,col:col};
  }

  function insert(str){
    if(!str)return;
    var clean='';
    for(var i=0;i<str.length;i++){
      var ch=str[i];
      if(ch==='\n'){
        // жҚўиЎҢдёҚи®Ўе…Ҙеӯ—ж•°пјҢдҪҶиҰҒеҠ ж®өйҰ–з©әж ј
        clean+='\nгҖҖгҖҖ';
      } else {
        clean+=ch;
      }
    }
    if(!clean)return;
    _pushHistory();
    _text=_text.slice(0,_cur)+clean+_text.slice(_cur);
    _cur+=clean.length;
    renderChars();
    window.jingsaiCount();
    if(typeof _debounceSave==='function')_debounceSave();
  }

  window.jingsaiCount=function(){
    var wc=_yjWordcount();
    if(!wc)return;
    var n=_text.replace(/\n/g,'').length;
    wc.textContent='еӯ—ж•°пјҡ'+n;
    wc.style.color='#388e3c';
  };
  window.jingsaiRender=function(){renderChars();};
  // д»…з”»ж јеӯҗ+з»‘е®ҡдәӢд»¶пјҢдёҚжҒўеӨҚеӯҳжЎЈпјҲз”ЁдәҺйўқеӨ–йўҳзӣ®жҝҖжҙ»пјү
  window.jingsaiInitExtra=function(){
    drawGrid();
    renderChars();
    var wrap=getWrap();if(!wrap)return;
    function _bindExtra(pageIdx){
      var e=_getPageEls(pageIdx);if(!e||!e.wrap)return;
      e.wrap.style.cursor='text';
      if(e.wrap._yjBound)return; // йҳІжӯўйҮҚеӨҚз»‘е®ҡ
      e.wrap._yjBound=true;
      e.wrap.addEventListener('click',function(ev){
        var rect=e.wrap.getBoundingClientRect();
        var x=ev.clientX-rect.left,y=ev.clientY-rect.top;
        var clickCol=Math.max(0,Math.min(Math.floor(x/cW),COLS-1));
        var clickRow=Math.max(0,Math.min(Math.floor(y/gH),ROWS-1));
        var globalRow=pageIdx*(_activeRows||ROWS)+clickRow;
        _cur=rcToPos(globalRow,clickCol);
        renderChars();
        moveHiToCurrentCell();
        var hi=document.getElementById('jingsai-hi');
        if(hi&&!window._jingsaiInputLocked)hi.focus();
      });

    else if(k==='ArrowLeft'){e.preventDefault();if(_cur>0){_cur--;}renderChars();}

      insert(v);

    hi.addEventListener('keydown',handleKeydown);

    // зІҳиҙҙеңЁзЁҝзәёжЁЎејҸдёӢзҰҒз”ЁпјҲз”ұ noPaste capture зӣ‘еҗ¬еҷЁз»ҹдёҖжӢҰжҲӘпјү
    // IME иҫ“е…ҘпјҲcompositionendпјүиө°зӢ¬з«Ӣи·Ҝеҫ„пјҢдёҚеҸ—еҪұе“Қ

    // жҒҜеұҸ/еҲҮжҚўеә”з”ЁеҗҺйҮҚж–°зӮ№еҮ»еҸҜз»§з»ӯиҫ“е…Ҙ
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden){
        // йЎөйқўйҮҚж–°еҸҜи§Ғж—¶иҮӘеҠЁжҒўеӨҚеӯҳжЎЈпјҲйҳІжӯўSafariеӣһж”¶еҶ…еӯҳпјү
        var restored=_autoRestore();
        if(restored){renderChars();}
      }
    });

    // еҲқе§Ӣfocus
    setTimeout(function(){
      moveHiToCurrentCell();
      // иӢҘи®Ўж—¶е°ҡжңӘејҖе§ӢпјҲй”Ғе®ҡдёӯпјүпјҢдёҚ focusпјҲйҳІжӯўеј№еҮәй”®зӣҳпјү
      if(!window._jingsaiInputLocked) hi.focus();
    },100);
  }

  function moveHiToCurrentCell(curRC){
    var hi=document.getElementById('jingsai-hi');
    if(!hi||!cW)return;
    if(!curRC)curRC=_getCursorRC();
    var e=_getPageEls(curRC.page);
    if(!e||!e.wrap)return;
    var rect=e.wrap.getBoundingClientRect();
    var x=rect.left+curRC.col*cW;
    var y=rect.top+curRC.row*gH+cH;
    hi.style.left=Math.round(x)+'px';
    hi.style.top=Math.round(y)+'px';
  }

  window.addEventListener('resize',function(){
    if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'){
      var pg=document.getElementById('page-jingsai');
      if(pg&&pg.style.display!=='none'){
        cW=0;TW=0; // force recalc
        drawGrid();renderChars();
      }
    }
  });

  window.addEventListener('load',function(){
    var observer=new MutationObserver(function(ms){
      ms.forEach(function(m){
        if((m.target.id==='page-jingsai'||m.target.id==='page-yuedu-jingsai')&&m.target.style.display!=='none')setTimeout(init,50);
      });
    });
    var pg=document.getElementById('page-jingsai');
    if(pg)observer.observe(pg,{attributes:true,attributeFilter:['style']});
    var pgYJ=document.getElementById('page-yuedu-jingsai');
    if(pgYJ)observer.observe(pgYJ,{attributes:true,attributeFilter:['style']});
  });
    var _os=window.switchTemplate;
  window.switchTemplate=function(name){
    if(_os)_os(name);
    if(name==='jingsai'){window._jingsaiResetSize&&window._jingsaiResetSize();if(typeof window._jingsaiSetRows==='function')window._jingsaiSetRows(22);setTimeout(init,80);}
    if(name==='yuedu-jingsai'){
        if(typeof window._jingsaiSetRows==='function') window._jingsaiSetRows(10);
        window._jingsaiResetSize && window._jingsaiResetSize();
        setTimeout(init,80);
        setTimeout(function(){
            if(typeof window.yjSyncEditMode==='function') window.yjSyncEditMode(typeof isEditMode!=='undefined'&&isEditMode);
        },100);
    }
  };

  // еӯҰз”ҹзүҲпјҡйЎөйқўеҠ иҪҪж—¶зӣҙжҺҘеҲқе§ӢеҢ–
  window.addEventListener('load',function(){
    var pg=document.getElementById('page-jingsai');
    var pgYJ=document.getElementById('page-yuedu-jingsai');
    var isJingsai = pg && pg.style.display!=='none';
    var isYJ = pgYJ && pgYJ.style.display!=='none';

    if(isJingsai){
      // жҷ®йҖҡзЁҝзәёжЁЎејҸ
      function tryInitJ(n){
        var container=document.getElementById('jingsai-pages-container');
        var wrap=container ? container.querySelector('.jingsai-grid-wrap') : null;
        if(wrap && wrap.clientWidth>10){init();}
        else if(n>0){setTimeout(function(){tryInitJ(n-1);},100);}
      }
      tryInitJ(20);
    } else if(isYJ){
      // йҳ…иҜ»зІҫз»ғпјҡдёҺjingsaiдёҖж ·пјҢзӯүclientWidth>10еҗҺinitпјҲ10иЎҢпјү
      function tryInitYJ(n){
        var container=document.getElementById('yuedu-jingsai-pages-container');
        var wrap=container?container.querySelector('.jingsai-grid-wrap'):null;
        if(wrap && wrap.clientWidth>10){
          if(typeof window._jingsaiSetRows==='function') window._jingsaiSetRows(10);
          TW=0;cW=0;cH=0;
          init();

        }
        else if(n>0){setTimeout(function(){tryInitYJ(n-1);},100);}
      }
      tryInitYJ(30);
      // жҒўеӨҚйўқеӨ–йўҳзӣ®пјҲеҰӮжһңжңү YJ_UNITS_DATAпјү
      setTimeout(function(){
        if(typeof YJ_UNITS_DATA!=='undefined'&&YJ_UNITS_DATA&&YJ_UNITS_DATA.length>1){
          if(typeof window.yjInit==='function') window.yjInit(YJ_UNITS_DATA);
        }
      }, 500);
    }
  });
})();

function jingsaiGroupChange(sel) {
  // When group changes, update title options based on group's topics
  var titleSel = document.getElementById('jingsai-title-input');
  if (!titleSel) return;
  var group = sel.value;
  // Get topics for this group from JINGSAI_TOPICS
  var topics = (window.JINGSAI_TOPICS && window.JINGSAI_TOPICS[group]) || [];
  titleSel.innerHTML = '<option value="">в”Җв”Җ зӮ№еҮ»жӯӨеӨ„йҖүйўҳ в”Җв”Җ</option>';
  topics.forEach(function(t) {
    var opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    titleSel.appendChild(opt);
  });
}

function jingsaiUpdateTitle(sel) {
  // Title select changed - value is already the title text
}

function jingsaiTotalScore(){var inputs=document.querySelectorAll('#jingsai-marking-zone input[type="number"]'),total=0,valid=true;inputs.forEach(function(inp){var v=parseFloat(inp.value);if(isNaN(v))valid=false;else total+=v;});var el=document.getElementById('jingsai-total');if(el)el.textContent=valid?total:'вҖ”';}
function jingsaiSyncTopic(){var sel=document.getElementById('jingsai-topic-num'),inp=document.getElementById('jingsai-title-input'),lbl=document.getElementById('jingsai-title-label');if(!sel||!inp||!lbl)return;if(parseInt(sel.value)>=4){lbl.textContent='вңҸпёҸ иҮӘжӢҹйўҳзӣ®пјҡ';inp.placeholder='йҖүжӢ©еӣҫзүҮйўҳиҖ…иҜ·иҮӘжӢҹйўҳзӣ®';}else{lbl.textContent='вңҸпёҸ дҪңж–Үйўҳзӣ®пјҡ';inp.placeholder='иҜ·еЎ«еҶҷжүҖйҖүйўҳзӣ®';}}
</script>
<script>
function _topicsStorageKey() {
    // д»Ҙ assignTitle еҢәеҲҶдёҚеҗҢдҪңдёҡ/з«һиөӣзҡ„йўҳзӣ®и®ҫзҪ®
    var t = (window.STUDENT_META && window.STUDENT_META.assignTitle) || 'default';
    return 'jingsai_topics__' + t.replace(/\s/g,'_');
}
function _saveTopicsToStorage() {
    var data = {
        hhHigh:  (document.getElementById('topics-hh-high')  || {value:''}).value,
        hhLow:   (document.getElementById('topics-hh-low')   || {value:''}).value,
        g3High:  (document.getElementById('topics-g3-high')  || {value:''}).value,
        g3Low:   (document.getElementById('topics-g3-low')   || {value:''}).value
    };
    try { localStorage.setItem(_topicsStorageKey(), JSON.stringify(data)); } catch(e) {}
    // еҗҢжӯҘжӣҙж–° JINGSAI_TOPICS дҫӣ jingsaiGroupChange дҪҝз”Ё
    window.JINGSAI_TOPICS = {
        'й«ҳеҚҺ В· й«ҳе№ҙзә§з»„пјҲдёӯдёү&дёӯеӣӣпјү': data.hhHigh.split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'й«ҳеҚҺ В· дҪҺе№ҙзә§з»„пјҲдёӯдёҖ&дёӯдәҢпјү':  data.hhLow.split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'G3еҚҺж–Ү В· й«ҳе№ҙзә§з»„пјҲдёӯдёү&дёӯеӣӣпјү': data.g3High.split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'G3еҚҺж–Ү В· дҪҺе№ҙзә§з»„пјҲдёӯдёҖ&дёӯдәҢпјү': data.g3Low.split('\n').map(function(s){return s.trim();}).filter(Boolean)
    };
}
function _loadTopicsFromStorage() {
    var raw; try { raw = localStorage.getItem(_topicsStorageKey()); } catch(e) {}
    if (!raw) return false;
    var data; try { data = JSON.parse(raw); } catch(e) { return false; }
    var hh  = document.getElementById('topics-hh-high');
    var hl  = document.getElementById('topics-hh-low');
    var gh  = document.getElementById('topics-g3-high');
    var gl  = document.getElementById('topics-g3-low');
    if (hh && data.hhHigh !== undefined) hh.value = data.hhHigh;
    if (hl && data.hhLow  !== undefined) hl.value = data.hhLow;
    if (gh && data.g3High !== undefined) gh.value = data.g3High;
    if (gl && data.g3Low  !== undefined) gl.value = data.g3Low;
    // еҗҢжӯҘжӣҙж–° JINGSAI_TOPICS
    window.JINGSAI_TOPICS = {
        'й«ҳеҚҺ В· й«ҳе№ҙзә§з»„пјҲдёӯдёү&дёӯеӣӣпјү': (data.hhHigh||'').split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'й«ҳеҚҺ В· дҪҺе№ҙзә§з»„пјҲдёӯдёҖ&дёӯдәҢпјү':  (data.hhLow||'').split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'G3еҚҺж–Ү В· й«ҳе№ҙзә§з»„пјҲдёӯдёү&дёӯеӣӣпјү': (data.g3High||'').split('\n').map(function(s){return s.trim();}).filter(Boolean),
        'G3еҚҺж–Ү В· дҪҺе№ҙзә§з»„пјҲдёӯдёҖ&дёӯдәҢпјү': (data.g3Low||'').split('\n').map(function(s){return s.trim();}).filter(Boolean)
    };
    return true;
}
function openTopicsModal() {
    var m = document.getElementById('topics-modal');
    if (m) { m.style.display = 'flex'; }
    _loadTopicsFromStorage();
}
function closeTopicsModal() {
    _saveTopicsToStorage();
    var m = document.getElementById('topics-modal');
    if (m) { m.style.display = 'none'; }
}
// Close on backdrop click
var _topicsModal = document.getElementById('topics-modal');
if (_topicsModal) _topicsModal.addEventListener('click', function(e) {
    if (e.target === this) closeTopicsModal();
});
// йЎөйқўеҠ иҪҪж—¶иҮӘеҠЁиҜ»еҸ–е·Ідҝқеӯҳзҡ„йўҳзӣ®и®ҫзҪ®
window.addEventListener('load', function() { _loadTopicsFromStorage(); });
</script>
