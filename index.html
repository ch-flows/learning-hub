<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-blue: #004e7c;
            --text-main: #1e293b; 
            --text-sub: #475569; 
            --text-light: #94a3b8;
            --soft-bg: #f8fafc; /* 微弱的浅灰蓝背景，提升质感 */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: var(--soft-bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }
        
        header {
            padding: 80px 20px 40px; 
            text-align: center;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.4rem;
            font-weight: 200;
            letter-spacing: 16px;
            /* 渐变文字：让极简不再单调 */
            background: linear-gradient(to right, #004e7c, #0a81ab);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* 核心内容区 */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 0;
        }

        .container {
            max-width: 1080px;
            width: 90%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 35px;
        }

        /* 卡片优化：纯白卡片在浅灰蓝背景上会“弹”出来 */
        .card {
            background: #ffffff;
            border-radius: 4px; /* 极小圆角更显专业 */
            padding: 55px 30px;
            text-align: center;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex; flex-direction: column; align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* 增加悬停时的底部光条 */
        .card::after {
            content: '';
            position: absolute; bottom: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent-blue);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }
        .card:hover { 
            transform: translateY(-10px);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.08);
        }
        .card:hover::after { transform: scaleX(1); }
        
        .icon { 
            font-size: 42px; margin-bottom: 30px; 
            filter: grayscale(100%); opacity: 0.5; 
            transition: 0.5s cubic-bezier(0.22, 1, 0.36, 1); 
        }
        .card:hover .icon { filter: grayscale(0%); opacity: 1; transform: scale(1.15); }
        
        .card h2 { font-size: 1.4rem; letter-spacing: 5px; color: var(--text-main); margin-bottom: 8px; font-weight: 400;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; color: var(--text-light); letter-spacing: 2px; text-transform: uppercase;}

        /* 底部理念：更紧凑的排版 */
        .vision-board {
            text-align: center;
            padding: 60px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .vision-ch {
            font-size: 1.1rem;
            color: var(--text-sub);
            letter-spacing: 5px;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 0.5px;
            line-height: 1.8;
            font-weight: 300;
        }

        footer {
            padding: 40px;
            text-align: center;
            background: #ffffff; /* 底部使用白色，形成视觉截断，不再感觉空洞 */
            border-top: 1px solid #edf2f7;
        }
        .footer-text { font-size: 0.7rem; color: #cbd5e1; letter-spacing: 3px; }

        @media (max-width: 768px) {
            header { padding-top: 50px; }
            .brand { font-size: 1.7rem; letter-spacing: 8px; }
            .grid { grid-template-columns: 1fr; }
            .main-content { justify-content: flex-start; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">Learning Guide</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">Class Interaction</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">Excellence Gallery</div>
                </a>
            </div>
        </div>

        <div class="vision-board">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </div>
    </main>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · CONNECTING THE WORLD THROUGH CHINESE</div>
    </footer>
</body>
</html>
