<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #64748b; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc; 
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: var(--bg-gradient);
            padding: 60px 20px 90px; 
            text-align: center;
            color: white;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 12px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 5px;
            opacity: 0.8;
            font-weight: 300;
        }

        /* 关键调整：放宽容器，确保电脑端能并排 */
        .container {
            max-width: 1100px; 
            width: 90%;
            margin: -35px auto 0; 
            padding: 0 20px;
            flex: 1;
        }

        .grid {
            display: grid;
            /* 关键：调整最小宽度为 220px，确保三个卡片能挤在同一行 */
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 80px;
        }

        .card {
            background: #ffffff;
            border-radius: 14px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.08);
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.12); 
            border-color: var(--primary-blue);
        }
        
        .icon { font-size: 52px; margin-bottom: 25px; transition: transform 0.4s ease; }
        
        .card h2 { font-size: 1.4rem; letter-spacing: 5px; color: var(--text-main); margin-bottom: 10px; font-weight: 500;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-sub); letter-spacing: 2px; }

        footer {
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.03);
        }
        .footer-text { font-size: 0.85rem; color: #94a3b8; letter-spacing: 2px; }

        /* 移动端特殊适配：只有屏幕真的很窄时才竖排 */
        @media (max-width: 600px) {
            .brand { font-size: 1.6rem; letter-spacing: 6px; }
            .grid { grid-template-columns: 1fr; } 
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <div class="container">
        <div class="grid">
            <a href="./01-learning-guide/index.html" class="card">
                <span class="icon">🧭</span>
                <h2>学法指引</h2>
                <div class="subtitle">LEARNING GUIDE</div>
            </a>
            <a href="./02-interaction/index.html" class="card">
                <span class="icon">⚡</span>
                <h2>课堂互动</h2>
                <div class="subtitle">CLASS INTERACTION</div>
            </a>
            <a href="./03-gallery/index.html" class="card">
                <span class="icon">⭐</span>
                <h2>佳作视界</h2>
                <div class="subtitle">EXCELLENCE GALLERY</div>
            </a>
        </div>
    </div>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS | 以华文为桥 · 连接世界</div>
    </footer>
</body>
</html>
