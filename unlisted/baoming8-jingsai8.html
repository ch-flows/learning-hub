    function applyRoster(btn) {
        // 找到同组的 textarea 和 missingList
        var container = btn.parentElement; // flex row with textarea + button
        var groupDiv = container.parentElement; // group div
        var textarea = container.querySelector('.rosterInput');
        var ml = groupDiv.querySelector('.missingList');
        if (!textarea || !ml) return;

        var raw = textarea.value.trim();
        var rosterKey = textarea.getAttribute('data-key');
        if (rosterKey) localStorage.setItem(rosterKey, raw);

        var names = raw.split(/[\n,，、\s]+/).map(function(n){ return n.trim(); }).filter(Boolean);
        if (!names.length) { ml.innerHTML = ''; return; }

        // 收集本组已提交姓名
        var submitted = new Set();
        groupDiv.querySelectorAll('.import-row-cb').forEach(function(cb) {
            try {
                var r = JSON.parse(decodeURIComponent(cb.getAttribute('data-record')));
                if (r.studentName) submitted.add(r.studentName.trim());
            } catch(e) {}
        });

        var missing = names.filter(function(n) {
            // 精确匹配 或 模糊匹配（互为子串）
            var nl = n.trim();
            for (var s of submitted) {
                if (s === nl) return false;           // 精确
                if (s.indexOf(nl) !== -1) return false; // 提交的包含名单名

        }

    // ── 第一种：生成批量打印 HTML 文件（本地，一次打印全部）──
    function batchGenerateHTML() {
        const checked = Array.from(document.querySelectorAll('.import-row-cb:checked'));
        if (!checked.length) return;
        const records = checked.map(cb => JSON.parse(decodeURIComponent(cb.getAttribute('data-record'))));

        const headEl = document.querySelector('head');
        const headHTML = headEl ? headEl.innerHTML : '';

        // 额外的打印分页样式 + textarea 自适应高度

            + '@page{margin:6mm!important;}'
            + '@media print{'
            + '.batch-page{page-break-after:always;break-after:page;}'
            + '.batch-page:last-child{page-break-after:auto;break-after:auto;}'
            + 'body{background:#fff!important;margin:0;padding:0;}'
            + '.batch-page{padding:5mm 8mm!important;}'
            + '}'
            + 'div[style*="height:245mm"]{height:auto!important;min-height:0!important;}'
            + 'textarea.yuedu-input,div.yuedu-input{height:auto!important;overflow:visible!important;}'
            + '</style>';

        let bodyHTML = '';

        records.forEach(function(r) {
            const tpl = r.template || (function(){
                const t = (r.assignTitle||'').replace(/\s/g,'');
                if(t.indexOf('阅读')!==-1) return 'yuedu';
                if(t.indexOf('议论')!==-1) return 'yilun';
                if(t.indexOf('描写')!==-1) return 'miaoxie';
                if(t.indexOf('实用')!==-1) return 'shiyong';
                if(t.indexOf('表达')!==-1) return 'biaoda';
                if(t.indexOf('课堂')!==-1) return 'ketang';
                if(t.indexOf('稿纸')!==-1) return 'jingsai';
                return 'biaoda';
            })();

            // ── pazhao：每张照片独占一页，第一页带姓名信息 ──
            if (tpl === 'pazhao') {
                const photos = r.pzPhotos || [];
                const infoHtml = '<div style="font-family:inherit;padding:6mm 8mm 4mm;border-bottom:1px solid #e2e8f0;margin-bottom:4mm;">'
                    + '<div style="font-size:14pt;font-weight:700;color:#1a2a3a;margin-bottom:2mm;">' + (r.studentName||'—') + '</div>'
                    + '<div style="font-size:9.5pt;color:#64748b;">编号：' + (r.studentNum||'—') + '　提交时间：' + (r.submitTime||'—') + '</div>'
                    + '</div>';
                if (!photos.length) {
                    // 无照片：仅输出一页信息页
                    bodyHTML += '<div class="batch-page" style="background:#fff;min-height:297mm;box-sizing:border-box;">'
                        + infoHtml
                        + '<div style="padding:8mm;color:#94a3b8;font-size:10pt;">（无照片）</div>'
                        + '</div>\n';
                } else {
                    photos.forEach(function(photo, pi) {
                        const isFirst = pi === 0;
                        bodyHTML += '<div class="batch-page" style="background:#fff;min-height:297mm;box-sizing:border-box;display:flex;flex-direction:column;">'
                            + (isFirst ? infoHtml : '')
                            + '<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:4mm 8mm 8mm;">'
                            + '<img src="' + photo.dataUrl + '" style="max-width:100%;max-height:' + (isFirst ? '220mm' : '270mm') + ';object-fit:contain;display:block;" />'
                            + '</div>'
                            + (photos.length > 1 ? '<div style="text-align:center;font-size:8pt;color:#94a3b8;padding-bottom:3mm;">第 ' + (pi+1) + ' / ' + photos.length + ' 张</div>' : '')
                            + '</div>\n';
                    });
                }
                return; // 跳过后面的通用逻辑
            }

            // 克隆页面
            const pageEl = document.getElementById('page-' + tpl);
            if (!pageEl) return;
            const clone = pageEl.cloneNode(true);

            // 锁定所有 contenteditable
            clone.querySelectorAll('[contenteditable]').forEach(el => el.setAttribute('contenteditable','false'));

            // 填入文字数据
            const inputs = clone.querySelectorAll('input[type="text"], textarea');
            const checks = clone.querySelectorAll('input[type="checkbox"]');
            if (r.inputs) {
                inputs.forEach((el,i) => {
                    const v = r.inputs['field_'+i];
                    if (v === undefined) return;
                    if (el.tagName === 'TEXTAREA') {
                        el.textContent = v;
                        // 移除内联 height，让内容自然撑开
                        el.style.height = 'auto';
                        el.style.minHeight = '0';
                        el.style.overflow = 'visible';
                    } else {
                        el.setAttribute('value', v);
                    }
                });
                checks.forEach((el,i) => {
                    const v = r.inputs['check_'+i];
                    if (v !== undefined) {
                        if (v) el.setAttribute('checked', '');
                        else el.removeAttribute('checked');
                    }
                });
            }

            // canvas 数据转为 <img> 标签（打印时显示）
            if (r.canvases) {
                clone.querySelectorAll('canvas').forEach(function(c) {
                    const dataUrl = r.canvases[c.id];
                    if (!dataUrl || dataUrl.length < 1500) return;
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.style.cssText = c.style.cssText + ';display:block;';
                    img.width = c.offsetWidth || c.width;
                    img.height = c.offsetHeight || c.height;
                    c.parentNode.replaceChild(img, c);
                });
            }

            // 显示状态
            clone.style.display = '';
            clone.classList.add('batch-page');

            // 把所有 textarea 替换成高度自适应的 div（和单个打印一样）
            clone.querySelectorAll('textarea').forEach(function(ta) {
                const div = document.createElement('div');
                const st = ta.getAttribute('style') || '';
                const newSt = st.replace(/\bheight\s*:[^;]+;?/gi, '')
                               .replace(/\bmin-height\s*:[^;]+;?/gi, '')
                               .replace(/\bmax-height\s*:[^;]+;?/gi, '')
                               .replace(/\boverflow\s*:[^;]+;?/gi, '')
                               .replace(/\bresize\s*:[^;]+;?/gi, '');
                div.setAttribute('style', newSt + 'white-space:pre-wrap;word-break:break-word;box-sizing:border-box;');
                if (ta.className) div.className = ta.className;
                div.textContent = ta.textContent || ta.value || '';
                ta.parentNode.replaceChild(div, ta);
            });

            bodyHTML += clone.outerHTML + '\n';
        });

        const fileName = (records[0].assignTitle||'学习单') + '_批量打印_' + records.length + '人.html';
        const fullHTML = '<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n' + headHTML + '\n' + batchPrintStyle + '\n</head>\n<body style="background:#edf0f4;">\n' + bodyHTML + '\n</body>\n</html>';

        const blob = new Blob([fullHTML], {type:'text/html;charset=utf-8'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = fileName;
        a.click();

        // 提示
        const note = document.createElement('div');
        note.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a4f8a;color:#fff;padding:10px 28px;border-radius:8px;font-size:11pt;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
        note.textContent = '✅ 已生成 ' + records.length + ' 人的批量打印文件，打开后 Ctrl+P 另存为 PDF';
        document.body.appendChild(note);
        setTimeout(() => note.remove(), 3000);
    }

    // ── 第二种：从 GAS 拉取所有学生数据（Google Drive）──
    function fetchFromGAS() {
        const url = document.getElementById('scriptUrl').value.trim();
        if (!url) { alert('请先在齿轮设置里填入 Apps Script URL'); return; }

        const btn = document.getElementById('fetchGASBtn');
        if (btn) { btn.textContent = '⏳ 读取中…'; btn.disabled = true; }

        // 监听 postMessage（GAS 页面会把数据发过来）
        function onMessage(event) {
            if (!event.data || event.data.source !== 'GAS_WORKSHEET') return;
            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = '☁️ 从 Drive 读取'; btn.disabled = false; }
            const data = event.data.payload;
            if (!data || !data.records || !data.records.length) {
                alert('Google Drive 上没有找到学习单数据。');
                return;
            }
            showImportedData(data.records);
        }
        window.addEventListener('message', onMessage);

        // 开新窗口（必须在用户点击事件里直接调用，否则被拦截）
        const readerUrl = url + '?action=getAll&type=worksheet&mode=postMessage';
        const popup = window.open(readerUrl, '_blank', 'width=500,height=200,left=200,top=200');
        closeWsScriptConfig();

        // 超时保护
        setTimeout(function() {
            window.removeEventListener('message', onMessage);
            if (btn) { btn.textContent = '☁️ 从 Drive 读取'; btn.disabled = false; }
            if (popup && !popup.closed) popup.close();
        }, 30000);
    }

    function batchPrintSelected() {
        const checked = Array.from(document.querySelectorAll('.import-row-cb:checked'));
        if (!checked.length) return;
        const records = checked.map(function(cb) {
            return JSON.parse(decodeURIComponent(cb.getAttribute('data-record')));
        });

        // 关闭导入面板
        const overlay = document.getElementById('importDataOverlay');
        if (overlay) overlay.remove();

        // 逐一渲染，收集所有页面 HTML，合并打印
        let idx = 0;
        function renderNext() {
            if (idx >= records.length) {
                // 全部渲染完毕，触发打印
                setTimeout(function() {
                    window.print();
                    // 打印完清空页面回到初始状态
                    setTimeout(function() {
                        // 清空所有模板页面内容，重新初始化
                        switchTemplate(currentTemplate);
                        clearAllInputs();
                    }, 500);
                }, 600);
                return;
            }
            const r = records[idx];
            idx++;
            // 切换模板并还原数据
            const tpl = r.template || (function() {
                const title = (r.assignTitle || '').replace(/\s/g,'');
                if (title.indexOf('阅读')!==-1) return 'yuedu';
                if (title.indexOf('议论')!==-1) return 'yilun';
                if (title.indexOf('描写')!==-1) return 'miaoxie';
                if (title.indexOf('实用')!==-1) return 'shiyong';
                if (title.indexOf('表达')!==-1) return 'biaoda';
                if (title.indexOf('课堂')!==-1) return 'ketang';
                if (title.indexOf('稿纸')!==-1) return 'jingsai';
                return 'biaoda';
            })();
            switchTemplate(tpl);
            const pageSelector = '#page-' + tpl;

            // 清空当前页面
            document.querySelectorAll(pageSelector + ' input[type="text"], ' + pageSelector + ' textarea').forEach(function(el){ el.value=''; });
            document.querySelectorAll(pageSelector + ' input[type="checkbox"]').forEach(function(el){ el.checked=false; });
            document.querySelectorAll(pageSelector + ' canvas').forEach(function(c){ try{ c.getContext('2d').clearRect(0,0,c.width,c.height); }catch(e){} });

            // 还原文字
            if (r.inputs) {
                document.querySelectorAll(pageSelector + ' input[type="text"], ' + pageSelector + ' textarea').forEach(function(el, i){
                    var v = r.inputs['field_'+i]; if (v !== undefined) el.value = v;
                });
                document.querySelectorAll(pageSelector + ' input[type="checkbox"]').forEach(function(el, i){
                    var v = r.inputs['check_'+i]; if (v !== undefined) el.checked = v;
                });
                // jingsai：还原稿纸文字
                if (tpl === 'jingsai' && r.inputs['jingsai_text'] !== undefined && typeof window._jingsaiSetState === 'function') {
                    window._jingsaiSetState(r.inputs['jingsai_text'], r.inputs['jingsai_cur'] || 0);
                }
            }

            // 还原手写，完成后打印或继续下一个
            const canvases = (r.canvases && Object.keys(r.canvases).length > 0) ? r.canvases : null;
            function afterRestore() {
                if (idx < records.length) {
                    setTimeout(function() {
                        smartPrint();
                        setTimeout(renderNext, 800);
                    }, 400);
                } else {
                    setTimeout(function() {
                        smartPrint();
                    }, 400);
                }
            }

            if (canvases) {
                const ids = Object.keys(canvases);
                let done = 0;
                requestAnimationFrame(function(){ requestAnimationFrame(function(){
                    if (ids.length === 0) { afterRestore(); return; }
                    ids.forEach(function(id){
                        const canvas = document.getElementById(id);
                        const dataUrl = canvases[id];
                        if (!canvas || !dataUrl || dataUrl.length < 1500) { done++; if(done===ids.length) afterRestore(); return; }
                        const img = new Image();
                        img.onload = function(){ canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height); done++; if(done===ids.length) afterRestore(); };
                        img.onerror = function(){ done++; if(done===ids.length) afterRestore(); };
                        img.src = dataUrl;
                    });
                });});
            } else {
                setTimeout(afterRestore, 300);
            }
        }

        renderNext();
    }

<script>
// ── 迁移：为已存在的 .kt-ruby 元素设置 CSS 颜色变量 ──
(function() {
    function hex2rgb(hex) {
        hex = (hex||'').replace('#','');
        if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        return [parseInt(hex.slice(0,2),16), parseInt(hex.slice(2,4),16), parseInt(hex.slice(4,6),16)];
    }
    document.querySelectorAll('.kt-ruby').forEach(function(r) {
        // 优先读 data-color，没有则从 style.color 迁移
        var hex = r.getAttribute('data-color');
        if (!hex) {
            var sc = r.style.color;
            if (sc && sc.indexOf('#') === 0) { hex = sc; }
            else if (sc && sc.indexOf('rgb') === 0) {
                var m = sc.match(/\d+/g);
                if (m) hex = '#'+('0'+parseInt(m[0]).toString(16)).slice(-2)+('0'+parseInt(m[1]).toString(16)).slice(-2)+('0'+parseInt(m[2]).toString(16)).slice(-2);
            }
            hex = hex || '#1565c0';
            r.setAttribute('data-color', hex);
        }
        // 没有 data-rubystyle 的旧注释默认用 soft（淡色块）
        if (!r.getAttribute('data-rubystyle')) {
            r.setAttribute('data-rubystyle', 'soft');
        }
        var style = r.getAttribute('data-rubystyle') || 'soft';
        var rgb = hex2rgb(hex);
        r.style.setProperty('--rc', hex);
        var alpha = (style === 'highlight') ? '0.45' : '0.18';
        r.style.setProperty('--rca', 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+alpha+')');
        // 清除旧的 style.color（防止干扰 CSS 变量）
        r.style.removeProperty('color');
        // 恢复字色 CSS 变量（data-fc-color）
        var fcColor = r.getAttribute('data-fc-color');
        if (fcColor) {
            r.style.setProperty('--kt-fc-span-color', fcColor);
            // 给内部字色 span 加上 class（兼容旧存档）
            var inner = r.querySelector('span:not(rt)');
            if (inner && inner.style.color) {
                inner.className = (inner.className ? inner.className + ' ' : '') + 'kt-fc-span';
                inner.style.removeProperty('color');
            }
        }
    });
})();
</script>

  var _text='　　',_cur=2,_composing=false;

  var _pageCount=1; // 当前已渲染的页数
  function _pushHistory(){if(_history.length>20)_history.shift();_history.push({text:_text,cur:_cur});}

  // ── 多页辅助：返回第n页（0-indexed）的wrap/canvas/box/cursor ──
  function _getPageEls(pageIdx){
    var blocks=document.querySelectorAll('.jingsai-page-block');
    if(pageIdx>=blocks.length)return null;
    var b=blocks[pageIdx];
    return {
      wrap:b.querySelector('.jingsai-grid-wrap'),
      cv:b.querySelector('.jingsai-grid-canvas'),
      box:b.querySelector('.jingsai-text-canvas'),
      cur:b.querySelector('.jingsai-cursor')
    };
  }

  // ── 计算文本共需多少页 ──
  function _calcPageCount(text){
    // 逐字符扫描，统计行数
    var row=0,col=0;
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
    }
    return Math.max(1,Math.ceil((row+1)/ROWS));
  }

  // ── 确保DOM中有足够页数 ──
  function _ensurePages(n){
    var container=document.getElementById('jingsai-pages-container');
    if(!container)return;
    var existing=container.querySelectorAll('.jingsai-page-block').length;
    for(var i=existing;i<n;i++){
      var pageNum=i+1;
      var block=document.createElement('div');
      block.className='jingsai-page-block';
      block.setAttribute('data-page',i);
      block.innerHTML=
        '<div style="display:block;width:100%;box-sizing:border-box;background:#fff;line-height:0;font-size:0;height:auto !important;overflow:visible !important;position:relative;">'+
          '<div class="jingsai-grid-wrap" style="position:relative;background:#fff;overflow:visible !important;">'+
            '<canvas class="jingsai-grid-canvas" style="display:block;width:100%;"></canvas>'+
            '<div class="jingsai-text-canvas" style="position:absolute;top:0;left:0;pointer-events:none;overflow:hidden;"></div>'+
            '<div class="jingsai-cursor" style="position:absolute;width:1.5px;background:#2e7d32;pointer-events:none;display:none;animation:jc-blink 1s step-end infinite;z-index:4;"></div>'+
          '</div>'+
        '</div>'+
        '<div class="jingsai-page-num" style="font-size:8pt;color:#999;text-align:right;padding-right:4px;margin-top:5px;line-height:1;">第 '+pageNum+' 页</div>';
      container.appendChild(block);
      // 立即绘制格子
      _drawGridForPage(i);
    }
  }

  // ── 兼容旧接口 ──
  function getWrap(){var e=_getPageEls(0);return e?e.wrap:null;}
  function getCV(){var e=_getPageEls(0);return e?e.cv:null;}
  function getBox(){var e=_getPageEls(0);return e?e.box:null;}
  function getCurEl(){var e=_getPageEls(0);return e?e.cur:null;}

  // ── 绘制单页格子 ──
  function _drawGridForPage(pageIdx){
    var e=_getPageEls(pageIdx);if(!e||!e.wrap||!e.cv)return;
    var wrap=e.wrap,cv=e.cv;
    if(!TW){TW=wrap.clientWidth;if(TW<10)TW=wrap.parentNode.clientWidth||300;}
    if(TW<10)return;
    if(!cW){
      cW=TW/COLS;
      var maxCH=Math.floor(957/31.8);
      cH=Math.min(cW,maxCH);
      auxH=Math.round(cH*0.4);gH=cH+auxH;
      // TH = 精确到最后一行字格底边，外框底边与最后一行字格底线重合由外框负责
      TH=(ROWS-1)*gH+cH;
    }
    var BOT=2; // 外框底边低于最后一行2px，确保底部边框可见
    cv.width=Math.round(TW*dpr);cv.height=Math.round((TH+BOT)*dpr);
    cv.style.width=TW+'px';cv.style.height=(TH+BOT)+'px';
    wrap.style.height=(TH+BOT)+'px';
    var outerDiv=wrap.parentNode;
    if(outerDiv){outerDiv.style.height=(TH+BOT+4)+'px';}
    var ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);ctx.clearRect(0,0,TW,TH+BOT);
    ctx.strokeStyle=G;ctx.lineWidth=0.7;
    for(var r=0;r<ROWS;r++){
      var base=r*gH,wb=base+cH,ab=wb+auxH;
      // 每行字格底线（最后一行不画，由外框底边代替）
      if(r<ROWS-1){ctx.beginPath();ctx.moveTo(0,wb);ctx.lineTo(TW,wb);ctx.stroke();}
      // 辅助线：最后一行不画
      if(r<ROWS-1){
        ctx.beginPath();ctx.moveTo(0,ab);ctx.lineTo(TW,ab);ctx.stroke();
      }
      // 竖分隔线
      for(var c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*cW,base);ctx.lineTo(c*cW,wb);ctx.stroke();}
    }
    // 外框：lineWidth=1.5最后绘制，确保四边清晰可见
    ctx.lineWidth=1.5;ctx.strokeRect(0.75,0.75,TW-1.5,TH+BOT-1.5);
  }

  function drawGrid(){
    // 重置尺寸（resize时需重算）
    var e0=_getPageEls(0);
    if(e0&&e0.wrap){TW=e0.wrap.clientWidth;if(TW<10)return;}
    cW=TW/COLS;
    var maxCH=Math.floor(957/31.8);
    cH=Math.min(cW,maxCH);
    auxH=Math.round(cH*0.4);gH=cH+auxH;TH=(ROWS-1)*gH+cH;
    var blocks=document.querySelectorAll('.jingsai-page-block');
    for(var i=0;i<blocks.length;i++){_drawGridForPage(i);}
  }

  function posToRC(pos){
    var r=0,c=0,txt=_text.substring(0,pos);
    for(var i=0;i<txt.length;i++){
      if(txt[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return {r:r,c:c};
  }

  function rcToPos(row,col){
    if(row<0)return 0;
    var r=0,c=0;
    for(var i=0;i<_text.length;i++){
      if(r===row&&c===col)return i;
      if(r>row)return i;
      if(_text[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return _text.length;
  }

  function renderChars(){
    if(!cW)return;

    // ── 计算需要多少页 ──
    var needed=_calcPageCount(_text);
    _ensurePages(needed);

    // ── 清空所有现有页的文本层 ──
    var blocks=document.querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.box){be.box.innerHTML='';be.box.style.width=TW+'px';be.box.style.height=TH+'px';}
      if(be&&be.cur){be.cur.style.display='none';}
    }

    // ── 逐字符分配到各页 ──
    var fs=Math.round(cH*0.60);
    var pageIdx=0,row=0,col=0;
    var curPage=_getPageEls(pageIdx);
    var curBox=curPage?curPage.box:null;

    // 当前光标所在页和格
    var curRC=null; // {page,row,col}

    for(var idx=0;idx<_text.length;idx++){
      var ch=_text[idx];

      // 记录光标位置
      if(idx===_cur){curRC={page:pageIdx,row:row,col:col};}

      if(ch==='\n'){
        row++;col=0;
        if(row>=ROWS){row=0;pageIdx++;curPage=_getPageEls(pageIdx);curBox=curPage?curPage.box:null;}
        continue;
      }

      // 渲染字符
      if(curBox){
        var s=document.createElement('span');
        s.textContent=ch;
        s.style.cssText='position:absolute;left:'+(col*cW)+'px;top:'+(row*gH)+'px;width:'+cW+'px;height:'+cH+'px;display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:100;line-height:1;color:#1a2a3a;font-family:"SimSun","宋体","STSong",serif;box-sizing:border-box;-webkit-font-smoothing:antialiased;';
        curBox.appendChild(s);
      }

      col++;
      if(col>=COLS){row++;col=0;if(row>=ROWS){row=0;pageIdx++;curPage=_getPageEls(pageIdx);curBox=curPage?curPage.box:null;}}
    }

    // 光标位置未命中（在末尾）
    if(!curRC){curRC={page:pageIdx,row:row,col:col};}

    updateCursorEl(curRC);
  }

  function updateCursorEl(curRC){
    if(!cW)return;
    if(!curRC){var rc=_getCursorRC();curRC=rc;}
    // 隐藏所有页光标
    var blocks=document.querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.cur)be.cur.style.display='none';
    }
    var e=_getPageEls(curRC.page);
    if(!e||!e.cur)return;
    var fs=Math.round(cH*0.60),pt=Math.round((cH-fs)/2);
    e.cur.style.display='block';
    e.cur.style.left=(curRC.col*cW+1)+'px';
    e.cur.style.top=(curRC.row*gH+pt)+'px';
    e.cur.style.height=fs+'px';
    moveHiToCurrentCell(curRC);
  }

  // 计算_cur对应的{page,row,col}
  function _getCursorRC(){
    var pageIdx=0,row=0,col=0;
    for(var idx=0;idx<_cur;idx++){
      if(idx>=_text.length)break;
      var ch=_text[idx];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
      if(row>=ROWS){row=0;pageIdx++;}
    }
    return {page:pageIdx,row:row,col:col};
  }

  function insert(str){
    if(!str)return;
    var clean='';
    for(var i=0;i<str.length;i++){
      var ch=str[i];
      if(ch==='\n'){
        // 换行不计入字数，但要加段首空格
        clean+='\n　　';
      } else {
        clean+=ch;
      }
    }
    if(!clean)return;
    _pushHistory();
    _text=_text.slice(0,_cur)+clean+_text.slice(_cur);
    _cur+=clean.length;
    renderChars();
    window.jingsaiCount();
  }

  window.jingsaiCount=function(){
    var wc=document.getElementById('jingsai-wordcount');
    if(!wc)return;
    var n=_text.replace(/\n/g,'').length;
    wc.textContent='字数：'+n;
    wc.style.color='#388e3c';
  };
  window.jingsaiRender=function(){renderChars();};
  window._jingsaiGetText=function(){return _text;};
  // 暴露 cW、TH、COLS、ROWS 供外部打印代码使用
  Object.defineProperty(window,'_jingsaiCW',{get:function(){return cW||0;},configurable:true});
  Object.defineProperty(window,'_jingsaiTH',{get:function(){return TH||0;},configurable:true});
  window._jingsaiCOLS=COLS;window._jingsaiROWS=ROWS;

  // 自动保存到localStorage（每30秒）
  var _autoSaveTimer=null;
  function _autoSave(){
    try{
      var key='jingsai_autosave_'+(window.STUDENT_META?window.STUDENT_META.fileToken||'':'draft');
      localStorage.setItem(key,JSON.stringify({text:_text,cur:_cur,ts:Date.now()}));
    }catch(e){}
  }
  function _autoRestore(){
    try{
      var key='jingsai_autosave_'+(window.STUDENT_META?window.STUDENT_META.fileToken||'':'draft');
      var raw=localStorage.getItem(key);
      if(!raw)return false;
      var d=JSON.parse(raw);
      // 只恢复2小时内的存档
      if(Date.now()-d.ts>7200000)return false;
      if(d.text&&d.text!=='　　'){
        _text=d.text; _cur=d.cur||0;
        return true;
      }
    }catch(e){}
    return false;
  }
  function _startAutoSave(){
    if(_autoSaveTimer)clearInterval(_autoSaveTimer);
    _autoSaveTimer=setInterval(_autoSave,30000);
    // 页面隐藏时立即保存（手机息屏/切换应用）
    document.addEventListener('visibilitychange',function(){
      if(document.hidden)_autoSave();
    });
    // 页面关闭前保存
    window.addEventListener('beforeunload',_autoSave);
  }

  // 存档接口
  window._jingsaiGetState=function(){return {text:_text,cur:_cur};};


  // 导出Word（纯文字，段首两格，HTML→doc格式）
  window.jingsaiExportWord=function(){
    var pg=document.getElementById('page-jingsai');
    if(!pg)return;
    // 取姓名和编号
    var inputs=pg.querySelectorAll('input[type="text"]');
    var name=(inputs[0]&&inputs[0].value)||'';
    var num=(inputs[1]&&inputs[1].value)||'';
    var title=(document.getElementById('jingsai-title-input')||{}).value||'';
    var group=(pg.querySelector('select')||{}).value||'';

    // 把_text转成段落（按换行分段）
    var paras=_text.split('\n');
    var bodyHtml=paras.map(function(p){
      return '<p style="text-indent:2em;line-height:1.8;margin:0 0 6pt 0;font-family:SimSun,serif;font-size:12pt;">'+
        (p||'&nbsp;')+'</p>';
    }).join('');

    var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" '+
      'xmlns:w="urn:schemas-microsoft-com:office:word" '+
      'xmlns="http://www.w3.org/TR/REC-html40">'+
      '<head><meta charset="utf-8">'+
      '<style>'+
      '@page{size:210mm 297mm;margin:25mm 25mm 25mm 25mm;}'+
      'body{font-family:SimSun,serif;font-size:12pt;line-height:1.8;color:#000;}'+
      'h2{font-size:14pt;text-align:center;margin-bottom:12pt;}'+
      '.info{font-size:11pt;margin-bottom:16pt;}'+
      '</style></head><body>'+
      (title?'<h2>'+title+'</h2>':'')+
      '<div class="info">'+
      (name?'姓名：'+name+'&nbsp;&nbsp;&nbsp;&nbsp;':'')+
      (num?'编号：'+num+'&nbsp;&nbsp;&nbsp;&nbsp;':'')+
      (group?'组别：'+group:'')+
      '</div>'+
      bodyHtml+
      '</body></html>';

    var blob=new Blob([html],{type:'application/msword;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(name||'作文')+'_'+(title||'稿纸作答')+'.doc';
    a.click();
  };
  window._jingsaiSetState=function(text,cur){
    _text=text||'　　';
    _cur=typeof cur==='number'?cur:2;
    if(cW)renderChars();
  };
  window.jingsaiKey=function(){};

  function handleKeydown(e){
    var k=e.key;
    var ctrl=e.ctrlKey||e.metaKey;

    // Ctrl/Cmd 组合键
    if(ctrl){
      if(k==='z'||k==='Z'){
        e.preventDefault();
        // 简单undo：恢复上一步（保存最近20步历史）
        if(_history.length>0){
          var prev=_history.pop();
          _text=prev.text; _cur=prev.cur;
          renderChars(); window.jingsaiCount();
        }
        return;
      }
      if(k==='a'||k==='A'){
        e.preventDefault();
        _cur=_text.length; renderChars(); return;
      }
      if(k==='c'||k==='C'){return;} // 允许复制（不阻止）
      if(k==='v'||k==='V'){return;} // 粘贴由paste事件处理
      return;
    }

    if(k===' '){e.preventDefault();_pushHistory();insert(' ');return;}
    if(k==='ArrowRight'){e.preventDefault();if(_cur<_text.length){_cur++;}renderChars();}
    else if(k==='ArrowLeft'){e.preventDefault();if(_cur>0){_cur--;}renderChars();}
    else if(k==='ArrowDown'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r+1,rc.c);renderChars();}
    else if(k==='ArrowUp'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r-1,rc.c);renderChars();}
    else if(k==='Backspace'){
      e.preventDefault();
      if(_cur>0){_pushHistory();_text=_text.slice(0,_cur-1)+_text.slice(_cur);_cur--;renderChars();window.jingsaiCount();}
    }
    else if(k==='Delete'){
      e.preventDefault();
      if(_cur<_text.length){_pushHistory();_text=_text.slice(0,_cur)+_text.slice(_cur+1);renderChars();window.jingsaiCount();}
    }
    else if(k==='Enter'){e.preventDefault();_pushHistory();_text=_text.slice(0,_cur)+'\n　　'+_text.slice(_cur);_cur+=3;renderChars();window.jingsaiCount();}
    else if(k==='Home'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r,0);renderChars();}
    else if(k==='End'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r,COLS);renderChars();}
    else if(k==='Tab'){e.preventDefault();_pushHistory();insert('　');}
  }

  function init(){
    drawGrid();
    // 尝试恢复自动存档
    var restored=_autoRestore();
    renderChars();
    if(restored){
      var tip=document.createElement('div');
      tip.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2e7d32;color:#fff;padding:8px 18px;border-radius:20px;font-size:9pt;z-index:9999;pointer-events:none;';
      tip.textContent='✓ 已自动恢复上次内容';
      document.body.appendChild(tip);
      setTimeout(function(){if(tip.parentNode)tip.parentNode.removeChild(tip);},3000);
    }
    _startAutoSave();
    var wrap=getWrap();if(!wrap)return;

    // 设置所有页的cursor样式，并绑定点击
    function _bindPageClick(pageIdx){
      var e=_getPageEls(pageIdx);if(!e||!e.wrap)return;
      e.wrap.style.cursor='text';
      e.wrap.addEventListener('click',function(ev){
        var rect=e.wrap.getBoundingClientRect();
        var x=ev.clientX-rect.left,y=ev.clientY-rect.top;
        var clickCol=Math.max(0,Math.min(Math.floor(x/cW),COLS-1));
        var clickRow=Math.max(0,Math.min(Math.floor(y/gH),ROWS-1));
        // 转换为全局文本位置
        var globalRow=pageIdx*ROWS+clickRow;
        _cur=rcToPos(globalRow,clickCol);
        renderChars();
        moveHiToCurrentCell();
        hi.focus();
      });
    }
    // 绑定当前已有页
    var existingBlocks=document.querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<existingBlocks.length;bi++){_bindPageClick(bi);}
    // 新增页时自动绑定（MutationObserver）
    var _container=document.getElementById('jingsai-pages-container');
    if(_container&&window.MutationObserver){
      var _mo=new MutationObserver(function(ms){
        ms.forEach(function(m){
          m.addedNodes.forEach(function(node){
            if(node.classList&&node.classList.contains('jingsai-page-block')){
              var idx=parseInt(node.getAttribute('data-page')||'0');
              _bindPageClick(idx);
            }
          });
        });
      });
      _mo.observe(_container,{childList:true});
    }

    // 创建隐藏input（放在body级别，不受wrap限制）
    var hi=document.getElementById('jingsai-hi');
    if(!hi){
      hi=document.createElement('input');
      hi.id='jingsai-hi';
      hi.setAttribute('type','text');
      hi.setAttribute('autocomplete','off');
      hi.setAttribute('autocorrect','off');
      hi.setAttribute('autocapitalize','off');
      hi.style.cssText='position:fixed;opacity:0;width:1px;height:1px;border:none;outline:none;z-index:9999;font-size:16px;background:transparent;padding:0;margin:0;left:0;top:0;pointer-events:none;';
      hi.setAttribute('inputmode','text');
      hi.setAttribute('autocorrect','off');
      hi.setAttribute('autocapitalize','sentences');
      document.body.appendChild(hi);

      hi.addEventListener('compositionstart',function(){_composing=true;});
      hi.addEventListener('compositionend',function(e){
        _composing=false;
        var v=e.data||hi.value;
        hi.value='';
        insert(v);
      });
      hi.addEventListener('input',function(){
        if(_composing)return;
        var v=hi.value;
        hi.value='';
        insert(v);
      });
      hi.addEventListener('keydown',handleKeydown);

    // 粘贴支持（电脑端 Ctrl+V）
    hi.addEventListener('paste',function(e){
      e.preventDefault();
      var text=(e.clipboardData||window.clipboardData).getData('text')||'';
      if(!text)return;
      _pushHistory();
      // 统一换行符，直接插入纯文字（不自动加段首空格）
      text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
      var clean='';
      for(var i=0;i<text.length;i++){
        var ch=text[i];
        if(ch==='\n'){
          clean+='\n';
        } else {
          clean+=ch;
        }
      }
      if(!clean)return;
      _text=_text.slice(0,_cur)+clean+_text.slice(_cur);
      _cur+=clean.length;
      renderChars();
      window.jingsaiCount();
    });
    }

    // 息屏/切换应用后重新点击可继续输入
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden){
        // 页面重新可见时自动恢复存档（防止Safari回收内存）
        var restored=_autoRestore();
        if(restored){renderChars();}
      }
    });

    // 初始focus
    setTimeout(function(){
      moveHiToCurrentCell();
      hi.focus();
    },100);
  }

  function moveHiToCurrentCell(curRC){
    var hi=document.getElementById('jingsai-hi');
    if(!hi||!cW)return;
    if(!curRC)curRC=_getCursorRC();
    var e=_getPageEls(curRC.page);
    if(!e||!e.wrap)return;
    var rect=e.wrap.getBoundingClientRect();
    var x=rect.left+curRC.col*cW;
    var y=rect.top+curRC.row*gH+cH;
    hi.style.left=Math.round(x)+'px';
    hi.style.top=Math.round(y)+'px';
  }

  window.addEventListener('resize',function(){
    if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'){
      var pg=document.getElementById('page-jingsai');
      if(pg&&pg.style.display!=='none'){
        cW=0;TW=0; // force recalc
        drawGrid();renderChars();
      }
    }
  });

  window.addEventListener('load',function(){
    var observer=new MutationObserver(function(ms){
      ms.forEach(function(m){
        if(m.target.id==='page-jingsai'&&m.target.style.display!=='none')setTimeout(init,50);
      });
    });
    var pg=document.getElementById('page-jingsai');
    if(pg)observer.observe(pg,{attributes:true,attributeFilter:['style']});
  });
  var _os=window.switchTemplate;
  window.switchTemplate=function(name){
    if(_os)_os(name);
    if(name==='jingsai')setTimeout(init,80);
    var btn=document.getElementById('exportWordBtn');
    if(btn)btn.style.display=(name==='jingsai')?'':'none';
  };

  // 学生版：页面加载时直接初始化
  window.addEventListener('load',function(){
    var pg=document.getElementById('page-jingsai');
    if(pg && pg.style.display!=='none'){
      function tryInit(n){
        var wrap=document.querySelector('.jingsai-grid-wrap');
        if(wrap && wrap.clientWidth>10){init();}
        else if(n>0){setTimeout(function(){tryInit(n-1);},100);}
      }
      tryInit(10);
    }
  });
})();

    opt.value = t; opt.textContent = t;

  });
}

<script>
(function(){
if(window._bmInited)return;window._bmInited=true;
var BM_TEACHERS={'陈老师':['1HCL','3G3CL'],'韩老师':['1G3CL','2G3CL'],'李老师':['4HCL','1G3CL','2G3CL'],'廖老师':['4G3CL','2G3CL'],'林老师':['1HCL','4G3CL'],'刘老师':['4HCL','1G3CL','3G3CL'],'丘老师':['2HCL','2G3CL'],'王老师':['3HCL','4G3CL'],'尤老师':['2HCL','3G3CL','4G3CL'],'张老师':['3HCL','1G3CL']};
var BM_ORDER=['陈老师','韩老师','李老师','廖老师','林老师','刘老师','丘老师','王老师','尤老师','张老师'];
var BM_CLS_SORT=['1HCL','2HCL','3HCL','4HCL','1G3CL','2G3CL','3G3CL','4G3CL'];
var BM_PASSWORD='1234';
(function(){var sel=document.getElementById('bm-teacher-sel');if(!sel||sel.options.length>1)return;BM_ORDER.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});})();
function bmGet(){try{return JSON.parse(localStorage.getItem('bm_roster')||'[]');}catch(e){return[];}}
function bmSave(a){localStorage.setItem('bm_roster',JSON.stringify(a));}
window.bmSwitchTab=function(tab){document.getElementById('bm-tab-form').classList.toggle('active',tab==='form');document.getElementById('bm-tab-admin').classList.toggle('active',tab==='admin');document.getElementById('bm-panel-form').classList.toggle('active',tab==='form');document.getElementById('bm-panel-admin').classList.toggle('active',tab==='admin');};
window.bmOnTeacherChange=function(){var name=document.getElementById('bm-teacher-sel').value;var badge=document.getElementById('bm-badge');var secs=document.getElementById('bm-cls-sections');var sa=document.getElementById('bm-submit-area');if(!name){badge.classList.remove('visible');secs.classList.remove('visible');secs.innerHTML='';sa.style.display='none';return;}var classes=BM_TEACHERS[name]||[];document.getElementById('bm-badge-name').textContent=name;document.getElementById('bm-badge-cls').textContent='任教班级：'+classes.join('、');badge.classList.add('visible');var existing=bmGet().filter(function(r){return r.teacher===name;});var submitted=existing.length>0;secs.innerHTML='';classes.forEach(function(cls){var names=existing.filter(function(r){return r.class===cls;}).map(function(r){return r.name;});secs.appendChild(bmBuildSection(cls,names,submitted));});secs.classList.add('visible');sa.style.display='block';var btn=document.getElementById('bm-submit-btn');btn.onclick=function(){window.bmSubmit();};if(submitted){btn.textContent='重新提交（将覆盖原有名单）';btn.style.background='#854F0B';}else{btn.textContent='提交名单';btn.style.background='';}};
function bmBuildSection(cls,existingNames,submitted){var sec=document.createElement('div');sec.className='bm-cls-sec';sec.dataset.cls=cls;var hdr=document.createElement('div');hdr.className='bm-cls-hdr';var lw=document.createElement('div');lw.style.cssText='display:flex;align-items:center;gap:6px;';var lbl=document.createElement('div');lbl.className='bm-cls-lbl';lbl.textContent=cls;lw.appendChild(lbl);if(submitted){var sb=document.createElement('span');sb.className='bm-submitted-badge';sb.textContent='已提交';lw.appendChild(sb);}var list=document.createElement('div');list.className='bm-stu-list';var addBtn=document.createElement('button');addBtn.className='bm-add-btn';addBtn.innerHTML='<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加学生';addBtn.onclick=function(){bmAddRow(list);};hdr.appendChild(lw);hdr.appendChild(addBtn);var initNames=existingNames.length>0?existingNames:[''];initNames.forEach(function(n){bmAddRow(list,n,false);});sec.appendChild(hdr);sec.appendChild(list);return sec;}
function bmAddRow(list,val,doFocus){if(doFocus===undefined)doFocus=true;var row=document.createElement('div');row.className='bm-stu-row';var num=document.createElement('div');num.className='bm-stu-num';var inp=document.createElement('input');inp.type='text';inp.className='bm-stu-input';inp.placeholder='输入学生姓名';inp.value=val||'';var rm=document.createElement('button');rm.className='bm-rm-btn';rm.title='移除';rm.innerHTML='<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';rm.onclick=function(){row.remove();bmReindex(list);};row.appendChild(num);row.appendChild(inp);row.appendChild(rm);list.appendChild(row);bmReindex(list);if(doFocus)inp.focus();}
function bmReindex(list){list.querySelectorAll('.bm-stu-num').forEach(function(el,i){el.textContent=i+1;});}
window.bmSubmit=function(){
  var teacher=document.getElementById('bm-teacher-sel').value;
  if(!teacher){bmToast('请先选择老师','error');return;}
  var _bmPage=document.getElementById('bm-cls-sections')||document;
  var secs=_bmPage.querySelectorAll('.bm-cls-sec');
  var entries=[];var hasAny=false;
  secs.forEach(function(sec){
    var cls=sec.dataset.cls;
    sec.querySelectorAll('.bm-stu-input').forEach(function(inp){
      var n=inp.value.trim();
      if(n){entries.push({teacher:teacher,class:cls,name:n});hasAny=true;}
    });
  });
  if(!hasAny){bmToast('请至少填写一位学生姓名','error');return;}
  // Save locally
  var rest=bmGet().filter(function(r){return r.teacher!==teacher;});
  bmSave(rest.concat(entries));
  // POST to Google Apps Script (same endpoint as the rest of the platform)
  var scriptUrl='';
  var urlEl=document.getElementById('scriptUrl');
  if(urlEl)scriptUrl=urlEl.value.trim();
  if(!scriptUrl&&window.STUDENT_META)scriptUrl=window.STUDENT_META.scriptUrl||'';
  if(scriptUrl){
    var payload={
      type:'baoming',
      teacher:teacher,
      submitTime:new Date().toISOString(),
      entries:entries
    };
    fetch(scriptUrl,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(payload)
    }).then(function(){
      bmToast('✓ 已成功提交 '+entries.length+' 位学生','success');
    }).catch(function(){
      bmToast('✓ 已本地保存（网络提交失败）','success');
    });
  } else {
    bmToast('✓ 已成功提交 '+entries.length+' 位学生','success');
  }
  // 最小更新：不重建DOM，只更新按钮文字和班级标记
  var submitBtn=document.getElementById('bm-submit-btn');
  if(submitBtn){submitBtn.textContent='重新提交（将覆盖原有名单）';submitBtn.style.background='#854F0B';}
  document.querySelectorAll('#bm-cls-sections .bm-cls-hdr>div').forEach(function(lw){
    if(!lw.querySelector('.bm-submitted-badge')){
      var sb=document.createElement('span');sb.className='bm-submitted-badge';sb.textContent='已提交';lw.appendChild(sb);
    }
  });
};
window.bmUnlock=function(){var v=document.getElementById('bm-pwd').value;if(v===BM_PASSWORD){document.getElementById('bm-lock-screen').style.display='none';document.getElementById('bm-admin-content').style.display='block';document.getElementById('bm-lock-err').textContent='';bmRenderRoster();}else{document.getElementById('bm-lock-err').textContent='密码错误，请重试';document.getElementById('bm-pwd').value='';}};
window.bmLock=function(){document.getElementById('bm-lock-screen').style.display='block';document.getElementById('bm-admin-content').style.display='none';document.getElementById('bm-pwd').value='';document.getElementById('bm-lock-err').textContent='';};
function bmSorted(){return bmGet().slice().sort(function(a,b){var ia=BM_CLS_SORT.indexOf(a.class),ib=BM_CLS_SORT.indexOf(b.class);return ia!==ib?ia-ib:a.name.localeCompare(b.name,'zh');});}
window.bmRenderRoster=function(){var data=bmSorted();document.getElementById('bm-roster-count').textContent='共 '+data.length+' 位考生';var content=document.getElementById('bm-roster-content');if(data.length===0){content.innerHTML='<div class="bm-card"><div class="bm-empty">暂无考生数据<br>请老师们通过「提交名单」填写学生姓名</div></div>';return;}var num=1;var numbered=data.map(function(e){return Object.assign({},e,{num:num++});});var byClass={};numbered.forEach(function(e){if(!byClass[e.class])byClass[e.class]=[];byClass[e.class].push(e);});var html='';BM_CLS_SORT.forEach(function(cls){if(!byClass[cls])return;var entries=byClass[cls];html+='<div style="margin-bottom:1.5rem"><div class="bm-sec-title">'+cls+' · '+entries.length+' 人</div><div class="bm-card" style="padding:0;overflow:hidden;border-top:none;border-radius:0 0 10px 10px;"><table class="bm-roster-table"><thead><tr><th style="width:64px">编号</th><th>姓名</th><th>班级</th><th>提交老师</th></tr></thead><tbody>';entries.forEach(function(e){html+='<tr><td><div class="bm-num-badge">'+String(e.num).padStart(2,'0')+'</div></td><td>'+e.name+'</td><td>'+e.class+'</td><td>'+e.teacher+'</td></tr>';});html+='</tbody></table></div></div>';});content.innerHTML=html;};
window.bmExportPDF=function(){var data=bmSorted();if(data.length===0){bmToast('暂无考生数据','error');return;}var now=new Date();document.getElementById('bm-pdf-date').textContent='导出日期：'+now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日　共 '+data.length+' 位参赛学生';var num=1;var numbered=data.map(function(e){return Object.assign({},e,{num:num++});});var byClass={};numbered.forEach(function(e){if(!byClass[e.class])byClass[e.class]=[];byClass[e.class].push(e);});var groups=[{label:'高华 · 高年级组（中三 & 中四）',classes:['3HCL','4HCL']},{label:'高华 · 低年级组（中一 & 中二）',classes:['1HCL','2HCL']},{label:'G3华文 · 高年级组（中三 & 中四）',classes:['3G3CL','4G3CL']},{label:'G3华文 · 低年级组（中一 & 中二）',classes:['1G3CL','2G3CL']}];var html='';groups.forEach(function(g){var ents=[];g.classes.forEach(function(c){if(byClass[c])ents=ents.concat(byClass[c]);});if(!ents.length)return;html+='<div class="bm-pdf-sec"><div class="bm-pdf-sec-title">'+g.label+'（'+ents.length+' 人）</div><table><thead><tr><th style="width:52px;text-align:center">编号</th><th>姓名</th><th style="width:90px">班级</th><th style="width:80px">提交老师</th></tr></thead><tbody>';ents.forEach(function(e){html+='<tr><td class="bm-pdf-num">'+String(e.num).padStart(2,'0')+'</td><td>'+e.name+'</td><td>'+e.class+'</td><td>'+e.teacher+'</td></tr>';});html+='</tbody></table></div>';});document.getElementById('bm-pdf-body').innerHTML=html;document.getElementById('bm-pdf-area').style.display='block';window.print();setTimeout(function(){document.getElementById('bm-pdf-area').style.display='none';},500);};

window.bmClearAll=function(){if(!confirm('确定要清除所有考生数据吗？此操作无法撤销。'))return;localStorage.removeItem('bm_roster');bmRenderRoster();bmToast('数据已清除');};
window.bmToast=function(msg,type){var t=document.getElementById('bm-toast');if(!t)return;t.textContent=msg;t.className='show'+(type?' '+type:'');setTimeout(function(){t.className='';},2800);};
// Event delegation on page container — survives all DOM rebuilds
(function(){
  var page=document.getElementById('page-baoming');
  if(!page)return;
  // Teacher select
  var sel=document.getElementById('bm-teacher-sel');
  if(sel){
    sel.addEventListener('change',function(){window.bmOnTeacherChange();});
    sel.addEventListener('input',function(){window.bmOnTeacherChange();});
  }
  // Submit button via delegation
  page.addEventListener('click',function(e){
    var t=e.target;
    // Submit / resubmit button
    if(t&&(t.id==='bm-submit-btn'||t.closest&&t.closest('#bm-submit-btn'))){
      e.preventDefault();e.stopPropagation();
      window.bmSubmit();
      return;
    }
    // Unlock button
    if(t&&t.classList&&t.classList.contains('bm-unlock-btn')){
      window.bmUnlock();return;
    }
    // Lock button
    if(t&&t.onclick&&t.getAttribute&&t.getAttribute('onclick')==='bmLock()'){
      window.bmLock();return;
    }
  });
  // Password enter key
  var pwd=document.getElementById('bm-pwd');
  if(pwd){pwd.addEventListener('keydown',function(e){if(e.key==='Enter')window.bmUnlock();});}
})();
})();
</script>
