    /* ŌöĆŌöĆ Ķ»ŠÕĀéńĀöõ╣Āµ│©ķćŖ ruby ŌöĆŌöĆ */
    .kt-ruby { cursor:help; position:relative; display:inline; }

    /* ŌöĆŌöĆ ÕÉäķŻÄµĀ╝’╝ÜµēĆµ£ēķó£Ķē▓ķĆÜĶ┐ć CSS ÕÅśķćÅ --rc õ╝ĀķĆÆ’╝łńö▒ JS Ķ«ŠńĮ«’╝ē ŌöĆŌöĆ */

    /* fill’╝łķü«ńø¢’╝īķ╗śĶ«ż’╝ē’╝Üń║»Ķē▓Õ«īÕģ©ķü«ńø¢’╝īńÖĮÕŁŚ */
    .kt-ruby:not([data-rubystyle]),
    .kt-ruby[data-rubystyle="fill"] {
        background-color: var(--rc, #1565c0) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* solid’╝Üń║»Ķē▓ÕĪ½ÕģģŌĆöŌĆöĶāīµÖ»Ķē▓ĶĘ¤ķÜÅ --rc’╝īńÖĮÕŁŚ’╝īµŚĀÕ£åĶ¦Æ’╝łõĖÄķü«ńø¢Õī║Õłå’╝ē */
    .kt-ruby[data-rubystyle="solid"] {
        background-color: var(--rc, #c0392b) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 0 !important;
        padding: 0 3px 1px !important;
    }

    /* font-color’╝Üõ╗ģµö╣ÕÅśÕŁŚõĮōķó£Ķē▓’╝īµŚĀĶāīµÖ»µŚĀĶŻģķź░ */
    .kt-ruby[data-rubystyle="font-color"] {
        background: transparent !important;
        color: var(--rc, #c0392b) !important;
        border-bottom: none !important;
        padding: 0 !important;
    }

    /* highlight’╝ÜĶŹ¦Õģēń¼öŌĆöŌĆöÕŹŖķĆÅµśÄĶāīµÖ»’╝īµ¢ćÕŁŚķó£Ķē▓õ┐ØµīüÕÄ¤Ķē▓ */
    .kt-ruby[data-rubystyle="highlight"] {
        background-color: var(--rca, rgba(255,235,59,0.55)) !important;
        color: inherit !important;
        border-bottom: none !important;
        border-radius: 2px !important;
        padding: 0 2px 2px !important;
    }

    /* soft’╝ÜµĄģĶē▓ĶāīµÖ»Ķē▓ÕØŚ’╝łÕÄ¤µØźńÜä"ÕĪ½Ķē▓"ĶĮ╗ķćÅńēł’╝ē’╝īÕŁŚĶē▓õĖÄÕØŚĶē▓õĖĆĶć┤ */
    .kt-ruby[data-rubystyle="soft"] {
        background-color: var(--rca, rgba(21,101,192,0.15)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* underline’╝Üõ╗ģõĖŗÕłÆń║┐ */
    .kt-ruby[data-rubystyle="underline"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: 2px solid var(--rc, #1565c0) !important;
        border-radius: 0 !important;
        padding: 0 1px !important;
    }

    /* wave’╝Üµ│óµĄ¬õĖŗÕłÆń║┐ */
    .kt-ruby[data-rubystyle="wave"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        padding: 0 1px 2px !important;
        text-decoration: underline wavy var(--rc, #1565c0) !important;
        text-underline-offset: 2px !important;
    }

    /* box’╝ÜĶŠ╣µĪåÕ£łķĆē */
    .kt-ruby[data-rubystyle="box"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        outline: 1.5px solid var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 2px !important;
    }

    /* tag’╝ÜÕ£åĶ¦ÆµĀćńŁŠ’╝łĶāīµÖ»Ķē▓ÕŠłµĘĪ’╝īÕĘ”õŠ¦µ£ēĶē▓µØĪ’╝ē */
    .kt-ruby[data-rubystyle="tag"] {
        background-color: var(--rca, rgba(21,101,192,0.1)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-left: 3px solid var(--rc, #1565c0) !important;
        border-radius: 0 3px 3px 0 !important;
        padding: 0 4px 0 3px !important;
    }

    /* ŌöĆŌöĆ µĘ▒µĄģõ┐«ķź░’╝łÕÅĀÕŖĀÕ£©ķŻÄµĀ╝õ╣ŗõĖŖ’╝ē ŌöĆŌöĆ */
    .kt-ruby[data-shade="light"] { filter: saturate(0.7) brightness(1.1); }
    .kt-ruby[data-shade="normal"] { filter: none; }
    .kt-ruby[data-shade="deep"]  { filter: saturate(1.4) brightness(0.82); }

    .kt-ruby rt { font-size:0; line-height:0; display:none; visibility:hidden; }
    /* ÕŖĀń▓Śµ│©ķćŖ */
    .kt-ruby[data-bold="1"] > span { font-weight: 700 !important; }
    /* ÕŁŚĶē▓ span õĮ┐ńö© CSS ÕÅśķćÅõ╝ĀķĆÆķó£Ķē▓’╝īń¬üńĀ┤ńłČÕģāń┤Ā !important ķÖÉÕłČ */
    .kt-ruby > span.kt-fc-span { color: var(--kt-fc-span-color) !important; }
    .kt-ruby > .kt-an-fc-inner { color: var(--kt-fc-span-color) !important; }

    /* ń╝¢ĶŠæµ©ĪÕ╝ÅõĖŗ ruby µé¼Õü£ */
    body.edit-mode-on .kt-ruby { cursor:pointer; }
    body.edit-mode-on .kt-ruby:hover { filter:brightness(0.88) !important; outline:1.5px dashed var(--rc,#1565c0) !important; outline-offset:1px; }
    /* tooltip via JS fixed div ŌĆö no pseudo element needed */
    #kt-tooltip {
        display:none;
        position:fixed;
        background:#eef4fb;
        color:#1a3a5c;
        border:1px solid #b8d4ee;
        font-size:7.5pt;
        line-height:1.8;
        padding:6px 12px;
        border-radius:6px;
        white-space:pre;
        z-index:9999;
        pointer-events:none;
        box-shadow:0 3px 12px rgba(42,100,160,0.15);
        font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    }
    </style>

<!-- Mobile layout (Ōēż768px) -->
<style>
#page-langdu .ld-wrap {
  display:flex; flex-direction:column; flex:1;
}
/* ŌöĆŌöĆ Mobile: unified card layout ŌöĆŌöĆ */

/* Fix gray space: langdu manages its own top spacing */
#page-langdu {
  background: var(--ld-bg) !important;
  transition: background .3s;
}

/* Namebar is now inside the card; hide the standalone one on mobile */
#langdu-namebar { display:none; }
@media (min-width:769px) { #langdu-namebar { display:flex; } }

/* Main card */
#page-langdu .ld-wrap {
  display:flex; flex-direction:column;
  padding:14px 14px 32px; gap:0;
  background:var(--ld-bg); transition:background .3s;
  min-height:calc(100vh - 52px);
}
#page-langdu .ld-main-card {
  background:#fff; border-radius:18px; overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.08);
  display:flex; flex-direction:column;
}

/* Card name row */
#page-langdu .ld-card-names {
  display:flex; align-items:stretch; padding:0; min-height:52px;
}
#page-langdu .ld-cn-field {
  display:flex; align-items:center; gap:7px; padding:13px 16px;
}
#page-langdu .ld-cn-lbl {
  font-size:13px; font-weight:600; color:var(--ld-timer);
  white-space:nowrap; transition:color .3s; flex-shrink:0;
}
#page-langdu .ld-cn-input {
  flex:1; min-width:0; border:none; outline:none;
  background:transparent; font-family:inherit; font-size:15px; color:var(--ld-txt);
}
#page-langdu .ld-cn-input::placeholder { color:var(--ld-bd); }
#page-langdu .ld-cn-sep {
  width:0.5px; background:var(--ld-bd); flex-shrink:0; transition:background .3s;
}
#page-langdu .ld-palette-btn {
  width:50px; flex-shrink:0; border:none; background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  -webkit-tap-highlight-color:transparent; transition:background .15s;
}
#page-langdu .ld-palette-btn:active { background:var(--ld-bg); }(--ld-bd); align-self:stretch; flex-shrink:0; transition:background .3s;
}
#page-langdu .ld-palette-btn {
  width:50px; border:none; background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center; align-self:stretch;
  -webkit-tap-highlight-color:transparent; transition:background .15s;
}
#page-langdu .ld-palette-btn:active { background:var(--ld-bg); }

/* Card divider */
#page-langdu .ld-card-div {
  height:0.5px; background:var(--ld-bd); transition:background .3s;
}

/* Tab row */
#page-langdu .ld-card-tabs {
  display:flex; background:var(--ld-bg); transition:background .3s;
}
#page-langdu .ld-ctab {
  flex:1; padding:11px 8px;
  border:none; border-bottom:2.5px solid transparent;
  font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; background:transparent; color:var(--ld-label);
  transition:all .18s; -webkit-tap-highlight-color:transparent;
}
#page-langdu .ld-ctab-active {
  color:var(--ld-timer); border-bottom-color:var(--ld-timer);
  background:#fff;
}

/* Panel content */
#page-langdu .ld-cpanel {
  display:flex; flex-direction:column; align-items:center;
  padding:22px 18px 20px; gap:13px;
}

/* Timer */
#page-langdu .ld-big-timer {
  font-size:40px; font-weight:300; color:var(--ld-timer);
  font-family:"SF Mono","Courier New",monospace;
  font-variant-numeric:tabular-nums; letter-spacing:0; line-height:1;
  transition:color .3s;
}
#page-langdu #langdu-timer-display { font-size:40px; font-weight:300; }
#page-langdu .ld-status-txt,
#page-langdu #langdu-status-text {
  font-size:13px; color:var(--ld-label); margin-top:-6px; transition:color .3s;
}
#page-langdu .ld-meter {
  width:100%; height:3px; background:var(--ld-bd); border-radius:2px; overflow:hidden; transition:background .3s;
}
#page-langdu #langdu-meter-bar {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--ld-m1),var(--ld-m2));
  border-radius:2px; transition:width .08s;
}

/* Buttons */
#page-langdu #langdu-rec-btn {
  width:100%; padding:17px; border:none; border-radius:12px;
  background:var(--ld-top); color:#fff; font-size:15px; font-weight:500;
  font-family:inherit; cursor:pointer; letter-spacing:.3px;
  transition:background .3s,transform .12s; -webkit-tap-highlight-color:transparent;
}
#page-langdu #langdu-rec-btn:active { transform:scale(.97); }
#page-langdu #langdu-rec-btn.ld-recording { background:#dc2626; }
#page-langdu #langdu-stop-btn {
  width:100%; padding:14px; border-radius:12px; font-size:15px; font-weight:500;
  font-family:inherit; cursor:pointer;
  background:transparent; color:var(--ld-bd); border:0.5px solid var(--ld-bd);
  transition:all .2s; -webkit-tap-highlight-color:transparent;
}
#page-langdu #langdu-stop-btn:not([disabled]) {
  color:var(--ld-top); border-color:var(--ld-top); background:rgba(255,255,255,.5);
}

/* Playback */
#page-langdu #langdu-playback-area {
  display:none; flex-direction:column; gap:11px; width:100%;
}
#page-langdu #langdu-preview,
#page-langdu #langdu-preview-desk {
  width:100%; height:36px; border-radius:8px; outline:none; border:none; display:block; box-shadow:none;
}
#page-langdu .ld-play-row { display:flex; gap:9px; }
#page-langdu .ld-play-row button {
  flex:1; padding:12px 6px; border-radius:10px; font-size:13px; font-weight:500;
  font-family:inherit; cursor:pointer; -webkit-tap-highlight-color:transparent;
}
#page-langdu #langdu-save-btn {
  background:rgba(255,255,255,.7); color:var(--ld-timer); border:0.5px solid var(--ld-bd);
}
#page-langdu .ld-rerecord-btn {
  background:#f0fdf4; color:#166534; border:0.5px solid #bbf7d0;
}
#page-langdu #langdu-submit-wrap { display:none; width:100%; }
#page-langdu #langdu-submit-wrap button {
  width:100%; padding:16px; border:none; border-radius:12px;
  background:var(--ld-up); color:#fff; font-size:15px; font-weight:500;
  font-family:inherit; cursor:pointer; letter-spacing:.3px;
  transition:background .3s,transform .12s; -webkit-tap-highlight-color:transparent;
}
#page-langdu #langdu-submit-wrap button:active { transform:scale(.97); }
#page-langdu #langdu-upload-status {
  font-size:13px; color:var(--ld-label); text-align:center; min-height:16px; width:100%;
}
#page-langdu #langdu-convert-bar-wrap {
  display:none; width:100%; height:4px; background:var(--ld-bd); border-radius:2px; overflow:hidden;
}
#page-langdu #langdu-convert-bar {
  height:100%; width:0%; background:linear-gradient(90deg,var(--ld-m1),var(--ld-m2));
  border-radius:2px; transition:width .2s;
}
#page-langdu #langdu-mic-error {
  display:none; width:100%; padding:12px 14px;
  background:#fef2f2; border:0.5px solid #fca5a5; border-radius:10px;
  font-size:13px; color:#dc2626; line-height:1.7;
}
#page-langdu #langdu-save-hint {
  font-size:11px; color:#6b7280; text-align:center; display:none; width:100%;
}

/* Feedback tab panel */
#page-langdu .ld-fb-lbl {
  font-size:15px; font-weight:600; color:var(--ld-timer);
  letter-spacing:.2px; transition:color .3s; align-self:flex-start;
}
#page-langdu .ld-fb-hint {
  font-size:13px; color:var(--ld-txt); line-height:1.7; opacity:.75; align-self:flex-start;
}
#page-langdu #langdu-fb-student { display:none; flex-direction:column; gap:12px; width:100%; }
#page-langdu .ld-fb-row { display:flex; gap:8px; }
#page-langdu #langdu-query-name {
  flex:1; padding:13px 14px; border:0.5px solid var(--ld-bd); border-radius:10px;
  font-family:inherit; font-size:14px; outline:none;
  background:var(--ld-bg); color:var(--ld-txt); transition:all .3s;
}
#page-langdu #langdu-query-name::placeholder { color:var(--ld-bd); }
#page-langdu #langdu-query-name:focus { border-color:var(--ld-top); background:#fff; }
#page-langdu .ld-fb-row button {
  padding:13px 20px; background:var(--ld-top); color:#fff; border:none; border-radius:10px;
  font-size:14px; font-weight:500; font-family:inherit; cursor:pointer;
  transition:background .3s; -webkit-tap-highlight-color:transparent;
}
#page-langdu #langdu-query-result {
  display:none; padding:14px 16px; background:var(--ld-bg);
  border-radius:12px; font-size:14px; line-height:2; color:var(--ld-txt); width:100%;
}
#page-langdu #langdu-query-status {
  font-size:13px; color:var(--ld-label); text-align:center; min-height:16px; width:100%;
}

/* ŌöĆŌöĆ Desktop layout (>768px) ŌöĆŌöĆ */
@media (min-width:769px) {
  #page-langdu .ld-wrap { display:none; }
  #page-langdu .ld-desk { display:grid !important; }
}
@media (max-width:768px) {
  #page-langdu .ld-wrap { display:flex; }

    background:var(--ld-bg) !important; }

/* Theme overlay */

// ŌöĆŌöĆ Desktop dual-display bridge ŌöĆŌöĆ
// The original script uses mobile IDs exclusively.

var _ldBridgeTimer=null;
function _ldBridge(){
  // Timer + status
  var m=document.getElementById('langdu-timer-display');
  var d=document.getElementById('langdu-timer-display-desk');
  if(m&&d) d.textContent=m.textContent;
  var ms=document.getElementById('langdu-status-text');
  var ds=document.getElementById('langdu-status-text-desk');
  if(ms&&ds) ds.textContent=ms.textContent;
  // Meter bar
  var mm=document.getElementById('langdu-meter-bar');
  var dm=document.getElementById('langdu-meter-bar-desk');
  if(mm&&dm) dm.style.width=mm.style.width;
  // Playback area visibility
  var mp=document.getElementById('langdu-playback-area');
  var dp=document.getElementById('langdu-playback-area-desk');
  if(mp&&dp) dp.style.display=mp.style.display;
  // Audio src ŌĆö only update if changed to avoid resetting playback position
  var ma=document.getElementById('langdu-preview');
  var da=document.getElementById('langdu-preview-desk');
  if(ma&&da&&ma.src&&da.src!==ma.src) da.src=ma.src;
  // Submit wrap
  var msw=document.getElementById('langdu-submit-wrap');
  var dsw=document.getElementById('langdu-submit-wrap-desk');
  if(msw&&dsw) dsw.style.display=msw.style.display;
  // Upload status
  var mus=document.getElementById('langdu-upload-status');
  var dus=document.getElementById('langdu-upload-status-desk');
  if(mus&&dus) dus.textContent=mus.textContent;
  // Rec/stop button states
  var rb=document.getElementById('langdu-rec-btn');
  var rbd=document.getElementById('langdu-rec-btn-desk');
  if(rb&&rbd){
    rbd.textContent=rb.textContent;
    rbd.disabled=rb.disabled;
    rbd.className=rb.className.replace('langdu-rec-btn','langdu-rec-btn-desk');
    if(rb.classList.contains('ld-recording')) rbd.style.background='#dc2626';
    else rbd.style.background='var(--ld-top)';
  }
  var sb=document.getElementById('langdu-stop-btn');
  var sbd=document.getElementById('langdu-stop-btn-desk');
  if(sb&&sbd) sbd.disabled=sb.disabled;
  // Convert bar
  var mcb=document.getElementById('langdu-convert-bar');
  var dcb=document.getElementById('langdu-convert-bar-desk');
  if(mcb&&dcb) dcb.style.width=mcb.style.width;
  var mcbw=document.getElementById('langdu-convert-bar-wrap');
  var dcbw=document.getElementById('langdu-convert-bar-wrap-desk');
  if(mcbw&&dcbw) dcbw.style.display=mcbw.style.display;
  // Save hint
  var msh=document.getElementById('langdu-save-hint');
  var dsh=document.getElementById('langdu-save-hint-desk');
  if(msh&&dsh){dsh.textContent=msh.textContent;dsh.style.display=msh.style.display;}
}

    return;
  }
  // copy name into mobile input so original langduQueryFeedback can read it
  var mi=document.getElementById('langdu-query-name');
  if(mi) mi.value=n;

  // patch result/status els temporarily to point at desk versions
  var origResult=document.getElementById('langdu-query-result');
  var origStatus=document.getElementById('langdu-query-status');
  var deskResult=document.getElementById('langdu-query-result-desk');
  var deskStatus=document.getElementById('langdu-query-status-desk');

  // Temporarily swap IDs so langduQueryFeedback writes to desk elements
  if(origResult) origResult.id='langdu-query-result-hidden';
  if(origStatus) origStatus.id='langdu-query-status-hidden';
  if(deskResult) deskResult.id='langdu-query-result';
  if(deskStatus) deskStatus.id='langdu-query-status';

  langduQueryFeedback();

  // Restore IDs after fetch completes (langduQueryFeedback is async)
  setTimeout(function(){
    var dr=document.getElementById('langdu-query-result');
    var ds=document.getElementById('langdu-query-status');
    var hr=document.getElementById('langdu-query-result-hidden');
    var hs=document.getElementById('langdu-query-status-hidden');
    if(dr) dr.id='langdu-query-result-desk';
    if(ds) ds.id='langdu-query-status-desk';
    if(hr) hr.id='langdu-query-result';
    if(hs) hs.id='langdu-query-status';
  },8000);
};

<script>
// ŌĢÉŌĢÉ µ£ŚĶ»╗ÕĮĢķ¤│µ©ĪÕØŚ ŌĢÉŌĢÉ
(function(){
    var _ldStream = null, _ldMR = null, _ldChunks = [], _ldCtx = null, _ldAnalyser = null,
        _ldDataArr = null, _ldAnimId = null, _ldTimerInt = null, _ldSeconds = 0,
        _ldReady = false, _ldFontSize = 11;

    function _el(id){ return document.getElementById(id); }

    function langduInitMic() {
        if (_ldReady) return;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            _el('langdu-mic-error').style.display = 'block'; return;
        }
        navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
            _ldStream = stream;
            _ldCtx = new (window.AudioContext || window.webkitAudioContext)();
            _ldAnalyser = _ldCtx.createAnalyser();
            _ldAnalyser.fftSize = 256;
            _ldCtx.createMediaStreamSource(stream).connect(_ldAnalyser);
            _ldDataArr = new Uint8Array(_ldAnalyser.frequencyBinCount);
            _ldMR = new MediaRecorder(stream, {audioBitsPerSecond: 96000});
            _ldMR.ondataavailable = function(e){ if(e.data && e.data.size>0) _ldChunks.push(e.data); };
            _ldMR.onstop = function(){
                var blob = new Blob(_ldChunks, {type:'audio/webm'});
                var url  = URL.createObjectURL(blob);
                _el('langdu-preview').src = url;
                var pa = _el('langdu-playback-area');

                window._langduAudioBlob = blob;
                // ÕŁ”ńö¤ńēłµēŹµśŠńż║õĖŖõ╝ĀµīēķÆ«
                var sw = _el('langdu-submit-wrap');
                if (sw && window.STUDENT_META) sw.style.display = 'block';
            };
            _ldReady = true;
            _el('langdu-rec-btn').disabled = false;
            _el('langdu-status-text').textContent = 'Microphone ready';
        }).catch(function(){
            _el('langdu-mic-error').style.display = 'block';
        });
    }

    function _drawMeter(){
        _ldAnalyser.getByteFrequencyData(_ldDataArr);
        var avg = _ldDataArr.reduce(function(a,b){return a+b;},0) / _ldDataArr.length;
        _el('langdu-meter-bar').style.width = Math.min(avg * 3, 100) + '%';
        _ldAnimId = requestAnimationFrame(_drawMeter);
    }

    window.langduStartRec = function(){
        if (!_ldReady) { alert('Microphone not ready yet, please wait.'); return; }
        if (_ldCtx && _ldCtx.state === 'suspended') _ldCtx.resume();
        _ldChunks = [];
        _ldSeconds = 0;
        _el('langdu-timer-display').textContent = '00:00';
        _el('langdu-playback-area').style.display = 'none';
        _el('langdu-upload-status').textContent = '';
        window._langduAudioBlob = null;
        _ldMR.start(200);
        _el('langdu-rec-btn').disabled = true;

        _el('langdu-stop-btn').disabled = false;

        _el('langdu-stop-btn').style.color = '#fff';

        _ldTimerInt = setInterval(function(){
            _ldSeconds++;
            var m = Math.floor(_ldSeconds/60), s = _ldSeconds % 60;

    window.langduStopRec = function(){

        cancelAnimationFrame(_ldAnimId);

        _el('langdu-rec-btn').style.background = '#4a35c8';
        _el('langdu-rec-btn').textContent = 'ŌŚÅ Record';

    window.langduReRecord = function(){
        _el('langdu-playback-area').style.display = 'none';

        _el('langdu-timer-display').textContent = '00:00';
        _el('langdu-status-text').textContent = 'Microphone ready ŌĆö record again';
        _el('langdu-upload-status').textContent = '';
        var hint = _el('langdu-save-hint');
        if (hint) hint.style.display = 'none';
        var bar = _el('langdu-convert-bar');
        var wrap = _el('langdu-convert-bar-wrap');
        if (bar)  bar.style.width = '0%';
        if (wrap) wrap.style.display = 'none';
        var saveBtn = _el('langdu-save-btn');
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Ōåō Save MP3'; }
        // ķćŹµ¢░ÕĮĢķ¤│µŚČķÜÉĶŚÅõĖŖõ╝ĀµīēķÆ«
        var sw = _el('langdu-submit-wrap');
        if (sw) sw.style.display = 'none';
    };

    // ŌöĆŌöĆ µ×äÕ╗║µ¢ćõ╗ČÕÉŹ’╝łÕģ▒ńö©’╝ē ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    function _ldBuildFileName(ext) {
        var page   = document.getElementById('page-langdu');
        var inputs = page ? page.querySelectorAll('input[type="text"]') : [];
        var sName  = (inputs[0] && inputs[0].value.trim()) || 'student';
        var meta   = window.STUDENT_META;
        var task   = (meta && meta.assignTitle) ? meta.assignTitle : 'reading';
        var now    = new Date();
        var stamp  = now.getFullYear()
                   + String(now.getMonth()+1).padStart(2,'0')
                   + String(now.getDate()).padStart(2,'0')
                   + '_'
                   + String(now.getHours()).padStart(2,'0')
                   + String(now.getMinutes()).padStart(2,'0');
        var safe = function(s){ return s.replace(/[\/\\:*?"<>|\s]/g,'_'); };
        return safe(sName) + '_' + safe(task) + '_' + stamp + ext;
    }

    // ŌöĆŌöĆ Ķ¦”ÕÅæõĖŗĶĮĮ ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    function _ldTriggerDownload(blob, fileName) {
        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href  = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function(){ URL.revokeObjectURL(url); }, 15000);
    }

    // ŌöĆŌöĆ Ķ┐øÕ║”µØĪĶŠģÕŖ® ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    function _ldSetProgress(pct, msg) {
        var bar  = _el('langdu-convert-bar');
        var wrap = _el('langdu-convert-bar-wrap');
        var hint = _el('langdu-save-hint');
        if (bar)  bar.style.width = pct + '%';
        if (wrap) wrap.style.display = pct >= 100 || pct < 0 ? 'none' : 'block';
        if (hint) { hint.textContent = msg || ''; hint.style.display = msg ? 'block' : 'none'; }
    }

    // ŌöĆŌöĆ õĖ╗ÕģźÕÅŻ’╝ÜWebM ŌåÆ MP3’╝łvia lamejs’╝ē’╝īfallback ŌåÆ WebM ŌöĆŌöĆ
    window.langduSaveLocal = function(){
        if (!window._langduAudioBlob) return;

        var saveBtn = _el('langdu-save-btn');
        if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'ŌÅ│ ConvertingŌĆ”'; }
        _ldSetProgress(5, '');

        // 1. µŖŖ WebM blob Ķ¦ŻńĀüµłÉ PCM AudioBuffer
        var reader = new FileReader();
        reader.onloadend = function() {
            var arrayBuf = reader.result;
            var audioCtxTmp = new (window.AudioContext || window.webkitAudioContext)();
            audioCtxTmp.decodeAudioData(arrayBuf, function(audioBuf) {
                _ldSetProgress(30, '');
                _ldEncodeMp3(audioBuf, function(mp3Blob) {
                    var fileName = _ldBuildFileName('.mp3');
                    _ldTriggerDownload(mp3Blob, fileName);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Ōåō Save MP3'; }
                    _ldSetProgress(100, '');
                    _ldSetProgress(-1, 'Ō£ō Saved as ' + fileName + '(MP3 ŌĆö plays on all devices)');
                }, function(err) {
                    // lamejs ÕŖĀĶĮĮÕż▒Ķ┤ź ŌåÆ fallback õĖŗĶĮĮ WebM
                    console.warn('MP3 encode failed, saving WebM:', err);
                    var fileName = _ldBuildFileName('.webm');
                    _ldTriggerDownload(window._langduAudioBlob, fileName);
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Ōåō Save MP3'; }
                    _ldSetProgress(-1, 'ŌÜĀ Saved as WebM (MP3 conversion failed ŌĆö open in Chrome on iPhone/iPad)');
                });
            }, function() {
                // decodeAudioData Õż▒Ķ┤ź ŌåÆ fallback
                var fileName = _ldBuildFileName('.webm');
                _ldTriggerDownload(window._langduAudioBlob, fileName);
                if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Ōåō Save MP3'; }
                _ldSetProgress(-1, 'ŌÜĀ Saved as WebM (decode failed ŌĆö open in Chrome on iPhone/iPad)');
            });
        };
        reader.readAsArrayBuffer(window._langduAudioBlob);
    };

    // ŌöĆŌöĆ lamejs MP3 ń╝¢ńĀü ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    // ÕŖ©µĆüÕŖĀĶĮĮ lamejs’╝łCDN’╝ē’╝īµłÉÕŖ¤ÕÉÄń╝¢ńĀü’╝īÕż▒Ķ┤źÕłÖÕø×Ķ░ā onError
    function _ldEncodeMp3(audioBuf, onDone, onError) {
        function _doEncode(lamejs) {
            try {
                var nCh      = Math.min(audioBuf.numberOfChannels, 2);
                var sRate    = audioBuf.sampleRate;
                var kbps     = 128;
                var mp3enc   = new lamejs.Mp3Encoder(nCh, sRate, kbps);
                var samples  = audioBuf.length;
                var CHUNK    = 1152 * 8;   // lamejs µ»ÅÕĖ¦ 1152 µĀĘµ£¼’╝īµē╣ķćÅÕżäńÉåÕŖĀķĆ¤
                var mp3Data  = [];

                // ÕÅ¢ÕÉäÕŻ░ķüōµĢ░µŹ«Õ╣ČĶĮ¼µłÉ Int16
                var left  = _ldFloat32ToInt16(audioBuf.getChannelData(0));
                var right = nCh > 1 ? _ldFloat32ToInt16(audioBuf.getChannelData(1)) : null;

                var processed = 0;
                function encodeChunk() {
                    var end = Math.min(processed + CHUNK, samples);
                    var lChunk = left.subarray(processed, end);
                    var rChunk = right ? right.subarray(processed, end) : lChunk;
                    var mp3buf = nCh > 1
                        ? mp3enc.encodeBuffer(lChunk, rChunk)
                        : mp3enc.encodeBuffer(lChunk);
                    if (mp3buf.length > 0) mp3Data.push(mp3buf);
                    processed = end;

                    var pct = 30 + Math.round((processed / samples) * 65);
                    _ldSetProgress(pct, '');

                    if (processed < samples) {
                        // ÕłåÕĖ¦Õ╝éµŁźÕżäńÉå’╝īõĖŹķś╗ÕĪ× UI
                        setTimeout(encodeChunk, 0);
                    } else {
                        var final = mp3enc.flush();
                        if (final.length > 0) mp3Data.push(final);
                        onDone(new Blob(mp3Data, { type: 'audio/mpeg' }));
                    }
                }
                encodeChunk();
            } catch(e) { onError(e); }
        }

        // ÕĘ▓ÕŖĀĶĮĮĶ┐ćÕłÖńø┤µÄźńö©
        if (window._lameLoaded && window.lamejs) { _doEncode(window.lamejs); return; }

        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js';
        s.onload  = function(){ window._lameLoaded = true; _doEncode(window.lamejs); };
        s.onerror = function(){ onError(new Error('lamejs CDN load failed')); };
        document.head.appendChild(s);
    }

    // Float32 [-1,1] ŌåÆ Int16
    function _ldFloat32ToInt16(f32) {
        var int16 = new Int16Array(f32.length);
        for (var i = 0; i < f32.length; i++) {
            var v = Math.max(-1, Math.min(1, f32[i]));
            int16[i] = v < 0 ? v * 32768 : v * 32767;
        }
        return int16;
    }

    // ŌöĆŌöĆ µ£ŚĶ»╗ÕĮĢķ¤│’╝ÜõĖŖõ╝ĀÕĮĢķ¤│’╝łĶĄ░ÕŁ”õ╣ĀÕŹĢµÅÉõ║żµĄüń©ŗ’╝īńö©Õø×Ķ░āĶÄĘÕÅ¢ń╗ōµ×£’╝ēŌöĆŌöĆ
    window.langduSubmitRecording = function(){

                if (submitBtn) { submitBtn.style.display = 'none'; }
            } else if (reason === 'validation') {
                // ķ¬īĶ»üÕż▒Ķ┤ź’╝ÜÕ╝╣ń¬ŚÕĘ▓ńö▒ showModal ÕżäńÉå’╝īĶ┐ÖķćīÕÅ¬µüóÕżŹµīēķÆ«
                _el('langdu-upload-status').textContent = '';

            } else {
                // ńĮæń╗£ķöÖĶ»»’╝ÜÕģ©Õ▒ÅµÅÉńż║ÕĘ▓ńö▒ submitWork ÕżäńÉå

    window.langduChangeFontSize = function(delta){

        if (!isRec) {

    // ŌöĆŌöĆ ĶĆüÕĖłµēōÕ╝ĆĶ»äÕłåµĆ╗ĶĪ© ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ
    window.langduOpenScoreSheet = function() {
        var scriptUrl = '';
        var urlEl = document.getElementById('scriptUrl');
        if (urlEl) scriptUrl = urlEl.value.trim();

            if (hint) hint.textContent = 'ŌÜĀ Please set up Script URL in settings first';

        // ÕÅ¢ńÅŁń║¦ÕÆīõ╗╗ÕŖĪÕÉŹ’╝łĶĆüÕĖłńēłõ╗Ä toolbar Ķ»╗’╝īÕŁ”ńö¤ńēłõ╗Ä STUDENT_META Ķ»╗’╝ē

    window.langduQueryFeedback = function() {

        if (!name) { statusEl.textContent = 'Please enter your name'; return; }

        statusEl.textContent = 'SearchingŌĆ”';
        resultEl.style.display = 'none';

        // ÕÅ¢ńÅŁń║¦’╝łÕŁ”ńö¤ńēłõ╗Ä STUDENT_META’╝īĶĆüÕĖłńēłõ╗Ä toolbar’╝ē

            + '&template=langdu';

        fetch(url)
            .then(function(r){ return r.json(); })

                resultEl.style.display = 'block';
                if (d.found) {
                    var html = '';
                    if (d.score !== undefined && d.score !== '')
                        html += '<div><b style="color:var(--ld-timer,#6556cc)">Score: </b>' + d.score + '</div>';
                    if (d.comment !== undefined && d.comment !== '')
                        html += '<div style="margin-top:8px;"><b style="color:var(--ld-timer,#6556cc)">Comments: </b><span style="white-space:pre-wrap;">' + d.comment + '</span></div>';
                    if (!html) html = '<div style="color:#888;">No feedback yet ŌĆö check back later.</div>';
                    // µśŠńż║õĖŖµ¼ĪÕĘ▓Ķ»╗µŚČķŚ┤’╝łÕ”éµ£ē’╝ē
                    if (d.readTime && d.readTime !== '' && (d.score !== '' || d.comment !== '')) {
                        html += '<div style="margin-top:10px;font-size:7.5pt;color:#aaa;border-top:0.5px solid #e8e0f8;padding-top:6px;">Last viewed: ' + d.readTime + '</div>';
                    }
                    resultEl.innerHTML = html;
                } else {
                    resultEl.innerHTML = '<div style="color:#888;">No record found. Check your name spelling, or wait for your teacher to mark your recording.</div>';
                }
            })
            .catch(function() {

    };

    // ÕĮōµ©ĪµØ┐ÕłćµŹóÕł░ langdu µŚČÕłØÕ¦ŗÕī¢ķ║”ÕģŗķŻÄ

        if (document.getElementById('page-langdu') &&

    function smartPrint() {

        var _jsPg = document.getElementById('page-jingsai');
        if (_jsPg && _jsPg.style.display !== 'none') { _printTpl = 'jingsai'; }
        // Õ”éµ×£ÕĮōÕēŹµś»jingsai’╝īõĮ┐ńö©savePDFńö¤µłÉPDF’╝łµø┤ÕÅ»ķØĀ’╝ē
        if (_printTpl === 'jingsai' && typeof savePDF === 'function') {

        // µēōÕŹ░ÕēŹ’╝ÜµŖŖµēĆµ£ēÕÅ»Ķ¦üķĪĄķØóńÜä textarea µø┐µŹóµłÉķ½śÕ║”Ķć¬ķĆéÕ║öńÜä div
        const replacements = [];
        document.querySelectorAll('.page textarea').forEach(function(ta) {
            const div = document.createElement('div');
            const st = ta.getAttribute('style') || '';

            if (ta.className) div.className = ta.className;
            div.textContent = ta.value;
            ta.parentNode.insertBefore(div, ta);
            ta.style.display = 'none';
            replacements.push({ ta: ta, div: div });
        });

        // grid Õ«╣ÕÖ©ķ½śÕ║”
        const savedGrids = [];
        ['page-yilun','page-miaoxie','page-yilun-outline','page-yilun-mini'].forEach(function(pid) {

        // Ķ««Ķ«║ń╗āń¼ö’╝ÜõĖ┤µŚČń╝®Õ░Å @page margin’╝īĶģŠÕć║ĶČ│Õż¤ń®║ķŚ┤µöŠĶ┐øõĖĆķĪĄ

        // Õģ©Õ▒ĆµēōÕŹ░µĀĘÕ╝Å’╝łtextareaķ½śÕ║”µÆæÕ╝ĆńŁē’╝ē
        var yueduPrintStyle = document.createElement('style');

            '.page textarea { height:auto !important; max-height:none !important; overflow:visible !important; }',

        // ń©┐ń║Ėµ©ĪÕ╝ÅµēōÕŹ░’╝Üµ¢ćÕŁŚńö╗Õģźcanvas’╝īµĖģķÖżinline heightĶ«®CSS height:autońö¤µĢł
        (function(){
          var pg=document.getElementById('page-jingsai');

          var saved=[];

            if(cv&&tb&&_cW>0){

              if(spans.length){
                var ctx=cv.getContext('2d');

                  ctx.fillText(s.textContent,l+w/2,t+h/2);
                });

            }

            // µĖģķÖżinline height’╝īĶ«®CSSńÜäheight:auto!importantń£¤µŁŻńö¤µĢł
            var s={};
            if(cv){s.cv=cv;s.cvH=cv.style.height;cv.style.height='auto';}
            if(wrap){s.wrap=wrap;s.wrapH=wrap.style.height;wrap.style.height='auto';}
            if(outer){s.outer=outer;s.outerH=outer.style.height;outer.style.height='auto';}
            saved.push(s);
          });

          // afterprintµüóÕżŹinline height
          var done=false;
          function restore(){
            if(done)return;done=true;
            window.removeEventListener('afterprint',restore);
            saved.forEach(function(s){
              if(s.cv)s.cv.style.height=s.cvH;
              if(s.wrap)s.wrap.style.height=s.wrapH;
              if(s.outer)s.outer.style.height=s.outerH;
            });
          }
          window.addEventListener('afterprint',restore);
          setTimeout(restore,5000);
        })();

        window.print();
        // µüóÕżŹĶó½õĖ┤µŚČķÜÉĶŚÅńÜäķĪĄķØó
        _hiddenPages.forEach(function(pg){ pg.style.display = ''; });

        savedGrids.forEach(function(item) {

        if (yilunPageStyle && yilunPageStyle.parentNode) {
            yilunPageStyle.parentNode.removeChild(yilunPageStyle);
        }

    }

    // ŌĢÉŌĢÉ Ķ»ŠÕĀéńĀöõ╣Ā’╝ÜÕ«īµĢ┤ÕŖ¤ĶāĮ ŌĢÉŌĢÉ
    var ktQCount = 1;
    var KT_BOX_HEIGHTS = { s: 36, m: 58, l: 100 };

    // ŌöĆŌöĆ ÕĘźÕģĘµ©ĪÕ╝Åń«ĪńÉå’╝łķ½śõ║« / ńö╗ń¼ö’╝ēŌöĆŌöĆ
    var _ktToolMode = 'draw'; // 'highlight' | 'draw'
    var _ktHLColor = '#fff176';

    // ŌöĆŌöĆ µē╣µ│©ńö╗ń¼öµĆ╗Õ╝ĆÕģ│’╝łÕŁ”ńö¤ńēłµ¢ćµ£¼Õī║ toggle switch’╝ēŌöĆŌöĆ
    var _ktAnnotateOn = false;
    function ktToggleAnnotate() {
        _ktAnnotateOn = !_ktAnnotateOn;
        var dc    = document.getElementById('kt-draw-canvas');

        if (_ktAnnotateOn) {

            if (dc && body) {
                var bw = body.offsetWidth || 300;

                var saved = null;
                try { if (dc.width > 10 && dc.height > 10) saved = dc.toDataURL(); } catch(e) {}
                dc.width  = bw;

                if (saved) {

                dc.style.display       = 'block';

            if (tc) { tc.style.userSelect = 'none'; tc.style.webkitUserSelect = 'none'; }

            // ÕĘźÕģĘµĀÅµüóÕżŹµŁŻÕĖĖ
            var ht = document.getElementById('kt-highlight-toolbar');
            if (ht) { ht.querySelectorAll('button,select').forEach(function(el){ el.style.opacity=''; el.style.pointerEvents=''; }); }
            _ktToolMode = 'draw';
        } else {
            // ŌöĆŌöĆ OFF’╝ÜķÜÉĶŚÅńö╗ÕĖā’╝īµüóÕżŹµŁŻÕĖĖķśģĶ»╗ ŌöĆŌöĆ
            if (dc) { dc.style.display = 'none'; dc.style.pointerEvents = 'none'; }
            if (tc) { tc.style.userSelect = ''; tc.style.webkitUserSelect = ''; }
            if (track) track.style.background = '#d1d5db';
            if (thumb) thumb.style.left = '2px';
            // ÕĘźÕģĘµĀÅńü░Õī¢’╝łlabel µ£¼Ķ║½õ┐ØµīüµŁŻÕĖĖ’╝īĶ«® toggle ÕÅ»ńé╣’╝ē
            var ht = document.getElementById('kt-highlight-toolbar');
            if (ht) {
                ht.querySelectorAll('button,select').forEach(function(el){
                    el.style.opacity = '0.35';

    // toggle switch label ń╗æÕ«Ü’╝łclick Ķ¦”ÕÅæ ktToggleAnnotate’╝ē
    document.addEventListener('DOMContentLoaded', function() {
        var lbl = document.getElementById('kt-annotate-label');
        if (lbl) lbl.addEventListener('click', ktToggleAnnotate);
    });

    function ktSetMode(mode) {
        _ktToolMode = mode;
        var hlBtn    = document.getElementById('kt-mode-hl-btn');
        var eraseBtn = document.getElementById('kt-hl-erase');
        var drawBtn  = document.getElementById('kt-mode-draw-btn');
        // Reset all button styles
        if (hlBtn)    { hlBtn.style.background='#fff'; hlBtn.style.borderColor='#e0c97a'; hlBtn.style.color='#7a5800'; hlBtn.style.fontWeight='600'; hlBtn.style.boxShadow='none'; }
        if (eraseBtn) { eraseBtn.style.background='#fff8e1'; eraseBtn.style.borderColor='#ffe082'; eraseBtn.style.boxShadow='none'; }
        if (drawBtn)  { drawBtn.style.background='#fff'; drawBtn.style.borderColor='#c0d4e8'; drawBtn.style.color='#555'; drawBtn.style.fontWeight='400'; drawBtn.style.boxShadow='none'; }
        // Active state
        if (mode==='highlight' && hlBtn)    { hlBtn.style.background='#fdf0c0'; hlBtn.style.borderColor='#e6b800'; hlBtn.style.boxShadow='0 0 0 2px #ffe57a inset'; }
        if (mode==='hl-erase'  && eraseBtn) { eraseBtn.style.background='#fffbeb'; eraseBtn.style.borderColor='#f59e0b'; eraseBtn.style.boxShadow='0 0 0 2px #fcd34d inset'; }
        if (mode==='draw'      && drawBtn)  { drawBtn.style.background='#e8f2fb'; drawBtn.style.borderColor='#2e86c1'; drawBtn.style.color='#2e86c1'; drawBtn.style.fontWeight='700'; drawBtn.style.boxShadow='0 0 0 2px #7ec8e3 inset'; }
        // touch-action: allow text selection for highlight, none for draw
        var tc = document.getElementById('kt-text-content');
        if (tc) {
            if (mode==='draw') {
                tc.style.userSelect = 'none';
                tc.style.webkitUserSelect = 'none';
            } else {
                tc.style.userSelect = '';
                tc.style.webkitUserSelect = '';
            }
        }
        // canvas pointer-events: only draw mode sends events to draw canvas
        var dc = document.getElementById('kt-draw-canvas');
        if (dc) {
            dc.style.pointerEvents = (mode==='draw') ? 'auto' : 'none';
            // Re-sync canvas size when entering draw mode
            if (mode==='draw') {
                var body2 = document.getElementById('kt-text-body');
                if (body2 && body2.offsetWidth > 0) {
                    if (dc.width !== body2.offsetWidth || dc.height !== body2.offsetHeight) {
                        dc.width  = body2.offsetWidth;
                        dc.height = body2.offsetHeight;
                    }
                }
            }
        }
    }


    function ktSetHLColor(color) {
        _ktHLColor = color;
        // highlight all border colors to show active
        ['kt-hl-y','kt-hl-b','kt-hl-g','kt-hl-p'].forEach(function(id) {
            var b = document.getElementById(id);
            if (b) b.style.borderWidth = '0.5px';
        });
    }

    // ŌöĆŌöĆ ķ½śõ║«ń¼ö’╝ÜmousedownŌåÆmousemoveŌåÆmouseup Õī║ķŚ┤ķĆēõĖŁÕ╣Čķ½śõ║« ŌöĆŌöĆ
    var _ktHLDown = false, _ktHLRange = null;

    function ktInitHighlightMode() {
        var tc = document.getElementById('kt-text-content');
        if (!tc || tc._hlInited) return;
        tc._hlInited = true;
        tc.style.userSelect = 'text';
        tc.style.webkitUserSelect = 'text';

        // ŌöĆŌöĆ ķ½śõ║« DOM Õ┐½ńģ¦ undo/redo ŌöĆŌöĆ
        var _hlUndoStack = [], _hlRedoStack = [];
        function saveHlSnapshot() {
            _hlUndoStack.push(tc.innerHTML);
            if (_hlUndoStack.length > 30) _hlUndoStack.shift();
            _hlRedoStack = [];
            _lastActionType = 'highlight';
        }
        function hlUndo() {
            if (_hlUndoStack.length === 0) return;
            _hlRedoStack.push(tc.innerHTML);
            tc.innerHTML = _hlUndoStack.pop();
        }
        function hlRedo() {
            if (_hlRedoStack.length === 0) return;
            _hlUndoStack.push(tc.innerHTML);
            tc.innerHTML = _hlRedoStack.pop();
        }
        // µīéÕł░Õģ©Õ▒Ć’╝īCtrl+Z/Y ń╗¤õĖĆĶ░āńö©
        window._hlUndo = hlUndo;
        window._hlRedo = hlRedo;
        window._hlUndoStack = _hlUndoStack;
        window._hlRedoStack = _hlRedoStack;
        window._saveHlSnapshot = saveHlSnapshot; // õŠøÕŖĀń▓Ś/ķó£Ķē▓ńŁēµōŹõĮ£Õģ▒ńö©ÕÉīõĖĆõĖ¬ undo µĀł

        function applyHL() {
            var sel = window.getSelection();
            if (!sel || sel.isCollapsed) return;
            var range;
            try { range = sel.getRangeAt(0); } catch(ex) { return; }
            if (!tc.contains(range.commonAncestorContainer)) return;
            saveHlSnapshot(); // µōŹõĮ£ÕēŹõ┐ØÕŁśÕ┐½ńģ¦
            var mode = _ktToolMode;
            if (mode === 'highlight') {
                var span = document.createElement('span');
                span.className = 'kt-hl';
                span.style.cssText = 'background-color:' + _ktHLColor + ';border-radius:2px;padding:0 1px;';
                try { range.surroundContents(span); }
                catch(ex) { var frag = range.extractContents(); span.appendChild(frag); range.insertNode(span); }
            } else if (mode === 'hl-erase') {
                Array.from(tc.querySelectorAll('.kt-hl')).forEach(function(s) {
                    if (range.intersectsNode(s)) {
                        var p = s.parentNode;
                        while (s.firstChild) p.insertBefore(s.firstChild, s);
                        p.removeChild(s);
                    }
                });
            }
            sel.removeAllRanges();
        }

        // MOUSE: enable contenteditable only in highlight/erase mode (not draw)
        tc.addEventListener('mousedown', function(e) {
            if (!_ktAnnotateOn) return; // µē╣µ│©µĆ╗Õ╝ĆÕģ│Õģ│ķŚŁµŚČõĖŹÕōŹÕ║ö
            var mode = _ktToolMode;
            if (mode === 'highlight' || mode === 'hl-erase') {
                tc.contentEditable = 'true';
                tc._selecting = true;
            }
        });

        // Apply on mouseup
        tc.addEventListener('mouseup', function(e) {
            if (!tc._selecting) return;
            tc._selecting = false;
            var mode = _ktToolMode;
            if (mode !== 'highlight' && mode !== 'hl-erase') return;
            setTimeout(function() {
                applyHL();
                if (!window.isEditMode) tc.contentEditable = 'false';
            }, 10);
        });

        // PEN: two-tap range marking
        var _hlAnchor = null, _hlMarker = null;
        tc.addEventListener('pointerdown', function(e) {
            if (e.pointerType !== 'pen') return;
            if (!_ktAnnotateOn) return; // µē╣µ│©µĆ╗Õ╝ĆÕģ│Õģ│ķŚŁµŚČõĖŹÕōŹÕ║ö
            var mode = _ktToolMode;
            if (mode !== 'highlight' && mode !== 'hl-erase') return;
            e.preventDefault();
            var pos = getCaretPos(e.clientX, e.clientY);
            if (!pos) return;
            if (!_hlAnchor) {
                _hlAnchor = pos;
                showPenMarker(e.clientX, e.clientY);
            } else {
                var a = _hlAnchor; _hlAnchor = null; removePenMarker();
                applyTwoTap(a, pos);
            }
        }, { passive: false });

        document.addEventListener('pointerdown', function(e) {
            if (e.target === tc || tc.contains(e.target)) return;
            if (_hlAnchor) { _hlAnchor = null; removePenMarker(); }
        });

        function getCaretPos(x, y) {
            if (document.caretRangeFromPoint) return document.caretRangeFromPoint(x, y);
            if (document.caretPositionFromPoint) {
                var cp = document.caretPositionFromPoint(x, y);
                if (cp) { var r = document.createRange(); r.setStart(cp.offsetNode, cp.offset); r.setEnd(cp.offsetNode, cp.offset); return r; }
            }
            return null;
        }

        function showPenMarker(x, y) {
            removePenMarker();
            _hlMarker = document.createElement('div');
            _hlMarker.textContent = 'Ō¢╝1';
            _hlMarker.style.cssText = 'position:fixed;left:'+(x-6)+'px;top:'+(y-22)+'px;font-size:10px;color:#e6b800;background:#fff8cc;border:1px solid #e6b800;border-radius:3px;padding:0 3px;pointer-events:none;z-index:9999;';
            document.body.appendChild(_hlMarker);
        }

        function removePenMarker() {
            if (_hlMarker && _hlMarker.parentNode) _hlMarker.parentNode.removeChild(_hlMarker);
            _hlMarker = null;
        }

    // ŌöĆŌöĆ µēŗÕåÖńö╗µØ┐ ŌöĆŌöĆ
    var _ktDrawing = false, _ktDrawCtx = null, _ktDrawColor = '#e53935', _ktDrawErase = false;
    var _ktDrawCanvasInited = false;

    function ktInitDrawCanvas() {
        var canvas = document.getElementById('kt-draw-canvas');
        var body   = document.getElementById('kt-text-body');
        if (!canvas || !body) return;
        var wasHidden = canvas.style.display === 'none';
        if (wasHidden) canvas.style.display = 'block';
        var w = body.offsetWidth  || 800;
        var h = body.offsetHeight || 300;
        if (wasHidden) canvas.style.display = 'none';
        canvas.width  = w;
        canvas.height = h;
        _ktDrawCtx = canvas.getContext('2d');
        _ktDrawCtx.clearRect(0, 0, w, h); // ńĪ«õ┐Ø canvas ÕāÅń┤ĀÕ«īÕģ©ķĆÅµśÄ’╝īõĖŹķü«µīĪõĖŗµ¢╣µ¢ćÕŁŚ
        canvas.style.background = 'transparent';
        _ktDrawCtx.lineCap = 'round';
        _ktDrawCtx.lineJoin = 'round';
        canvas.style.pointerEvents = _ktToolMode === 'draw' ? '' : 'none';
        ktInitHighlightMode();
        if (_ktDrawCanvasInited) return;
        _ktDrawCanvasInited = true;

        // ŌöĆŌöĆ Undo/Redo µĀł ŌöĆŌöĆ
        var _undoStack = [], _redoStack = [];
        function saveSnapshot() {
            _undoStack.push(canvas.toDataURL());
            if (_undoStack.length > 30) _undoStack.shift();
            _redoStack = [];
        }
        function ktUndo() {
            if (_undoStack.length === 0) return;
            _redoStack.push(canvas.toDataURL());
            var data = _undoStack.pop();
            var img = new Image();
            img.onload = function() {
                _ktDrawCtx.clearRect(0, 0, canvas.width, canvas.height);
                _ktDrawCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = data;
        }
        function ktRedo() {
            if (_redoStack.length === 0) return;
            _undoStack.push(canvas.toDataURL());
            var data = _redoStack.pop();
            var img = new Image();
            img.onload = function() {
                _ktDrawCtx.clearRect(0, 0, canvas.width, canvas.height);
                _ktDrawCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = data;
        }
        window._ktUndo = ktUndo; window._ktRedo = ktRedo;


        // ŌöĆŌöĆ Shift ńø┤ń║┐ overlay ŌöĆŌöĆ
        var _ktOverlay = document.createElement('canvas');
        _ktOverlay.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;';
        canvas.parentElement.appendChild(_ktOverlay);
        var _ktShiftStart = null;
        function syncKtOverlay() { _ktOverlay.width = canvas.width; _ktOverlay.height = canvas.height; }
        syncKtOverlay();
        function drawKtPreview(px, py) {
            if (!_ktShiftStart) return;
            syncKtOverlay();
            var oc = _ktOverlay.getContext('2d');
            oc.clearRect(0, 0, _ktOverlay.width, _ktOverlay.height);
            oc.strokeStyle = _ktDrawColor; oc.lineWidth = _ktDrawLineWidth || 2;
            oc.lineCap = 'round'; oc.setLineDash([8, 5]);
            oc.beginPath(); oc.moveTo(_ktShiftStart.x, _ktShiftStart.y); oc.lineTo(px, py); oc.stroke();
            oc.setLineDash([]);
        }
        function clearKtOverlay() { _ktOverlay.getContext('2d').clearRect(0, 0, _ktOverlay.width, _ktOverlay.height); }

        function getPos(e) {
            var rect = canvas.getBoundingClientRect();
            var t = e.touches ? e.touches[0] : e;
            return { x: (t.clientX - rect.left) * (canvas.width / rect.width),
                     y: (t.clientY - rect.top)  * (canvas.height / rect.height) };
        }
        function start(e) {
            e.preventDefault(); _ktDrawing = true;
            _lastFocusedCanvas = canvas;
            _lastActionType = 'canvas';
            var p = getPos(e);
            _ktShiftStart = (!e.touches && e.shiftKey) ? {x: p.x, y: p.y} : null;
            saveSnapshot();
            _ktDrawCtx.beginPath(); _ktDrawCtx.moveTo(p.x, p.y);
            if (_ktDrawErase) {
                _ktDrawCtx.globalCompositeOperation = 'destination-out';
                _ktDrawCtx.lineWidth = 18;
            } else {
                _ktDrawCtx.globalCompositeOperation = 'source-over';
                _ktDrawCtx.strokeStyle = _ktDrawColor;
                _ktDrawCtx.lineWidth = _ktDrawLineWidth || 1;
            }
        }
        function move(e) {
            e.preventDefault(); if (!_ktDrawing) return;
            var p = getPos(e);
            if (!e.touches && e.shiftKey && _ktShiftStart) {
                drawKtPreview(p.x, p.y);
                return; // õĖŹÕ«×µŚČń╗śÕłČ’╝īńŁē mouseup
            }
            clearKtOverlay(); _ktShiftStart = null;
            _ktDrawCtx.lineTo(p.x, p.y); _ktDrawCtx.stroke();
        }
        function end(e) {
            e.preventDefault();
            if (_ktShiftStart && _ktDrawing) {
                var p = getPos(e);
                clearKtOverlay();
                _ktDrawCtx.beginPath();
                _ktDrawCtx.moveTo(_ktShiftStart.x, _ktShiftStart.y);
                _ktDrawCtx.lineTo(p.x, p.y);
                _ktDrawCtx.stroke();
            }
            _ktDrawing = false; _ktShiftStart = null;
            if(typeof _scheduleDraft==='function') _scheduleDraft();
            clearKtOverlay(); _ktDrawCtx.beginPath();
        }
        canvas.addEventListener('mouseleave', () => { _ktDrawing = false; clearKtOverlay(); _ktShiftStart = null; _lastFocusedCanvas = null; });
        canvas.addEventListener('mousedown',  start);
        canvas.addEventListener('mousemove',  move);
        canvas.addEventListener('mouseup',    end);
        canvas.addEventListener('touchstart', start, {passive:false});
        canvas.addEventListener('touchmove',  move,  {passive:false});
        canvas.addEventListener('touchend',   end,   {passive:false});

    }

    var _ktAnnotColors = ['#1565c0','#c0392b','#1b5e20','#6a1b9a','#e65100','#00695c','#4a148c','#bf360c','#b7770d','#117a8b'];

    // ŌöĆŌöĆ µĆØń╗┤Õ»╝ÕøŠÕ«×µŚČķóäĶ¦ł’╝łĶŠōÕģźķś▓µŖ¢’╝ī600ms’╝ēŌöĆŌöĆ
    var _mmPreviewTimer = null;

    function ktMmTabKey(e) {
        var ta = e.target;
        var start = ta.selectionStart, end2 = ta.selectionEnd;
        var val = ta.value;

        if (e.key === 'Tab') {
            e.preventDefault();
            _ktMmIndentTA(ta, e.shiftKey ? -1 : 1);
        } else if (e.key === 'Enter') {
            // Auto-continue: detect current line's prefix and repeat it
            var lineStart = val.lastIndexOf('\n', start - 1) + 1;
            var currentLine = val.substring(lineStart, start);
            // Get the indent of the current line
            var indentMatch = currentLine.match(/^(\s*)/);
            var indent = indentMatch ? indentMatch[1] : '';
            // Check for list marker: "- ", "1. ", "2. " etc
            var listMatch = currentLine.trimStart().match(/^(-|\*|\d+[.ŃĆé’╝ē)ŃĆü])\s/);
            var prefix = indent;
            if (listMatch) {
                var marker = listMatch[1];
                // If numbered, increment the number
                var numMatch = marker.match(/^(\d+)/);
                if (numMatch) {
                    prefix += (parseInt(numMatch[1]) + 1) + marker.replace(/^\d+/, '') + ' ';
                } else {
                    prefix += marker + ' ';
                }
            }
            // If current line (after trim) is empty or just a marker, remove the prefix (stop list)
            var trimmed = currentLine.trim().replace(/^(-|\*|\d+[.ŃĆé’╝ē)ŃĆü])\s*$/, '');
            if (!trimmed && listMatch) {
                // Empty list item ŌĆö remove the marker from current line and stop
                e.preventDefault();
                ta.value = val.substring(0, lineStart) + indent + val.substring(start);
                ta.selectionStart = ta.selectionEnd = lineStart + indent.length;
                return;
            }
            if (prefix !== '\n') {
                e.preventDefault();
                var insert = '\n' + prefix;
                ta.value = val.substring(0, start) + insert + val.substring(end2);
                ta.selectionStart = ta.selectionEnd = start + insert.length;
            }
        }
    }

    // ŌöĆŌöĆ µĆØń╗┤Õ»╝ÕøŠń╝®Ķ┐øĶŠģÕŖ®’╝łTabķö«ÕÆīµīēķÆ«Õģ▒ńö©’╝ēŌöĆŌöĆ
    function _ktMmIndentTA(ta, dir) {
        var start = ta.selectionStart;
        var val = ta.value;
        var lineStart = val.lastIndexOf('\n', start - 1) + 1;
        if (dir > 0) {
            ta.value = val.substring(0, lineStart) + '  ' + val.substring(lineStart);
            ta.selectionStart = ta.selectionEnd = start + 2;
        } else {
            var sub = val.substring(lineStart);
            var remove = sub.match(/^ {1,2}/) ? sub.match(/^ {1,2}/)[0].length : 0;
            if (remove > 0) {
                ta.value = val.substring(0, lineStart) + val.substring(lineStart + remove);
                ta.selectionStart = ta.selectionEnd = Math.max(lineStart, start - remove);
            }
        }
        if (typeof ktMmLivePreview === 'function') ktMmLivePreview(ta);
    }

    // ŌöĆŌöĆ µ░öµ│ĪÕøŠ ŌöĆŌöĆ
    function ktBuildBubbleMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;">µŚĀÕåģÕ«╣</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var CX = 340, CY = 200;
        var l0 = nodes.filter(function(n){return n.level===0;})[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var svgParts = [];
        // root circle
        svgParts.push('<circle cx="'+CX+'" cy="'+CY+'" r="42" fill="'+colors[0]+'" opacity="0.9"/>');
        svgParts.push('<text x="'+CX+'" y="'+(CY+5)+'" text-anchor="middle" font-size="9" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="700">'+(l0?l0.text:'').replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        var R = 145;
        l1.forEach(function(n, i) {
            var angle = (2*Math.PI*i/Math.max(l1.length,1)) - Math.PI/2;
            var nx = CX + R*Math.cos(angle), ny = CY + R*Math.sin(angle);
            var col = colors[(i+1)%colors.length];
            var r = 32;
            // children of this node
            var myIdx = nodes.indexOf(n);
            var children = [];
            for(var j=myIdx+1;j<nodes.length;j++){if(nodes[j].level===2)children.push(nodes[j]);else if(nodes[j].level<=1)break;}
            svgParts.push('<line x1="'+CX+'" y1="'+CY+'" x2="'+nx+'" y2="'+ny+'" stroke="'+col+'" stroke-width="1.5" opacity="0.4"/>');
            svgParts.push('<circle cx="'+nx+'" cy="'+ny+'" r="'+r+'" fill="'+col+'" opacity="0.85"/>');
            svgParts.push('<text x="'+nx+'" y="'+(ny+4)+'" text-anchor="middle" font-size="7.5" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            children.forEach(function(c,ci){
                var cAngle = angle + (ci-(children.length-1)/2)*0.45;
                var cr = 22, cR = R+75;
                var cx2 = CX+cR*Math.cos(cAngle), cy2 = CY+cR*Math.sin(cAngle);
                svgParts.push('<line x1="'+nx+'" y1="'+ny+'" x2="'+cx2+'" y2="'+cy2+'" stroke="'+col+'" stroke-width="1" opacity="0.3"/>');
                svgParts.push('<circle cx="'+cx2+'" cy="'+cy2+'" r="'+cr+'" fill="'+col+'" opacity="0.55"/>');
                svgParts.push('<text x="'+cx2+'" y="'+(cy2+4)+'" text-anchor="middle" font-size="6.5" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            });
        });
        return '<svg viewBox="0 0 680 400" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // ŌöĆŌöĆ µŗ¼ÕÅĘÕøŠ’╝łÕż¦ń║▓Õ▒ĢÕ╝ĆÕ╝Å’╝īÕĘ”ŌåÆÕÅ│Õ▒éń║¦µŗ¼ÕÅĘ’╝ēŌöĆŌöĆ
    function ktBuildBracketMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;">µŚĀÕåģÕ«╣</p>';
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b'];
        var H_PER = 26, PAD = 10, X0 = 10, IND = 110;
        var totalH = nodes.length * H_PER + PAD*2;
        var svgParts = [];
        nodes.forEach(function(n, i) {
            var y = PAD + i*H_PER + H_PER/2;
            var x = X0 + n.level*IND;
            var col = colors[n.level%colors.length];
            var tw = Math.max(70, n.text.length*7+16);
            // bracket line to children
            var nextSameOrHigher = -1;
            for(var j=i+1;j<nodes.length;j++){if(nodes[j].level<=n.level){nextSameOrHigher=j;break;}}
            var childCount = (nextSameOrHigher>0?nextSameOrHigher:nodes.length) - (i+1);
            if(childCount>0){
                var yEnd = PAD + (i+childCount)*H_PER + H_PER/2;
                svgParts.push('<line x1="'+(x+tw)+'" y1="'+y+'" x2="'+(x+tw+12)+'" y2="'+y+'" stroke="'+col+'" stroke-width="1" opacity="0.6"/>');
                svgParts.push('<line x1="'+(x+tw+12)+'" y1="'+y+'" x2="'+(x+tw+12)+'" y2="'+yEnd+'" stroke="'+col+'" stroke-width="1" opacity="0.6"/>');
            }
            svgParts.push('<rect x="'+x+'" y="'+(y-10)+'" width="'+tw+'" height="20" rx="4" fill="'+col+'" opacity="'+(n.level===0?'0.9':'0.7')+'"/>');
            svgParts.push('<text x="'+(x+tw/2)+'" y="'+(y+5)+'" text-anchor="middle" font-size="'+(n.level===0?'8.5':'7.5')+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+(n.level===0?'700':'400')+'">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        });
        var maxX = Math.max.apply(null, nodes.map(function(n,i){return X0+n.level*IND+Math.max(70,n.text.length*7+16)+30;}));
        return '<svg viewBox="0 0 '+Math.max(500,maxX)+' '+Math.max(120,totalH)+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // ŌöĆŌöĆ ķ▒╝ķ¬©ÕøŠ ŌöĆŌöĆ
    function ktBuildFishboneMindmap(text) {
        var nodes = ktParseMindmapLines(text);
        if (!nodes.length) return '<p style="color:#aaa;font-size:8pt;">µŚĀÕåģÕ«╣</p>';
        var l0 = nodes.filter(function(n){return n.level===0;})[0];
        var l1 = nodes.filter(function(n){return n.level===1;});
        var W=680, H=320, spineY=H/2, headX=W-60, tailX=60;
        var colors = ['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b'];
        var svgParts = [];
        // spine
        svgParts.push('<line x1="'+tailX+'" y1="'+spineY+'" x2="'+headX+'" y2="'+spineY+'" stroke="#555" stroke-width="2.5"/>');
        // head (fish)
        svgParts.push('<polygon points="'+(headX)+','+(spineY-18)+' '+(headX+28)+','+spineY+' '+headX+','+(spineY+18)+'" fill="#2e86c1" opacity="0.7"/>');
        if(l0) svgParts.push('<text x="'+(headX+5)+'" y="'+(spineY+5)+'" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#1a2a3a" font-weight="700">'+l0.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
        var spineLen = headX - tailX;
        l1.forEach(function(n, i) {
            var side = i%2===0 ? -1 : 1; // -1=top, 1=bottom
            var boneX = headX - (spineLen/(l1.length+1)) * (Math.floor(i/2)+1);
            var boneLen = 70;
            var boneEndY = spineY + side*boneLen;
            var col = colors[i%colors.length];
            svgParts.push('<line x1="'+boneX+'" y1="'+spineY+'" x2="'+boneX+'" y2="'+boneEndY+'" stroke="'+col+'" stroke-width="1.5" opacity="0.7"/>');
            svgParts.push('<text x="'+boneX+'" y="'+(boneEndY + side*14)+'" text-anchor="middle" font-size="8" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="'+col+'" font-weight="600">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            // children
            var myIdx = nodes.indexOf(n);
            var children=[];
            for(var j=myIdx+1;j<nodes.length;j++){if(nodes[j].level===2)children.push(nodes[j]);else if(nodes[j].level<=1)break;}
            children.forEach(function(c,ci){
                var cx2 = boneX + (ci+1)*22*(side>0?-1:1);
                var cy2 = spineY + side*(boneLen*(0.4+ci*0.2));
                svgParts.push('<line x1="'+boneX+'" y1="'+cy2+'" x2="'+cx2+'" y2="'+cy2+'" stroke="'+col+'" stroke-width="1" opacity="0.4"/>');
                svgParts.push('<text x="'+cx2+'" y="'+(cy2-4)+'" text-anchor="middle" font-size="6.5" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="'+col+'" opacity="0.85">'+c.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
            });
        });
        return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+svgParts.join('')+'</svg>';
    }

    // Shared mindmap helper
    function _mmParse(text) {
        var rawLines = text.split('\n');
        var result = [];
        rawLines.forEach(function(line) {
            if (!line.trim()) return;
            // Tab ŌåÆ 2 spaces
            var normalized = '';
            for (var i=0; i<line.length; i++) {
                normalized += (line[i] === '\t') ? '  ' : line[i];
            }
            var indent = normalized.match(/^(\s*)/)[1].length;
            var level = Math.floor(indent / 2);
            var txt = normalized.trim();
            // Check if this is a list-marker line (-, *, 1., ŌæĀ, etc.)
            var isListItem = /^[-*ŌĆó┬Ę]\s+/.test(txt) || /^\d+[.ŃĆé’╝ē)ŃĆü]\s*/.test(txt) || /^[ŌæĀŌæĪŌæóŌæŻŌæżŌæźŌæ”Ōæ¦Ōæ©Ōæ®]\s*/.test(txt);
            // Strip the list marker
            txt = txt.replace(/^[-*ŌĆó┬Ę]\s+/, '').replace(/^\d+[.ŃĆé’╝ē)ŃĆü]\s*/, '').replace(/^[ŌæĀŌæĪŌæóŌæŻŌæżŌæźŌæ”Ōæ¦Ōæ©Ōæ®]\s*/, '');
            if (!txt) return;
            // If it's a list item with no indentation AND it's not the first node,
            // treat it as at least level 1 (child of root)
            if (isListItem && level === 0 && result.length > 0) {
                level = 1;
            }
            result.push({ text: txt, level: level });
        });
        if (result.length === 0) return result;
        // Normalize levels: remove gaps (e.g. 0,2,4 ŌåÆ 0,1,2)
        var sortedLevels = [];
        result.forEach(function(n) { if (sortedLevels.indexOf(n.level) < 0) sortedLevels.push(n.level); });
        sortedLevels.sort(function(a,b){return a-b;});
        var levelMap = {};
        sortedLevels.forEach(function(lv, idx) { levelMap[lv] = idx; });
        result.forEach(function(n) { n.level = levelMap[n.level]; });
        return result;
    }


    function _mmParent(nodes) {
        var parent = new Array(nodes.length).fill(-1);
        for (var i=1;i<nodes.length;i++) {
            for (var j=i-1;j>=0;j--) {
                if (nodes[j].level === nodes[i].level-1) { parent[i]=j; break; }
            }
        }
        return parent;
    }
    function _mmLeaves(i, parent, n) {
        var ch = [];
        for (var k=0;k<n;k++) if (parent[k]===i) ch.push(k);
        return ch.length ? ch.reduce(function(s,k){return s+_mmLeaves(k,parent,n);},0) : 1;
    }

    function ktBuildTree(text, vertical) {
        var nodes = _mmParse(text);
        if (!nodes.length) return '<p style="color:#aaa;padding:8px;">µŚĀÕåģÕ«╣</p>';
        if (vertical) return _buildTreeV(nodes);
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#c0392b'], PAD=12, RH=26, IND=118;
        var y=PAD, sn=[], maxX=0;
        nodes.forEach(function(n,i){
            var tw=Math.max(60,n.text.length*7.8+16);
            var x=PAD+n.level*IND;
            maxX=Math.max(maxX,x+tw);
            sn.push({x:x,y:y,w:tw,h:20,cx:x+tw/2,cy:y+10,text:n.text,col:C[n.level%C.length],lv:n.level});
            y+=RH;
        });
        var paths='';
        for(var i=1;i<sn.length;i++){
            var n=sn[i];

                    break;

                   '<text x="'+n.cx+'" y="'+(n.y+14)+'" text-anchor="middle" font-size="'+(n.lv===0?9:7.5)+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+(n.lv===0?700:400)+'">'+n.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>';
        }).join('');
        return '<svg viewBox="0 0 '+(maxX+PAD)+' '+(y+PAD)+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+paths+rects+'</svg>';

    function _buildTreeV(nodes) {
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#c0392b'], PAD=12, CW=100, RH=50;
        var parent=_mmParent(nodes), n=nodes.length;
        function leaves(i){var ch=[];for(var k=0;k<n;k++)if(parent[k]===i)ch.push(k);return ch.length?ch.reduce(function(s,k){return s+leaves(k);},0):1;}
        var xL=new Array(n).fill(0); xL[0]=PAD;
        for(var i=0;i<n;i++){var ch=[];for(var k=0;k<n;k++)if(parent[k]===i)ch.push(k);var cx=xL[i];ch.forEach(function(k){xL[k]=cx;cx+=leaves(k)*CW;});}
        var sn=nodes.map(function(nd,i){var tw=Math.max(54,nd.text.length*7+12);var cx=xL[i]+leaves(i)*CW/2,y=PAD+nd.level*RH;return{cx,y,tw,h:20,text:nd.text,col:C[nd.level%C.length],lv:nd.level,i};});
        var maxY=0; sn.forEach(function(nd){maxY=Math.max(maxY,nd.y+nd.h);});
        var paths=''; sn.forEach(function(nd,i){
            if(!nd||nd.lv===0)return;
            for(var j=i-1;j>=0;j--){if(sn[j]&&sn[j].lv===nd.lv-1){var p=sn[j],my=(p.y+p.h+nd.y)/2;paths+='<path d="M'+p.cx+','+(p.y+p.h)+' C'+p.cx+','+my+' '+nd.cx+','+my+' '+nd.cx+','+nd.y+'" fill="none" stroke="'+nd.col+'" stroke-width="1.4" opacity="0.6"/>';break;}}
        });
        var rects=sn.filter(Boolean).map(function(nd){return '<rect x="'+(nd.cx-nd.tw/2)+'" y="'+nd.y+'" width="'+nd.tw+'" height="'+nd.h+'" rx="'+(nd.lv===0?6:4)+'" fill="'+nd.col+'" opacity="'+(nd.lv===0?1:0.88)+'"/><text x="'+nd.cx+'" y="'+(nd.y+14)+'" text-anchor="middle" font-size="'+(nd.lv===0?9:7.5)+'" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff" font-weight="'+(nd.lv===0?700:400)+'">'+nd.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>';}).join('');
        var totalW=leaves(0)*CW+PAD*2;
        return '<svg viewBox="0 0 '+totalW+' '+(maxY+PAD)+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+paths+rects+'</svg>';
    }
    function ktBuildRadial(text, vertical) {

        var root=nodes[0], l1=nodes.filter(function(n){return n.level===1;});
        var CX=340,CY=220,R1=120,R2=210;
        var parts=[], minX=CX, maxX=CX, minY=CY, maxY=CY;

        function track(x1,y1,x2,y2){
            minX=Math.min(minX,x1,x2); maxX=Math.max(maxX,x1,x2);
            minY=Math.min(minY,y1,y2); maxY=Math.max(maxY,y1,y2);

                nx = l1.length===1 ? CX : Math.round(60 + i*(560/Math.max(l1.length-1,1)));
                ny = CY + R1;
            } else {
                var angle=(2*Math.PI*i/Math.max(l1.length,1))-Math.PI/2;
                nx=Math.round(CX+R1*Math.cos(angle));
                ny=Math.round(CY+R1*Math.sin(angle));

            parts.push('<path d="M'+CX+','+CY+' Q'+(CX+(nx-CX)*0.5)+','+(CY+(ny-CY)*0.3)+' '+nx+','+ny+'" fill="none" stroke="'+col+'" stroke-width="1.8" opacity="0.5"/>');

            track(nx-tw/2,ny-11,nx+tw/2,ny+11);

            // Level 2 children
            var myIdx=nodes.indexOf(n),children=[];

            children.forEach(function(ch,ci){
                var cx2,cy2,ctw=Math.max(44,ch.text.length*7+12);

                    cx2=Math.round(CX+R2*Math.cos(angle2)); cy2=Math.round(CY+R2*Math.sin(angle2));

                parts.push('<rect x="'+(cx2-ctw/2)+'" y="'+(cy2-9)+'" width="'+ctw+'" height="18" rx="4" fill="'+col+'" opacity="0.6"/>');
                parts.push('<text x="'+cx2+'" y="'+(cy2+4)+'" text-anchor="middle" font-size="7" font-family="Microsoft YaHei,PingFang SC,sans-serif" fill="#fff">'+ch.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</text>');
                track(cx2-ctw/2,cy2-9,cx2+ctw/2,cy2+9);
            });
        });

        var PAD=20;
        var vx=minX-PAD, vy=minY-PAD, vw=maxX-minX+PAD*2, vh=maxY-minY+PAD*2;
        return '<svg viewBox="'+vx+' '+vy+' '+vw+' '+vh+'" width="100%" style="max-width:680px;display:block;" xmlns="http://www.w3.org/2000/svg">'+parts.join('')+'</svg>';
    }

    function ktBuildBubble(text, vertical) {

        var parts=[], minX=CX-R0, maxX=CX+R0, minY=CY-R0, maxY=CY+R0;

        function track(x,y,r){ minX=Math.min(minX,x-r); maxX=Math.max(maxX,x+r); minY=Math.min(minY,y-r); maxY=Math.max(maxY,y+r); }

    function ktBuildBracket(text, vertical) {
        var nodes=_mmParse(text); if(!nodes.length)return '<p style="color:#aaa;padding:8px;">µŚĀÕåģÕ«╣</p>';
        var C=['#2e86c1','#1e8449','#b7770d','#8e44ad','#c0392b','#117a8b','#566573','#c0392b'];
        var parent=_mmParent(nodes), n=nodes.length;
        function leaves(i){var ch=[];for(var k=0;k<n;k++)if(parent[k]===i)ch.push(k);return ch.length?ch.reduce(function(s,k){return s+leaves(k);},0):1;}

        if(vertical){
            // TOPŌåÆBOTTOM: each node's x = centre of its leaf span, y = level├ŚrowH

                    parts.push('<line x1="'+leftCx+'" y1="'+by+'" x2="'+rightCx+'" y2="'+by+'" stroke="'+nd.col+'" stroke-width="1.2" opacity="0.5"/>');

        // HORIZONTAL LEFTŌåÆRIGHT bracket
