<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #334155; 
            --text-light: #64748b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #f8fafc;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        /* 1. 柔化蓝色条：增加弧度，减少突兀感 */
        header {
            background: var(--bg-gradient);
            padding: 60px 20px 100px; 
            text-align: center;
            color: white;
            position: relative;
            clip-path: ellipse(120% 100% at 50% 0%); /* 让底部带一点圆润的弧度 */
        }
        .brand {
            font-family: 'Montserrat', sans-serif; font-size: 2.2rem; font-weight: 600;
            letter-spacing: 12px; margin-bottom: 10px; text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
            letter-spacing: 5px; opacity: 0.8; font-weight: 300;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 20px;
        }

        /* 2. 统一遮盖逻辑：使用 relative 位移 */
        .container {
            max-width: 1040px;
            width: 90%;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            top: -50px; /* 强制位移，确保全屏/非全屏都有遮盖 */
            z-index: 10;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.08);
            transition: all 0.4s ease;
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.12); }
        .icon { font-size: 48px; margin-bottom: 20px; }
        .card h2 { font-size: 1.4rem; letter-spacing: 4px; color: var(--text-main); margin-bottom: 8px; font-weight: 500;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-light); letter-spacing: 2px; }

        /* 理念看板：优化间距，颜色更清晰 */
        .vision-board {
            text-align: center;
            padding: 20px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .vision-ch {
            font-size: 1.15rem;
            color: var(--text-sub); 
            letter-spacing: 5px;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 0.5px;
            font-weight: 400;
            line-height: 1.6;
        }

        footer {
            padding: 20px;
            text-align: center;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.03);
            flex-shrink: 0;
        }
        .footer-text { font-size: 0.75rem; color: #94a3b8; letter-spacing: 2px; }

        /* 针对非全屏（矮窗口）的极致优化 */
        @media (max-height: 800px) {
            header { padding: 40px 20px 70px; }
            .container { top: -40px; }
            .card { padding: 30px 20px; }
            .vision-board { padding: 10px 20px 30px; }
        }

        @media (max-width: 768px) {
            .brand { font-size: 1.7rem; letter-spacing: 6px; }
            .grid { grid-template-columns: 1fr; }
            .container { top: -20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">LEARNING GUIDE</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">CLASS INTERACTION</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">EXCELLENCE GALLERY</div>
                </a>
            </div>
        </div>

        <div class="vision-board">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </div>
    </main>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · Connecting the World through Chinese</div>
    </footer>
</body>
</html>
