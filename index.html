<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-blue: #004e7c; 
            --bg-gradient: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%); 
            --text-main: #1e293b; 
            --text-sub: #94a3b8; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #fcfcfc; color: var(--text-main); }
        
        /* Header：缩减高度，增加优雅感 */
        header {
            background: var(--bg-gradient);
            padding: 60px 20px 80px; /* 底部预留空间减少 */
            text-align: center;
            color: white;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 14px; /* 极致的呼吸感 */
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            opacity: 0.7;
            font-weight: 300;
        }

        /* 容器：大幅收窄，增加页面两侧的“负空间” */
        .container {
            max-width: 900px; 
            margin: -25px auto 80px; /* 仅向上叠加 25px，非常轻微的遮盖 */
            padding: 0 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px;
        }

        /* 卡片：极致精简，从“厚砖”变“轻卡” */
        .card {
            background: #ffffff;
            border-radius: 12px;
            padding: 35px 20px; /* 大幅缩小内边距 */
            text-align: center;
            text-decoration: none;
            /* 更轻、更高级的投影 */
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            border: 1px solid rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1); 
            border-color: rgba(0, 78, 124, 0.2);
        }
        
        .icon { 
            font-size: 48px; /* 图标缩小，更显精致 */
            margin-bottom: 25px; 
            transition: transform 0.4s ease; 
        }
        .card:hover .icon { transform: scale(1.1); }
        
        .card h2 { 
            font-size: 1.3rem; /* 标题缩小 */
            letter-spacing: 4px; 
            color: var(--text-main); 
            margin-bottom: 8px; 
            font-weight: 400;
        }
        .card .subtitle { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.7rem; 
            color: var(--text-sub); 
            letter-spacing: 2px; 
        }

        @media (max-width: 768px) {
            .brand { font-size: 1.6rem; letter-spacing: 8px; }
            .container { margin-top: 20px; padding: 0 20px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>
    <div class="container">
        <div class="grid">
            <a href="./01-learning-guide/index.html" class="card">
                <span class="icon">🧭</span>
                <h2>学法指引</h2>
                <div class="subtitle">LEARNING GUIDE</div>
            </a>
            <a href="./02-interaction/index.html" class="card">
                <span class="icon">⚡</span>
                <h2>课堂互动</h2>
                <div class="subtitle">CLASS INTERACTION</div>
            </a>
            <a href="./03-gallery/index.html" class="card">
                <span class="icon">⭐</span>
                <h2>佳作视界</h2>
                <div class="subtitle">EXCELLENCE GALLERY</div>
            </a>
        </div>
    </div>
</body>
</html>
