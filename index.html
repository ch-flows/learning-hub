<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-blue: #004e7c;
            --text-main: #1e293b; 
            --text-sub: #475569; 
            --text-light: #94a3b8;
            --bg-base: #f1f5f9; /* 稍微深一点的浅灰蓝，让白色卡片更突显 */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 强制禁止滚动条 */
        html, body { 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
        }

        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            padding: 5vh 20px 2vh; /* 使用视口单位 */
            text-align: center;
            flex-shrink: 0;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 200;
            letter-spacing: 18px;
            background: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: var(--text-light);
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center; /* 垂直居中 */
            justify-content: center;
            width: 100%;
            padding: 0 40px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 强制三列排版，确保不换行 */
            gap: 40px;
        }

        /* 核心调整：让卡片“跳”出来 */
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 8vh 20px; /* 随屏幕高度缩放 */
            text-align: center;
            text-decoration: none;
            /* 极具质感的深层阴影 */
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05), 
                        0 10px 15px -5px rgba(0, 0, 0, 0.02);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .card:hover { 
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 40px 70px -15px rgba(0, 78, 124, 0.15);
            background: #ffffff;
        }
        
        .icon { 
            font-size: clamp(40px, 5vh, 64px); /* 动态大小 */
            margin-bottom: 3vh;
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.06));
        }
        
        .card h2 { 
            font-size: clamp(1.1rem, 1.8vh, 1.6rem); 
            letter-spacing: 5px; 
            color: var(--accent-blue); 
            margin-bottom: 10px;
            font-weight: 500;
        }
        .card .subtitle { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.65rem; 
            color: var(--text-light); 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .vision-section {
            padding-bottom: 5vh;
            text-align: center;
            flex-shrink: 0;
        }
        .vision-ch {
            font-size: 1.1rem;
            color: var(--text-sub);
            letter-spacing: 6px;
            margin-bottom: 10px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            color: var(--text-light);
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* 移动端/极窄窗口适配 */
        @media (max-width: 900px) {
            .grid { gap: 20px; }
            .card { padding: 4vh 10px; }
            .brand { font-size: 1.8rem; letter-spacing: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">Learning Guide</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">Class Interaction</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">Excellence Gallery</div>
                </a>
            </div>
        </div>
    </main>

    <section class="vision-section">
        <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
        <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
    </section>
</body>
</html>
