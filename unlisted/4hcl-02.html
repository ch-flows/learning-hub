    /* ── 课堂研习注释 ruby ── */
    .kt-ruby { cursor:help; position:relative; display:inline; }

    /* ── 各风格：所有颜色通过 CSS 变量 --rc 传递（由 JS 设置） ── */

    /* fill（遮盖，默认）：纯色完全遮盖，白字 */
    .kt-ruby:not([data-rubystyle]),
    .kt-ruby[data-rubystyle="fill"] {
        background-color: var(--rc, #1565c0) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* solid：纯色填充——背景色跟随 --rc，白字，无圆角（与遮盖区分） */
    .kt-ruby[data-rubystyle="solid"] {
        background-color: var(--rc, #c0392b) !important;
        color: #fff !important;
        border-bottom: none !important;
        border-radius: 0 !important;
        padding: 0 3px 1px !important;
    }

    /* font-color：仅改变字体颜色，无背景无装饰 */
    .kt-ruby[data-rubystyle="font-color"] {
        background: transparent !important;
        color: var(--rc, #c0392b) !important;
        border-bottom: none !important;
        padding: 0 !important;
    }

    /* highlight：荧光笔——半透明背景，文字颜色保持原色 */
    .kt-ruby[data-rubystyle="highlight"] {
        background-color: var(--rca, rgba(255,235,59,0.55)) !important;
        color: inherit !important;
        border-bottom: none !important;
        border-radius: 2px !important;
        padding: 0 2px 2px !important;
    }

    /* soft：浅色背景色块（原来的"填色"轻量版），字色与块色一致 */
    .kt-ruby[data-rubystyle="soft"] {
        background-color: var(--rca, rgba(21,101,192,0.15)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 3px 1px !important;
    }

    /* underline：仅下划线 */
    .kt-ruby[data-rubystyle="underline"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: 2px solid var(--rc, #1565c0) !important;
        border-radius: 0 !important;
        padding: 0 1px !important;
    }

    /* wave：波浪下划线 */
    .kt-ruby[data-rubystyle="wave"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        padding: 0 1px 2px !important;
        text-decoration: underline wavy var(--rc, #1565c0) !important;
        text-underline-offset: 2px !important;
    }

    /* box：边框圈选 */
    .kt-ruby[data-rubystyle="box"] {
        background: transparent !important;
        color: var(--rc, #1565c0) !important;
        outline: 1.5px solid var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-radius: 3px !important;
        padding: 0 2px !important;
    }

    /* tag：圆角标签（背景色很淡，左侧有色条） */
    .kt-ruby[data-rubystyle="tag"] {
        background-color: var(--rca, rgba(21,101,192,0.1)) !important;
        color: var(--rc, #1565c0) !important;
        border-bottom: none !important;
        border-left: 3px solid var(--rc, #1565c0) !important;
        border-radius: 0 3px 3px 0 !important;
        padding: 0 4px 0 3px !important;
    }

    /* ── 深浅修饰（叠加在风格之上） ── */
    .kt-ruby[data-shade="light"] { filter: saturate(0.7) brightness(1.1); }
    .kt-ruby[data-shade="normal"] { filter: none; }
    .kt-ruby[data-shade="deep"]  { filter: saturate(1.4) brightness(0.82); }

    .kt-ruby rt { font-size:0; line-height:0; display:none; visibility:hidden; }
    /* 加粗注释 */
    .kt-ruby[data-bold="1"] > span { font-weight: 700 !important; }
    /* 字色 span 使用 CSS 变量传递颜色，突破父元素 !important 限制 */
    .kt-ruby > span.kt-fc-span { color: var(--kt-fc-span-color) !important; }
    .kt-ruby > .kt-an-fc-inner { color: var(--kt-fc-span-color) !important; }

    /* 编辑模式下 ruby 悬停 */
    body.edit-mode-on .kt-ruby { cursor:pointer; }
    body.edit-mode-on .kt-ruby:hover { filter:brightness(0.88) !important; outline:1.5px dashed var(--rc,#1565c0) !important; outline-offset:1px; }
    /* tooltip via JS fixed div — no pseudo element needed */
    #kt-tooltip {
        display:none;
        position:fixed;
        background:#eef4fb;
        color:#1a3a5c;
        border:1px solid #b8d4ee;
        font-size:7.5pt;
        line-height:1.8;
        padding:6px 12px;
        border-radius:6px;
        white-space:pre;
        z-index:9999;
        pointer-events:none;
        box-shadow:0 3px 12px rgba(42,100,160,0.15);
        font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    }

        /* ══ 工具栏 tooltip ══ */
        /* 仅工具栏按钮显示 data-tip 悬浮提示，排除内容区 kt-ruby 注释词 */
        .toolbar [data-tip] { position: relative; }
        .toolbar [data-tip]::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 7px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15,25,40,0.93);
            color: #e8edf2;
            font-size: 7pt;
            white-space: nowrap;
            padding: 4px 9px;

            letter-spacing: 0.3px;

<script>

(function(){

var _yjUnits = [];      // [{id, text, cur, history, pages}]
var _yjActiveId = null; // 当前活跃单元的 id
var _yjUnitCounter = 0;

// ── 创建一个新题目单元的 DOM 结构 ──
function _yjMakeUnitDOM(uid, qText, isEditMode) {
    var unit = document.createElement('div');
    unit.className = 'yj-unit';
    unit.dataset.uid = uid;
    unit.style.cssText = 'margin-bottom:24px;';

    // 题目框

    qBox.className = 'yj-question-box';
    qBox.setAttribute('contenteditable', isEditMode ? 'true' : 'false');
    qBox.setAttribute('spellcheck','false');
    qBox.style.cssText = 'font-size:9.5pt;color:#1a2a3a;line-height:1.8;min-height:44px;outline:none;font-family:inherit;white-space:pre-wrap;';
    qBox.textContent = qText || '（老师在此输入题目，学生作答时只读）';

    // 删除按钮（Edit 模式）
    var delBtn = document.createElement('button');
    delBtn.className = 'yj-del-btn';
    delBtn.style.cssText = 'position:absolute;top:8px;right:10px;background:none;border:none;color:#c0392b;font-size:10pt;cursor:pointer;padding:2px 6px;border-radius:4px;display:' + (isEditMode ? 'block' : 'none') + ';';
    delBtn.textContent = '🗑';

    qWrap.appendChild(qLabel);
    qWrap.appendChild(qBox);
    qWrap.appendChild(delBtn);

    // 字数
    var wcRow = document.createElement('div');
    wcRow.style.cssText = 'text-align:right;padding:2px 0 4px;';
    var wc = document.createElement('span');
    wc.className = 'yj-wordcount';
    wc.style.cssText = 'font-size:8pt;color:#388e3c;';
    wc.textContent = '字数：0';

    var firstBlock = _yjMakePageBlock(0);

}

// ── 自包含的格子绘制函数（不依赖 jingsai 引擎）──
function _yjDrawGrid(containerEl, rows) {
    var COLS = 20, G = '#4caf50';
    var dpr = window.devicePixelRatio || 1;
    var wrap = containerEl ? containerEl.querySelector('.jingsai-grid-wrap') : null;
    var cv = wrap ? wrap.querySelector('.jingsai-grid-canvas') : null;
    if (!wrap || !cv) return false;
    var W = wrap.clientWidth;
    // 如果 wrap 没有宽度，从页面宽度和 padding 推算
    if (W < 10) {
        var pg = document.getElementById('page-yuedu-jingsai');
        if (pg && pg.clientWidth > 10) {
            // page padding: 10mm + 14mm = 24mm ≈ 91px each side
            var pgPad = parseFloat(window.getComputedStyle(pg).paddingLeft) || 53;
            W = pg.clientWidth - pgPad * 2;
            if (W < 10) return false;
            // 强制设置宽度让后续 layout 正确
            wrap.style.width = W + 'px';
            containerEl.style.width = W + 'px';
        } else {
            return false;
        }
    }
    var activeRows = rows || 10;
    var cW = W / COLS;
    var maxCH = Math.floor(957 / 31.8);
    var cH = Math.min(cW, maxCH);
    var auxH = Math.round(cH * 0.4);
    var gH = cH + auxH;
    var TH = (activeRows - 1) * gH + cH;
    var BOT = 2;
    cv.width = Math.round(W * dpr);
    cv.height = Math.round((TH + BOT) * dpr);
    cv.style.width = W + 'px';
    cv.style.height = (TH + BOT) + 'px';
    wrap.style.height = (TH + BOT) + 'px';
    var outerDiv = wrap.parentNode;
    if (outerDiv) outerDiv.style.height = (TH + BOT + 4) + 'px';
    var ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, TH + BOT);
    ctx.strokeStyle = G; ctx.lineWidth = 0.7;
    for (var ri = 0; ri < activeRows; ri++) {
        var base = ri * gH, wb = base + cH, ab = wb + auxH;
        if (ri < activeRows - 1) { ctx.beginPath(); ctx.moveTo(0, wb); ctx.lineTo(W, wb); ctx.stroke(); }
        if (ri < activeRows - 1) { ctx.beginPath(); ctx.moveTo(0, ab); ctx.lineTo(W, ab); ctx.stroke(); }
        for (var ci = 1; ci < COLS; ci++) { ctx.beginPath(); ctx.moveTo(ci * cW, base); ctx.lineTo(ci * cW, wb); ctx.stroke(); }
    }
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0.75, 0.75, W - 1.5, TH + BOT - 1.5);
    return true;
}

function _yjDrawGridWithRetry(containerEl, rows) {
    if (_yjDrawGrid(containerEl, rows)) return;
    var wrap = containerEl ? containerEl.querySelector('.jingsai-grid-wrap') : null;
    if (!wrap) return;
    // 强制触发 layout：设置明确宽度
    var pg = document.getElementById('page-yuedu-jingsai');
    var pgW = pg ? pg.clientWidth : 0;
    if (pgW > 10) {
        // 页面有宽度，强制给 wrap 设宽度
        var unitEl = containerEl.closest('.yj-unit');
        var targetW = pgW - 56; // 减去 padding
        if (targetW > 100) {
            containerEl.style.width = targetW + 'px';
            wrap.style.width = targetW + 'px';
        }
        if (_yjDrawGrid(containerEl, rows)) return;
    }
    // ResizeObserver 兜底
    if (window.ResizeObserver) {
        var ro = new ResizeObserver(function(entries) {
            for (var i = 0; i < entries.length; i++) {
                if (entries[i].contentRect.width > 10) {
                    ro.disconnect();
                    _yjDrawGrid(containerEl, rows);
                    break;
                }
            }
        });
        ro.observe(wrap);
    } else {
        var tries = 0;
        var t = setInterval(function(){
            if (_yjDrawGrid(containerEl, rows) || tries++ > 100) clearInterval(t);
        }, 50);
    }
}

// ── 创建一页稿纸 block（原版canvas格子）──
function _yjMakePageBlock(pageIdx) {
    var block = document.createElement('div');
    block.className = 'jingsai-page-block';
    block.dataset.page = pageIdx;
    block.innerHTML = '<div style="display:block;width:100%;box-sizing:border-box;background:#fff;line-height:0;font-size:0;position:relative;overflow:visible !important;">'
        + '<div class="jingsai-grid-wrap" style="position:relative;background:#fff;overflow:visible !important;cursor:text;">'
        + '<canvas class="jingsai-grid-canvas" style="display:block;width:100%;"></canvas>'
        + '<div class="jingsai-text-canvas" style="position:absolute;top:0;left:0;pointer-events:none;overflow:hidden;"></div>'
        + '<div class="jingsai-cursor" style="position:absolute;width:1.5px;background:#2e7d32;pointer-events:none;display:none;animation:jc-blink 1s step-end infinite;z-index:4;"></div>'
        + '</div></div>'
        + '<div class="jingsai-page-num" style="font-size:8pt;color:#999;text-align:right;padding-right:4px;margin-top:5px;line-height:1;">第 ' + (pageIdx+1) + ' 页</div>';
    return block;
}

window.yjAddUnit = function(qText, savedText, savedCur) {
    var uid = 'yju_' + (++_yjUnitCounter);
    var state = {

    // 强制 reflow 后立即画格子
    var pc2 = dom.querySelector('.yj-pages-container');
    if (pc2) {
        // 触发 reflow
        void pc2.offsetWidth;
        _yjDrawGridWithRetry(pc2, 10);
    }
    yjActivateUnit(uid);
    return uid;
};

// ── 删除单元 ──
window.yjDeleteUnit = function(uid) {
    if (_yjUnits.length <= 1) { alert('至少保留一个题目。'); return; }
    _yjUnits = _yjUnits.filter(function(u){ return u.id !== uid; });
    var container = document.getElementById('yj-units-container');
    if (container) {
        var el = container.querySelector('.yj-unit[data-uid="' + uid + '"]');
        if (el) container.removeChild(el);
    }
    // 若删除的是活跃单元，激活第一个
    if (_yjActiveId === uid) {
        _yjActiveId = null;
        if (_yjUnits.length > 0) yjActivateUnit(_yjUnits[0].id);
    }
    _yjUpdateTotalWordcount();
};

// ── 激活某单元（保存旧状态，加载新状态）──
window.yjActivateUnit = function(uid) {
    if (_yjActiveId === uid) return;

    // 保存旧活跃单元状态
    if (_yjActiveId && typeof window._jingsaiGetState === 'function') {
        var oldState = _yjUnits.find(function(u){ return u.id === _yjActiveId; });
        if (oldState) {
            var st = window._jingsaiGetState();
            oldState.text = st.text;
            oldState.cur = st.cur;
            if (typeof window._jingsaiGetRows === 'function') oldState.rows = window._jingsaiGetRows();
            // 隐藏旧单元光标
            var oldEl = document.querySelector('.yj-unit[data-uid="' + _yjActiveId + '"]');
            if (oldEl) {
                oldEl.querySelectorAll('.jingsai-cursor').forEach(function(c){ c.style.display='none'; });
            }
        }
    }

    _yjActiveId = uid;
    var newState = _yjUnits.find(function(u){ return u.id === uid; });
    if (!newState) return;

    // 把引擎的容器指向此单元
    if (typeof window._jingsaiSetContainer === 'function') {
        var unitEl = document.querySelector('.yj-unit[data-uid="' + uid + '"]');
        var pagesContainer = unitEl ? unitEl.querySelector('.yj-pages-container') : null;
        window._jingsaiSetContainer(pagesContainer);
    }
    // 恢复此单元的行数
    if (typeof window._jingsaiSetRows === 'function') {
        window._jingsaiSetRows(newState.rows || 10);
    }

    // 加载此单元的文字状态
    if (typeof window._jingsaiSetState === 'function') {
        window._jingsaiSetState(newState.text, newState.cur);
    }

    // 聚焦
    var unitEl2 = document.querySelector('.yj-unit[data-uid="' + uid + '"]');
    if (unitEl2) {
        var wrap = unitEl2.querySelector('.jingsai-grid-wrap');
        if (wrap) wrap.focus && wrap.focus();
    }
};

// ── 初始化某单元：画格子 + 设置引擎状态 ──
function _yjInitUnit(uid) {
    var state = _yjUnits.find(function(u){ return u.id === uid; });
    if (!state) return;
    var unitEl = document.querySelector('.yj-unit[data-uid="' + uid + '"]');
    if (!unitEl) return;
    var pagesContainer = unitEl.querySelector('.yj-pages-container');
    if (!pagesContainer) return;
    // 独立画格子
    _yjDrawGridWithRetry(pagesContainer, state.rows || 10);
    // 设置引擎状态（仅当此单元是活跃单元时才设置，避免覆盖其他单元）
    if (uid === _yjActiveId) {
        if (typeof window._jingsaiSetContainer === 'function') window._jingsaiSetContainer(pagesContainer);
        if (typeof window._jingsaiSetRows === 'function') window._jingsaiSetRows(state.rows || 10);
        if (typeof window._jingsaiSetState === 'function') window._jingsaiSetState(state.text || '　　', state.cur || 2);
        if (typeof window.jingsaiRender === 'function') window.jingsaiRender();
    }
}

// ── 更新总字数显示 ──
window._yjUpdateTotalWordcount = function() {
    var total = 0;
    _yjUnits.forEach(function(u){
        var n = (u.text||'').replace(/\n/g,'').replace(/^\u3000\u3000/, '').replace(/\n\u3000\u3000/g,'').length;
        total += n;
    });
    // 同步各单元字数
    _yjUnits.forEach(function(u){
        var unitEl = document.querySelector('.yj-unit[data-uid="' + u.id + '"]');
        if (!unitEl) return;
        var wc = unitEl.querySelector('.yj-wordcount');
        if (!wc) return;
        var n = (u.text||'').replace(/\n/g,'').replace(/^\u3000\u3000/, '').replace(/\n\u3000\u3000/g,'').length;
        wc.textContent = '字数：' + n;
    });
    var totalWc = document.getElementById('yuedu-jingsai-wordcount');
    if (totalWc) totalWc.textContent = '总字数：' + total;
};

// ── 获取所有单元数据（用于提交/保存）──
window.yjGetAllUnits = function() {
    // 先保存活跃单元最新状态
    if (_yjActiveId && typeof window._jingsaiGetState === 'function') {
        var st = window._jingsaiGetState();
        var active = _yjUnits.find(function(u){ return u.id === _yjActiveId; });
        if (active) { active.text = st.text; active.cur = st.cur; }
    }
    // 如果 _yjUnits 只有一个但 DOM 里有多个单元，从 DOM 补全数据
    var domUnits = document.querySelectorAll('#yj-units-container .yj-unit');
    if (domUnits.length > _yjUnits.length) {
        domUnits.forEach(function(unitEl, i) {
            var uid = unitEl.dataset.uid;
            var existing = _yjUnits.find(function(u){ return u.id === uid; });
            if (!existing) {
                _yjUnits.push({ id: uid, text: '　　', cur: 2, history: [], rows: 10 });
            }
        });
    }
    return _yjUnits.map(function(u, i){
        var unitEl = document.querySelector('.yj-unit[data-uid="' + u.id + '"]');
        var qBox = unitEl ? unitEl.querySelector('.yj-question-box') : null;
        return {
            index: i,
            question: qBox ? (qBox.innerText || qBox.textContent || '') : '',
            text: u.text || '',
            cur: u.cur || 0,
            rows: u.rows || 10
        };
    });
};

// ── 画所有单元的格子（供外部调用）──
window._yjDrawAllGrids = function() {
    _yjUnits.forEach(function(state) {
        var unitEl = document.querySelector('.yj-unit[data-uid="' + state.id + '"]');
        var pagesContainer = unitEl ? unitEl.querySelector('.yj-pages-container') : null;
        if (pagesContainer) _yjDrawGridWithRetry(pagesContainer, state.rows || 10);
    });
};

// ── Edit 模式切换：显示/隐藏删除按钮和添加按钮 ──
window.yjSyncEditMode = function(isEdit) {
    document.querySelectorAll('.yj-del-btn').forEach(function(btn){
        btn.style.display = isEdit ? 'block' : 'none';
    });
    document.querySelectorAll('.yj-question-box').forEach(function(box){
        box.setAttribute('contenteditable', isEdit ? 'true' : 'false');
    });
    var addWrap = document.getElementById('yj-add-btn-wrap');
    if (addWrap) addWrap.style.display = isEdit ? 'block' : 'none';
};

// ── 初始化：在 switchTemplate('yuedu-jingsai') 后调用 ──
window.yjInit = function(savedUnits) {
    var container = document.getElementById('yj-units-container');
    if (!container) return;
    // 如果已有多个单元且没有传入新数据，不重置（防止二次调用覆盖）
    if (!savedUnits && _yjUnits.length > 1) return;
    container.innerHTML = '';
    _yjUnits = [];
    _yjActiveId = null;
    _yjUnitCounter = 0;

    var units = (savedUnits && savedUnits.length > 0) ? savedUnits : [{question:'', text:'　　', cur:2}];
    var isEdit = document.body.classList.contains('edit-mode-on');

    units.forEach(function(u, i){
        var uid = 'yju_' + (++_yjUnitCounter);
        var state = { id: uid, text: u.text||'　　', cur: u.cur||2, history: [], pageCount: 1 };
        _yjUnits.push(state);
        var dom = _yjMakeUnitDOM(uid, u.question||'', isEdit);
        container.appendChild(dom);
    });

    // 激活第一个单元
    setTimeout(function(){
        if (_yjUnits.length > 0) {
            _yjActiveId = _yjUnits[0].id;
            _yjInitAllUnits();
        }
    }, 100);
};

function _yjInitAllUnits() {
    // 触发 reflow 后立即画所有单元格子
    _yjUnits.forEach(function(state) {
        var unitEl = document.querySelector('.yj-unit[data-uid="' + state.id + '"]');
        var pc = unitEl ? unitEl.querySelector('.yj-pages-container') : null;
        if (pc) {
            void pc.offsetWidth; // 强制 reflow
            _yjDrawGridWithRetry(pc, state.rows || 10);
        }
    });
    // 激活第一个单元
    if (_yjUnits.length > 0) yjActivateUnit(_yjUnits[0].id);
}

// ── Hook: 当 jingsai 引擎的 jingsaiCount 被调用时更新总字数 ──
var _origJingsaiCount = null;
function _hookJingsaiCount() {
    if (window.jingsaiCount && !window.jingsaiCount._hooked) {
        _origJingsaiCount = window.jingsaiCount;
        window.jingsaiCount = function() {
            _origJingsaiCount();
            // 同步当前活跃单元字数
            if (_yjActiveId) {
                var active = _yjUnits.find(function(u){ return u.id === _yjActiveId; });
                if (active && typeof window._jingsaiGetState === 'function') {
                    var st = window._jingsaiGetState();
                    active.text = st.text;
                }
                window._yjUpdateTotalWordcount();
            }
        };
        window.jingsaiCount._hooked = true;
    }
}

// Hook after jingsai engine loads
window.addEventListener('load', function(){ setTimeout(_hookJingsaiCount, 500); });

})();
</script>
<script>
(function(){
  var COLS=20,ROWS=22,PAGE_CHARS=COLS*ROWS,G='#4caf50';
  var TOTAL=PAGE_CHARS*10; // 支持最多10页（无实际上限，动态扩展）
  var dpr=window.devicePixelRatio||1;
  var cW,cH,auxH,gH,TW,TH;
  var _text='　　',_cur=2,_composing=false;
  var _history=[];
  var _pageCount=1; // 当前已渲染的页数
  function _pushHistory(){if(_history.length>20)_history.shift();_history.push({text:_text,cur:_cur});}

  // ── 多页辅助：返回第n页（0-indexed）的wrap/canvas/box/cursor ──
  function _getPageEls(pageIdx){
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    if(pageIdx>=blocks.length)return null;
    var b=blocks[pageIdx];
    return {
      wrap:b.querySelector('.jingsai-grid-wrap'),
      cv:b.querySelector('.jingsai-grid-canvas'),
      box:b.querySelector('.jingsai-text-canvas'),
      cur:b.querySelector('.jingsai-cursor')
    };
  }

  // ── 计算文本共需多少页 ──
  function _calcPageCount(text){
    // 逐字符扫描，统计行数
    var row=0,col=0;
    for(var i=0;i<text.length;i++){
      var ch=text[i];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
    }
    var rows = _activeRows || ROWS;
    return Math.max(1,Math.ceil((row+1)/rows));
  }

  // ── 确保DOM中有足够页数 ──
  function _ensurePages(n){
    var container=_yjContainer();
    if(!container)return;
    var existing=container.querySelectorAll('.jingsai-page-block').length;
    for(var i=existing;i<n;i++){
      var pageNum=i+1;
      var block=document.createElement('div');
      block.className='jingsai-page-block';
      block.setAttribute('data-page',i);
      block.innerHTML=
        '<div style="display:block;width:100%;box-sizing:border-box;background:#fff;line-height:0;font-size:0;height:auto !important;overflow:visible !important;position:relative;">'+
          '<div class="jingsai-grid-wrap" style="position:relative;background:#fff;overflow:visible !important;">'+
            '<canvas class="jingsai-grid-canvas" style="display:block;width:100%;"></canvas>'+
            '<div class="jingsai-text-canvas" style="position:absolute;top:0;left:0;pointer-events:none;overflow:hidden;"></div>'+
            '<div class="jingsai-cursor" style="position:absolute;width:1.5px;background:#2e7d32;pointer-events:none;display:none;animation:jc-blink 1s step-end infinite;z-index:4;"></div>'+
          '</div>'+
        '</div>'+
        '<div class="jingsai-page-num" style="font-size:8pt;color:#999;text-align:right;padding-right:4px;margin-top:5px;line-height:1;">第 '+pageNum+' 页</div>';
      container.appendChild(block);
      // 立即绘制格子
      _drawGridForPage(i);
    }
  }

  // ── 兼容旧接口 ──
  function getWrap(){var e=_getPageEls(0);return e?e.wrap:null;}
  function getCV(){var e=_getPageEls(0);return e?e.cv:null;}
  function getBox(){var e=_getPageEls(0);return e?e.box:null;}
  function getCurEl(){var e=_getPageEls(0);return e?e.cur:null;}

  // ── 绘制单页格子 ──
  function _drawGridForPage(pageIdx){
    var e=_getPageEls(pageIdx);if(!e||!e.wrap||!e.cv)return;
    var wrap=e.wrap,cv=e.cv;
    if(!TW){TW=wrap.clientWidth;if(TW<10)TW=wrap.parentNode.clientWidth||300;}
    if(TW<10)return;
    if(!cW){
      cW=TW/COLS;
      var maxCH=Math.floor(957/31.8);
      cH=Math.min(cW,maxCH);
      auxH=Math.round(cH*0.4);gH=cH+auxH;
      // TH = 精确到最后一行字格底边，外框底边与最后一行字格底线重合由外框负责
      TH=(ROWS-1)*gH+cH;
    }
    var BOT=2; // 外框底边低于最后一行2px，确保底部边框可见
    cv.width=Math.round(TW*dpr);cv.height=Math.round((TH+BOT)*dpr);
    cv.style.width=TW+'px';cv.style.height=(TH+BOT)+'px';
    wrap.style.height=(TH+BOT)+'px';
    var outerDiv=wrap.parentNode;
    if(outerDiv){outerDiv.style.height=(TH+BOT+4)+'px';}
    var ctx=cv.getContext('2d');
    ctx.scale(dpr,dpr);ctx.clearRect(0,0,TW,TH+BOT);
    ctx.strokeStyle=G;ctx.lineWidth=0.7;
    for(var r=0;r<ROWS;r++){
      var base=r*gH,wb=base+cH,ab=wb+auxH;
      // 每行字格底线（最后一行不画，由外框底边代替）
      if(r<ROWS-1){ctx.beginPath();ctx.moveTo(0,wb);ctx.lineTo(TW,wb);ctx.stroke();}
      // 辅助线：最后一行不画
      if(r<ROWS-1){
        ctx.beginPath();ctx.moveTo(0,ab);ctx.lineTo(TW,ab);ctx.stroke();
      }
      // 竖分隔线
      for(var c=1;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*cW,base);ctx.lineTo(c*cW,wb);ctx.stroke();}
    }
    // 外框：lineWidth=1.5最后绘制，确保四边清晰可见
    ctx.lineWidth=1.5;ctx.strokeRect(0.75,0.75,TW-1.5,TH+BOT-1.5);
  }

  // 阅读精练模式下每页的行数（默认10行，超出时由 renderChars 动态扩展到22行）
  var _activeRows = ROWS; // 当前使用的行数
  window._jingsaiSetRows = function(n) { _activeRows = Math.max(1, Math.min(n, ROWS)); };
  window._jingsaiGetRows = function() { return _activeRows; };

  function drawGrid(){
    // 重置尺寸（resize时需重算）
    var e0=_getPageEls(0);
    if(e0&&e0.wrap){TW=e0.wrap.clientWidth;if(TW<10)return;}
    cW=TW/COLS;
    var maxCH=Math.floor(957/31.8);
    cH=Math.min(cW,maxCH);
    auxH=Math.round(cH*0.4);gH=cH+auxH;TH=(_activeRows-1)*gH+cH;
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var i=0;i<blocks.length;i++){_drawGridForPage(i);}
  }

  function posToRC(pos){
    var r=0,c=0,txt=_text.substring(0,pos);
    for(var i=0;i<txt.length;i++){
      if(txt[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return {r:r,c:c};
  }

  function rcToPos(row,col){
    if(row<0)return 0;
    var r=0,c=0;
    for(var i=0;i<_text.length;i++){
      if(r===row&&c===col)return i;
      if(r>row)return i;
      if(_text[i]==='\n'){r++;c=0;}else{c++;if(c>=COLS){r++;c=0;}}
    }
    return _text.length;
  }

  function renderChars(){
    if(!cW)return;

    // ── 计算需要多少页，阅读精练模式下先尝试扩展行数再扩展页数 ──
    var _yjPg = document.getElementById('page-yuedu-jingsai');
    var _isYjMode = _yjPg && _yjPg.style.display !== 'none' && _yjOverrideContainer;
    if (_isYjMode) {
      // 先计算文本需要多少行
      var _totalRows = 0, _c2 = 0;
      for (var _i2 = 0; _i2 < _text.length; _i2++) {
        var _ch2 = _text[_i2];
        if (_ch2 === '\n') { _totalRows++; _c2 = 0; }
        else { _c2++; if (_c2 >= COLS) { _totalRows++; _c2 = 0; } }
      }
      _totalRows = _totalRows + 1;
      // 如果超出当前行数，扩展到22行
      if (_totalRows > _activeRows && _activeRows < ROWS) {
        _activeRows = ROWS;
        TH = (_activeRows-1)*gH+cH;
        var _allBlocks = (_yjContainer()||document).querySelectorAll('.jingsai-page-block');
        for (var _bi2=0;_bi2<_allBlocks.length;_bi2++) { _drawGridForPage(_bi2); }
      }
    }
    var needed=_calcPageCount(_text);
    _ensurePages(needed);

    // ── 清空所有现有页的文本层 ──
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.box){be.box.innerHTML='';be.box.style.width=TW+'px';be.box.style.height=TH+'px';}
      if(be&&be.cur){be.cur.style.display='none';}
    }

    // ── 逐字符分配到各页 ──
    var fs=Math.round(cH*0.60);
    var pageIdx=0,row=0,col=0;
    var curPage=_getPageEls(pageIdx);
    var curBox=curPage?curPage.box:null;

    // 当前光标所在页和格
    var curRC=null; // {page,row,col}

    for(var idx=0;idx<_text.length;idx++){
      var ch=_text[idx];

      // 记录光标位置
      if(idx===_cur){curRC={page:pageIdx,row:row,col:col};}

      if(ch==='\n'){
        row++;col=0;
        if(row>=ROWS){row=0;pageIdx++;curPage=_getPageEls(pageIdx);curBox=curPage?curPage.box:null;}
        continue;
      }

      // 渲染字符
      if(curBox){
        var s=document.createElement('span');
        s.textContent=ch;
        var _topOffset=Math.round((cH-fs)/2);
        s.style.cssText='position:absolute;left:'+(col*cW)+'px;top:'+(row*gH+_topOffset)+'px;width:'+cW+'px;height:'+fs+'px;display:flex;align-items:center;justify-content:center;font-size:'+fs+'px;font-weight:100;line-height:1;color:#1a2a3a;font-family:"SimSun","宋体","STSong",serif;box-sizing:border-box;-webkit-font-smoothing:antialiased;transform:translateY(-'+Math.round(fs*0.08)+'px);';
        curBox.appendChild(s);
      }

      col++;
      if(col>=COLS){row++;col=0;if(row>=ROWS){row=0;pageIdx++;curPage=_getPageEls(pageIdx);curBox=curPage?curPage.box:null;}}
    }

    // 光标位置未命中（在末尾）
    if(!curRC){curRC={page:pageIdx,row:row,col:col};}

    updateCursorEl(curRC);
  }

  function updateCursorEl(curRC){
    if(!cW)return;
    if(!curRC){var rc=_getCursorRC();curRC=rc;}
    // 隐藏所有页光标
    var blocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<blocks.length;bi++){
      var be=_getPageEls(bi);
      if(be&&be.cur)be.cur.style.display='none';
    }
    var e=_getPageEls(curRC.page);
    if(!e||!e.cur)return;
    var fs=Math.round(cH*0.60),pt=Math.round((cH-fs)/2);
    e.cur.style.display='block';
    e.cur.style.left=(curRC.col*cW+1)+'px';
    e.cur.style.top=(curRC.row*gH+pt)+'px';
    e.cur.style.height=fs+'px';
    moveHiToCurrentCell(curRC);
  }

  // 计算_cur对应的{page,row,col}
  function _getCursorRC(){
    var pageIdx=0,row=0,col=0;
    for(var idx=0;idx<_cur;idx++){
      if(idx>=_text.length)break;
      var ch=_text[idx];
      if(ch==='\n'){row++;col=0;}
      else{col++;if(col>=COLS){row++;col=0;}}
      if(row>=ROWS){row=0;pageIdx++;}
    }
    return {page:pageIdx,row:row,col:col};
  }

  function insert(str){
    if(!str)return;
    var clean='';
    for(var i=0;i<str.length;i++){
      var ch=str[i];
      if(ch==='\n'){
        // 换行不计入字数，但要加段首空格
        clean+='\n　　';
      } else {
        clean+=ch;
      }
    }
    if(!clean)return;
    _pushHistory();
    _text=_text.slice(0,_cur)+clean+_text.slice(_cur);
    _cur+=clean.length;
    renderChars();
    window.jingsaiCount();
    if(typeof _debounceSave==='function')_debounceSave();
  }

  window.jingsaiCount=function(){
    var wc=_yjWordcount();
    if(!wc)return;
    var n=_text.replace(/\n/g,'').length;
    wc.textContent='字数：'+n;
    wc.style.color='#388e3c';
  };
  window.jingsaiRender=function(){renderChars();};
  window.jingsaiInit=function(retries){
    var r = (retries===undefined)?20:retries;
    var container=_yjContainer();
    var wrap=container?container.querySelector('.jingsai-grid-wrap'):null;
    if(wrap && wrap.clientWidth>10){ init(); }
    else if(r>0){ setTimeout(function(){ window.jingsaiInit(r-1); },80); }
  };

  // 在指定容器里画格子（阅读精练多单元用）
  window.jingsaiDrawInContainer = function(containerEl, rows, retries) {
    var r = (retries===undefined) ? 30 : retries;
    var wrap = containerEl ? containerEl.querySelector('.jingsai-grid-wrap') : null;
    var cv = wrap ? wrap.querySelector('.jingsai-grid-canvas') : null;
    if (!wrap || !cv) return;
    var W = wrap.clientWidth;
    if (W < 10) {
      if (r > 0) setTimeout(function(){ window.jingsaiDrawInContainer(containerEl, rows, r-1); }, 80);
      return;
    }
    var activeRows = rows || 10;
    var _dpr = window.devicePixelRatio || 1;
    var _cW = W / COLS;
    var maxCH = Math.floor(957/31.8);
    var _cH = Math.min(_cW, maxCH);
    var _auxH = Math.round(_cH * 0.4);
    var _gH = _cH + _auxH;
    var _TH = (activeRows - 1) * _gH + _cH;
    var BOT = 2;
    cv.width = Math.round(W * _dpr);
    cv.height = Math.round((_TH + BOT) * _dpr);
    cv.style.width = W + 'px';
    cv.style.height = (_TH + BOT) + 'px';
    wrap.style.height = (_TH + BOT) + 'px';
    var outerDiv = wrap.parentNode;
    if (outerDiv) outerDiv.style.height = (_TH + BOT + 4) + 'px';
    var ctx = cv.getContext('2d');
    ctx.scale(_dpr, _dpr);
    ctx.clearRect(0, 0, W, _TH + BOT);
    ctx.strokeStyle = G; ctx.lineWidth = 0.7;
    for (var ri = 0; ri < activeRows; ri++) {
      var base = ri * _gH, wb = base + _cH, ab = wb + _auxH;
      if (ri < activeRows - 1) { ctx.beginPath(); ctx.moveTo(0, wb); ctx.lineTo(W, wb); ctx.stroke(); }
      if (ri < activeRows - 1) { ctx.beginPath(); ctx.moveTo(0, ab); ctx.lineTo(W, ab); ctx.stroke(); }
      for (var ci = 1; ci < COLS; ci++) { ctx.beginPath(); ctx.moveTo(ci*_cW, base); ctx.lineTo(ci*_cW, wb); ctx.stroke(); }
    }
    ctx.lineWidth = 1.5;
    ctx.strokeRect(0.75, 0.75, W - 1.5, _TH + BOT - 1.5);
  };
  window._jingsaiGetText=function(){return _text;};
  // 暴露 cW、TH、COLS、ROWS 供外部打印代码使用
  Object.defineProperty(window,'_jingsaiCW',{get:function(){return cW||0;},configurable:true});
  Object.defineProperty(window,'_jingsaiTH',{get:function(){return TH||0;},configurable:true});
  window._jingsaiCOLS=COLS;window._jingsaiROWS=ROWS;
  // 阅读精练复用同一套稿纸引擎，但操作各自的容器
  // 根据哪个稿纸页面当前可见来决定操作哪个容器
  // （阅读精练多题模式通过 _yjOverrideContainer 覆盖）
  var _yjOverrideContainer = null;
  function _yjContainer() {
    if (_yjOverrideContainer) return _yjOverrideContainer;
    var yjPg = document.getElementById('page-yuedu-jingsai');
    if (yjPg && yjPg.style.display !== 'none') {
      return document.getElementById('yuedu-jingsai-pages-container');
    }
    return document.getElementById('jingsai-pages-container');
  }
  function _yjWordcount() {
    var yjPg = document.getElementById('page-yuedu-jingsai');
    if (yjPg && yjPg.style.display !== 'none') {
      return document.getElementById('yuedu-jingsai-wordcount');
    }
    return document.getElementById('jingsai-wordcount');
  }

  // 自动保存到localStorage（每30秒）
  var _autoSaveTimer=null;
  // 轮换3个存档槽，防止单槽损坏丢失全部内容
  var _saveSlot=0;
  function _autoSave(){
    try{
      var base='jingsai_autosave_'+(window.STUDENT_META?window.STUDENT_META.fileToken||'':'draft');
      var data=JSON.stringify({text:_text,cur:_cur,ts:Date.now()});
      // 写入当前槽，同时也写入主槽（兼容旧版）
      localStorage.setItem(base,data);
      localStorage.setItem(base+'_s'+_saveSlot,data);
      _saveSlot=(_saveSlot+1)%3;
      // 显示已保存提示
      var sc = document.getElementById('jingsai-save-clock');
      if(sc){ var d=new Date(); sc.textContent='已自动保存 '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); sc.style.color='#388e3c'; }
    }catch(e){
      var sc = document.getElementById('jingsai-save-clock');
      if(sc){ sc.textContent='⚠ 保存失败，请截图备份！'; sc.style.color='#c62828'; }
    }
  }
  // 输入后3秒自动保存（防止崩溃丢失）
  var _saveDebounceTimer=null;
  function _debounceSave(){
    if(_saveDebounceTimer)clearTimeout(_saveDebounceTimer);
    _saveDebounceTimer=setTimeout(_autoSave, 3000);
  }
  function _autoRestore(){
    try{
      var base='jingsai_autosave_'+(window.STUDENT_META?window.STUDENT_META.fileToken||'':'draft');
      // 找所有槽中最新的有效存档
      var best=null;
      var keys=[base, base+'_s0', base+'_s1', base+'_s2'];
      for(var ki=0;ki<keys.length;ki++){
        try{
          var raw=localStorage.getItem(keys[ki]);
          if(!raw)continue;
          var d=JSON.parse(raw);
          if(!d.text||d.text==='　　')continue;
          if(Date.now()-d.ts>86400000)continue;
          if(!best||d.ts>best.ts)best=d;
        }catch(e){}
      }
      if(best){_text=best.text;_cur=best.cur||0;return true;}
    }catch(e){}
    return false;
  }
  function _startAutoSave(){
    if(_autoSaveTimer)clearInterval(_autoSaveTimer);
    _autoSaveTimer=setInterval(_autoSave,10000);
    // 页面隐藏时立即保存（手机息屏/切换应用）
    document.addEventListener('visibilitychange',function(){
      if(document.hidden)_autoSave();
    });
    // 页面关闭前保存
    window.addEventListener('beforeunload',_autoSave);
  }

  // 存档接口
  window._jingsaiGetState=function(){return {text:_text,cur:_cur};};
  window._jingsaiSetState=function(text,cur){_text=text||'　　';_cur=cur||2;_history=[];renderChars();window.jingsaiCount&&window.jingsaiCount();};

  // 动态容器切换（阅读精练多题模式使用）
  window._jingsaiSetContainer = function(containerEl) {
    _yjOverrideContainer = containerEl || null;
  };


  // 导出Word（纯文字，段首两格，HTML→doc格式）
  window.jingsaiExportWord=function(){
    var pg=document.getElementById('page-jingsai');
    if(!pg)return;
    // 取姓名和编号
    var inputs=pg.querySelectorAll('input[type="text"]');
    var name=(inputs[0]&&inputs[0].value)||'';
    var num=(inputs[1]&&inputs[1].value)||'';
    var title=(document.getElementById('jingsai-title-input')||{}).value||'';
    var group=(pg.querySelector('select')||{}).value||'';

    // 把_text转成段落（按换行分段）
    var paras=_text.split('\n');
    var bodyHtml=paras.map(function(p){
      return '<p style="text-indent:2em;line-height:1.8;margin:0 0 6pt 0;font-family:SimSun,serif;font-size:12pt;">'+
        (p||'&nbsp;')+'</p>';
    }).join('');

    var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" '+
      'xmlns:w="urn:schemas-microsoft-com:office:word" '+
      'xmlns="http://www.w3.org/TR/REC-html40">'+
      '<head><meta charset="utf-8">'+
      '<style>'+
      '@page{size:210mm 297mm;margin:25mm 25mm 25mm 25mm;}'+
      'body{font-family:SimSun,serif;font-size:12pt;line-height:1.8;color:#000;}'+
      'h2{font-size:14pt;text-align:center;margin-bottom:12pt;}'+
      '.info{font-size:11pt;margin-bottom:16pt;}'+
      '</style></head><body>'+
      (title?'<h2>'+title+'</h2>':'')+
      '<div class="info">'+
      (name?'姓名：'+name+'&nbsp;&nbsp;&nbsp;&nbsp;':'')+
      (num?'编号：'+num+'&nbsp;&nbsp;&nbsp;&nbsp;':'')+
      (group?'组别：'+group:'')+
      '</div>'+
      bodyHtml+
      '</body></html>';

    var blob=new Blob([html],{type:'application/msword;charset=utf-8'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=(name||'作文')+'_'+(title||'稿纸作答')+'.doc';
    a.click();
  };
  window._jingsaiSetState=function(text,cur){
    _text=text||'　　';
    _cur=typeof cur==='number'?cur:2;
    if(cW)renderChars();
  };
  window.jingsaiKey=function(){};

  function handleKeydown(e){
    if(window._jingsaiInputLocked){e.preventDefault();return;}
    var k=e.key;
    var ctrl=e.ctrlKey||e.metaKey;

    // Ctrl/Cmd 组合键
    if(ctrl){
      if(k==='z'||k==='Z'){
        e.preventDefault();
        // 简单undo：恢复上一步（保存最近20步历史）
        if(_history.length>0){
          var prev=_history.pop();
          _text=prev.text; _cur=prev.cur;
          renderChars(); window.jingsaiCount();
        }
        return;
      }
      if(k==='a'||k==='A'){
        e.preventDefault();
        _cur=_text.length; renderChars(); return;
      }
      if(k==='c'||k==='C'){return;} // 允许复制（不阻止）
      if(k==='v'||k==='V'){return;} // 粘贴由paste事件处理
      return;
    }

    if(k===' '){e.preventDefault();_pushHistory();insert(' ');return;}
    if(k==='ArrowRight'){e.preventDefault();if(_cur<_text.length){_cur++;}renderChars();}
    else if(k==='ArrowLeft'){e.preventDefault();if(_cur>0){_cur--;}renderChars();}
    else if(k==='ArrowDown'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r+1,rc.c);renderChars();}
    else if(k==='ArrowUp'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r-1,rc.c);renderChars();}
    else if(k==='Backspace'){
      e.preventDefault();
      if(_cur>0){_pushHistory();_text=_text.slice(0,_cur-1)+_text.slice(_cur);_cur--;renderChars();window.jingsaiCount();}
    }
    else if(k==='Delete'){
      e.preventDefault();
      if(_cur<_text.length){_pushHistory();_text=_text.slice(0,_cur)+_text.slice(_cur+1);renderChars();window.jingsaiCount();}
    }
    else if(k==='Enter'){e.preventDefault();_pushHistory();_text=_text.slice(0,_cur)+'\n　　'+_text.slice(_cur);_cur+=3;renderChars();window.jingsaiCount();}
    else if(k==='Home'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r,0);renderChars();}
    else if(k==='End'){e.preventDefault();var rc=posToRC(_cur);_cur=rcToPos(rc.r,COLS);renderChars();}
    else if(k==='Tab'){e.preventDefault();_pushHistory();insert('　');}
  }

  function init(){
    drawGrid();
    // 尝试恢复自动存档
    var restored=_autoRestore();
    renderChars();
    if(restored){
      var tip=document.createElement('div');
      tip.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1b5e20;color:#fff;padding:12px 24px;border-radius:10px;font-size:10.5pt;font-weight:600;z-index:99999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.3);text-align:center;';
      tip.innerHTML='✅ 已自动恢复上次内容<br><span style="font-size:8.5pt;font-weight:400;opacity:0.85;">你的作文已找回，请继续作答</span>';
      document.body.appendChild(tip);
      setTimeout(function(){if(tip.parentNode)tip.parentNode.removeChild(tip);},5000);
    }
    _startAutoSave();
    var wrap=getWrap();if(!wrap)return;

    // 设置所有页的cursor样式，并绑定点击
    function _bindPageClick(pageIdx){
      var e=_getPageEls(pageIdx);if(!e||!e.wrap)return;
      e.wrap.style.cursor='text';
      e.wrap.addEventListener('click',function(ev){
        var rect=e.wrap.getBoundingClientRect();
        var x=ev.clientX-rect.left,y=ev.clientY-rect.top;
        var clickCol=Math.max(0,Math.min(Math.floor(x/cW),COLS-1));
        var clickRow=Math.max(0,Math.min(Math.floor(y/gH),ROWS-1));
        // 转换为全局文本位置
        var globalRow=pageIdx*ROWS+clickRow;
        _cur=rcToPos(globalRow,clickCol);
        renderChars();
        moveHiToCurrentCell();
        if(!window._jingsaiInputLocked) hi.focus();
      });
    }
    // 绑定当前已有页
    var existingBlocks=(_yjContainer()||document).querySelectorAll('.jingsai-page-block');
    for(var bi=0;bi<existingBlocks.length;bi++){_bindPageClick(bi);}
    // 新增页时自动绑定（MutationObserver）
    var _container=_yjContainer();
    if(_container&&window.MutationObserver){
      var _mo=new MutationObserver(function(ms){
        ms.forEach(function(m){
          m.addedNodes.forEach(function(node){
            if(node.classList&&node.classList.contains('jingsai-page-block')){
              var idx=parseInt(node.getAttribute('data-page')||'0');
              _bindPageClick(idx);
            }
          });
        });
      });
      _mo.observe(_container,{childList:true});
    }

    // 创建隐藏input（放在body级别，不受wrap限制）
    var hi=document.getElementById('jingsai-hi');
    if(!hi){
      hi=document.createElement('input');
      hi.id='jingsai-hi';
      hi.setAttribute('type','text');
      hi.setAttribute('autocomplete','off');
      hi.setAttribute('autocorrect','off');
      hi.setAttribute('autocapitalize','off');
      hi.style.cssText='position:fixed;opacity:0;width:1px;height:1px;border:none;outline:none;z-index:9999;font-size:16px;background:transparent;padding:0;margin:0;left:0;top:0;pointer-events:none;';
      hi.setAttribute('inputmode','text');
      hi.setAttribute('autocorrect','off');
      hi.setAttribute('autocapitalize','sentences');
      document.body.appendChild(hi);
    }

    // 每次 init 都重新绑定事件（移除旧的再绑定，防止文件保存后重开时事件丢失）
    var _hiNew = hi.cloneNode(false);
    hi.parentNode.replaceChild(_hiNew, hi);
    hi = _hiNew;

    hi.addEventListener('compositionstart',function(){_composing=true;});
    hi.addEventListener('compositionend',function(e){
      _composing=false;
      if(window._jingsaiInputLocked){hi.value='';return;}
      var v=e.data||hi.value;
      hi.value='';
      insert(v);
    });
    hi.addEventListener('input',function(){
      if(_composing)return;
      if(window._jingsaiInputLocked){hi.value='';return;}
      var v=hi.value;
      hi.value='';
      insert(v);
    });
    hi.addEventListener('keydown',handleKeydown);

    // 粘贴在稿纸模式下禁用（由 noPaste capture 监听器统一拦截）
    // IME 输入（compositionend）走独立路径，不受影响

    // 息屏/切换应用后重新点击可继续输入
    document.addEventListener('visibilitychange',function(){
      if(!document.hidden){
        // 页面重新可见时自动恢复存档（防止Safari回收内存）
        var restored=_autoRestore();
        if(restored){renderChars();}
      }
    });

    // 初始focus
    setTimeout(function(){
      moveHiToCurrentCell();
      // 若计时尚未开始（锁定中），不 focus（防止弹出键盘）
      if(!window._jingsaiInputLocked) hi.focus();
    },100);
  }

  function moveHiToCurrentCell(curRC){
    var hi=document.getElementById('jingsai-hi');
    if(!hi||!cW)return;
    if(!curRC)curRC=_getCursorRC();
    var e=_getPageEls(curRC.page);
    if(!e||!e.wrap)return;
    var rect=e.wrap.getBoundingClientRect();
    var x=rect.left+curRC.col*cW;
    var y=rect.top+curRC.row*gH+cH;
    hi.style.left=Math.round(x)+'px';
    hi.style.top=Math.round(y)+'px';
  }

  window.addEventListener('resize',function(){
    if(typeof currentTemplate!=='undefined'&&currentTemplate==='jingsai'){
      var pg=document.getElementById('page-jingsai');
      if(pg&&pg.style.display!=='none'){
        cW=0;TW=0; // force recalc
        drawGrid();renderChars();
      }
    }
  });

  window.addEventListener('load',function(){
    var observer=new MutationObserver(function(ms){
      ms.forEach(function(m){
        if((m.target.id==='page-jingsai'||m.target.id==='page-yuedu-jingsai')&&m.target.style.display!=='none')setTimeout(init,50);
      });
    });
    var pg=document.getElementById('page-jingsai');
    if(pg)observer.observe(pg,{attributes:true,attributeFilter:['style']});
    var pgYJ=document.getElementById('page-yuedu-jingsai');
    if(pgYJ)observer.observe(pgYJ,{attributes:true,attributeFilter:['style']});
  });
    var _os=window.switchTemplate;
  window.switchTemplate=function(name){
    if(_os)_os(name);
    if(name==='jingsai'){if(typeof window._jingsaiSetRows==='function')window._jingsaiSetRows(22);setTimeout(init,80);}
    if(name==='yuedu-jingsai'){
        setTimeout(function(){
            if(typeof window.yjInit==='function'){
                var _yjSaved=(typeof YJ_UNITS_DATA!=='undefined'&&YJ_UNITS_DATA&&YJ_UNITS_DATA.length>0)?YJ_UNITS_DATA:null;
                window.yjInit(_yjSaved);
            }
            if(typeof window.yjSyncEditMode==='function') window.yjSyncEditMode(typeof isEditMode!=='undefined'&&isEditMode);
        },150);
    }
  };

  // 学生版：页面加载时直接初始化
  window.addEventListener('load',function(){
    var pg=document.getElementById('page-jingsai');
    var pgYJ=document.getElementById('page-yuedu-jingsai');
    var isJingsai = pg && pg.style.display!=='none';
    var isYJ = pgYJ && pgYJ.style.display!=='none';

    if(isJingsai){
      // 普通稿纸模式
      function tryInitJ(n){
        var container=document.getElementById('jingsai-pages-container');
        var wrap=container ? container.querySelector('.jingsai-grid-wrap') : null;
        if(wrap && wrap.clientWidth>10){init();}
        else if(n>0){setTimeout(function(){tryInitJ(n-1);},100);}
      }
      tryInitJ(20);
    } else if(isYJ){
      // 阅读精练模式：等页面宽度就绪 + yjInit完成后画格子
      function tryInitYJ(n){
        var pgYJ2=document.getElementById('page-yuedu-jingsai');
        var pgW = pgYJ2 ? pgYJ2.clientWidth : -1;
        var hasContainer = document.querySelector('#yj-units-container .yj-unit');
        var dbg = document.getElementById('_yjDbg');
        if(dbg) dbg.textContent = 'n='+n+' pgW='+pgW+' hasContainer='+!!hasContainer+' yjUnits='+(typeof _yjUnits!=='undefined'?_yjUnits.length:'?');
        if(pgW>10 && hasContainer){
          if(dbg) dbg.textContent += ' -> DRAWING';
          if(typeof window._yjDrawAllGrids==='function') window._yjDrawAllGrids();
        } else if(n>0){
          setTimeout(function(){tryInitYJ(n-1);},100);
        } else {
          if(dbg) dbg.textContent += ' -> GAVE UP';
        }
      }
      // 注入调试元素
      var _dbgEl = document.createElement('div');
      _dbgEl.id = '_yjDbg';
      _dbgEl.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);color:#0f0;font-size:11px;padding:4px 8px;z-index:99999;font-family:monospace;';
      document.body.appendChild(_dbgEl);
      tryInitYJ(50);
    }
  });
})();
