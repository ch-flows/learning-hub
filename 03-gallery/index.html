<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佳作视界 | CH-FLOWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-blue: #004e7c; 
            --text-english: #64748b; 
            --bg-base: #f0f4f8; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; background: var(--bg-base); font-family: 'Noto Sans SC', sans-serif; }
        
        /* 回归你最喜欢的蓝色光晕设计 */
        body { 
            display: flex; justify-content: center; 
            background: radial-gradient(circle at 50% 15%, rgba(10, 129, 171, 0.12) 0%, var(--bg-base) 45%);
        }

        .stage { 
            width: 100%; max-width: 1200px; padding: 6vh 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        
        header { text-align: center; margin-bottom: 6vh; }
        .back-link { font-family: 'Montserrat'; font-size: 0.75rem; color: var(--accent-blue); text-decoration: none; opacity: 0.5; letter-spacing: 3px; transition: 0.3s; text-transform: uppercase; }
        .back-link:hover { opacity: 1; letter-spacing: 5px; }
        .page-title { font-size: 2.2rem; letter-spacing: 12px; color: var(--accent-blue); font-weight: 200; margin: 15px 0 5px; padding-left: 12px; }
        .page-subtitle { font-family: 'Montserrat'; font-size: 0.8rem; color: var(--text-english); letter-spacing: 5px; opacity: 0.7; }

        /* 文章网格列表 */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 30px; 
            width: 100%; 
            max-width: 1000px;
        }
        
        .card {
            background: #ffffff; border-radius: 24px; padding: 45px 30px; text-align: center; text-decoration: none;
            box-shadow: 0 12px 30px rgba(0,0,0,0.04); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,78,124,0.12); }
        
        /* 文章图标样式 */
        .article-icon { font-size: 42px; margin-bottom: 22px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.08)); }
        
        .card h2 { font-size: 1.2rem; color: var(--accent-blue); margin-bottom: 10px; letter-spacing: 3px; font-weight: 500; }
        .card p { font-family: 'Montserrat'; font-size: 0.7rem; color: var(--text-english); letter-spacing: 1px; text-transform: uppercase; }

        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <a href="../index.html" class="back-link">← Return Hub</a>
            <h1 class="page-title">佳作视界</h1>
            <p class="page-subtitle">Excellence Gallery</p>
        </header>

        <main class="grid">
            <a href="1g3-情境作文.html" class="card">
                <div class="article-icon">✍️</div>
                <h2>1G3 情境作文</h2>
                <p>Situational Writing</p>
            </a>

            </main>
    </div>
</body>
</html>
