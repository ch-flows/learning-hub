<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-blue: #004e7c;
            --text-main: #1e293b; 
            --text-sub: #334155; 
            --text-english: #64748b; /* 调深了英文颜色，确保易读 */
            --bg-base: #f1f5f9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 锁定视口，禁止滚动 */
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg-base);
        }

        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            display: flex; justify-content: center; align-items: center;
        }

        /* 关键：全屏保护容器。无论屏幕多大，内容只在这个区域内流动 */
        .stage {
            width: 100%;
            height: 100%;
            max-width: 1400px; /* 限制超宽屏下的散开 */
            max-height: 900px; /* 限制超高屏下的分离 */
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* 均匀分布 */
            padding: 40px 0;
        }
        
        header {
            text-align: center;
            flex-shrink: 0;
            padding-top: 20px;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 5vh, 2.8rem);
            font-weight: 200;
            letter-spacing: 15px;
            background: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 5px;
            color: #94a3b8;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 60px;
        }

        .container {
            width: 100%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(20px, 4vw, 50px);
        }

        /* 再次强化卡片的“跳出感” */
        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: clamp(40px, 8vh, 80px) 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 1);
        }
        
        .card:hover { 
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 40px 80px -15px rgba(0, 78, 124, 0.2);
        }
        
        .icon { 
            font-size: clamp(42px, 6vh, 60px); 
            margin-bottom: 3vh;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.08));
        }
        
        .card h2 { 
            font-size: clamp(1.2rem, 2vh, 1.5rem); 
            letter-spacing: 5px; 
            color: var(--accent-blue); 
            margin-bottom: 12px;
            font-weight: 500;
        }
        .card .subtitle { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.65rem; 
            color: #94a3b8; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .vision-section {
            text-align: center;
            flex-shrink: 0;
            padding-bottom: 20px;
        }
        .vision-ch {
            font-size: 1.15rem;
            color: var(--text-sub); /* 深灰色，读起来不累 */
            letter-spacing: 6px;
            margin-bottom: 12px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            color: var(--text-english); /* 加深色值 */
            letter-spacing: 0.5px;
            line-height: 1.6;
            font-weight: 400;
        }

        /* 窄屏适配 */
        @media (max-width: 900px) {
            .grid { gap: 15px; }
            .main-content { padding: 0 20px; }
            .brand { letter-spacing: 8px; }
            .vision-ch { font-size: 1rem; letter-spacing: 4px; }
        }
        
        /* 极矮窗口适配：防止内容重叠 */
        @media (max-height: 600px) {
            .stage { padding: 10px 0; }
            .card { padding: 20px 10px; }
            .icon { margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <div class="brand">CH-FLOWS</div>
            <div class="hub-title">CHINESE LEARNING HUB</div>
        </header>

        <main class="main-content">
            <div class="container">
                <div class="grid">
                    <a href="./01-learning-guide/index.html" class="card">
                        <span class="icon">🧭</span>
                        <h2>学法指引</h2>
                        <div class="subtitle">Learning Guide</div>
                    </a>
                    <a href="./02-interaction/index.html" class="card">
                        <span class="icon">⚡</span>
                        <h2>课堂互动</h2>
                        <div class="subtitle">Class Interaction</div>
                    </a>
                    <a href="./03-gallery/index.html" class="card">
                        <span class="icon">⭐</span>
                        <h2>佳作视界</h2>
                        <div class="subtitle">Excellence Gallery</div>
                    </a>
                </div>
            </div>
        </main>

        <section class="vision-section">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </section>
    </div>
</body>
</html>
