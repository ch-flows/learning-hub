<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;400;500&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --text-main: #1e293b; 
            --text-sub: #475569; 
            --text-light: #94a3b8;
            --accent-blue: #004e7c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            background-color: #ffffff; /* 纯白背景 */
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* 移除蓝色块后的轻量化 Header */
        header {
            padding: 100px 20px 60px; 
            text-align: center;
        }
        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            font-weight: 200; /* 使用极细字体，更有高级感 */
            letter-spacing: 18px;
            color: var(--text-main);
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: var(--text-light);
            font-weight: 400;
        }

        /* 核心内容区自适应屏幕居中 */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* 全屏时垂直居中 */
            padding: 20px 0 60px;
        }

        .container {
            max-width: 1100px;
            width: 90%;
            margin: 0 auto;
            padding: 0 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
        }

        /* 卡片设计：去掉生硬阴影，改用极细边框和轻微浮动 */
        .card {
            background: #ffffff;
            border-radius: 0px; /* 方形或微圆角更显干练 */
            padding: 60px 30px;
            text-align: center;
            text-decoration: none;
            border: 1px solid #f1f5f9; /* 极细边框 */
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex; flex-direction: column; align-items: center;
        }
        .card:hover { 
            border-color: var(--accent-blue);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
            transform: translateY(-5px);
        }
        .icon { font-size: 40px; margin-bottom: 30px; filter: grayscale(100%); opacity: 0.6; transition: 0.4s; }
        .card:hover .icon { filter: grayscale(0%); opacity: 1; transform: scale(1.1); }
        
        .card h2 { font-size: 1.4rem; letter-spacing: 6px; color: var(--text-main); margin-bottom: 10px; font-weight: 400;}
        .card .subtitle { font-family: 'Montserrat', sans-serif; font-size: 0.7rem; color: var(--text-light); letter-spacing: 2px; }

        /* 理念看板：不再作为填补，而是作为设计的终点 */
        .vision-board {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .vision-ch {
            font-size: 1.1rem;
            color: var(--text-sub);
            letter-spacing: 6px;
            margin-bottom: 15px;
            font-weight: 300;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 1px;
            line-height: 1.8;
            font-weight: 300;
        }

        footer {
            padding: 40px;
            text-align: center;
            flex-shrink: 0;
        }
        .footer-text { font-size: 0.7rem; color: #cbd5e1; letter-spacing: 3px; }

        @media (max-width: 768px) {
            header { padding-top: 60px; }
            .brand { font-size: 1.8rem; letter-spacing: 10px; }
            .grid { grid-template-columns: 1fr; gap: 20px; }
            .vision-board { padding-top: 40px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">CH-FLOWS</div>
        <div class="hub-title">CHINESE LEARNING HUB</div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <span class="icon">🧭</span>
                    <h2>学法指引</h2>
                    <div class="subtitle">Learning Guide</div>
                </a>
                <a href="./02-interaction/index.html" class="card">
                    <span class="icon">⚡</span>
                    <h2>课堂互动</h2>
                    <div class="subtitle">Class Interaction</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <span class="icon">⭐</span>
                    <h2>佳作视界</h2>
                    <div class="subtitle">Excellence Gallery</div>
                </a>
            </div>
        </div>

        <div class="vision-board">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </div>
    </main>

    <footer>
        <div class="footer-text">© 2026 CH-FLOWS · CONNECTING THE WORLD THROUGH CHINESE</div>
    </footer>
</body>
</html>
