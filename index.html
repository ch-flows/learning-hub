<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CH-FLOWS | Chinese Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-blue: #004e7c;
            --text-main: #1e293b; 
            --text-sub: #475569; 
            --text-english: #64748b; 
            --bg-base: #f1f5f9;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: var(--bg-base);
        }

        body { 
            font-family: 'Noto Sans SC', sans-serif; 
            display: flex; justify-content: center; align-items: center;
            /* 背景光影微调，让中心更明亮 */
            background: radial-gradient(circle at 50% 50%, #ffffff 0%, var(--bg-base) 100%);
        }

        .stage {
            width: 100%; height: 100%;
            max-width: 1400px;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 5vh 0;
        }
        
        header {
            text-align: center;
            flex-shrink: 0;
            padding-top: 10vh; /* 进一步下移，拉近与卡片的物理距离 */
        }

        .brand {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2.4rem, 6vh, 3.2rem);
            font-weight: 200;
            letter-spacing: 18px;
            background: linear-gradient(135deg, #004e7c 0%, #0a81ab 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .hub-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 5px;
            color: var(--text-english);
            text-transform: none;
            opacity: 0.8;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0 60px;
        }

        /* 移除装饰线，改用文字间隙作为逻辑连接 */
        .content-hint {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 8px;
            color: var(--accent-blue);
            opacity: 0.25; /* 极其微弱，像呼吸一样 */
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(20px, 4vw, 50px);
            width: 100%;
        }

        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: clamp(40px, 8vh, 80px) 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.04);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 1);
        }
        
        /* 关键：中间卡片微调，起到视觉锚定作用 */
        .card.active {
            transform: scale(1.02);
            box-shadow: 0 30px 60px -15px rgba(0, 78, 124, 0.1);
        }

        .card:hover { 
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 40px 80px -20px rgba(0, 78, 124, 0.15);
            z-index: 2;
        }
        
        .icon-box { 
            height: 70px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 3vh;
        }

        .star-svg {
            width: 52px; height: 52px;
            fill: #ffcf40;
            filter: drop-shadow(0 4px 8px rgba(255, 180, 0, 0.2));
        }
        
        .emoji-icon {
            font-size: 52px;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.06));
        }
        
        .card h2 { 
            font-size: clamp(1.1rem, 2.2vh, 1.35rem); 
            letter-spacing: 5px; color: var(--accent-blue); 
            margin-bottom: 12px; font-weight: 500;
        }
        .card .subtitle { 
            font-family: 'Montserrat', sans-serif; 
            font-size: 0.65rem; color: var(--text-english); 
            letter-spacing: 1px;
        }

        .vision-section {
            text-align: center;
            flex-shrink: 0;
            padding-bottom: 6vh;
        }
        .vision-ch {
            font-size: 1.1rem; color: var(--text-sub);
            letter-spacing: 8px; margin-bottom: 15px;
            font-weight: 400;
        }
        .vision-en {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem; color: var(--text-english);
            line-height: 1.8;
            opacity: 0.9;
        }

        @media (max-width: 900px) {
            .grid { gap: 20px; }
            .main-content { padding: 0 20px; }
            .card.active { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <div class="brand">CH-FLOWS</div>
            <div class="hub-title">Chinese Learning Hub</div>
        </header>

        <main class="main-content">
            <div class="content-hint">Selection</div>
            
            <div class="grid">
                <a href="./01-learning-guide/index.html" class="card">
                    <div class="icon-box"><span class="emoji-icon">🧭</span></div>
                    <h2>学法指引</h2>
                    <div class="subtitle">Learning Guide</div>
                </a>
                <a href="./02-interaction/index.html" class="card active">
                    <div class="icon-box"><span class="emoji-icon">⚡</span></div>
                    <h2>课堂互动</h2>
                    <div class="subtitle">Class Interaction</div>
                </a>
                <a href="./03-gallery/index.html" class="card">
                    <div class="icon-box">
                        <svg class="star-svg" viewBox="0 0 24 24">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="#eab308" stroke-width="0.3" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <h2>佳作视界</h2>
                    <div class="subtitle">Excellence Gallery</div>
                </a>
            </div>
        </main>

        <section class="vision-section">
            <p class="vision-ch">学思并进，格物致知；灵感流转，佳作共赏</p>
            <p class="vision-en">Integrate learning with reflection to seek true knowledge.<br>Let inspiration flow and excellence be shared.</p>
        </section>
    </div>
</body>
</html>
