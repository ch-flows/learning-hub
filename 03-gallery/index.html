<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <title>佳作视界 | CH-FLOWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent-blue: #004e7c; --text-english: #64748b; --bg-base: #f0f4f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background: var(--bg-base); font-family: 'Noto Sans SC', sans-serif; }
        
        /* 保持你喜欢的蓝色光晕氛围 */
        body { 
            display: flex; justify-content: center; 
            background: radial-gradient(circle at 50% 15%, rgba(10, 129, 171, 0.12) 0%, var(--bg-base) 45%);
        }

        .stage { width: 100%; max-width: 1200px; padding: 6vh 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 6vh; }
        .back-link { font-family: 'Montserrat'; font-size: 0.75rem; color: var(--accent-blue); text-decoration: none; opacity: 0.5; letter-spacing: 3px; }
        .page-title { font-size: 2.2rem; letter-spacing: 12px; color: var(--accent-blue); font-weight: 200; margin: 15px 0 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; width: 100%; }
        
        /* 动态生成的卡片样式 */
        .card {
            background: #ffffff; border-radius: 24px; padding: 40px 20px; text-align: center; text-decoration: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; align-items: center; border: 1px solid white;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,78,124,0.1); }
        .article-icon { font-size: 38px; margin-bottom: 15px; }
        .card h2 { font-size: 1.1rem; color: var(--accent-blue); letter-spacing: 2px; }
        
        #loading { color: var(--accent-blue); opacity: 0.5; font-size: 0.9rem; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <a href="../index.html" class="back-link">← RETURN HUB</a>
            <h1 class="page-title">佳作视界</h1>
        </header>

        <div id="loading">正在加载灵感流转的文章...</div>
        <main class="grid" id="article-list"></main>
    </div>

    <script>
        // 配置你的 GitHub 信息
        const owner = 'ch-flows';
        const repo = 'learning-hub';
        const path = '03-gallery'; // 对应的文件夹

        async function fetchArticles() {
            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`);
                const files = await response.json();
                const listContainer = document.getElementById('article-list');
                const loadingInfo = document.getElementById('loading');

                loadingInfo.style.display = 'none';

                files.forEach(file => {
                    // 只处理以 .html 结尾且不是 index.html 的文件
                    if (file.name.endsWith('.html') && file.name !== 'index.html') {
                        const card = document.createElement('a');
                        card.className = 'card';
                        card.href = file.name;
                        
                        // 去掉文件后缀作为题目
                        const title = file.name.replace('.html', '');
                        
                        card.innerHTML = `
                            <div class="article-icon">✍️</div>
                            <h2>${title}</h2>
                        `;
                        listContainer.appendChild(card);
                    }
                });
            } catch (error) {
                console.error('获取列表失败:', error);
                document.getElementById('loading').innerText = '加载失败，请检查网络。';
            }
        }

        fetchArticles();
    </script>
</body>
</html>
