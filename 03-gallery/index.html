<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <title>佳作视界 | CH-FLOWS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Montserrat:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --accent-blue: #004e7c; --text-english: #64748b; --bg-base: #f0f4f8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { min-height: 100%; background: var(--bg-base); font-family: 'Noto Sans SC', sans-serif; }
        body { 
            display: flex; justify-content: center; 
            background: radial-gradient(circle at 50% 0%, rgba(10, 129, 171, 0.13) 0%, var(--bg-base) 70%);
        }
        .stage { width: 100%; max-width: 1200px; padding: 6vh 20px; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin-bottom: 6vh; }
        .back-link { font-family: 'Montserrat'; font-size: 0.75rem; color: var(--accent-blue); text-decoration: none; opacity: 0.5; letter-spacing: 3px; }
        .page-title { font-size: 2.2rem; letter-spacing: 12px; color: var(--accent-blue); font-weight: 200; margin: 15px 0 5px; }

        /* 目录列表 */
        .article-list { list-style: none; width: 100%; max-width: 680px; }
        .article-list li { border-bottom: 1px solid rgba(0,78,124,0.1); }
        .article-list li:first-child { border-top: 1px solid rgba(0,78,124,0.1); }
        .article-list a {
            display: flex; align-items: baseline; justify-content: space-between;
            gap: 16px; padding: 14px 6px;
            text-decoration: none; color: inherit;
            transition: padding-left 0.2s;
        }
        .article-list a:hover { padding-left: 14px; }
        .art-title { font-size: 0.97rem; color: var(--accent-blue); flex: 1; font-weight: 400; }
        .art-date { font-family: 'Montserrat'; font-size: 0.68rem; letter-spacing: 1px; color: var(--text-english); white-space: nowrap; flex-shrink: 0; }

        #loading { color: var(--accent-blue); opacity: 0.5; font-size: 0.9rem; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="stage">
        <header>
            <a href="../index.html" class="back-link">← RETURN HUB</a>
            <h1 class="page-title">佳作视界</h1>
            <div style="font-family:'Montserrat';font-size:0.75rem;letter-spacing:4px;color:var(--text-english);margin-top:6px;">Excellence Gallery</div>
        </header>

        <div id="loading" style="display:none;"></div>
        <ul class="article-list" id="article-list"></ul>
    </div>

    <script>
// ── 文章清单（由学习单平台自动维护，请勿手动编辑此行以下至 ARTICLES_END）──
// ARTICLES_START
var ARTICLES = [
  { file:"1g3-情境作文.html", title:"从看不起到刮目相看", cls:"1G3", date:"" }
];
// ARTICLES_END

(function(){
    var list = document.getElementById('article-list');
    if (!ARTICLES || ARTICLES.length === 0) return;
    var sorted = ARTICLES.slice().reverse();

    // 先渲染条目，日期异步填入
    sorted.forEach(function(a) {
        var li = document.createElement('li');
        li.innerHTML = '<a href="' + a.file + '">'
            + '<span class="art-title">' + a.title + '</span>'
            + '<span class="art-date" id="date-' + a.file.replace(/[^a-z0-9]/gi,'_') + '">' + (a.date || '') + '</span>'
            + '</a>';
        list.appendChild(li);

        // 如果已有日期就不用再查
        if (a.date) return;

        // 从 GitHub API 取上传日期
        fetch('https://api.github.com/repos/ch-flows/learning-hub/commits?path=03-gallery/' + encodeURIComponent(a.file) + '&per_page=1')
        .then(function(r){ return r.json(); })
        .then(function(data){
            if (!data || !data[0]) return;
            var d = new Date(data[0].commit.committer.date);
            var str = d.getFullYear() + '.'
                    + String(d.getMonth()+1).padStart(2,'0') + '.'
                    + String(d.getDate()).padStart(2,'0');
            var el = document.getElementById('date-' + a.file.replace(/[^a-z0-9]/gi,'_'));
            if (el) el.textContent = str;
        })
        .catch(function(){});
    });
})();
    </script>
</body>
</html>
